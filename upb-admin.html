/** Read a sheet tab via JSONP (no write token required, just "Anyone with link") */
function jsonpRead(sheetName) {
  return new Promise((resolve, reject) => {
    const cb = "_upbAdm" + Date.now() + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    let done = false;
    const cleanup = () => {
      if (done) return; done = true;
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    };
    window[cb] = (resp) => {
      cleanup();
      try {
        if (!resp || resp.status !== "ok") throw new Error("bad response");
        const { cols, rows } = resp.table;
        const headers = cols.map(c => (c.label || c.id || "").toLowerCase().replace(/\s+/g, "_").trim());
        const parsed = (rows || []).map(row => {
          const obj = {};
          (row.c || []).forEach((cell, i) => {
            obj[headers[i]] = cell && cell.v != null ? String(cell.v).trim() : "";
          });
          return obj;
        });
        resolve(parsed);
      } catch (e) { reject(e); }
    };
    script.onerror = () => { cleanup(); reject(new Error("script load error")); };
    const timer = setTimeout(() => { cleanup(); reject(new Error("timeout")); }, 12000);
    script.src = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json;responseHandler:${cb}&sheet=${encodeURIComponent(sheetName)}&headers=1`;
    document.head.appendChild(script);
  });
}

/** Write full sheet content (overwrites everything from A1) */
async function sheetsWrite(sheetName, cols, rows) {
  const tok = getToken();
  if (!tok) throw new Error("Not authenticated");
  const values = [cols, ...rows.map(r => cols.map(c => r[c] ?? ""))];
  const range  = `${sheetName}!A1`;
  const url    = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`;
  const resp   = await fetch(url, {
    method:  "PUT",
    headers: { "Authorization": `Bearer ${tok}`, "Content-Type": "application/json" },
    body:    JSON.stringify({ values }),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || resp.statusText);
  }
  return resp.json();
}

/** List all sheet tab names in the spreadsheet */
async function sheetsList() {
  const tok = getToken();
  if (!tok) return [];
  const resp = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}?fields=sheets.properties.title`,
    { headers: { "Authorization": `Bearer ${tok}` } }
  );
  if (!resp.ok) return [];
  const data = await resp.json();
  return (data.sheets || []).map(s => s.properties.title);
}

/** Add a new tab to the spreadsheet */
async function sheetsAddTab(sheetName) {
  const tok = getToken();
  if (!tok) throw new Error("Not authenticated");
  const resp = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}:batchUpdate`,
    {
      method:  "POST",
      headers: { "Authorization": `Bearer ${tok}`, "Content-Type": "application/json" },
      body:    JSON.stringify({ requests: [{ addSheet: { properties: { title: sheetName } } }] }),
    }
  );
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || resp.statusText);
  }
}

/**
 * Ensure a sheet tab exists. If not, create it and write defaultRows.
 * If it exists and has data, return that data. Otherwise seed with defaults.
 */
async function sheetsEnsure(sheetName, cols, defaultRows) {
  const existing = await sheetsList();
  if (!existing.includes(sheetName)) {
    await sheetsAddTab(sheetName);
    await sheetsWrite(sheetName, cols, defaultRows);
    return defaultRows;
  }
  try {
    const data = await jsonpRead(sheetName);
    if (data && data.length > 0) return data;
    // Sheet exists but is empty — seed it
    await sheetsWrite(sheetName, cols, defaultRows);
    return defaultRows;
  } catch {
    return defaultRows;
  }
}

// ── TOAST ──────────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = "ok") => {
    const id = Date.now() + Math.random();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3500);
  }, []);
  return { toasts, push };
}

function ToastContainer({ toasts }) {
  const colors = { ok: "bg-green-500", error: "bg-red-500", warn: "bg-amber-500" };
  const icons  = { ok: "✓", error: "✗", warn: "⚠" };
  return (
    <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id} className={`${colors[t.type] || colors.ok} text-white text-sm font-medium px-4 py-3 rounded-xl shadow-lg flex items-center gap-2 pointer-events-auto`}>
          <span>{icons[t.type] || "✓"}</span>
          <span>{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

function SyncBadge({ status }) {
  if (status === "saving") return <span className="text-xs text-amber-500 animate-pulse font-medium">Saving…</span>;
  if (status === "error")  return <span className="text-xs text-red-500 font-medium">Save failed — retry</span>;
  if (status === "idle")   return <span className="text-xs text-green-600 font-medium">✓ Saved to Sheets</span>;
  return null;
}

// ── GOOGLE AUTH GATE ───────────────────────────────────────────────────────────
function GoogleAuthGate({ onAuth }) {
  const [loading, setLoading] = useState(false);
  const [err, setErr]         = useState("");
  const clientRef             = useRef(null);

  useEffect(() => {
    let tries = 0;
    const init = () => {
      if (window.google?.accounts?.oauth2) {
        clientRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: SCOPES,
          callback: (resp) => {
            setLoading(false);
            if (resp.error) { setErr(resp.error_description || resp.error); return; }
            setToken(resp.access_token);
            onAuth(resp.access_token);
          },
        });
      } else if (tries++ < 30) {
        setTimeout(init, 300);
      } else {
        setErr("Google auth library failed to load. Please refresh the page.");
      }
    };
    init();
  }, [onAuth]);

  const handleSignIn = () => {
    setErr("");
    setLoading(true);
    clientRef.current?.requestAccessToken();
  };

  return (
    <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-amber-50 via-orange-50 to-yellow-50">
      <div className="bg-white rounded-2xl shadow-xl border border-gray-100 p-10 w-full max-w-sm text-center">
        <div className="w-16 h-16 bg-amber-100 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-5">🍺</div>
        <h1 className="text-2xl font-bold text-gray-800 mb-1">UPB Admin</h1>
        <p className="text-sm text-gray-400 mb-8">Sign in with your Google account to access admin features</p>
        {err && <p className="text-xs text-red-500 mb-4 px-2">{err}</p>}
        <button onClick={handleSignIn} disabled={loading}
          className="w-full py-3 bg-white hover:bg-gray-50 border border-gray-200 rounded-xl transition-colors flex items-center justify-center gap-3 text-sm font-medium text-gray-700 disabled:opacity-60 shadow-sm">
          {loading
            ? <span className="w-4 h-4 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"/>
            : <svg width="18" height="18" viewBox="0 0 18 18">
                <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
                <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
                <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
                <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/>
              </svg>
          }
          {loading ? "Signing in…" : "Sign in with Google"}
        </button>
        <p className="text-xs text-gray-400 mt-5">Only authorized accounts with edit access to the UPB Public Taps spreadsheet can sign in.</p>
      </div>
    </div>
  );
}

  const [events,     setEvents]     = useState([]);
  const [loading,    setLoading]    = useState(true);
  const [modal,      setModal]      = useState(null); // null | {} (new) | event (edit)
  const [syncStatus, setSyncStatus] = useState(null);
  const [filter,     setFilter]     = useState("all");

  useEffect(() => {
    (async () => {
      setLoading(true);
      try {
        const data = await sheetsEnsure(SHEET_EVENTS, EVENTS_COLS, []);
        setEvents(data);
      } catch(e) {
        push("Failed to load events: " + e.message, "error");
      } finally { setLoading(false); }
    })();
  }, []);

  const persist = async (next) => {
    setSyncStatus("saving");
    try {
      await sheetsWrite(SHEET_EVENTS, EVENTS_COLS, next);
      setSyncStatus("idle");
    } catch(e) {
      setSyncStatus("error");
      push("Save failed: " + e.message, "error");
      throw e;
    }
  };

  const handleSave = async (saved) => {
    const next = events.find(e => e.id === saved.id)
      ? events.map(e => e.id === saved.id ? saved : e)
      : [...events, saved];
    setEvents(next);
    setModal(null);
    await persist(next);
    push(saved.id && events.find(e => e.id === saved.id) ? "Event updated!" : "Event created!", "ok");
  };

  const handleDelete = async (id) => {
    if (!confirm("Delete this event? This cannot be undone.")) return;
    const next = events.filter(e => e.id !== id);
    setEvents(next);
    await persist(next);
    push("Event deleted", "ok");
  };

  const handleToggle = async (id) => {
    const next = events.map(e => e.id === id ? { ...e, active: e.active === "true" ? "false" : "true" } : e);
    setEvents(next);
    await persist(next);
    push("Visibility updated", "ok");
  };

  const filtered = events
    .filter(e => filter === "active" ? e.active === "true" : filter === "inactive" ? e.active !== "true" : true)
    .sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  return (
    <div>
      <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
        <div>
          <h2 className="text-lg font-bold text-gray-800">Events & News</h2>
          <div className="flex items-center gap-2 mt-0.5">
            <span className="text-xs text-gray-400">{events.length} post{events.length !== 1 ? "s" : ""}</span>
            {syncStatus && <><span className="text-gray-300">·</span><SyncBadge status={syncStatus}/></>}
          </div>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex gap-1 bg-gray-100 rounded-xl p-1">
            {[["all","All"],["active","Active"],["inactive","Hidden"]].map(([v,l]) => (
              <button key={v} onClick={() => setFilter(v)}
                className={`px-3 py-1 text-xs rounded-lg font-medium transition-colors ${filter === v ? "bg-white text-amber-700 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}>
                {l}
              </button>
            ))}
          </div>
          <button onClick={() => setModal({})}
            className="flex items-center gap-1.5 px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold rounded-xl transition-colors shadow-sm">
            <Icons.Plus/> New Post
          </button>
        </div>
      </div>

      {loading ? (
        <div className="flex items-center justify-center py-20 gap-2 text-gray-400 text-sm">
          <span className="w-4 h-4 border-2 border-amber-400 border-t-transparent rounded-full animate-spin"/>
          Loading events from Sheets…
        </div>
      ) : filtered.length === 0 ? (
        <div className="text-center py-20">
          <p className="text-gray-400 text-sm">No posts yet.</p>
          <button onClick={() => setModal({})} className="mt-3 text-sm text-amber-600 hover:underline">Create your first event →</button>
        </div>
      ) : (
        <div className="space-y-2">
          {filtered.map(evt => (
            <div key={evt.id}
              className={`bg-white rounded-xl border border-gray-100 px-4 py-3.5 flex items-start gap-3 hover:border-gray-200 transition-colors ${evt.active !== "true" ? "opacity-55" : ""}`}>
              <div className="flex-1 min-w-0">
                <div className="flex flex-wrap items-center gap-2 mb-1">
                  <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${TAG_COLORS[evt.tag] || TAG_COLORS["Other"]}`}>
                    {evt.tag || "Other"}
                  </span>
                  {evt.date && <span className="text-xs text-gray-400">{evt.date}</span>}
                  {evt.active !== "true" && (
                    <span className="text-xs text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full">Hidden</span>
                  )}
                </div>
                <p className="text-sm font-semibold text-gray-800 truncate">{evt.title_en || "(no title)"}</p>
                {evt.title_th && <p className="text-xs text-gray-400 truncate">{evt.title_th}</p>}
                {evt.desc_en && <p className="text-xs text-gray-500 mt-1 line-clamp-2 leading-relaxed">{evt.desc_en}</p>}
              </div>
              <div className="flex items-center gap-1 shrink-0 pt-0.5">
                <button title={evt.active === "true" ? "Hide from public site" : "Show on public site"}
                  onClick={() => handleToggle(evt.id)}
                  className={`p-1.5 rounded-lg transition-colors ${evt.active === "true" ? "bg-green-50 text-green-600 hover:bg-green-100" : "bg-gray-100 text-gray-400 hover:bg-gray-200"}`}>
                  {evt.active === "true" ? <Icons.Eye/> : <Icons.EyeOff/>}
                </button>
                <button onClick={() => setModal(evt)}
                  className="p-1.5 rounded-lg bg-amber-50 text-amber-600 hover:bg-amber-100 transition-colors">
                  <Icons.Edit/>
                </button>
                <button onClick={() => handleDelete(evt.id)}
                  className="p-1.5 rounded-lg bg-red-50 text-red-400 hover:bg-red-100 transition-colors">
                  <Icons.Trash/>
                </button>
              </div>
            </div>
          ))}
        </div>
      )}

      {modal !== null && (
        <EventModal
          initial={modal?.id ? modal : null}
          onSave={handleSave}
          onClose={() => setModal(null)}
        />
      )}
    </div>
  );
}

function AboutTab({ push, configRows, onConfigSave }) {

  const [form, setForm]       = useState(null);

  // Build initial form from configRows
  useEffect(() => {
    setForm({
      about_en:   get("about_desc",   "en"),
      about_th:   get("about_desc",   "th"),
      litres_en:  get("stat_litres",  "en"),
      litres_th:  get("stat_litres",  "th"),
      beers_en:   get("stat_beers",   "en"),
      beers_th:   get("stat_beers",   "th"),
      founded_en: get("stat_founded", "en"),

  if (!form) return <div className="text-sm text-gray-400 py-10 text-center">Loading…</div>;

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const handleSave = async (e) => {
    e.preventDefault();
    setSyncStatus("saving");
    try {
      await onConfigSave({
        about_desc:   { value_en: form.about_en,   value_th: form.about_th   },
        stat_litres:  { value_en: form.litres_en,  value_th: form.litres_th  },
        stat_beers:   { value_en: form.beers_en,   value_th: form.beers_th   },
        stat_founded: { value_en: form.founded_en, value_th: form.founded_th },
      });
      setSyncStatus("idle");
      push("About section saved!", "ok");
    } catch(e) {
      setSyncStatus("error");
      push("Save failed: " + e.message, "error");
    }
  };

  return (
    <form onSubmit={handleSave}>
      <div className="flex items-center justify-between mb-5">
        <div>
          <h2 className="text-lg font-bold text-gray-800">About the Brewery</h2>
          {syncStatus && <SyncBadge status={syncStatus}/>}

        <button type="submit" className="flex items-center gap-1.5 px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm">
          <Icons.Save/> Save Changes
        </button>
      </div>

      <div className="space-y-5">
        {/* Description */}
        <div className="bg-white rounded-xl border border-gray-100 p-5">
          <h3 className="text-sm font-semibold text-gray-700 mb-4">Brewery Description</h3>
          <div className="grid grid-cols-2 gap-4">
            {[["English","about_en","Our story in English..."],["ภาษาไทย","about_th","เรื่องราวของเราเป็นภาษาไทย..."]].map(([label,key,ph]) => (
              <div key={key}>
                <label className="text-xs font-medium text-gray-500 mb-1.5 block">{label}</label>
                <textarea rows={6} value={form[key]} onChange={e => set(key, e.target.value)} placeholder={ph}
                  className="w-full px-3 py-2.5 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400 resize-none leading-relaxed"/>
              </div>
            ))}
          </div>
        </div>

        {/* Stats */}
        <div className="bg-white rounded-xl border border-gray-100 p-5">
          <h3 className="text-sm font-semibold text-gray-700 mb-4">Stats <span className="text-xs font-normal text-gray-400">(shown on About section)</span></h3>
          <div className="grid grid-cols-3 gap-5">
            {[
              { label:"Annual Litres Brewed", en:"litres_en", th:"litres_th", ph_en:"e.g. 50,000", ph_th:"e.g. 50,000" },
              { label:"Beer Styles",           en:"beers_en",  th:"beers_th",  ph_en:"e.g. 20+",   ph_th:"e.g. 20+"    },
              { label:"Founded Year",          en:"founded_en",th:"founded_th",ph_en:"e.g. 2019",  ph_th:"e.g. 2562"   },
            ].map(({ label, en, th, ph_en, ph_th }) => (
              <div key={label} className="space-y-2">
                <p className="text-xs font-semibold text-gray-600">{label}</p>
                <input type="text" value={form[en]} onChange={e => set(en, e.target.value)} placeholder={ph_en}
                  className="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400"/>
                <input type="text" value={form[th]} onChange={e => set(th, e.target.value)} placeholder={ph_th}
                  className="w-full px-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-amber-400"/>
                <p className="text-xs text-gray-400">EN · TH</p>
              </div>
            ))}

        </div>
      </div>

  );
}

// ── ADMIN APP ──────────────────────────────────────────────────────────────────
const TABS = [
  { id: "events",   label: "Events & News", icon: "📅" },
  { id: "about",    label: "About",         icon: "🏭" },
  { id: "business", label: "Business Info", icon: "🕐" },
];

function AdminApp({ userEmail }) {
  const [tab,        setTab]        = useState("events");
  const [configRows, setConfigRows] = useState([]);
  const [cfgLoading, setCfgLoading] = useState(true);
  const { toasts, push } = useToast();

  // Load SiteConfig on mount
  useEffect(() => {
    (async () => {
      setCfgLoading(true);
      try {
        const data = await sheetsEnsure(SHEET_CONFIG, CONFIG_COLS, CONFIG_DEFAULTS);
        setConfigRows(data && data.length > 0 ? data : CONFIG_DEFAULTS);
      } catch(e) {
        push("Could not load site config — using defaults.", "warn");
        setConfigRows(CONFIG_DEFAULTS);
      } finally { setCfgLoading(false); }
    })();
  }, []);

  const handleConfigSave = async (updates) => {
    // updates = { key: { value_en, value_th }, ... }
    let next = [...configRows];
    Object.entries(updates).forEach(([key, vals]) => {
      const idx = next.findIndex(r => r.key === key);
      if (idx >= 0) next[idx] = { ...next[idx], ...vals };
      else next.push({ key, ...vals });
    });
    await sheetsWrite(SHEET_CONFIG, CONFIG_COLS, next);
    setConfigRows(next);
  };

  return (
    <div className="min-h-screen bg-gray-50">
      {/* Header */}
      <header className="bg-white border-b border-gray-100 sticky top-0 z-30 shadow-sm">
        <div className="max-w-5xl mx-auto px-4">
          <div className="flex items-center gap-4 py-0">
            {/* Brand */}
            <div className="flex items-center gap-2.5 py-3 shrink-0">
              <div className="w-8 h-8 bg-amber-500 rounded-lg flex items-center justify-center text-lg">🍺</div>
              <div>
                <span className="font-bold text-gray-800 text-sm leading-none block">UPB Admin</span>
                <span className="text-xs text-gray-400 leading-none">{userEmail || "Admin"}</span>
              </div>
            </div>
            {/* Nav */}
            <nav className="flex items-center gap-1 ml-4">
              {TABS.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)}
                  className={`flex items-center gap-1.5 px-3 py-2 text-sm font-medium rounded-xl transition-colors ${
                    tab === t.id ? "bg-amber-50 text-amber-700" : "text-gray-500 hover:text-gray-700 hover:bg-gray-50"
                  }`}>
                  <span className="text-base">{t.icon}</span>
                  <span>{t.label}</span>
                </button>
              ))}
            </nav>
            {/* Right side */}
            <div className="ml-auto flex items-center gap-2">
              <a href="upb-public.html" target="_blank" rel="noopener"
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition-colors">
                <Icons.Eye/> View Site
              </a>
              <button onClick={() => { setToken(null); window.location.reload(); }}
                className="flex items-center gap-1.5 px-3 py-1.5 text-xs text-gray-500 hover:text-gray-700 hover:bg-gray-100 rounded-xl transition-colors">
                <Icons.Logout/> Sign out
              </button>
            </div>
          </div>
        </div>
      </header>

      {/* Content */}
      <main className="max-w-5xl mx-auto px-4 py-6">
        {tab === "events"   && <EventsTab push={push}/>}
        {tab === "about"    && (cfgLoading ? <div className="text-center py-20 text-gray-400 text-sm">Loading config…</div> : <AboutTab push={push} configRows={configRows} onConfigSave={handleConfigSave}/>)}
        {tab === "business" && (cfgLoading ? <div className="text-center py-20 text-gray-400 text-sm">Loading config…</div> : <BusinessTab push={push} configRows={configRows} onConfigSave={handleConfigSave}/>)}
      </main>

      <ToastContainer toasts={toasts}/>
    </div>
  );
}

// ── ROOT ───────────────────────────────────────────────────────────────────────
function Root() {
  const [step,  setStep]  = useState("password");
  const [email, setEmail] = useState("");

  const handleAuth = useCallback((tok) => {
    // Fetch email from Google token info
    fetch(`https://www.googleapis.com/oauth2/v3/tokeninfo?access_token=${tok}`)
      .then(r => r.json())
      .then(d => setEmail(d.email || ""))
      .catch(() => {});
    setStep("app");
  }, []);

  if (step === "password") return <PasswordGate onPass={() => setStep("google")}/>;
  if (step === "google")   return <GoogleAuthGate onAuth={handleAuth}/>;
  return <AdminApp userEmail={email}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
