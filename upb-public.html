function parseCSVRow(line) {
  const cells = [];
  let cur = "", inQ = false;
  for (const ch of line) {
    if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { cells.push(cur); cur = ""; }
    else cur += ch;
  }
  cells.push(cur);
  return cells.map(c => c.trim().replace(/^"|"$/g, ""));
}

function parseCSV(text) {
  const lines = text.trim().split("\n").filter(Boolean);
  if (lines.length < 2) return [];
  const headers = parseCSVRow(lines[0]).map(h => h.toLowerCase().trim());
  return lines.slice(1).map(line => {
    const vals = parseCSVRow(line);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (vals[i] || "").trim(); });
    return obj;
  });
}

function fmtDate(dateStr, lang) {
  if (!dateStr) return "";
  try {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString(lang === "th" ? "th-TH" : "en-GB", {
      day: "numeric", month: "long", year: "numeric",
    });
  } catch { return dateStr; }
}

function tagClass(tag) {
  const m = { Event:"tag-event", News:"tag-news", Promo:"tag-promo", Collab:"tag-collab" };
  return m[tag] || "tag-news";
}

// Sort events: upcoming first (future → past)
function sortedEvents() {
  const today = new Date().toISOString().split("T")[0];
  return [...EVENTS].sort((a, b) => {
    const aFut = a.date >= today, bFut = b.date >= today;
    if (aFut && !bFut) return -1;
    if (!aFut && bFut) return 1;
    return aFut ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date);
  });
}

function TapCard({ tap, t, index }) {
  const colorSets = [
    { bg:"bg-amber-50",  border:"border-amber-200",  num:"text-amber-500",  badge:"bg-amber-100 text-amber-700"  },
    { bg:"bg-sky-50",    border:"border-sky-200",    num:"text-sky-500",    badge:"bg-sky-100 text-sky-700"      },
    { bg:"bg-emerald-50",border:"border-emerald-200",num:"text-emerald-500",badge:"bg-emerald-100 text-emerald-700"},
    { bg:"bg-violet-50", border:"border-violet-200", num:"text-violet-500", badge:"bg-violet-100 text-violet-700" },
    { bg:"bg-rose-50",   border:"border-rose-200",   num:"text-rose-500",   badge:"bg-rose-100 text-rose-700"    },
  ];
  const c = colorSets[index % colorSets.length];
  const isBrewery = (tap.source || "").toLowerCase() === "brewery";
  const sourceLabel = isBrewery ? t.tap_brewery : (tap.supplier || t.tap_supplier);

  return (
    <div className={`tap-card rounded-2xl p-5 border-2 ${c.bg} ${c.border} relative`}>
      {/* Tap number */}
      <div className={`font-display text-4xl font-bold ${c.num} leading-none mb-3`}>
        {tap.tap_line ? `${t.tap_line} ${tap.tap_line}` : `—`}
      </div>

      {/* Beer name */}
      <h3 className="font-display text-lg font-bold text-stone-900 leading-snug mb-1">{tap.beer_name || "—"}</h3>

      {/* Source badge */}
      <span className={`inline-block px-2.5 py-0.5 rounded-full text-xs font-medium ${c.badge} mb-3`}>
        {isBrewery ? "🏭 " : "🍻 "}{sourceLabel}
      </span>

      {/* Price + Size row */}
      <div className="flex items-center justify-between mt-auto pt-3 border-t border-white/60">
        <span className="text-xs text-stone-400">{tap.size || "—"}</span>
        {tap.price && <span className="text-sm font-bold text-stone-700">{t.tap_price}{tap.price}</span>}
      </div>
    </div>
  );
}

function ActiveTaps({ lang, t }) {
  const [taps, setTaps]       = useState([]);
  const [status, setStatus]   = useState("loading"); // "loading" | "ok" | "empty" | "error"
  const [lastUpd, setLastUpd] = useState(null);

  async function fetchTaps() {
    setStatus("loading");
    try {
      // Uses the "Publish to web" CSV endpoint — more reliable than gviz/tq for cross-origin fetch
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/pub?output=csv&sheet=TapLog`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const csv = await res.text();
      const rows = parseCSV(csv);
      const active = rows.filter(r => (r.status || "").toLowerCase() === "active")
        .sort((a, b) => {
          const na = parseInt(a.tap_line) || 99, nb = parseInt(b.tap_line) || 99;
          return na - nb;
        });
      setTaps(active);
      setStatus(active.length === 0 ? "empty" : "ok");
      setLastUpd(new Date().toLocaleTimeString(lang === "th" ? "th-TH" : "en-GB", { hour:"2-digit", minute:"2-digit" }));
    } catch (e) {
      console.warn("Tap fetch error:", e);
      setStatus("error");
    }
  }

  useEffect(() => { fetchTaps(); }, []);

  return (
    <section id="taps" className="py-24 bg-stone-50">
      <div className="max-w-6xl mx-auto px-5">
        {/* Header */}
        <div className="flex flex-wrap items-end justify-between gap-4 mb-12">
          <div>
            <p className="text-amber-600 text-xs font-bold uppercase tracking-widest mb-3">{t.taps_label}</p>
            <div className="section-rule mb-4"></div>
            <h2 className="font-display text-4xl md:text-5xl font-bold text-stone-900">{t.taps_title}</h2>
            <p className="text-stone-400 mt-2 text-sm">{t.taps_sub}</p>
          </div>
          <div className="flex items-center gap-3">
            {lastUpd && <span className="text-xs text-stone-400">Updated {lastUpd}</span>}
            <button onClick={fetchTaps}
              className="inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-amber-700 bg-amber-100 hover:bg-amber-200 rounded-full transition-colors">
              <IconRefresh /> {t.refresh}
            </button>
          </div>
        </div>

        {/* States */}
        {status === "loading" && (
          <div className="flex flex-col items-center justify-center py-20 gap-4">
            <div className="w-10 h-10 border-4 border-amber-200 border-t-amber-500 rounded-full animate-spin"></div>
            <p className="text-stone-400 text-sm">{t.taps_loading}</p>
          </div>
        )}

        {status === "error" && (
          <div className="bg-red-50 border border-red-100 rounded-2xl p-8 text-center">
            <p className="text-red-500 font-medium mb-1">{t.taps_error}</p>
            <p className="text-red-400 text-xs mt-2">Make sure the spreadsheet is shared as "Anyone with the link can view"</p>
            <button onClick={fetchTaps} className="mt-4 px-5 py-2 bg-red-100 hover:bg-red-200 text-red-600 rounded-full text-sm font-medium transition-colors">{t.refresh}</button>
          </div>
        )}

        {status === "empty" && (
          <div className="text-center py-20">
            <div className="text-5xl mb-4">🍺</div>
            <p className="text-stone-400">{t.taps_empty}</p>
          </div>
        )}

        {status === "ok" && (
          <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
            {taps.map((tap, i) => (
              <TapCard key={tap.id || i} tap={tap} t={t} index={i} lang={lang} />
            ))}
          </div>
        )}
      </div>
    </section>
  );
}

        )}

    </section>
  );
}
