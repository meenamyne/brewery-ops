                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── FILL LOG PAGE ────────────────────────────────────────────────────────
    function FillLogPage({ fillLog, setFillLog, beerList, kegStatus, setKegStatus, batches }) {
      const [showModal, setShowModal] = useState(false);
      const [search, setSearch] = useState("");
      const [kegSearch, setKegSearch] = useState("");

      function makeBlankForm() {
        return {
          date_filled: new Date().toISOString().split("T")[0],
          batch_id: "",
          keg_size: "20 L",
          selected_kegs: [],
          std_litres: 20,
          last_litres: 20,
          filled_by: STAFF[0],
          remark: "",
        };
      }
      const [form, setForm] = useState(makeBlankForm);

      // Sort batches newest-first for the dropdown
      const sortedBatches = [...batches].sort((a,b) => parseInt(b.batch_id) - parseInt(a.batch_id));
      const selectedBatch = sortedBatches.find(b => b.batch_id === form.batch_id);
      const beerName = selectedBatch?.beer_name || "";

      // Only show Empty kegs for the selected size, with optional search
      const availableKegs = [...kegStatus]
        .filter(k => k.size === form.keg_size && k.status === "Empty")
        .filter(k => !kegSearch || k.keg_id.toLowerCase().includes(kegSearch.toLowerCase()))
        .sort((a,b) => a.keg_id.localeCompare(b.keg_id));

      const multiKeg = form.selected_kegs.length > 1;
      const totalLitres = multiKeg
        ? (form.selected_kegs.length - 1) * (parseFloat(form.std_litres) || 0) + (parseFloat(form.last_litres) || 0)
        : (parseFloat(form.std_litres) || 0);

      function handleSizeChange(size) {
        setKegSearch("");
        setForm(f => ({
          ...f,
          keg_size: size,
          std_litres: parseInt(size) || 20,
          last_litres: parseInt(size) || 20,
          selected_kegs: [],
        }));
      }

      function toggleKeg(kegId) {
        setForm(f => ({
          ...f,
          selected_kegs: f.selected_kegs.includes(kegId)
            ? f.selected_kegs.filter(k => k !== kegId)
            : [...f.selected_kegs, kegId],
        }));
      }

      function handleSubmit(e) {
        e.preventDefault();
        if (!form.batch_id || !form.selected_kegs.length) return;
        const now = Date.now();
        const newEntries = form.selected_kegs.map((kegId, i) => {
          const isLast = i === form.selected_kegs.length - 1;
          return {
            id: now + i,
            date_filled: form.date_filled,
            beer_name: beerName,
            keg_size: form.keg_size,
            keg_id: kegId,
            filled_by: form.filled_by,
            batch_no: form.batch_id,
            litres: isLast && multiKeg
              ? parseFloat(form.last_litres) || 0
              : parseFloat(form.std_litres) || 0,
            remark: form.remark,
          };
        });
        setFillLog(prev => [...newEntries.reverse(), ...prev]);
        // Update keg status: Empty → Filled
        const filledSet = new Set(form.selected_kegs);
        setKegStatus(prev => prev.map(k =>
          filledSet.has(k.keg_id)
            ? { ...k, status: "Filled", beer_name: beerName, fill_date: form.date_filled, last_updated_by: form.filled_by }
            : k
        ));
        setShowModal(false);
        setKegSearch("");
        setForm(makeBlankForm());
      }

      const filtered = useMemo(() => {
        if (!search) return fillLog;
        const s = search.toLowerCase();
        return fillLog.filter(r => r.keg_id.toLowerCase().includes(s) || r.beer_name.toLowerCase().includes(s) || (r.filled_by||"").toLowerCase().includes(s));
      }, [fillLog, search]);

      const sorted = [...filtered].sort((a,b) => b.date_filled.localeCompare(a.date_filled));

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Fill Log</h1>
              <p className="text-sm text-gray-400 mt-0.5">{fillLog.length} entries</p>
            </div>
            <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Log Fill
            </button>
          </div>

          <div className="bg-white rounded-2xl p-4 border border-gray-100">
            <div className="relative">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search keg ID, beer or staff…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Filled</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Size</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Litres</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Filled By</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Batch #</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Remark</th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 ? (
                    <tr><td colSpan={8} className="text-center py-10 text-gray-400 text-sm">No fill log entries</td></tr>
                  ) : sorted.map((r, i) => (
                    <tr key={r.id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i % 2 === 0 ? "" : "bg-gray-50/40"}`}>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_filled)}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{r.beer_name}</td>
                      <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{r.keg_id}</td>
                      <td className="px-4 py-3 text-gray-600 whitespace-nowrap">{r.keg_size}</td>
                      <td className="px-4 py-3 text-gray-700 font-medium">{r.litres} L</td>
                      <td className="px-4 py-3 text-gray-600">{r.filled_by}</td>
                      <td className="px-4 py-3 text-gray-500">{r.batch_no || "—"}</td>
                      <td className="px-4 py-3 text-gray-400 max-w-40 truncate">{r.remark || "—"}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {showModal && (
            <Modal title="Log a Keg Fill" onClose={() => { setShowModal(false); setKegSearch(""); setForm(makeBlankForm()); }}>
              <form onSubmit={handleSubmit} className="space-y-4">
                {/* Date + Filled By */}
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Date Filled">
                    <input type="date" required value={form.date_filled} onChange={e => setForm(f=>({...f,date_filled:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Filled By">
                    <select value={form.filled_by} onChange={e => setForm(f=>({...f,filled_by:e.target.value}))} className={inputCls}>
                      {STAFF.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>

                {/* Batch selector → auto-fills beer name */}
                <Field label="Batch #">
                  <select required value={form.batch_id} onChange={e => setForm(f=>({...f, batch_id: e.target.value, selected_kegs: []}))} className={inputCls}>
                    <option value="">— Select batch —</option>
                    {sortedBatches.map(b => (
                      <option key={b.batch_id} value={b.batch_id}>
                        {b.batch_id} — {b.beer_name}  [{b.status}]
                      </option>
                    ))}
                  </select>
                  {beerName && (
                    <p className="text-xs mt-1.5 text-gray-500 flex items-center gap-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"></span>
                      {beerName}
                    </p>
                  )}
                </Field>

                {/* Keg Size toggle — 20 / 30 / 50 only */}
                <Field label="Keg Size">
                  <div className="flex gap-2">
                    {["20 L","30 L","50 L"].map(s => (
                      <label key={s} className={`flex-1 flex items-center justify-center py-2.5 rounded-xl border-2 cursor-pointer text-sm font-semibold transition-all ${form.keg_size === s ? "border-amber-400 bg-amber-50 text-amber-700" : "border-gray-200 text-gray-400 hover:border-gray-300"}`}>
                        <input type="radio" name="fillKegSize" value={s} checked={form.keg_size === s} onChange={() => handleSizeChange(s)} className="sr-only" />
                        {s}
                      </label>
                    ))}
                  </div>
                </Field>

                {/* Multi-select keg checkbox list — Empty kegs only */}
                <div className="flex flex-col gap-1.5">
                  <div className="flex items-center justify-between">
                    <label className="text-xs font-medium text-gray-500 uppercase tracking-wide">
                      Select Empty Kegs ({form.selected_kegs.length} selected)
                    </label>
                    {form.selected_kegs.length > 0 && (
                      <button type="button" onClick={() => setForm(f=>({...f, selected_kegs:[]}))} className="text-xs text-gray-400 hover:text-gray-600 transition-colors">Clear</button>
                    )}
                  </div>
                  <div className="relative">
                    <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input value={kegSearch} onChange={e => setKegSearch(e.target.value)} placeholder="Search keg ID…" className="w-full pl-8 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
                  </div>
                  <div className="border border-gray-200 rounded-xl overflow-hidden max-h-44 overflow-y-auto">
                    {availableKegs.length === 0 ? (
                      <p className="text-xs text-gray-400 text-center py-4">
                        {kegSearch ? `No empty ${form.keg_size} kegs matching "${kegSearch}"` : `No empty ${form.keg_size} kegs available`}
                      </p>
                    ) : availableKegs.map(k => (
                      <label key={k.keg_id} className={`flex items-center gap-2.5 px-3 py-2 cursor-pointer border-b border-gray-50 last:border-0 transition-colors ${form.selected_kegs.includes(k.keg_id) ? "bg-amber-50" : "hover:bg-gray-50"}`}>
                        <input type="checkbox" checked={form.selected_kegs.includes(k.keg_id)} onChange={() => toggleKeg(k.keg_id)} className="w-4 h-4 rounded accent-amber-500 shrink-0" />
                        <span className="font-mono text-xs font-semibold text-gray-700 flex-1">{k.keg_id}</span>
                        <span className="text-xs text-gray-400">{k.location || "Brewery"}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {/* Litres fields */}
                <div className="grid grid-cols-2 gap-4">
                  <Field label={multiKeg ? "Litres / Keg (standard)" : "Litres"}>
                    <input type="number" min={0} step={0.5} required value={form.std_litres} onChange={e => setForm(f=>({...f, std_litres: e.target.value}))} className={inputCls} />
                  </Field>
                  {multiKeg && (
                    <Field label={`Last Keg (${form.selected_kegs[form.selected_kegs.length - 1]})`}>
                      <input type="number" min={0} step={0.5} value={form.last_litres} onChange={e => setForm(f=>({...f, last_litres: e.target.value}))} className={inputCls} />
                      <p className="text-xs text-gray-400 mt-0.5">For partial last keg</p>
                    </Field>
                  )}
                </div>

                {/* Total summary pill */}
                {form.selected_kegs.length > 0 && (
                  <div className="flex items-center gap-2 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-xl px-3 py-2 text-xs font-medium">
                    <svg className="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>{form.selected_kegs.length} keg{form.selected_kegs.length > 1 ? "s" : ""} · Total: <strong>{totalLitres} L</strong></span>
                    {multiKeg && parseFloat(form.last_litres) !== parseFloat(form.std_litres) && (
                      <span className="text-emerald-600 font-normal">
                        ({form.selected_kegs.length - 1} × {form.std_litres} L + {form.last_litres} L last)
                      </span>
                    )}
                  </div>
                )}

                {/* Remark */}
                <Field label="Remark">
                  <input placeholder="Optional note" value={form.remark} onChange={e => setForm(f=>({...f,remark:e.target.value}))} className={inputCls} />
                </Field>

                <div className="flex gap-3 pt-1">
                  <button type="button" onClick={() => { setShowModal(false); setForm(makeBlankForm()); }} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" disabled={!form.batch_id || !form.selected_kegs.length} className="flex-1 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 disabled:bg-gray-200 disabled:text-gray-400 text-white text-sm font-medium rounded-xl transition-colors">
                    Save Fill{form.selected_kegs.length > 1 ? ` (${form.selected_kegs.length} kegs)` : ""}
                  </button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── STOCK OUT PAGE ───────────────────────────────────────────────────────
    function StockOutPage({ stockOut, setStockOut, kegStatus, setKegStatus }) {
      const [showModal, setShowModal] = useState(false);
      const [returnTarget, setReturnTarget] = useState(null);
      const [returnForm, setReturnForm] = useState({ date_returned: new Date().toISOString().split("T")[0], recorded_by: STAFF[0] });
      const [search, setSearch] = useState("");
      const [filterDest, setFilterDest] = useState("All");
      const [filterStatus, setFilterStatus] = useState("All");
      const [kegSearch, setKegSearch] = useState("");

      function makeBlankForm() {
        return {
          date_out: new Date().toISOString().split("T")[0],
          selected_kegs: [],
          destination: DESTINATIONS[0],
          recorded_by: STAFF[0],
          date_returned: "",
        };
      }
      const [form, setForm] = useState(makeBlankForm);

      // Only Filled kegs can go out, filtered by optional search
      const filledKegs = [...kegStatus]
        .filter(k => k.status === "Filled")
        .filter(k => !kegSearch || k.keg_id.toLowerCase().includes(kegSearch.toLowerCase()) || (k.beer_name||"").toLowerCase().includes(kegSearch.toLowerCase()))
        .sort((a,b) => a.keg_id.localeCompare(b.keg_id));

      function toggleKeg(kegId) {
        setForm(f => ({
          ...f,
          selected_kegs: f.selected_kegs.includes(kegId)
            ? f.selected_kegs.filter(k => k !== kegId)
            : [...f.selected_kegs, kegId],
        }));
      }

      function handleSubmit(e) {
        e.preventDefault();
        if (!form.selected_kegs.length) return;
        const now = Date.now();
        const newEntries = form.selected_kegs.map((kegId, i) => {
          const keg = kegStatus.find(k => k.keg_id === kegId);
          return {
            id: now + i,
            date_out: form.date_out,
            keg_id: kegId,
            beer_name: keg?.beer_name || "",
            destination: form.destination,
            recorded_by: form.recorded_by,
            date_returned: form.date_returned,
          };
        });
        setStockOut(prev => [...newEntries.reverse(), ...prev]);
        // Update keg status: Filled → Out
        const outSet = new Set(form.selected_kegs);
        setKegStatus(prev => prev.map(k =>
          outSet.has(k.keg_id)
            ? { ...k, status: "Out", date_out: form.date_out, location: form.destination, last_updated_by: form.recorded_by }
            : k
        ));
        setShowModal(false);
        setKegSearch("");
        setForm(makeBlankForm());
      }

      function openReturn(row) {
        setReturnTarget(row);
        setReturnForm({ date_returned: new Date().toISOString().split("T")[0], recorded_by: STAFF[0] });
      }

      function handleReturnSubmit(e) {
        e.preventDefault();
        // Update stock out record
        setStockOut(prev => prev.map(r =>
          r.id === returnTarget.id ? { ...r, date_returned: returnForm.date_returned } : r
        ));
        // Update keg status
        setKegStatus(prev => prev.map(k =>
          k.keg_id === returnTarget.keg_id
            ? { ...k, status: "Return", return_date: returnForm.date_returned, location: "Brewery", last_updated_by: returnForm.recorded_by }
            : k
        ));
        setReturnTarget(null);
      }

      const allDests = ["All", ...DESTINATIONS];

      const filtered = useMemo(() => {
        return stockOut.filter(r => {
          const s = search.toLowerCase();
          const matchSearch = !s || r.keg_id.toLowerCase().includes(s) || (r.beer_name||"").toLowerCase().includes(s) || (r.destination||"").toLowerCase().includes(s);
          const matchDest   = filterDest === "All" || r.destination === filterDest;
          const matchStatus = filterStatus === "All" || (filterStatus === "Out" ? !r.date_returned : !!r.date_returned);
          return matchSearch && matchDest && matchStatus;
        });
      }, [stockOut, search, filterDest, filterStatus]);

      const sorted = [...filtered].sort((a,b) => b.date_out.localeCompare(a.date_out));

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Stock Out</h1>
              <p className="text-sm text-gray-400 mt-0.5">{stockOut.length} entries · {stockOut.filter(s => !s.date_returned).length} currently out</p>
            </div>
            <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Log Stock Out
            </button>
          </div>

          <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-3">
            <div className="relative flex-1 min-w-48">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search keg ID, beer, destination…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
            </div>
            <select value={filterDest} onChange={e => setFilterDest(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
              {allDests.map(d => <option key={d}>{d}</option>)}
            </select>
            <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
              <option value="All">All Status</option>
              <option value="Out">Still Out</option>
              <option value="Returned">Returned</option>
            </select>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Out</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Destination</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Recorded By</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Returned</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Status</th>
                    <th className="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 ? (
                    <tr><td colSpan={8} className="text-center py-10 text-gray-400 text-sm">No stock out entries</td></tr>
                  ) : sorted.map((r, i) => (
                    <tr key={r.id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i % 2 === 0 ? "" : "bg-gray-50/40"}`}>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_out)}</td>
                      <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{r.keg_id}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{r.beer_name || "—"}</td>
                      <td className="px-4 py-3 text-gray-600">{r.destination}</td>
                      <td className="px-4 py-3 text-gray-600">{r.recorded_by}</td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_returned)}</td>
                      <td className="px-4 py-3">
                        {r.date_returned
                          ? <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-sky-50 text-sky-600"><span className="w-1.5 h-1.5 rounded-full bg-sky-400"></span>Returned</span>
                          : <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-amber-50 text-amber-600"><span className="w-1.5 h-1.5 rounded-full bg-amber-400"></span>Out</span>
                        }
                      </td>
                      <td className="px-4 py-3 text-right">
                        {!r.date_returned && (
                          <button
                            onClick={() => openReturn(r)}
                            className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-lg transition-colors whitespace-nowrap"
                          >
                            <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                            Mark Returned
                          </button>
                        )}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {returnTarget && (
            <Modal title="Mark Keg as Returned" onClose={() => setReturnTarget(null)}>
              {/* Keg summary */}
              <div className="mb-5 p-4 bg-gray-50 rounded-xl space-y-2">
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Keg</span>
                  <span className="font-mono text-sm font-semibold text-gray-700">{returnTarget.keg_id}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Beer</span>
                  <span className="text-sm text-gray-700 text-right max-w-56 truncate">{returnTarget.beer_name}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">From</span>
                  <span className="text-sm text-gray-600">{returnTarget.destination}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Sent Out</span>
                  <span className="text-sm text-gray-600">{fmt(returnTarget.date_out)}</span>
                </div>
              </div>
              <form onSubmit={handleReturnSubmit} className="space-y-4">
                <Field label="Date Returned">
                  <input type="date" required value={returnForm.date_returned} onChange={e => setReturnForm(f => ({...f, date_returned: e.target.value}))} className={inputCls} />
                </Field>
                <Field label="Recorded By">
                  <select value={returnForm.recorded_by} onChange={e => setReturnForm(f => ({...f, recorded_by: e.target.value}))} className={inputCls}>
                    {STAFF.map(s => <option key={s}>{s}</option>)}
                  </select>
                </Field>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => setReturnTarget(null)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-sky-500 hover:bg-sky-600 text-white text-sm font-medium rounded-xl transition-colors">Confirm Return</button>
                </div>
              </form>
            </Modal>
          )}

          {showModal && (
            <Modal title="Log a Stock Out" onClose={() => { setShowModal(false); setKegSearch(""); setForm(makeBlankForm()); }}>
              <form onSubmit={handleSubmit} className="space-y-4">
                {/* Date Out + Recorded By */}
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Date Out">
                    <input type="date" required value={form.date_out} onChange={e => setForm(f=>({...f,date_out:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Recorded By">
                    <select value={form.recorded_by} onChange={e => setForm(f=>({...f,recorded_by:e.target.value}))} className={inputCls}>
                      {STAFF.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>

                {/* Destination */}
                <Field label="Destination">
                  <select value={form.destination} onChange={e => setForm(f=>({...f,destination:e.target.value}))} className={inputCls}>
                    {DESTINATIONS.map(d => <option key={d}>{d}</option>)}
                  </select>
                </Field>

                {/* Multi-select keg list — Filled kegs only */}
                <div className="flex flex-col gap-1.5">
                  <div className="flex items-center justify-between">
                    <label className="text-xs font-medium text-gray-500 uppercase tracking-wide">
                      Select Kegs ({form.selected_kegs.length} selected)
                    </label>
                    {form.selected_kegs.length > 0 && (
                      <button type="button" onClick={() => setForm(f=>({...f, selected_kegs:[]}))} className="text-xs text-gray-400 hover:text-gray-600 transition-colors">Clear</button>
                    )}
                  </div>
                  <div className="relative">
                    <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input value={kegSearch} onChange={e => setKegSearch(e.target.value)} placeholder="Search keg ID or beer…" className="w-full pl-8 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
                  </div>
                  <div className="border border-gray-200 rounded-xl overflow-hidden max-h-52 overflow-y-auto">
                    {filledKegs.length === 0 ? (
                      <p className="text-xs text-gray-400 text-center py-4">
                        {kegSearch ? `No filled kegs matching "${kegSearch}"` : "No filled kegs available"}
                      </p>
                    ) : filledKegs.map(k => (
                      <label key={k.keg_id} className={`flex items-center gap-2.5 px-3 py-2.5 cursor-pointer border-b border-gray-50 last:border-0 transition-colors ${form.selected_kegs.includes(k.keg_id) ? "bg-amber-50" : "hover:bg-gray-50"}`}>
                        <input type="checkbox" checked={form.selected_kegs.includes(k.keg_id)} onChange={() => toggleKeg(k.keg_id)} className="w-4 h-4 rounded accent-amber-500 shrink-0" />
                        <span className="font-mono text-xs font-semibold text-gray-700 w-20 shrink-0">{k.keg_id}</span>
                        <span className="text-xs text-gray-500 flex-1 truncate">{k.beer_name || "—"}</span>
                        <span className="text-xs text-gray-400 shrink-0">{k.size}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {/* Summary of selected kegs */}
                {form.selected_kegs.length > 0 && (
                  <div className="bg-amber-50 border border-amber-100 rounded-xl px-3 py-2.5 space-y-1">
                    <p className="text-xs font-medium text-amber-700 mb-1.5">{form.selected_kegs.length} keg{form.selected_kegs.length > 1 ? "s" : ""} going to <strong>{form.destination}</strong></p>
                    {form.selected_kegs.map(kid => {
                      const k = kegStatus.find(x => x.keg_id === kid);
                      return (
                        <div key={kid} className="flex items-center gap-2 text-xs text-amber-800">
                          <span className="font-mono font-semibold w-20 shrink-0">{kid}</span>
                          <span className="text-amber-600 truncate">{k?.beer_name || "—"}</span>
                          <span className="text-amber-500 shrink-0">{k?.size}</span>
                        </div>
                      );
                    })}
                  </div>
                )}

                <div className="flex gap-3 pt-1">
                  <button type="button" onClick={() => { setShowModal(false); setKegSearch(""); setForm(makeBlankForm()); }} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" disabled={!form.selected_kegs.length} className="flex-1 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 disabled:bg-gray-200 disabled:text-gray-400 text-white text-sm font-medium rounded-xl transition-colors">
                    Save Stock Out{form.selected_kegs.length > 1 ? ` (${form.selected_kegs.length} kegs)` : ""}
                  </button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── BROKEN LOG PAGE ─────────────────────────────────────────────────────
    const SEVERITY_CONFIG = {
      High:   { bg:"bg-red-100",    text:"text-red-700",    dot:"bg-red-500"    },
      Medium: { bg:"bg-amber-100",  text:"text-amber-700",  dot:"bg-amber-500"  },
      Low:    { bg:"bg-yellow-100", text:"text-yellow-700", dot:"bg-yellow-500" },
    };
    const RESOLUTION_CONFIG = {
      "":         { bg:"bg-red-50",   text:"text-red-600",   label:"Unresolved" },
      Repaired:   { bg:"bg-emerald-50",text:"text-emerald-600",label:"Repaired" },
      Discarded:  { bg:"bg-gray-100", text:"text-gray-500",  label:"Discarded"  },
    };
    function SeverityBadge({ severity }) {
      const c = SEVERITY_CONFIG[severity] || { bg:"bg-gray-100", text:"text-gray-500", dot:"bg-gray-400" };
      return <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text}`}><span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>{severity || "—"}</span>;
    }
    function ResolutionBadge({ resolution }) {
      const c = RESOLUTION_CONFIG[resolution] || RESOLUTION_CONFIG[""];
      return <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text}`}>{c.label}</span>;
    }

    function BrokenLogPage({ brokenLog, setBrokenLog, kegStatus, setKegStatus }) {
      const [showModal, setShowModal] = useState(false);
      const [search, setSearch] = useState("");
      const [filterSev, setFilterSev] = useState("All");
      const [form, setForm] = useState({
        date_reported: new Date().toISOString().split("T")[0],
        keg_id: "", beer_name: "", where: "", reported_by: STAFF[0],
        severity: "High", reason: "Leak", resolution: "", resolution_date: "", returned_date: "",
      });

      function handleKegSelect(keg_id) {
        const keg = kegStatus.find(k => k.keg_id === keg_id);
        setForm(f => ({...f, keg_id, beer_name: keg ? (keg.beer_name || "") : ""}));
      }

      function handleSubmit(e) {
        e.preventDefault();
        const newEntry = { ...form, id: Date.now() };
        setBrokenLog(prev => [newEntry, ...prev]);
        setKegStatus(prev => prev.map(k =>
          k.keg_id === form.keg_id ? { ...k, status: "Broken", last_updated_by: form.reported_by } : k
        ));
        setShowModal(false);
        setForm({ date_reported: new Date().toISOString().split("T")[0], keg_id:"", beer_name:"", where:"", reported_by:STAFF[0], severity:"High", reason:"Leak", resolution:"", resolution_date:"", returned_date:"" });
      }

      const filtered = useMemo(() => {
        return brokenLog.filter(r => {
          const s = search.toLowerCase();
          const match = !s || r.keg_id.toLowerCase().includes(s) || (r.beer_name||"").toLowerCase().includes(s) || (r.reason||"").toLowerCase().includes(s);
          const sev = filterSev === "All" || r.severity === filterSev;
          return match && sev;
        });
      }, [brokenLog, search, filterSev]);

      const sorted = [...filtered].sort((a,b) => (b.date_reported||"").localeCompare(a.date_reported||""));
      const unresolvedCount = brokenLog.filter(r => !r.resolution).length;

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Broken Log</h1>
              <p className="text-sm text-gray-400 mt-0.5">{brokenLog.length} reports · <span className="text-red-500 font-medium">{unresolvedCount} unresolved</span></p>
            </div>
            <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Report Issue
            </button>
          </div>

          <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-3">
            <div className="relative flex-1 min-w-48">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search keg ID, beer, reason…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
            </div>
            <select value={filterSev} onChange={e => setFilterSev(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
              {["All","High","Medium","Low"].map(s => <option key={s}>{s}</option>)}
            </select>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Location</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Reported By</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Severity</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Reason</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Resolution</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Resolved Date</th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 ? (
                    <tr><td colSpan={9} className="text-center py-10 text-gray-400 text-sm">No issues reported</td></tr>
                  ) : sorted.map((r, i) => (
                    <tr key={r.id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i%2===0?"":"bg-gray-50/40"}`}>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_reported)}</td>
                      <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{r.keg_id}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-40 truncate">{r.beer_name || "—"}</td>
                      <td className="px-4 py-3 text-gray-600">{r.where || "—"}</td>
                      <td className="px-4 py-3 text-gray-600">{r.reported_by || "—"}</td>
                      <td className="px-4 py-3"><SeverityBadge severity={r.severity} /></td>
                      <td className="px-4 py-3 text-gray-600">{r.reason || "—"}</td>
                      <td className="px-4 py-3"><ResolutionBadge resolution={r.resolution} /></td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.resolution_date)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {showModal && (
            <Modal title="Report Keg Issue" onClose={() => setShowModal(false)}>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Date Reported">
                    <input type="date" required value={form.date_reported} onChange={e => setForm(f=>({...f,date_reported:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Reported By">
                    <select value={form.reported_by} onChange={e => setForm(f=>({...f,reported_by:e.target.value}))} className={inputCls}>
                      {STAFF.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>
                <Field label="Keg ID">
                  <input required placeholder="e.g. K20_061" value={form.keg_id}
                    onChange={e => handleKegSelect(e.target.value.toUpperCase())}
                    list="all-kegs-broken" className={inputCls} />
                  <datalist id="all-kegs-broken">
                    {kegStatus.map(k => <option key={k.keg_id} value={k.keg_id}>{k.keg_id} — {k.beer_name || "empty"}</option>)}
                  </datalist>
                </Field>
                {form.beer_name && (
                  <div className="px-3 py-2 bg-gray-50 rounded-lg text-xs text-gray-600">🍺 {form.beer_name}</div>
                )}
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Location / Where">
                    <input placeholder="e.g. UPB, Client" value={form.where} onChange={e => setForm(f=>({...f,where:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Severity">
                    <select value={form.severity} onChange={e => setForm(f=>({...f,severity:e.target.value}))} className={inputCls}>
                      {["High","Medium","Low"].map(s=><option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>
                <Field label="Reason">
                  <select value={form.reason} onChange={e => setForm(f=>({...f,reason:e.target.value}))} className={inputCls}>
                    {["Leak","Lost","Damaged","No keg out","Other"].map(r=><option key={r}>{r}</option>)}
                  </select>
                </Field>
                <div className="border-t border-gray-100 pt-4">
                  <p className="text-xs text-gray-400 mb-3 uppercase tracking-wide font-medium">Resolution (optional)</p>
                  <div className="grid grid-cols-2 gap-4">
                    <Field label="Resolution">
                      <select value={form.resolution} onChange={e => setForm(f=>({...f,resolution:e.target.value}))} className={inputCls}>
                        <option value="">Unresolved</option>
                        <option>Repaired</option>
                        <option>Discarded</option>
                      </select>
                    </Field>
                    <Field label="Resolution Date">
                      <input type="date" value={form.resolution_date} onChange={e => setForm(f=>({...f,resolution_date:e.target.value}))} className={inputCls} />
                    </Field>
                  </div>
                </div>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => setShowModal(false)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-colors">Save Report</button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── BATCHES PAGE ─────────────────────────────────────────────────────────
    const BATCH_STATUS_CONFIG = {
      Pending:    { bg:"bg-gray-100",    text:"text-gray-500"   },
      Brewing:    { bg:"bg-amber-100",   text:"text-amber-700"  },
      Fermenting: { bg:"bg-sky-100",     text:"text-sky-700"    },
      Condition:  { bg:"bg-violet-100",  text:"text-violet-700" },
      Ready:      { bg:"bg-emerald-100", text:"text-emerald-700"},
      Filling:    { bg:"bg-blue-100",    text:"text-blue-700"   },
      Done:       { bg:"bg-gray-100",    text:"text-gray-400"   },
    };
    const BATCH_STATUSES = ["Pending","Brewing","Fermenting","Condition","Ready","Filling","Done"];
    function BatchStatusBadge({ status }) {
      const c = BATCH_STATUS_CONFIG[status] || BATCH_STATUS_CONFIG.Done;
      return <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text}`}>{status}</span>;
    }

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    function calcReleaseDate(brewDay, fermDays, condDays) {
      if (!brewDay || !fermDays) return "";
      const d = new Date(brewDay);
      d.setDate(d.getDate() + parseInt(fermDays||0) + parseInt(condDays||0));
      return d.toISOString().split("T")[0];
    }

    function BatchesPage({ batches, setBatches, beerList, setBeerList, fillLog, onOpenBrewsheet }) {
      const [tab, setTab]               = useState("batches");
      const [search, setSearch]         = useState("");
      const [filterStatus, setFilterStatus] = useState("All");
      const [showBatchModal, setShowBatchModal] = useState(false);
      const [showBeerModal, setShowBeerModal]   = useState(false);

      const today = new Date().toISOString().split("T")[0];
      const nextBatchId = batches.length
        ? Math.max(...batches.map(b => parseInt(b.batch_id)||0)) + 1
        : 215;

      const emptyBatchForm = () => ({
        batch_id: nextBatchId,
        brew_day: today,
        beer_name: beerList[0]?.name || "",
        fermenter: "F01",
        volume: 400,
        fermentation_days: 14,
        condition_days: 7,
        status: "Pending",
      });
      const [batchForm, setBatchForm] = useState(emptyBatchForm);
      const [beerForm,  setBeerForm]  = useState({ name:"", style:"" });

      // Auto-calc release date from form
      const previewRelease = calcReleaseDate(batchForm.brew_day, batchForm.fermentation_days, batchForm.condition_days);

      // Filled litres from fill log per batch
      function filledForBatch(batchId) {
        return fillLog
          .filter(f => String(f.batch_no) === String(batchId))
          .reduce((s,f) => s + (parseFloat(f.litres)||0), 0);
      }

      function handleAddBatch(e) {
        e.preventDefault();
        const newBatch = {
          id: Date.now(),
          batch_id: String(batchForm.batch_id),
          brew_day: batchForm.brew_day,
          beer_name: batchForm.beer_name,
          fermenter: batchForm.fermenter,
          volume: parseInt(batchForm.volume)||0,
          filled_litres: 0,
          fermentation_days: parseInt(batchForm.fermentation_days)||0,
          condition_days: parseInt(batchForm.condition_days)||0,
          release_date: previewRelease,
          status: batchForm.status,
        };
        setBatches(prev => [newBatch, ...prev]);
        setShowBatchModal(false);
        setBatchForm(emptyBatchForm());
      }

      function handleStatusChange(batchId, newStatus) {
        setBatches(prev => prev.map(b => b.id === batchId ? {...b, status: newStatus} : b));
      }

      function handleAddBeer(e) {
        e.preventDefault();
        if (!beerForm.name.trim()) return;
        setBeerList(prev => [...prev, { name: beerForm.name.trim(), style: beerForm.style.trim() }]);
        setShowBeerModal(false);
        setBeerForm({ name:"", style:"" });
      }

      // Fermenter occupancy hint for dropdown
      const activeFermenters = {};
      batches.filter(b => !["Done","Ready"].includes(b.status) && b.fermenter).forEach(b => {
        activeFermenters[b.fermenter] = b.beer_name;
      });

      const filteredBatches = useMemo(() => batches.filter(b => {
        const s = search.toLowerCase();
        const match = !s || String(b.batch_id).includes(s) || b.beer_name.toLowerCase().includes(s) || (b.fermenter||"").toLowerCase().includes(s);
        const st = filterStatus === "All" || b.status === filterStatus;
        return match && st;
      }), [batches, search, filterStatus]);

      const sorted = [...filteredBatches].sort((a,b) => (b.brew_day||"").localeCompare(a.brew_day||""));
      const totalLitres = batches.reduce((s,b) => s + (b.filled_litres||0), 0);
      const active = batches.filter(b => b.status !== "Done").length;

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Batches & Beers</h1>
              <p className="text-sm text-gray-400 mt-0.5">{batches.length} batches · {active} active · {totalLitres.toLocaleString()} L total</p>
            </div>
            {tab === "batches"
              ? <button onClick={() => { setBatchForm(emptyBatchForm()); setShowBatchModal(true); }} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                  Add Batch
                </button>
              : <button onClick={() => setShowBeerModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                  Add Beer
                </button>
            }
          </div>

          <div className="flex gap-1 bg-gray-100 p-1 rounded-xl w-fit">
            {[{id:"batches",label:`Batch Log (${batches.length})`},{id:"beers",label:`Beer List (${beerList.length})`}].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===t.id?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ── BATCH LOG TAB ────────────────────────────────────────── */}
          {tab === "batches" && (<>
            <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-3">
              <div className="relative flex-1 min-w-48">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search batch #, beer, fermenter…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
              </div>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                {["All",...BATCH_STATUSES].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
              <div className="table-scroll">
                <table className="w-full text-sm">
                  <thead><tr className="border-b border-gray-100">
