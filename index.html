              <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                <option value="All">All Status</option>
                <option value="Out">Still Out</option>
                <option value="Returned">Returned</option>
              </select>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              {[{id:"all",label:"Show All"},{id:"today",label:"Today"},{id:"period",label:"By Period"}].map(opt => (
                <button key={opt.id} onClick={() => setDateMode(opt.id)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${dateMode===opt.id?"bg-amber-500 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                  {opt.label}
                </button>
              ))}
              {dateMode === "period" && (<>
                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
                <span className="text-xs text-gray-400">–</span>
                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
              </>)}
            </div>
          </div>

          {/* Out / Returned toggle */}
          <div className="flex items-center gap-2">
            <button onClick={() => { setOutView("out"); setSelectedIds(new Set()); }}
              className={`inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium transition-colors ${outView==="out" ? "bg-amber-500 text-white shadow-sm" : "bg-white border border-gray-200 text-gray-600 hover:bg-gray-50"}`}>
              <span className="w-2 h-2 rounded-full bg-amber-300 inline-block"></span>
              Kegs Out
            </button>
            <button onClick={() => { setOutView("returned"); setSelectedIds(new Set()); }}
              className={`inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium transition-colors ${outView==="returned" ? "bg-sky-500 text-white shadow-sm" : "bg-white border border-gray-200 text-gray-600 hover:bg-gray-50"}`}>
              <span className="w-2 h-2 rounded-full bg-sky-300 inline-block"></span>
              Returned Kegs
            </button>
          </div>

          {(() => {
            const viewRows = sorted.filter(r => outView === "out" ? !r.date_returned : !!r.date_returned);
            const allOutSelected = viewRows.length > 0 && viewRows.every(r => selectedIds.has(r.id));
            const showCheckbox = outView === "out";
            const colSpanTotal = showCheckbox ? 10 : 9;
            return (
              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="table-scroll">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="border-b border-gray-100 bg-gray-50/60">
                        {showCheckbox && (
                          <th className="px-3 py-3 w-10">
                            <input type="checkbox" checked={allOutSelected} onChange={() => toggleSelectAll(viewRows)}
                              className="w-4 h-4 rounded accent-sky-500" title="Select all still-out kegs" />
                          </th>
                        )}
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Out</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Destination</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Recorded By</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Remark</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Returned</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Status</th>
                        <th className="px-4 py-3"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {viewRows.length === 0 ? (
                        <tr><td colSpan={colSpanTotal} className="text-center py-10 text-gray-400 text-sm">
                          {outView === "out" ? "No kegs currently out" : "No returned kegs"}
                        </td></tr>
                      ) : viewRows.map((r, i) => {
                        const isChecked = selectedIds.has(r.id);
                        return (
                          <tr key={r.id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${isChecked ? "bg-sky-50/60" : i % 2 === 0 ? "" : "bg-gray-50/40"}`}>
                            {showCheckbox && (
                              <td className="px-3 py-3 w-10">
                                <input type="checkbox" checked={isChecked} onChange={() => toggleSelect(r.id)}
                                  className="w-4 h-4 rounded accent-sky-500" />
                              </td>
                            )}
                            <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_out)}</td>
                            <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{r.keg_id}</td>
                            <td className="px-4 py-3 text-gray-700 max-w-40 truncate">{r.beer_name || "—"}</td>
                            <td className="px-4 py-3 text-gray-600">{r.destination}</td>
                            <td className="px-4 py-3 text-gray-600">{r.recorded_by}</td>
                            <td className="px-4 py-3 text-gray-400 text-xs max-w-40 truncate" title={r.remark||""}>{r.remark || "—"}</td>
                            <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_returned)}</td>
                            <td className="px-4 py-3">
                              {r.date_returned
                                ? <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-sky-50 text-sky-600"><span className="w-1.5 h-1.5 rounded-full bg-sky-400"></span>Returned</span>
                                : <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-amber-50 text-amber-600"><span className="w-1.5 h-1.5 rounded-full bg-amber-400"></span>Out</span>
                              }
                            </td>
                            <td className="px-4 py-3 text-right">
                              <div className="flex items-center justify-end gap-2">
                                {!r.date_returned && (
                                  <button onClick={() => openReturn(r)}
                                    className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-sky-600 bg-sky-50 hover:bg-sky-100 rounded-lg transition-colors whitespace-nowrap">
                                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                                    Return
                                  </button>
                                )}
                                {r.date_returned && (
                                  <button onClick={() => handleUndoReturn(r)}
                                    className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-orange-500 bg-orange-50 hover:bg-orange-100 rounded-lg transition-colors whitespace-nowrap">
                                    <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0019 16V8a1 1 0 00-1.6-.8l-5.333 4z"/><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4.066 11.2a1 1 0 000 1.6l5.334 4A1 1 0 0011 16V8a1 1 0 00-1.6-.8l-5.334 4z"/></svg>
                                    Undo Return
                                  </button>
                                )}
                                <button onClick={() => handleDeleteStockOut(r.id, r.keg_id, r.beer_name)}
                                  className="text-xs text-red-400 hover:text-red-600 transition-colors px-2 py-1 rounded hover:bg-red-50 whitespace-nowrap">Delete</button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })()}

          {returnTarget && (
            <Modal title="Mark Keg as Returned" onClose={() => setReturnTarget(null)}>
              {/* Keg summary */}
              <div className="mb-5 p-4 bg-gray-50 rounded-xl space-y-2">
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Keg</span>
                  <span className="font-mono text-sm font-semibold text-gray-700">{returnTarget.keg_id}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Beer</span>
                  <span className="text-sm text-gray-700 text-right max-w-56 truncate">{returnTarget.beer_name}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">From</span>
                  <span className="text-sm text-gray-600">{returnTarget.destination}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Sent Out</span>
                  <span className="text-sm text-gray-600">{fmt(returnTarget.date_out)}</span>
                </div>
              </div>
              <form onSubmit={handleReturnSubmit} className="space-y-4">
                <Field label="Date Returned">
                  <input type="date" required value={returnForm.date_returned} onChange={e => setReturnForm(f => ({...f, date_returned: e.target.value}))} className={inputCls} />
                </Field>
                <Field label="Recorded By">
                  <select value={returnForm.recorded_by} onChange={e => setReturnForm(f => ({...f, recorded_by: e.target.value}))} className={inputCls}>
                    {STAFF.map(s => <option key={s}>{s}</option>)}
                  </select>
                </Field>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => setReturnTarget(null)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-sky-500 hover:bg-sky-600 text-white text-sm font-medium rounded-xl transition-colors">Confirm Return</button>
                </div>
              </form>
            </Modal>
          )}

          {showBatchReturn && (
            <Modal title={`Batch Return — ${selectedIds.size} Keg${selectedIds.size > 1 ? "s" : ""}`} onClose={() => setShowBatchReturn(false)}>
              <div className="mb-5 p-4 bg-sky-50 border border-sky-100 rounded-xl">
                <p className="text-xs font-medium text-sky-700 mb-2">{selectedIds.size} keg{selectedIds.size > 1 ? "s" : ""} will be marked as Returned:</p>
                <div className="space-y-1 max-h-40 overflow-y-auto">
                  {stockOut.filter(r => selectedIds.has(r.id)).map(r => (
                    <div key={r.id} className="flex items-center gap-2 text-xs text-sky-800">
                      <span className="font-mono font-semibold w-20 shrink-0">{r.keg_id}</span>
                      <span className="text-sky-600 truncate">{r.beer_name || "—"}</span>
                      <span className="text-sky-400 shrink-0 ml-auto">{r.destination}</span>
                    </div>
                  ))}
                </div>
              </div>
              <form onSubmit={handleBatchReturn} className="space-y-4">
                <Field label="Date Returned">
                  <input type="date" required value={batchReturnForm.date_returned} onChange={e => setBatchReturnForm(f => ({...f, date_returned: e.target.value}))} className={inputCls} />
                </Field>
                <Field label="Recorded By">
                  <select value={batchReturnForm.recorded_by} onChange={e => setBatchReturnForm(f => ({...f, recorded_by: e.target.value}))} className={inputCls}>
                    {STAFF.map(s => <option key={s}>{s}</option>)}
                  </select>
                </Field>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => setShowBatchReturn(false)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-sky-500 hover:bg-sky-600 text-white text-sm font-medium rounded-xl transition-colors">
                    Confirm Return ({selectedIds.size})
                  </button>
                </div>
              </form>
            </Modal>
          )}

          {showModal && (
            <Modal title="Log a Stock Out" onClose={() => { setShowModal(false); setKegSearch(""); setForm(makeBlankForm()); }}>
              <form onSubmit={handleSubmit} className="space-y-4">
                {/* Date Out + Recorded By */}
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Date Out">
                    <input type="date" required value={form.date_out} onChange={e => setForm(f=>({...f,date_out:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Recorded By">
                    <select value={form.recorded_by} onChange={e => setForm(f=>({...f,recorded_by:e.target.value}))} className={inputCls}>
                      {STAFF.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>

                {/* Destination */}
                <Field label="Destination">
                  <select value={form.destination} onChange={e => setForm(f=>({...f,destination:e.target.value}))} className={inputCls}>
                    {DESTINATIONS.map(d => <option key={d}>{d}</option>)}
                  </select>
                </Field>

                {/* Multi-select keg list — Filled kegs only */}
                <div className="flex flex-col gap-1.5">
                  <div className="flex items-center justify-between">
                    <label className="text-xs font-medium text-gray-500 uppercase tracking-wide">
                      Select Kegs ({form.selected_kegs.length} selected)
                    </label>
                    {form.selected_kegs.length > 0 && (
                      <button type="button" onClick={() => setForm(f=>({...f, selected_kegs:[]}))} className="text-xs text-gray-400 hover:text-gray-600 transition-colors">Clear</button>
                    )}
                  </div>
                  <div className="relative">
                    <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input value={kegSearch} onChange={e => setKegSearch(e.target.value)} placeholder="Search keg ID or beer…" className="w-full pl-8 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
                  </div>
                  <div className="border border-gray-200 rounded-xl overflow-hidden max-h-52 overflow-y-auto">
                    {filledKegs.length === 0 ? (
                      <p className="text-xs text-gray-400 text-center py-4">
                        {kegSearch ? `No filled kegs matching "${kegSearch}"` : "No filled kegs available"}
                      </p>
                    ) : filledKegs.map(k => (
                      <label key={k.keg_id} className={`flex items-center gap-2.5 px-3 py-2.5 cursor-pointer border-b border-gray-50 last:border-0 transition-colors ${form.selected_kegs.includes(k.keg_id) ? "bg-amber-50" : "hover:bg-gray-50"}`}>
                        <input type="checkbox" checked={form.selected_kegs.includes(k.keg_id)} onChange={() => toggleKeg(k.keg_id)} className="w-4 h-4 rounded accent-amber-500 shrink-0" />
                        <span className="font-mono text-xs font-semibold text-gray-700 w-20 shrink-0">{k.keg_id}</span>
                        <span className="text-xs text-gray-500 flex-1 truncate">{k.beer_name || "—"}</span>
                        <span className="text-xs text-gray-400 shrink-0">{k.size}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {/* Summary of selected kegs */}
                {form.selected_kegs.length > 0 && (
                  <div className="bg-amber-50 border border-amber-100 rounded-xl px-3 py-2.5 space-y-1">
                    <p className="text-xs font-medium text-amber-700 mb-1.5">{form.selected_kegs.length} keg{form.selected_kegs.length > 1 ? "s" : ""} going to <strong>{form.destination}</strong></p>
                    {form.selected_kegs.map(kid => {
                      const k = kegStatus.find(x => x.keg_id === kid);
                      return (
                        <div key={kid} className="flex items-center gap-2 text-xs text-amber-800">
                          <span className="font-mono font-semibold w-20 shrink-0">{kid}</span>
                          <span className="text-amber-600 truncate">{k?.beer_name || "—"}</span>
                          <span className="text-amber-500 shrink-0">{k?.size}</span>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Remark */}
                <Field label="Remark (optional)">
                  <input value={form.remark} onChange={e => setForm(f=>({...f, remark: e.target.value}))} placeholder="e.g. client name, event name…" className={inputCls} />
                </Field>

                <div className="flex gap-3 pt-1">
                  <button type="button" onClick={() => { setShowModal(false); setKegSearch(""); setForm(makeBlankForm()); }} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" disabled={!form.selected_kegs.length} className="flex-1 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 disabled:bg-gray-200 disabled:text-gray-400 text-white text-sm font-medium rounded-xl transition-colors">
                    Save Stock Out{form.selected_kegs.length > 1 ? ` (${form.selected_kegs.length} kegs)` : ""}
                  </button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── KEG CLEANING PAGE ───────────────────────────────────────────────────
    function KegCleaningPage({ kegStatus, setKegStatus, brokenLog, setBrokenLog, stockOut }) {
      const STAFF = React.useContext(StaffCtx);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [brokenTarget, setBrokenTarget] = useState(null);
      const [brokenForm, setBrokenForm] = useState({
        date_reported: new Date().toISOString().split("T")[0],
        reported_by: STAFF[0], severity: "High", reason: "Leak", where: "", resolution: "", resolution_date: "", returned_date: "",
      });
      const [search, setSearch] = useState("");
      const [filterType, setFilterType] = useState("All");

      const KEG_TYPES = ["All","20L KeyKeg","30L KeyKeg","50L KeyKeg","One Way","Other"];
      function kegTypeCleaning(id) {
        if (!id) return "Other";
        if (id.startsWith("OW_"))  return "One Way";
        if (id.startsWith("K50_")) return "50L KeyKeg";
        if (id.startsWith("K30_")) return "30L KeyKeg";
        if (id.startsWith("K20_")) return "20L KeyKeg";
        return "Other";
      }

      const allReturnKegs = kegStatus.filter(k => k.status === "Return");
      const returnKegs = allReturnKegs.filter(k => {
        const q = search.toLowerCase();
        if (q && !k.keg_id?.toLowerCase().includes(q) && !k.beer_name?.toLowerCase().includes(q)) return false;
        if (filterType !== "All" && kegTypeCleaning(k.keg_id) !== filterType) return false;
        return true;
      });

      function toggleSelect(id) {
        setSelectedIds(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      }
      function toggleSelectAll() {
        if (selectedIds.size === returnKegs.length && returnKegs.every(k => selectedIds.has(k.keg_id)))
          setSelectedIds(new Set());
        else setSelectedIds(new Set(returnKegs.map(k => k.keg_id)));
      }

      function handleBatchClean() {
        if (selectedIds.size === 0) return;
        setKegStatus(prev => prev.map(k =>
          selectedIds.has(k.keg_id) && k.status === "Return"
            ? { ...k, status: "Empty", beer_name: "", size: k.size, last_updated_by: "—" }
            : k
        ));
        setSelectedIds(new Set());
      }

      function openBrokenModal(keg) {
        setBrokenTarget(keg);
        setBrokenForm({
          date_reported: new Date().toISOString().split("T")[0],
          reported_by: STAFF[0], severity: "High", reason: "Leak",
          where: (() => {
            const last = [...(stockOut||[])].reverse().find(s => s.keg_id === keg.keg_id);
            return last ? last.destination : "";
          })(),
          resolution: "", resolution_date: "", returned_date: "",
        });
      }

      function handleBrokenSubmit(e) {
        e.preventDefault();
        const entry = {
          ...brokenForm,
          id: Date.now(),
          keg_id: brokenTarget.keg_id,
          beer_name: brokenTarget.beer_name || "",
        };
        setBrokenLog(prev => [entry, ...prev]);
        setKegStatus(prev => prev.map(k =>
          k.keg_id === brokenTarget.keg_id
            ? { ...k, status: "Broken", last_updated_by: brokenForm.reported_by }
            : k
        ));
        setBrokenTarget(null);
      }

      const allSelected = returnKegs.length > 0 && returnKegs.every(k => selectedIds.has(k.keg_id));

      return (
        <div className="space-y-5">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-bold text-gray-800">Keg Cleaning</h1>
              <p className="text-sm text-gray-400 mt-0.5">Kegs awaiting cleaning after return — mark clean to set status back to Empty</p>
            </div>
            {selectedIds.size > 0 && (
              <button onClick={handleBatchClean}
                className="inline-flex items-center gap-2 px-4 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium rounded-xl transition-colors shadow-sm">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
                Mark {selectedIds.size} Keg{selectedIds.size>1?"s":""} Clean
              </button>
            )}
          </div>

          {/* Stats */}
          <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
            <div className="bg-white rounded-2xl border border-gray-100 p-4">
              <p className="text-xs text-gray-400 uppercase tracking-wide mb-1">Total Awaiting</p>
              <p className="text-2xl font-bold text-amber-500">{allReturnKegs.length}</p>
            </div>
            <div className="bg-white rounded-2xl border border-gray-100 p-4">
              <p className="text-xs text-gray-400 uppercase tracking-wide mb-1">Showing</p>
              <p className="text-2xl font-bold text-gray-600">{returnKegs.length}</p>
            </div>
            <div className="bg-white rounded-2xl border border-gray-100 p-4 col-span-2">
              <p className="text-xs text-gray-400 uppercase tracking-wide mb-1">Selected</p>
              <p className="text-2xl font-bold text-emerald-500">{selectedIds.size}</p>
            </div>
          </div>

          {/* Search + Filter */}
          <div className="flex flex-wrap gap-2 items-center">
            <div className="relative flex-1 min-w-48">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
              <input type="text" value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Search keg ID or beer name…"
                className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-300 bg-white" />
            </div>
            <div className="flex gap-1.5 flex-wrap">
              {KEG_TYPES.map(t => (
                <button key={t} onClick={() => setFilterType(t)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${filterType===t ? "bg-emerald-500 text-white" : "bg-white border border-gray-200 text-gray-600 hover:bg-gray-50"}`}>
                  {t}
                </button>
              ))}
            </div>
          </div>

          {/* Table */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100 bg-gray-50/60">
                    <th className="px-3 py-3 w-10">
                      <input type="checkbox" checked={allSelected} onChange={toggleSelectAll}
                        className="w-4 h-4 rounded accent-emerald-500" title="Select all" />
                    </th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Size</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Last Updated By</th>
                    <th className="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {returnKegs.length === 0 ? (
                    <tr><td colSpan={6} className="text-center py-12 text-gray-400 text-sm">
                      <div className="flex flex-col items-center gap-2">
                        <svg className="w-8 h-8 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        <span>No kegs awaiting cleaning</span>
                      </div>
                    </td></tr>
                  ) : returnKegs.map((keg, i) => {
                    const isChecked = selectedIds.has(keg.keg_id);
                    return (
                      <tr key={keg.keg_id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${isChecked ? "bg-emerald-50/60" : i % 2 === 0 ? "" : "bg-gray-50/40"}`}>
                        <td className="px-3 py-3 w-10">
                          <input type="checkbox" checked={isChecked} onChange={() => toggleSelect(keg.keg_id)}
                            className="w-4 h-4 rounded accent-emerald-500" />
                        </td>
                        <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{keg.keg_id}</td>
                        <td className="px-4 py-3 text-gray-700">{keg.beer_name || <span className="text-gray-300">—</span>}</td>
                        <td className="px-4 py-3 text-gray-500">{keg.size || "—"}</td>
                        <td className="px-4 py-3 text-gray-500">{keg.last_updated_by || "—"}</td>
                        <td className="px-4 py-3 text-right">
                          <div className="flex items-center justify-end gap-2">
                            <button onClick={() => {
                                setKegStatus(prev => prev.map(k =>
                                  k.keg_id === keg.keg_id ? { ...k, status: "Empty", beer_name: "", size: k.size, last_updated_by: "—" } : k
                                ));
                                setSelectedIds(prev => { const n = new Set(prev); n.delete(keg.keg_id); return n; });
                              }}
                              className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition-colors whitespace-nowrap">
                              <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7"/></svg>
                              Mark Clean
                            </button>
                            <button onClick={() => openBrokenModal(keg)}
                              className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-red-500 bg-red-50 hover:bg-red-100 rounded-lg transition-colors whitespace-nowrap">
                              <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                              Broken Log
                            </button>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* Send to Broken Log modal */}
          {brokenTarget && (
            <Modal title="Send to Broken Log" onClose={() => setBrokenTarget(null)}>
              <div className="mb-5 p-4 bg-red-50 rounded-xl space-y-2">
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Keg</span>
                  <span className="font-mono text-sm font-semibold text-gray-700">{brokenTarget.keg_id}</span>
                </div>
                <div className="flex items-center justify-between">
                  <span className="text-xs text-gray-400 uppercase tracking-wide">Beer</span>
                  <span className="text-sm text-gray-700">{brokenTarget.beer_name || "—"}</span>
                </div>
              </div>
              <form onSubmit={handleBrokenSubmit} className="space-y-4">
                <Field label="Date Reported">
                  <input type="date" required value={brokenForm.date_reported}
                    onChange={e => setBrokenForm(f => ({...f, date_reported: e.target.value}))} className={inputCls} />
                </Field>
                <Field label="Reported By">
                  <select value={brokenForm.reported_by}
                    onChange={e => setBrokenForm(f => ({...f, reported_by: e.target.value}))} className={inputCls}>
                    {STAFF.map(s => <option key={s}>{s}</option>)}
                  </select>
                </Field>
                <Field label="Severity">
                  <select value={brokenForm.severity}
                    onChange={e => setBrokenForm(f => ({...f, severity: e.target.value}))} className={inputCls}>
                    {["High","Medium","Low"].map(s => <option key={s}>{s}</option>)}
                  </select>
                </Field>
                <Field label="Reason">
                  <select value={brokenForm.reason}
                    onChange={e => setBrokenForm(f => ({...f, reason: e.target.value}))} className={inputCls}>
                    {["Leak","Dent","Valve broken","Coupler stuck","Other"].map(r => <option key={r}>{r}</option>)}
                  </select>
                </Field>
                <Field label="Where Found">
                  <input type="text" value={brokenForm.where}
                    onChange={e => setBrokenForm(f => ({...f, where: e.target.value}))} className={inputCls} placeholder="Location or venue" />
                </Field>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => setBrokenTarget(null)}
                    className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit"
                    className="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-colors">Send to Broken Log</button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── BROKEN LOG PAGE ─────────────────────────────────────────────────────
    const SEVERITY_CONFIG = {
      High:   { bg:"bg-red-100",    text:"text-red-700",    dot:"bg-red-500"    },
      Medium: { bg:"bg-amber-100",  text:"text-amber-700",  dot:"bg-amber-500"  },
      Low:    { bg:"bg-yellow-100", text:"text-yellow-700", dot:"bg-yellow-500" },
    };
    const RESOLUTION_CONFIG = {
      "":         { bg:"bg-red-50",   text:"text-red-600",   label:"Unresolved" },
      Repaired:   { bg:"bg-emerald-50",text:"text-emerald-600",label:"Repaired" },
      Discarded:  { bg:"bg-gray-100", text:"text-gray-500",  label:"Discarded"  },
    };
    function SeverityBadge({ severity }) {
      const c = SEVERITY_CONFIG[severity] || { bg:"bg-gray-100", text:"text-gray-500", dot:"bg-gray-400" };
      return <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text}`}><span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>{severity || "—"}</span>;
    }
    function ResolutionBadge({ resolution }) {
      const c = RESOLUTION_CONFIG[resolution] || RESOLUTION_CONFIG[""];
      return <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text}`}>{c.label}</span>;
    }

    function BrokenLogPage({ brokenLog, setBrokenLog, kegStatus, setKegStatus }) {
      const STAFF = React.useContext(StaffCtx);
      const [showModal, setShowModal] = useState(false);
      const [search, setSearch] = useState("");
      const [filterSev, setFilterSev] = useState("All");
      const [form, setForm] = useState({
        date_reported: new Date().toISOString().split("T")[0],
        keg_id: "", beer_name: "", where: "", reported_by: STAFF[0],
        severity: "High", reason: "Leak", resolution: "", resolution_date: "", returned_date: "",
      });

      function handleKegSelect(keg_id) {
        const keg = kegStatus.find(k => k.keg_id === keg_id);
        setForm(f => ({...f, keg_id, beer_name: keg ? (keg.beer_name || "") : ""}));
      }

      function handleDeleteBroken(id, keg_id) {
        // Revert keg: Broken → Empty (only if still Broken)
        setKegStatus(prev => prev.map(k =>
          k.keg_id === keg_id && k.status === "Broken"
            ? { ...k, status: "Empty", beer_name: "", last_updated_by: k.last_updated_by }
            : k
        ));
        setBrokenLog(prev => prev.filter(r => r.id !== id));
      }

      function handleSubmit(e) {
        e.preventDefault();
        const newEntry = { ...form, id: Date.now() };
        setBrokenLog(prev => [newEntry, ...prev]);
        setKegStatus(prev => prev.map(k =>
          k.keg_id === form.keg_id ? { ...k, status: "Broken", last_updated_by: form.reported_by } : k
        ));
        setShowModal(false);
        setForm({ date_reported: new Date().toISOString().split("T")[0], keg_id:"", beer_name:"", where:"", reported_by:STAFF[0], severity:"High", reason:"Leak", resolution:"", resolution_date:"", returned_date:"" });
      }

      const filtered = useMemo(() => {
        return brokenLog.filter(r => {
          const s = search.toLowerCase();
          const match = !s || r.keg_id.toLowerCase().includes(s) || (r.beer_name||"").toLowerCase().includes(s) || (r.reason||"").toLowerCase().includes(s);
          const sev = filterSev === "All" || r.severity === filterSev;
          return match && sev;
        });
      }, [brokenLog, search, filterSev]);

      const sorted = [...filtered].sort((a,b) => (b.date_reported||"").localeCompare(a.date_reported||""));
      const unresolvedCount = brokenLog.filter(r => !r.resolution).length;

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Broken Log</h1>
              <p className="text-sm text-gray-400 mt-0.5">{brokenLog.length} reports · <span className="text-red-500 font-medium">{unresolvedCount} unresolved</span></p>
            </div>
            <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Report Issue
            </button>
          </div>

          <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-3">
            <div className="relative flex-1 min-w-48">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search keg ID, beer, reason…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
            </div>
            <select value={filterSev} onChange={e => setFilterSev(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
              {["All","High","Medium","Low"].map(s => <option key={s}>{s}</option>)}
            </select>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Location</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Reported By</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Severity</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Reason</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Resolution</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Resolved Date</th>
                    <th className="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 ? (
                    <tr><td colSpan={10} className="text-center py-10 text-gray-400 text-sm">No issues reported</td></tr>
                  ) : sorted.map((r, i) => (
                    <tr key={r.id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i%2===0?"":"bg-gray-50/40"}`}>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_reported)}</td>
                      <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{r.keg_id}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-40 truncate">{r.beer_name || "—"}</td>
                      <td className="px-4 py-3 text-gray-600">{r.where || "—"}</td>
                      <td className="px-4 py-3 text-gray-600">{r.reported_by || "—"}</td>
                      <td className="px-4 py-3"><SeverityBadge severity={r.severity} /></td>
                      <td className="px-4 py-3 text-gray-600">{r.reason || "—"}</td>
                      <td className="px-4 py-3"><ResolutionBadge resolution={r.resolution} /></td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.resolution_date)}</td>
                      <td className="px-4 py-3 text-right">
                        <button onClick={() => handleDeleteBroken(r.id, r.keg_id)} className="text-xs text-red-400 hover:text-red-600 transition-colors px-2 py-0.5 rounded hover:bg-red-50">Delete</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {showModal && (
            <Modal title="Report Keg Issue" onClose={() => setShowModal(false)}>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Date Reported">
                    <input type="date" required value={form.date_reported} onChange={e => setForm(f=>({...f,date_reported:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Reported By">
                    <select value={form.reported_by} onChange={e => setForm(f=>({...f,reported_by:e.target.value}))} className={inputCls}>
                      {STAFF.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>
                <Field label="Keg ID">
                  <input required placeholder="e.g. K20_061" value={form.keg_id}
                    onChange={e => handleKegSelect(e.target.value.toUpperCase())}
                    list="all-kegs-broken" className={inputCls} />
                  <datalist id="all-kegs-broken">
                    {kegStatus.map(k => <option key={k.keg_id} value={k.keg_id}>{k.keg_id} — {k.beer_name || "empty"}</option>)}
                  </datalist>
                </Field>
                {form.beer_name && (
                  <div className="px-3 py-2 bg-gray-50 rounded-lg text-xs text-gray-600">🍺 {form.beer_name}</div>
                )}
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Location / Where">
                    <input placeholder="e.g. UPB, Client" value={form.where} onChange={e => setForm(f=>({...f,where:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Severity">
                    <select value={form.severity} onChange={e => setForm(f=>({...f,severity:e.target.value}))} className={inputCls}>
                      {["High","Medium","Low"].map(s=><option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>
                <Field label="Reason">
                  <select value={form.reason} onChange={e => setForm(f=>({...f,reason:e.target.value}))} className={inputCls}>
                    {["Leak","Lost","Damaged","No keg out","Other"].map(r=><option key={r}>{r}</option>)}
                  </select>
                </Field>
                <div className="border-t border-gray-100 pt-4">
                  <p className="text-xs text-gray-400 mb-3 uppercase tracking-wide font-medium">Resolution (optional)</p>
                  <div className="grid grid-cols-2 gap-4">
                    <Field label="Resolution">
                      <select value={form.resolution} onChange={e => setForm(f=>({...f,resolution:e.target.value}))} className={inputCls}>
                        <option value="">Unresolved</option>
                        <option>Repaired</option>
                        <option>Discarded</option>
                      </select>
                    </Field>
                    <Field label="Resolution Date">
                      <input type="date" value={form.resolution_date} onChange={e => setForm(f=>({...f,resolution_date:e.target.value}))} className={inputCls} />
                    </Field>
                  </div>
                </div>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => setShowModal(false)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-colors">Save Report</button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── BATCHES PAGE ─────────────────────────────────────────────────────────
    const BATCH_STATUS_CONFIG = {
      Planned:    { bg:"bg-indigo-50",   text:"text-indigo-500" },
      Pending:    { bg:"bg-gray-100",    text:"text-gray-500"   },
      Brewing:    { bg:"bg-amber-100",   text:"text-amber-700"  },
      Fermenting: { bg:"bg-sky-100",     text:"text-sky-700"    },
      Condition:  { bg:"bg-violet-100",  text:"text-violet-700" },
      Ready:      { bg:"bg-emerald-100", text:"text-emerald-700"},
      Filling:    { bg:"bg-blue-100",    text:"text-blue-700"   },
      Done:       { bg:"bg-gray-100",    text:"text-gray-400"   },
    };
    const BATCH_STATUSES = ["Planned","Pending","Brewing","Fermenting","Condition","Ready","Filling","Done"];
    function BatchStatusBadge({ status }) {
      const c = BATCH_STATUS_CONFIG[status] || BATCH_STATUS_CONFIG.Done;
      return <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text}`}>{status}</span>;
    }

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    function calcReleaseDate(brewDay, fermDays, condDays) {
      if (!brewDay || !fermDays) return "";
      const d = new Date(brewDay);
      d.setDate(d.getDate() + parseInt(fermDays||0) + parseInt(condDays||0));
      return d.toISOString().split("T")[0];
    }

    function BatchesPage({ batches, setBatches, beerList, setBeerList, fillLog, batchTasks, setBatchTasks, onOpenBrewsheet }) {
      const [tab, setTab]               = useState("batches");
      const [batchListTab, setBatchListTab] = useState("active"); // "active" | "done"
      const [search, setSearch]         = useState("");
      const [filterStatus, setFilterStatus] = useState("All");
      const [batchPage, setBatchPage]   = useState(1);
      const BATCH_PAGE_SIZE = 10;
      const [showBatchModal, setShowBatchModal] = useState(false);
      const [showBeerModal, setShowBeerModal]   = useState(false);
      const [editBatchId,   setEditBatchId]     = useState(null); // null = add mode, id = edit mode
      // deleteConfirm: null | { type:"beer", idx, name, linkedBatches[] }
      //               | { type:"batch", batch, taskCount }
      const [deleteConfirm, setDeleteConfirm]   = useState(null);
      // Beer List view/filter state
      const [beerView,    setBeerView]    = useState("cards"); // "cards" | "table"
      const [beerSearch,  setBeerSearch]  = useState("");
      const [filterBrand, setFilterBrand] = useState("");
      const [filterStyle, setFilterStyle] = useState("");

      const today = new Date().toISOString().split("T")[0];
      const nextBatchId = batches.length
        ? Math.max(...batches.map(b => parseInt(b.batch_id)||0)) + 1
        : 215;

      const emptyBatchForm = () => ({
        batch_id: nextBatchId,
        brew_day: today,
        beer_name: beerList[0]?.name || "",
        fermenter: "F01",
        volume: 400,
        fermentation_days: 14,
        condition_days: 7,
        status: "Planned",
      });
      const [batchForm, setBatchForm] = useState(emptyBatchForm);
      const [beerForm,  setBeerForm]  = useState({ brand:"", name:"", style:"", abv:"", contract: false });
      const [editBeerIdx, setEditBeerIdx] = useState(null); // null = add mode, number = edit mode

      function openEditBeer(idx) {
        const b = beerList[idx];
        setBeerForm({ brand: b.brand||"", name: b.name||"", style: b.style||"", abv: b.abv||"", contract: b.contract === "true" });
        setEditBeerIdx(idx);
        setShowBeerModal(true);
      }

      function openAddBeer() {
        setBeerForm({ brand:"", name:"", style:"", abv:"", contract: false });
        setEditBeerIdx(null);
        setShowBeerModal(true);
      }

      function handleDeleteBeer(idx) {
        const beer = beerList[idx];
        const linkedBatches = batches.filter(b => b.beer_name === beer.name);
        if (linkedBatches.length > 0) {
          // Show warning — beer is used in batches
          setDeleteConfirm({ type: "beer", idx, name: beer.name, linkedBatches });
        } else {
          // Safe to delete directly
          setBeerList(prev => prev.filter((_, i) => i !== idx));
        }
      }

      function handleDeleteBatch(batch) {
        const taskCount = batchTasks.filter(t => t.batch_id === batch.batch_id).length;
        setDeleteConfirm({ type: "batch", batch, taskCount });
      }

      function confirmDeleteBeer(force) {
        if (force) setBeerList(prev => prev.filter((_, i) => i !== deleteConfirm.idx));
        setDeleteConfirm(null);
      }

      function confirmDeleteBatch() {
        const { batch } = deleteConfirm;
        setBatches(prev => prev.filter(b => b.id !== batch.id));
        setBatchTasks(prev => prev.filter(t => t.batch_id !== batch.batch_id));
        setDeleteConfirm(null);
      }

      // Auto-calc release date from form
      const previewRelease = calcReleaseDate(batchForm.brew_day, batchForm.fermentation_days, batchForm.condition_days);

      // Filled litres from fill log per batch
      function filledForBatch(batchId) {
        return fillLog
          .filter(f => String(f.batch_no) === String(batchId))
          .reduce((s,f) => s + (parseFloat(f.litres)||0), 0);
      }

      function handleAddBatch(e) {
        e.preventDefault();
        const isPlanned = batchForm.status === "Planned";
        const newBatch = {
          id: Date.now(),
          batch_id: String(batchForm.batch_id),
          brew_day: batchForm.brew_day || "",            // may be empty for Planned
          beer_name: batchForm.beer_name,
          fermenter: batchForm.fermenter || (isPlanned ? "TBD" : "F01"),
          volume: parseInt(batchForm.volume)||0,
          filled_litres: 0,
          fermentation_days: parseInt(batchForm.fermentation_days)||0,
          condition_days: parseInt(batchForm.condition_days)||0,
          release_date: previewRelease || "",            // may be empty if no brew_day
          status: batchForm.status,
        };
        setBatches(prev => [newBatch, ...prev]);
        setShowBatchModal(false);
        setBatchForm(emptyBatchForm());
      }

      function handleStatusChange(batchId, newStatus) {
        setBatches(prev => prev.map(b => b.id === batchId ? {...b, status: newStatus} : b));
      }

      function openEditBatch(batch) {
        setBatchForm({
          batch_id:          batch.batch_id,
          brew_day:          batch.brew_day || "",
          beer_name:         batch.beer_name,
          fermenter:         batch.fermenter || "TBD",
          volume:            batch.volume,
          fermentation_days: batch.fermentation_days,
          condition_days:    batch.condition_days || 0,
          status:            batch.status,
        });
        setEditBatchId(batch.id);
        setShowBatchModal(true);
      }

      function handleEditBatch(e) {
        e.preventDefault();
        const updRelease = calcReleaseDate(batchForm.brew_day, batchForm.fermentation_days, batchForm.condition_days);
        setBatches(prev => prev.map(b => b.id === editBatchId ? {
          ...b,
          brew_day:          batchForm.brew_day || "",
          beer_name:         batchForm.beer_name,
          fermenter:         batchForm.fermenter || "TBD",
          volume:            parseInt(batchForm.volume)||0,
          fermentation_days: parseInt(batchForm.fermentation_days)||0,
          condition_days:    parseInt(batchForm.condition_days)||0,
          release_date:      updRelease || b.release_date,
          status:            batchForm.status,
        } : b));
        setShowBatchModal(false);
        setEditBatchId(null);
        setBatchForm(emptyBatchForm());
      }

      function handleAddBeer(e) {
        e.preventDefault();
        if (!beerForm.name.trim()) return;
        const updated = { brand: beerForm.brand.trim(), name: beerForm.name.trim(), style: beerForm.style.trim(), abv: beerForm.abv.trim(), contract: beerForm.contract ? "true" : "" };
        if (editBeerIdx !== null) {
          setBeerList(prev => prev.map((b, i) => i === editBeerIdx ? updated : b));
        } else {
          setBeerList(prev => [...prev, updated]);
        }
        setShowBeerModal(false);
        setEditBeerIdx(null);
        setBeerForm({ brand:"", name:"", style:"", abv:"", contract: false });
      }

      // Fermenter occupancy hint for dropdown
      const activeFermenters = {};
      batches.filter(b => !["Done","Ready"].includes(b.status) && b.fermenter).forEach(b => {
        activeFermenters[b.fermenter] = b.beer_name;
      });

      const filteredBatches = useMemo(() => batches.filter(b => {
        const s = search.toLowerCase();
        const match = !s || String(b.batch_id).includes(s) || b.beer_name.toLowerCase().includes(s) || (b.fermenter||"").toLowerCase().includes(s);
        const isDone = b.status === "Done";
        if (batchListTab === "active" && isDone) return false;
        if (batchListTab === "done" && !isDone) return false;
        const st = batchListTab === "active" ? (filterStatus === "All" || b.status === filterStatus) : true;
        return match && st;
      }), [batches, search, filterStatus, batchListTab]);

      const sorted = [...filteredBatches].sort((a,b) => (b.brew_day||"").localeCompare(a.brew_day||""));
      const batchTotalPages = Math.max(1, Math.ceil(sorted.length / BATCH_PAGE_SIZE));
      const batchPageClamped = Math.min(batchPage, batchTotalPages);
      const pagedBatches = sorted.slice((batchPageClamped - 1) * BATCH_PAGE_SIZE, batchPageClamped * BATCH_PAGE_SIZE);
      const totalLitres = batches.reduce((s,b) => s + (b.filled_litres||0), 0);
      const active = batches.filter(b => b.status !== "Done").length;

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Batches & Beers</h1>
              <p className="text-sm text-gray-400 mt-0.5">{batches.length} batches · {active} active · {totalLitres.toLocaleString()} L total</p>
            </div>
            {tab === "batches"
              ? <button onClick={() => { setBatchForm(emptyBatchForm()); setShowBatchModal(true); }} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                  Add Batch
                </button>
              : <button onClick={() => openAddBeer()} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                  Add Beer
                </button>
            }
          </div>

          <div className="flex gap-1 bg-gray-100 p-1 rounded-xl w-fit">
            {[{id:"batches",label:`Batch Log (${batches.length})`},{id:"beers",label:`Beer List (${beerList.length})`}].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all ${tab===t.id?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ── BATCH LOG TAB ────────────────────────────────────────── */}
          {tab === "batches" && (<>
            {/* Active / Done sub-tabs */}
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex gap-1 bg-gray-100 p-1 rounded-xl">
                {[
                  { id:"active", label:"Active", count: batches.filter(b => b.status !== "Done").length },
                  { id:"done",   label:"Done",   count: batches.filter(b => b.status === "Done").length },
                ].map(tb => (
                  <button key={tb.id} onClick={() => { setBatchListTab(tb.id); setBatchPage(1); setSearch(""); setFilterStatus("All"); }}
                    className={`px-3 py-1.5 rounded-lg text-sm font-medium transition-all flex items-center gap-1.5 ${batchListTab === tb.id ? "bg-white text-gray-800 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}>
                    {tb.label}
                    <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${tb.id === "active" ? "bg-amber-100 text-amber-700" : "bg-emerald-100 text-emerald-700"}`}>{tb.count}</span>
                  </button>
                ))}
              </div>
            </div>
            {/* Search + filter bar */}
            <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-3">
              <div className="relative flex-1 min-w-48">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={search} onChange={e=>{setSearch(e.target.value);setBatchPage(1);}} placeholder="Search batch #, beer, fermenter…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
              </div>
              {batchListTab === "active" && (
                <select value={filterStatus} onChange={e=>{setFilterStatus(e.target.value);setBatchPage(1);}} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                  {["All",...BATCH_STATUSES.filter(s => s !== "Done")].map(s=><option key={s}>{s}</option>)}
                </select>
              )}
            </div>
            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
              <div className="table-scroll">
                <table className="w-full text-sm">
                  <thead><tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Batch #</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Brew Day</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Fermenter</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Vol (L)</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Filled (L)</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Ferm / Cond</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Release</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Status</th>
                    <th className="px-4 py-3"></th>
                  </tr></thead>
                  <tbody>
                    {pagedBatches.length === 0
                      ? <tr><td colSpan={10} className="text-center py-10 text-gray-400 text-sm">No batches match</td></tr>

                        const fl = filledForBatch(b.batch_id);
                        const isPlanned = b.status === "Planned";
                        const beerMissing = !beerList.some(beer => beer.name === b.beer_name);
                        return (
                          <tr key={b.id} className={`border-b border-gray-50 hover:bg-amber-50/20 transition-colors ${beerMissing ? "bg-red-50/40" : isPlanned ? "bg-indigo-50/30" : i%2===0?"":"bg-gray-50/40"}`}>
                            <td className="px-4 py-3 font-mono text-xs font-semibold text-amber-600">
                              #{b.batch_id}
                              {isPlanned && <span className="ml-1.5 inline-block w-1.5 h-1.5 rounded-full bg-indigo-400 align-middle" title="Planned"></span>}
                            </td>
                            <td className="px-4 py-3 whitespace-nowrap">
                              {b.brew_day
                                ? <span className={isPlanned ? "text-indigo-500 italic" : "text-gray-500"}>{isPlanned ? "~" : ""}{fmt(b.brew_day)}</span>
                                : <span className="text-gray-300 italic text-xs">TBD</span>}
                            </td>
                            <td className="px-4 py-3 max-w-48">
                              <span className="flex items-center gap-1.5 truncate">
                                <span className={`truncate ${beerMissing ? "text-red-500 line-through" : "text-gray-700"}`}>{b.beer_name}</span>
                                {beerMissing && (
                                  <span title="Beer not found in Beer List — it may have been deleted" className="shrink-0 inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-xs font-medium bg-red-100 text-red-600">
                                    <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                                    Missing
                                  </span>
                                )}
                              </span>
                            </td>
                            <td className="px-4 py-3 font-mono text-xs">
                              {(!b.fermenter || b.fermenter === "TBD")
                                ? <span className="text-indigo-400 italic">TBD</span>
                                : <span className="text-gray-600">{b.fermenter}</span>}
                            </td>
                            <td className="px-4 py-3 text-gray-600">{b.volume}</td>
                            <td className="px-4 py-3 font-medium text-gray-700">{fl > 0 ? fl : (b.filled_litres > 0 ? b.filled_litres : "—")}</td>
                            <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{b.fermentation_days}d / {b.condition_days||0}d</td>
                            <td className="px-4 py-3 whitespace-nowrap">
                              {b.release_date
                                ? <span className={isPlanned ? "text-indigo-400 italic" : "text-gray-500"}>{isPlanned ? "~" : ""}{fmt(b.release_date)}</span>
                                : <span className="text-gray-300 italic text-xs">TBD</span>}
                            </td>
                            <td className="px-4 py-3">
                              <select
                                value={b.status}
                                onChange={e => handleStatusChange(b.id, e.target.value)}
                                className={`text-xs font-medium px-2.5 py-1 rounded-full border-0 cursor-pointer focus:outline-none focus:ring-2 focus:ring-amber-400 ${BATCH_STATUS_CONFIG[b.status]?.bg||"bg-gray-100"} ${BATCH_STATUS_CONFIG[b.status]?.text||"text-gray-500"}`}
                              >
                                {BATCH_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                              </select>
                            </td>
                            <td className="px-4 py-3">
                              <div className="flex items-center gap-1 justify-end">
                                {/* Edit batch button */}
                                <button
                                  onClick={() => openEditBatch(b)}
                                  title="Edit batch details"
                                  className={`p-1.5 rounded-lg transition-colors ${isPlanned ? "text-indigo-500 hover:bg-indigo-50" : "text-gray-400 hover:bg-gray-100 hover:text-gray-600"}`}
                                >
                                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                                {/* Delete batch button */}
                                <button
                                  onClick={() => handleDeleteBatch(b)}
                                  title="Delete batch"
                                  className="p-1.5 rounded-lg text-red-300 hover:text-red-600 hover:bg-red-50 transition-colors"
                                >
                                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                                <button
                                  onClick={() => onOpenBrewsheet(b.batch_id)}
                                  title="Open Brewsheet"
                                  className="text-xs text-amber-600 hover:text-amber-800 font-medium px-2.5 py-1 rounded-lg hover:bg-amber-50 transition-colors whitespace-nowrap flex items-center gap-1"
                                >
                                  📋 <span>Brewsheet</span>
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })
                    }
                  </tbody>
                </table>
              </div>
            </div>
            {/* Pagination */}
            {batchTotalPages > 1 && (
              <div className="flex items-center justify-between px-2">
                <span className="text-xs text-gray-400">
                  Showing {((batchPageClamped-1)*BATCH_PAGE_SIZE)+1}–{Math.min(batchPageClamped*BATCH_PAGE_SIZE, sorted.length)} of {sorted.length}
                </span>
                <div className="flex items-center gap-1">
                  <button onClick={() => setBatchPage(p => Math.max(1, p-1))} disabled={batchPageClamped <= 1}
                    className="px-3 py-1.5 rounded-lg text-sm border border-gray-200 disabled:opacity-40 hover:bg-gray-50 transition-colors">← Prev</button>
                  {Array.from({length: batchTotalPages}, (_, i) => i+1).map(p => (
                    <button key={p} onClick={() => setBatchPage(p)}
                      className={`w-8 h-8 rounded-lg text-sm font-medium transition-colors ${p === batchPageClamped ? "bg-amber-500 text-white" : "border border-gray-200 hover:bg-gray-50 text-gray-600"}`}>
                      {p}
                    </button>
                  ))}
                  <button onClick={() => setBatchPage(p => Math.min(batchTotalPages, p+1))} disabled={batchPageClamped >= batchTotalPages}
                    className="px-3 py-1.5 rounded-lg text-sm border border-gray-200 disabled:opacity-40 hover:bg-gray-50 transition-colors">Next →</button>
                </div>
              </div>
            )}
          </>)}

          {/* ── BEER LIST TAB ─────────────────────────────────────────── */}
          {tab === "beers" && (<>
            {/* Filter bar + view toggle */}
            <div className="bg-white rounded-2xl p-4 border border-gray-100 flex flex-wrap gap-3 items-center">
              <div className="relative flex-1 min-w-40">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={beerSearch} onChange={e=>setBeerSearch(e.target.value)} placeholder="Search beer name, brand…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
              </div>
              <select value={filterBrand} onChange={e=>setFilterBrand(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                <option value="">All Brands</option>
                {[...new Set(beerList.map(b=>b.brand).filter(Boolean))].sort().map(br=><option key={br} value={br}>{br}</option>)}
              </select>
              <select value={filterStyle} onChange={e=>setFilterStyle(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                <option value="">All Styles</option>
                {[...new Set(beerList.map(b=>b.style).filter(Boolean))].sort().map(st=><option key={st} value={st}>{st}</option>)}
              </select>
              {/* View toggle icons */}
              <div className="flex gap-0.5 bg-gray-100 rounded-lg p-0.5 shrink-0">
                <button onClick={()=>setBeerView("cards")} title="Card view"
                  className={`p-1.5 rounded-md transition-all ${beerView==="cards"?"bg-white shadow-sm text-amber-600":"text-gray-400 hover:text-gray-600"}`}>
                  <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M3 3h7v7H3V3zm0 11h7v7H3v-7zm11-11h7v7h-7V3zm0 11h7v7h-7v-7z"/></svg>
                </button>
                <button onClick={()=>setBeerView("table")} title="Table view"
                  className={`p-1.5 rounded-md transition-all ${beerView==="table"?"bg-white shadow-sm text-amber-600":"text-gray-400 hover:text-gray-600"}`}>
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                </button>
              </div>
            </div>

            {/* Filtered list (shared for both views) */}
            {(() => {
              const filteredBeers = beerList
                .map((b, idx) => ({ ...b, _idx: idx }))
                .filter(b => {
                  const s = beerSearch.toLowerCase();
                  const matchSearch = !s || b.name.toLowerCase().includes(s) || (b.brand||"").toLowerCase().includes(s) || (b.style||"").toLowerCase().includes(s);
                  const matchBrand  = !filterBrand || b.brand === filterBrand;
                  const matchStyle  = !filterStyle || b.style === filterStyle;
                  return matchSearch && matchBrand && matchStyle;
                });

              if (filteredBeers.length === 0) return (
                <div className="text-center py-12 text-gray-400 text-sm bg-white rounded-2xl border border-gray-100">No beers match your filters.</div>
              );

              if (beerView === "cards") return (
                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                  {filteredBeers.map(b => (
                    <div key={b.name + b._idx} className="group bg-white rounded-2xl p-4 border border-gray-100 hover:border-amber-200 transition-colors relative">
                      <div className="absolute top-2.5 right-2.5 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onClick={() => openEditBeer(b._idx)} className="p-1.5 rounded-lg bg-amber-50 hover:bg-amber-100 text-amber-600 transition-colors" title="Edit beer">
                          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                        </button>
                        <button onClick={() => handleDeleteBeer(b._idx)} className="p-1.5 rounded-lg bg-red-50 hover:bg-red-100 text-red-400 hover:text-red-600 transition-colors" title="Delete beer">
                          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                      </div>
                      <div className="w-8 h-8 rounded-lg bg-amber-50 flex items-center justify-center text-base mb-3">🍺</div>
                      {b.brand && <p className="text-xs text-amber-600 font-medium mb-0.5 truncate">{b.brand}</p>}
                      <p className="text-sm font-medium text-gray-800 leading-tight mb-1.5 pr-14">{b.name}</p>
                      <div className="flex flex-wrap gap-1">
                        <span className="inline-block px-2 py-0.5 bg-gray-100 text-gray-500 text-xs rounded-full">{b.style||"—"}</span>
                        {b.abv && <span className="inline-block px-2 py-0.5 bg-amber-50 text-amber-600 text-xs rounded-full">{b.abv}% ABV</span>}
                        {b.contract === "true" && <span className="inline-block px-2 py-0.5 bg-indigo-50 text-indigo-600 text-xs rounded-full font-medium">Contract</span>}
                      </div>
                    </div>
                  ))}
                </div>
              );

              // Table view
              return (
                <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                  <div className="table-scroll">
                    <table className="w-full text-sm">
                      <thead><tr className="border-b border-gray-100 bg-gray-50/60">
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">#</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Brand</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer Name</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Style</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">ABV</th>
                        <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Type</th>
                        <th className="px-4 py-3"></th>
                      </tr></thead>
                      <tbody>
                        {filteredBeers.map((b, i) => (
                          <tr key={b.name + b._idx} className={`border-b border-gray-50 hover:bg-amber-50/30 transition-colors ${i%2===0?"":"bg-gray-50/30"}`}>
                            <td className="px-4 py-2.5 text-xs text-gray-400 font-mono">{b._idx + 1}</td>
                            <td className="px-4 py-2.5 text-amber-600 font-medium text-xs">{b.brand||"—"}</td>
                            <td className="px-4 py-2.5 font-medium text-gray-800 max-w-xs truncate">{b.name}</td>
                            <td className="px-4 py-2.5">
