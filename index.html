    // ─── FERMENTER DASHBOARD ──────────────────────────────────────────────────
    // ─── FERMENTER STATUS TAB ─────────────────────────────────────────────────
    function FermenterStatusTab({ batches, fillLog }) {
      const TODAY_D = new Date("2026-03-16");

      // Active batch per fermenter (Done = empty tank)
      const activeMap = {};
      FERMENTER_IDS.forEach(id => { activeMap[id] = null; });
      [...batches]
        .filter(b => b.status !== "Done")
        .sort((a,b) => (b.brew_day||"").localeCompare(a.brew_day||""))
        .forEach(b => { if (b.fermenter && activeMap[b.fermenter] === null) activeMap[b.fermenter] = b; });

      // Last completed batch per fermenter (for "Last:" hint on empty tanks)
      const lastDoneMap = {};
      [...batches]
        .filter(b => b.status === "Done")
        .sort((a,b) => (b.brew_day||"").localeCompare(a.brew_day||""))
        .forEach(b => { if (b.fermenter && !lastDoneMap[b.fermenter]) lastDoneMap[b.fermenter] = b; });

      // Age in days from brew day to today
      function ageDays(brewDay) {
        if (!brewDay) return null;
        const diff = TODAY_D - new Date(brewDay);
        return Math.max(0, Math.floor(diff / 86400000));
      }

      // Filled litres for a batch from fill log
      function filledLitres(batchId) {
        return fillLog.filter(f => String(f.batch_no) === String(batchId))
          .reduce((s,f) => s + (parseFloat(f.litres)||0), 0);
      }

      const statusColor = {
        Pending:    { ring:"ring-gray-300",    bg:"bg-gray-100",    badge:"bg-gray-200 text-gray-500",       icon:"⏳" },
        Brewing:    { ring:"ring-amber-300",   bg:"bg-amber-50",    badge:"bg-amber-100 text-amber-700",     icon:"🔥" },
        Fermenting: { ring:"ring-sky-300",     bg:"bg-sky-50",      badge:"bg-sky-100 text-sky-700",         icon:"🧪" },
        Condition:  { ring:"ring-violet-300",  bg:"bg-violet-50",   badge:"bg-violet-100 text-violet-700",   icon:"❄️" },
        Ready:      { ring:"ring-emerald-300", bg:"bg-emerald-50",  badge:"bg-emerald-100 text-emerald-700", icon:"✅" },
        Filling:    { ring:"ring-blue-300",    bg:"bg-blue-50",     badge:"bg-blue-100 text-blue-700",       icon:"💧" },
        Available:  { ring:"ring-gray-100",    bg:"bg-white",       badge:"bg-gray-50 text-gray-400",        icon:"○"  },
      };

      return (
        <div className="space-y-5">
          {/* Legend */}
          <div className="flex flex-wrap gap-2">
            {Object.entries(statusColor).map(([s,c]) => (
              <span key={s} className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium ${c.badge}`}>
                <span>{c.icon}</span>{s}
              </span>
            ))}
          </div>

          {/* Tank grid */}
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            {FERMENTER_IDS.map(id => {
              const b = activeMap[id];
              const last = lastDoneMap[id];
              const st = b ? b.status : "Available";
              const c = statusColor[st] || statusColor.Available;
              const age = b ? ageDays(b.brew_day) : null;
              const filled = b ? filledLitres(b.batch_id) : 0;

              return (
                <div key={id} className={`rounded-2xl p-4 border-2 ${c.ring} ${c.bg} transition-all`}>
                  {/* Header */}
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-mono text-sm font-bold text-gray-700">{id}</span>
                    <span className="text-base leading-none">{c.icon}</span>
                  </div>

                  {b ? (<>
                    {/* Active batch info */}
                    <p className="text-xs font-semibold text-gray-800 leading-snug mb-0.5 truncate">{b.beer_name}</p>
                    <p className="text-xs text-gray-400 mb-0.5">Batch #{b.batch_id}</p>
                    <p className="text-xs text-gray-400">Brew: {fmt(b.brew_day)}</p>
                    <p className="text-xs text-gray-400 mb-2">Release: {fmt(b.release_date)}</p>

                    {/* Filled / Volume bar */}
                    <div className="mb-2">
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-xs text-gray-400">Filled</span>
                        <span className="text-xs font-semibold text-gray-700">{filled} / {b.volume} L</span>
                      </div>
                      <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div
                          className={`h-full rounded-full transition-all ${c.badge.split(" ")[0].replace("bg-","bg-").replace("-100","-400")}`}
                          style={{width:`${Math.min(100,(filled/(b.volume||1))*100).toFixed(1)}%`}}
                        ></div>
                      </div>
                    </div>

                    {/* Age + Status badge row */}
                    <div className="flex items-center justify-between">
                      <div className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${c.badge}`}>{st}</div>
                      {age !== null && (
                        <span className="text-xs text-gray-400">Day {age}</span>
                      )}
                    </div>
                  </>) : (<>
                    {/* Empty tank */}
                    {last ? (<>
                      <p className="text-xs text-gray-400 truncate mb-0.5">Last: {last.beer_name}</p>
                      <p className="text-xs text-gray-300 mb-2">#{last.batch_id}</p>
                    </>) : (
                      <p className="text-xs text-gray-300 mb-2">No batches yet</p>
                    )}
                    <div className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border border-gray-200 text-gray-400 bg-white">Available</div>
                  </>)}
                </div>
              );
            })}
          </div>

          {/* Active batch table */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="px-5 py-3 border-b border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider">Active & Upcoming Batches</p>
            </div>
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead><tr className="border-b border-gray-100">
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Fermenter</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Batch #</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Brew Day</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Age</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Filled / Vol</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Release</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Status</th>
                </tr></thead>
                <tbody>
                  {batches.filter(b=>b.status!=="Done").sort((a,b)=>(b.brew_day||"").localeCompare(a.brew_day||"")).map((b,i)=>(
                    <tr key={b.id} className={`border-b border-gray-50 hover:bg-gray-50 ${i%2===0?"":"bg-gray-50/40"}`}>
                      <td className="px-4 py-3 font-mono text-xs font-bold text-gray-600">{b.fermenter}</td>
                      <td className="px-4 py-3 font-mono text-xs font-semibold text-amber-600">#{b.batch_id}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{b.beer_name}</td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(b.brew_day)}</td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{ageDays(b.brew_day) !== null ? `Day ${ageDays(b.brew_day)}` : "—"}</td>
                      <td className="px-4 py-3 text-gray-700 whitespace-nowrap font-medium">{filledLitres(b.batch_id)} / {b.volume} L</td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(b.release_date)}</td>
                      <td className="px-4 py-3"><BatchStatusBadge status={b.status} /></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ─── FERMENTER TIMELINE TAB (GANTT + TASK PLANNING) ──────────────────────
    function FermenterTimelineTab({ batches, batchTasks, setBatchTasks }) {
      const TODAY     = new Date("2026-03-15");
      const WIN_START = new Date(TODAY); WIN_START.setDate(WIN_START.getDate() - 84);
      const WIN_END   = new Date(TODAY); WIN_END.setDate(WIN_END.getDate() + 56);
      const TOTAL_MS  = WIN_END - WIN_START;

      const [showAddTask, setShowAddTask] = useState(false);
      const [taskForm, setTaskForm] = useState({ batch_id: "", task: "", day: 1, assigned_to: "" });
      const [hoveredTask, setHoveredTask] = useState(null); // { id, task, day, assigned_to, dateStr, rect }

      // Generate Monday-aligned week ticks
      const weeks = [];
      const cursor = new Date(WIN_START);
      cursor.setDate(cursor.getDate() - cursor.getDay() + 1);
      while (cursor <= WIN_END) {
        if (cursor >= WIN_START) weeks.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 7);
      }

      function pct(date) { return ((new Date(date) - WIN_START) / TOTAL_MS * 100).toFixed(2); }

      const BAR_COLOR = {
        Pending:"bg-gray-300", Brewing:"bg-amber-400", Fermenting:"bg-sky-400",
        Condition:"bg-violet-400", Ready:"bg-emerald-400", Filling:"bg-blue-400", Done:"bg-gray-200",
      };
      const TEXT_COLOR = {
        Pending:"text-gray-600", Brewing:"text-white", Fermenting:"text-white",
        Condition:"text-white", Ready:"text-white", Filling:"text-white", Done:"text-gray-500",
      };

      const TASK_PRESETS = ["Check gravity","Drain yeast","Cold crash","Add dry hops","Add hops","Dry hop","Rack beer","Take gravity","Clean tank","Fining/Gelatine"];
      const TASK_PIN_COLORS = ["bg-orange-400","bg-pink-400","bg-purple-400","bg-teal-400","bg-red-400","bg-yellow-500","bg-indigo-400","bg-lime-500","bg-cyan-500","bg-rose-400"];
      function taskPinColor(taskName) {
        const idx = TASK_PRESETS.indexOf(taskName);
        return idx >= 0 ? TASK_PIN_COLORS[idx] : "bg-orange-400";
      }

      // Active (non-Done) batches with a brew_day for the modal selector
      const activeBatches = batches.filter(b => b.status !== "Done" && b.brew_day);
      const todayPct = parseFloat(pct(TODAY));

      // Preview date for the modal
      const previewDate = useMemo(() => {
        if (!taskForm.batch_id || !taskForm.day) return null;
        const b = batches.find(x => x.batch_id === taskForm.batch_id);
        if (!b || !b.brew_day) return null;
        const d = new Date(b.brew_day);
        d.setDate(d.getDate() + (parseInt(taskForm.day) || 1) - 1);
        return d;
      }, [taskForm.batch_id, taskForm.day, batches]);

      function handleAddTask(e) {
        e.preventDefault();
        if (!taskForm.batch_id || !taskForm.task || !taskForm.day) return;
        const newId = batchTasks.length > 0 ? Math.max(...batchTasks.map(t => t.id)) + 1 : 1;
        setBatchTasks(prev => [...prev, {
          id: newId, batch_id: taskForm.batch_id,
          task: taskForm.task, day: parseInt(taskForm.day) || 1,
          assigned_to: taskForm.assigned_to,
        }]);
        setShowAddTask(false);
        setTaskForm({ batch_id: "", task: "", day: 1, assigned_to: "" });
      }

      function handleDeleteTask(id) {
        setBatchTasks(prev => prev.filter(t => t.id !== id));
      }

      return (
        <div className="space-y-5">

          {/* Legend + Add Task button */}
          <div className="flex items-center justify-between flex-wrap gap-2">
            <div className="flex flex-wrap gap-2 items-center">
              {Object.entries(BAR_COLOR).map(([s,c]) => (
                <span key={s} className="inline-flex items-center gap-1.5 text-xs text-gray-500">
                  <span className={`w-3 h-3 rounded ${c}`}></span>{s}
                </span>
              ))}
              <span className="inline-flex items-center gap-1.5 text-xs text-gray-500 ml-1">
                <span className="w-0.5 h-3 bg-red-400 inline-block"></span>Today
              </span>
              <span className="inline-flex items-center gap-1.5 text-xs text-gray-500 ml-1">
                <span className="w-2.5 h-2.5 rounded-full bg-orange-400 border-2 border-white shadow inline-block"></span>Task pin
              </span>
            </div>
            <button
              onClick={() => setShowAddTask(true)}
              className="px-3.5 py-1.5 bg-amber-500 text-white text-sm font-medium rounded-lg hover:bg-amber-600 transition-colors flex items-center gap-1.5 shadow-sm"
            >
              <span className="text-base leading-none font-bold">+</span> Add Task
            </button>
          </div>

          {/* Gantt Chart */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div style={{overflowX:"auto"}}>
              <div style={{minWidth:"860px"}}>

                {/* Column header: week dates */}
                <div className="flex border-b border-gray-100 bg-gray-50/60">
                  <div className="shrink-0 w-14 px-3 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">Tank</div>
                  <div className="flex-1 relative h-8">
                    {weeks.map((w,i) => {
                      const l = parseFloat(pct(w));
                      if (l<0||l>100) return null;
                      return (
                        <div key={i} className="absolute top-0 h-full flex items-center" style={{left:`${l}%`}}>
                          <span className="text-xs text-gray-400 pl-1 whitespace-nowrap">
                            {w.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}
                          </span>
                        </div>
                      );
                    })}
                    <div className="absolute top-0 h-full border-l-2 border-red-400" style={{left:`${todayPct}%`}}></div>
                  </div>
                </div>

                {/* Fermenter rows */}
                {FERMENTER_IDS.map((fid, ri) => {
                  const fBatches = batches.filter(b => b.fermenter === fid && b.brew_day && b.release_date);
                  return (
                    <div key={fid} className={`flex border-b border-gray-50 ${ri%2===0?"":"bg-gray-50/30"}`} style={{minHeight:"52px"}}>
                      <div className="shrink-0 w-14 px-3 flex items-center">
                        <span className="font-mono text-xs font-bold text-gray-600">{fid}</span>
                      </div>
                      <div className="flex-1 relative" style={{paddingTop:"14px", paddingBottom:"6px"}}>
                        {/* Week grid lines */}
                        {weeks.map((w,i) => {
                          const l = parseFloat(pct(w));
                          if (l<0||l>100) return null;
                          return <div key={i} className="absolute top-0 h-full border-l border-gray-100" style={{left:`${l}%`}}></div>;
                        })}
                        {/* Today line */}
                        <div className="absolute top-0 h-full border-l-2 border-red-300 z-20" style={{left:`${todayPct}%`}}></div>
                        {/* Batch bars with task pins */}
                        {fBatches.map(b => {
                          const start  = new Date(b.brew_day);
                          const end    = new Date(b.release_date);
                          const spanMs = end - start;
                          const rawL   = (start - WIN_START) / TOTAL_MS * 100;
                          const rawW   = spanMs / TOTAL_MS * 100;
                          const left   = Math.max(0, rawL);
                          const width  = Math.min(100 - left, rawW - Math.max(0, -rawL));
                          if (width <= 0 || spanMs <= 0) return null;
                          const barC   = BAR_COLOR[b.status]  || BAR_COLOR.Done;
                          const textC  = TEXT_COLOR[b.status] || TEXT_COLOR.Done;
                          const bTasks = batchTasks.filter(t => t.batch_id === b.batch_id);
                          return (
                            <div
                              key={b.id}
                              className="absolute z-10"
                              style={{left:`${left}%`, width:`${width}%`, top:"14px", bottom:"6px"}}
                            >
                              {/* Bar */}
                              <div
                                title={`Batch #${b.batch_id} · ${b.beer_name}\n${b.brew_day} → ${b.release_date} · ${b.status}`}
                                className={`absolute inset-0 rounded-lg ${barC} flex items-center px-2 overflow-hidden cursor-default`}
                              >
                                <span className={`text-xs font-medium truncate ${textC}`}>
                                  #{b.batch_id} {b.beer_name}
                                </span>
                              </div>
                              {/* Task pins — positioned relative to bar width */}
                              {bTasks.map(t => {
                                const taskD = new Date(b.brew_day);
                                taskD.setDate(taskD.getDate() + (t.day - 1));
                                const relPct = ((taskD - start) / spanMs * 100);
                                if (relPct < 0 || relPct > 100) return null;
                                const pinC = taskPinColor(t.task);
                                const dateStr = taskD.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
                                const isHovered = hoveredTask && hoveredTask.id === t.id;
                                return (
                                  <div
                                    key={t.id}
                                    className="absolute z-30 -top-2 transform -translate-x-1/2"
                                    style={{left:`${relPct.toFixed(2)}%`}}
                                    onMouseEnter={e => {
                                      const rect = e.currentTarget.getBoundingClientRect();
                                      setHoveredTask({ id: t.id, task: t.task, day: t.day, assigned_to: t.assigned_to, dateStr, pinC, rect });
                                    }}
                                    onMouseLeave={() => setHoveredTask(null)}
                                  >
                                    <div className={`w-3 h-3 rounded-full border-2 border-white shadow-md ${pinC} cursor-pointer transition-transform ${isHovered ? "scale-150" : "hover:scale-125"}`}></div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}

              </div>
            </div>
          </div>

          {/* Planned Tasks List */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
              <h3 className="font-semibold text-gray-800 text-sm">Planned Tasks</h3>
              <span className="text-xs text-gray-400">{batchTasks.length} task{batchTasks.length !== 1 ? "s" : ""}</span>
            </div>
            {batchTasks.length === 0 ? (
              <div className="px-5 py-8 text-center text-sm text-gray-400">
                No tasks planned yet. Click <span className="font-semibold text-amber-600">+ Add Task</span> to schedule one.
              </div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-gray-50/60 text-xs font-medium text-gray-500 uppercase tracking-wide">
                      <th className="px-4 py-2.5 text-left">Batch</th>
                      <th className="px-4 py-2.5 text-left">Beer</th>
                      <th className="px-4 py-2.5 text-left">Task</th>
                      <th className="px-4 py-2.5 text-left">Day</th>
                      <th className="px-4 py-2.5 text-left">Date</th>
                      <th className="px-4 py-2.5 text-left">Assigned To</th>
                      <th className="px-4 py-2.5"></th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-gray-50">
                    {[...batchTasks]
                      .sort((a,b) => a.batch_id !== b.batch_id ? a.batch_id.localeCompare(b.batch_id) : a.day - b.day)
                      .map(t => {
                        const b = batches.find(x => x.batch_id === t.batch_id);
                        const tDate = (() => {
                          if (!b || !b.brew_day) return "—";
                          const d = new Date(b.brew_day);
                          d.setDate(d.getDate() + t.day - 1);
                          return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
                        })();
                        const pinC = taskPinColor(t.task);
                        return (
                          <tr key={t.id} className="hover:bg-gray-50/50">
                            <td className="px-4 py-2.5 font-mono text-xs text-gray-600">#{t.batch_id}</td>
                            <td className="px-4 py-2.5 text-gray-700 max-w-xs truncate">{b ? b.beer_name : "—"}</td>
                            <td className="px-4 py-2.5">
                              <span className="inline-flex items-center gap-1.5">
                                <span className={`w-2 h-2 rounded-full inline-block ${pinC}`}></span>
                                {t.task}
                              </span>
                            </td>
                            <td className="px-4 py-2.5 text-gray-600">Day {t.day}</td>
                            <td className="px-4 py-2.5 text-gray-600 whitespace-nowrap">{tDate}</td>
                            <td className="px-4 py-2.5">
                              {t.assigned_to
                                ? <span className="px-2 py-0.5 bg-amber-50 text-amber-700 rounded-full text-xs font-medium">{t.assigned_to}</span>
                                : <span className="text-gray-300 text-xs">—</span>}
                            </td>
                            <td className="px-4 py-2.5 text-right">
                              <button
                                onClick={() => handleDeleteTask(t.id)}
                                className="text-xs text-red-400 hover:text-red-600 transition-colors px-2 py-0.5 rounded hover:bg-red-50"
                              >Delete</button>
                            </td>
                          </tr>
                        );
                      })}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {/* Add Task Modal */}
          {showAddTask && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
                <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                  <h2 className="font-semibold text-gray-800">Add Planned Task</h2>
                  <button onClick={() => setShowAddTask(false)} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                </div>
                <form onSubmit={handleAddTask} className="p-6 space-y-4">

                  {/* Batch selector */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Batch</label>
                    <select
                      value={taskForm.batch_id}
                      onChange={e => setTaskForm(f => ({...f, batch_id: e.target.value}))}
                      required
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
                    >
                      <option value="">Select batch…</option>
                      {activeBatches.map(b => (
                        <option key={b.batch_id} value={b.batch_id}>
                          #{b.batch_id} · {b.beer_name}{b.fermenter ? ` (${b.fermenter})` : ""}
                        </option>
                      ))}
                    </select>
                  </div>

                  {/* Task name + presets */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Task</label>
                    <input
                      type="text"
                      value={taskForm.task}
                      onChange={e => setTaskForm(f => ({...f, task: e.target.value}))}
                      placeholder="e.g. Check gravity"
                      required
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 mb-2"
                    />
                    <div className="flex flex-wrap gap-1.5">
                      {TASK_PRESETS.map(p => (
                        <button
                          type="button"
                          key={p}
                          onClick={() => setTaskForm(f => ({...f, task: p}))}
                          className={`px-2.5 py-1 rounded-full text-xs border transition-all ${taskForm.task === p ? "bg-amber-500 text-white border-amber-500" : "border-gray-200 text-gray-600 hover:border-amber-300 hover:text-amber-700"}`}
                        >
                          {p}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Day + preview date */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Day of Batch</label>
                    <div className="flex items-center gap-3">
                      <input
                        type="number"
                        min="1"
                        max="90"
                        value={taskForm.day}
                        onChange={e => setTaskForm(f => ({...f, day: e.target.value}))}
                        required
                        className="w-24 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
                      />
                      {previewDate && (
                        <span className="text-xs text-gray-500">
                          = <span className="font-semibold text-amber-700">
                            {previewDate.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}
                          </span>
                        </span>
                      )}
                    </div>
                    <p className="text-xs text-gray-400 mt-1">Day 1 = brew day</p>
                  </div>

                  {/* Assigned To (optional) */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">
                      Assigned To <span className="text-gray-400 font-normal">(optional)</span>
                    </label>
                    <select
                      value={taskForm.assigned_to}
                      onChange={e => setTaskForm(f => ({...f, assigned_to: e.target.value}))}
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300"
                    >
                      <option value="">— Unassigned —</option>
                      {STAFF.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </div>

                  <div className="flex gap-3 pt-1">
                    <button
                      type="button"
                      onClick={() => setShowAddTask(false)}
                      className="flex-1 border border-gray-200 text-gray-600 rounded-lg py-2 text-sm hover:bg-gray-50 transition-colors"
                    >Cancel</button>
                    <button
                      type="submit"
                      className="flex-1 bg-amber-500 text-white rounded-lg py-2 text-sm font-medium hover:bg-amber-600 transition-colors"
                    >Add Task</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Task hover bubble — fixed, follows mouse position */}
          {hoveredTask && (
            <div
              className="fixed z-[9999] pointer-events-none"
              style={{
                left: hoveredTask.rect.left + hoveredTask.rect.width / 2,
                top:  hoveredTask.rect.top - 8,
                transform: "translate(-50%, -100%)",
              }}
            >
              <div className="bg-gray-900 text-white rounded-xl shadow-xl px-3.5 py-2.5 min-w-[160px] max-w-[220px]">
                {/* Color dot + task name */}
                <div className="flex items-start gap-2">
                  <span className={`mt-0.5 w-2.5 h-2.5 rounded-full shrink-0 ${hoveredTask.pinC}`}></span>
                  <span className="text-sm font-semibold leading-tight">{hoveredTask.task}</span>
                </div>
                <div className="mt-1.5 space-y-0.5 pl-4">
                  <div className="text-xs text-gray-300 flex items-center gap-1">
                    <span className="text-gray-500">Day</span>
                    <span className="font-medium text-white">{hoveredTask.day}</span>
                    <span className="text-gray-500 mx-0.5">·</span>
                    <span className="font-medium text-amber-300">{hoveredTask.dateStr}</span>
                  </div>
                  {hoveredTask.assigned_to ? (
                    <div className="text-xs text-gray-300 flex items-center gap-1">
                      <span className="text-gray-500">👤</span>
                      <span className="font-medium text-white">{hoveredTask.assigned_to}</span>
                    </div>
                  ) : (
                    <div className="text-xs text-gray-500 italic">Unassigned</div>
                  )}
                </div>
                {/* Arrow */}
                <div className="absolute left-1/2 -translate-x-1/2 -bottom-1.5 w-3 h-3 bg-gray-900 rotate-45 rounded-sm"></div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ─── FERMENTER DASHBOARD (tabbed wrapper) ─────────────────────────────────
    function FermenterDashboard({ batches, fillLog, batchTasks, setBatchTasks }) {
      const [tab, setTab] = useState("status");
      const fermenterMap = {};
      FERMENTER_IDS.forEach(id => { fermenterMap[id] = null; });
      [...batches].sort((a,b)=>(b.brew_day||"").localeCompare(a.brew_day||"")).forEach(b => {
        if (b.fermenter && fermenterMap[b.fermenter]===null) fermenterMap[b.fermenter] = b;
      });
      const active    = FERMENTER_IDS.filter(id => fermenterMap[id] && fermenterMap[id].status !== "Done").length;
      const available = FERMENTER_IDS.filter(id => !fermenterMap[id] || fermenterMap[id].status === "Done").length;
      return (
        <div className="space-y-5">
          <div>
            <h1 className="text-xl font-semibold text-gray-800">Fermenters</h1>
            <p className="text-sm text-gray-400 mt-0.5">
              {FERMENTER_IDS.length} tanks · <span className="text-amber-600 font-medium">{active} active</span> · <span className="text-emerald-600 font-medium">{available} available</span>
            </p>
          </div>
          <div className="flex gap-1 bg-gray-100 p-1 rounded-xl w-fit">
            {[{id:"status",label:"Tank Status"},{id:"timeline",label:"Timeline & Tasks"}].map(t => (
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all whitespace-nowrap ${tab===t.id?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                {t.label}
              </button>
            ))}
          </div>
          {tab==="status"   && <FermenterStatusTab batches={batches} fillLog={fillLog} />}
          {tab==="timeline" && <FermenterTimelineTab batches={batches} batchTasks={batchTasks} setBatchTasks={setBatchTasks} />}
        </div>
      );
    }

    // ─── BREWSHEET PAGE ───────────────────────────────────────────────────────
    function BrewsheetPage({ batch, brewsheet, onSave, onBack }) {
      const [tab, setTab] = useState("brewday");
      // Local copy for editing
      const empty = { water_in:"",malt_kg:"",mash_in_time:"",mash_in_temp:"",mash_out_temp:"",sparge_in:"",target_ph:"",
        mash_steps:[{time:"",temp:"",duration:""},{time:"",temp:"",duration:""},{time:"",temp:"",duration:""}],
        caso4:"",cacl2:"",mgso4:"",baking_soda:"",acid:"",other_addition:"",acid_type:"Lactic Acid",acid_amount:"",
        mash_readings:[{ph:"",gravity:""},{ph:"",gravity:""},{ph:"",gravity:""},{ph:"",gravity:""}],
        lauter_start:"",lauter_finish:"",sparge_volume:"",
        preboil_est_gravity:"",preboil_est_volume:500,preboil_rec_ph:"",preboil_rec_gravity:"",
        boil_start:"",boil_end:"",
        boil_additions:[{min:"",addition:"",weight:"",ibu:"",note:""},{min:"",addition:"",weight:"",ibu:"",note:""},{min:"",addition:"",weight:"",ibu:"",note:""},{min:"",addition:"",weight:"",ibu:"",note:""}],
        cooldown_temp:"",cooldown_start:"",cooldown_end:"",
        aroma_hops:false,aroma_hops_name:"",aroma_time:"",aroma_qty:"",
        load_start:"",load_end:"",
        final_temp_in:"",final_start_time:"",target_temp:"",final_ph:"",final_gravity:"",final_volume:"",
        yeast:"",yeast_source:"",yeast_qty:"",oxygen_lmin:"",oxygen_time:"",aldc:false,
        daily_log: Array.from({length:26},(_,i)=>({day:i+1,sg:null,ph:null,psi:null,temp:null,note:""})),
      };
      const [bs, setBs] = useState(() => brewsheet ? JSON.parse(JSON.stringify(brewsheet)) : empty);
      const [saved, setSaved] = useState(false);

      function upd(field, val) { setBs(b => ({...b, [field]: val})); setSaved(false); }
      function updStep(i, field, val) { setBs(b => { const s=[...b.mash_steps]; s[i]={...s[i],[field]:val}; return {...b,mash_steps:s}; }); setSaved(false); }
      function updReading(i, field, val) { setBs(b => { const r=[...b.mash_readings]; r[i]={...r[i],[field]:val}; return {...b,mash_readings:r}; }); setSaved(false); }
      function updBoil(i, field, val) { setBs(b => { const a=[...b.boil_additions]; a[i]={...a[i],[field]:val}; return {...b,boil_additions:a}; }); setSaved(false); }
      function updLog(i, field, val) { setBs(b => { const l=[...b.daily_log]; l[i]={...l[i],[field]:val===""?null:isNaN(val)?val:parseFloat(val)}; return {...b,daily_log:l}; }); setSaved(false); }

      function handleSave() { onSave(batch.batch_id, bs); setSaved(true); }

      // Add boil row
      function addBoilRow() { setBs(b => ({...b, boil_additions:[...b.boil_additions,{min:"",addition:"",weight:"",ibu:"",note:""}]})); }
      function removeBoilRow(i) { setBs(b => { const a=b.boil_additions.filter((_,idx)=>idx!==i); return {...b,boil_additions:a}; }); }

      // ── SVG mini charts ──────────────────────────────────────────────────────
      function MiniChart({ data, color, label, yDecimals=3 }) {
        const pts = data.map((d,i)=>({x:i,y:d})).filter(p=>p.y!=null);
        if (pts.length < 2) return <div className="flex items-center justify-center h-full text-xs text-gray-400">No data yet</div>;
        const W=340, H=90, PAD=6;
        const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
        const minX=Math.min(...xs), maxX=Math.max(...xs);
        const minY=Math.min(...ys), maxY=Math.max(...ys);
        const rangeY = maxY - minY || 0.001;
        const sx = v => PAD + (v-minX)/(maxX-minX||1)*(W-PAD*2);
        const sy = v => H-PAD - (v-minY)/rangeY*(H-PAD*2);
        const path = pts.map((p,i)=>`${i===0?"M":"L"}${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`).join(" ");
        const area = `${path} L${sx(pts[pts.length-1].x)},${H-PAD} L${sx(pts[0].x)},${H-PAD} Z`;
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height:H}}>
            <defs>
              <linearGradient id={`grad-${label}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
                <stop offset="100%" stopColor={color} stopOpacity="0.03"/>
              </linearGradient>
            </defs>
            {[0.25,0.5,0.75,1].map(r=>(
              <line key={r} x1={PAD} y1={sy(minY+rangeY*r)} x2={W-PAD} y2={sy(minY+rangeY*r)}
                stroke="#e5e7eb" strokeWidth="1" strokeDasharray="3,3"/>
            ))}
            <path d={area} fill={`url(#grad-${label})`}/>
            <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
            {pts.map(p=>(
              <circle key={p.x} cx={sx(p.x)} cy={sy(p.y)} r="3" fill="white" stroke={color} strokeWidth="2"/>
            ))}
            {/* Y labels */}
            {[minY, (minY+maxY)/2, maxY].map(v=>(
              <text key={v} x={PAD} y={sy(v)+4} fontSize="8" fill="#9ca3af">{v.toFixed(yDecimals)}</text>
            ))}
          </svg>
        );
      }

      // Compute brew day date for each log day
      function dayDate(dayNum) {
        if (!batch?.brew_day) return "";
        const d = new Date(batch.brew_day);
        d.setDate(d.getDate() + dayNum - 1);
        return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
      }

      const inp = "w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300";
      const sec = "bg-white rounded-2xl border border-gray-100 p-5 space-y-3";
      const secH = "text-sm font-semibold text-gray-700 border-b border-gray-100 pb-2 mb-3";
      const lbl = "text-xs text-gray-500 mb-0.5";

      return (
        <div className="space-y-5">
          {/* Header */}
          <div className="flex items-center gap-3">
            <button onClick={onBack} className="p-2 rounded-xl hover:bg-gray-100 transition-colors text-gray-500">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </button>
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Brewsheet — Batch #{batch.batch_id}</h1>
              <p className="text-sm text-gray-400 mt-0.5">{batch.beer_name} · {batch.fermenter} · Brew day {fmt(batch.brew_day)}</p>
            </div>
            <div className="ml-auto flex items-center gap-2">
              {saved && <span className="text-xs text-emerald-600 font-medium px-3 py-1.5 bg-emerald-50 rounded-lg">Saved ✓</span>}
              <button onClick={handleSave} className="px-4 py-2 bg-amber-500 text-white text-sm font-medium rounded-xl hover:bg-amber-600 transition-colors shadow-sm">
                Save Brewsheet
              </button>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 bg-gray-100 p-1 rounded-xl w-fit">
            {[{id:"brewday",label:"🍺 Brew Day"},{id:"fermentation",label:"📈 Fermentation Log"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all whitespace-nowrap ${tab===t.id?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ── BREW DAY TAB ── */}
          {tab === "brewday" && (
            <div className="space-y-4">

              {/* MASH */}
              <div className={sec}>
                <p className={secH}>Mash</p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                  <div><p className={lbl}>Water in (L)</p><input className={inp} value={bs.water_in} onChange={e=>upd("water_in",e.target.value)}/></div>
                  <div><p className={lbl}>Malt (KG)</p><input className={inp} value={bs.malt_kg} onChange={e=>upd("malt_kg",e.target.value)}/></div>

    const today = () => new Date().toISOString().slice(0,10);

    // ─── STORAGE INVENTORY PAGE ───────────────────────────────────────────────
    function StorageInventoryPage({ kegStatus }) {
      const inStorage = kegStatus.filter(k => k.status === "Filled" && k.location === "Brewery");
      // group by beer_name + size
      const grouped = {};
      inStorage.forEach(k => {
        const key = `${k.beer_name}||${k.size}`;
        if (!grouped[key]) grouped[key] = { beer_name: k.beer_name, size: k.size, kegs: [] };
        grouped[key].kegs.push(k.keg_id);
      });
      const rows = Object.values(grouped).sort((a,b) => a.beer_name.localeCompare(b.beer_name));
      return (
        <div>
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-gray-800">Storage Inventory</h1>
            <p className="text-sm text-gray-400 mt-1">Filled kegs currently in Brewery storage — read-only view from Keg Status</p>
          </div>
          <div className="grid grid-cols-3 gap-4 mb-6">
            {[
              { label:"Total Kegs in Storage", value: inStorage.length, color:"amber" },
              { label:"Unique Beers", value: rows.length, color:"sky" },
              { label:"Ready to Dispatch", value: inStorage.length, color:"emerald" },
            ].map(c => <StatCard key={c.label} label={c.label} value={c.value} color={c.color}/>)}
          </div>
          <div className="bg-white rounded-2xl border border-gray-100">
            <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
              <h2 className="font-semibold text-gray-800">Kegs in Storage</h2>
              <span className="text-xs text-gray-400">{inStorage.length} kegs total</span>
            </div>
            {rows.length === 0 ? (
              <div className="p-12 text-center text-gray-400">
                <div className="text-4xl mb-3">📦</div>
                <p className="font-medium">No filled kegs in storage</p>
                <p className="text-xs mt-1">Kegs will appear here when status is "Filled" and location is "Brewery"</p>
              </div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead><tr className="bg-gray-50 text-xs text-gray-500 uppercase tracking-wider">
                    <th className="px-5 py-3 text-left">Beer Name</th>
                    <th className="px-5 py-3 text-left">Size</th>
                    <th className="px-5 py-3 text-center">Kegs</th>
                    <th className="px-5 py-3 text-left">Keg IDs</th>
                  </tr></thead>
                  <tbody className="divide-y divide-gray-50">
                    {rows.map((r,i) => (
                      <tr key={i} className="hover:bg-amber-50/30">
                        <td className="px-5 py-3 font-medium text-gray-800">{r.beer_name}</td>
                        <td className="px-5 py-3 text-gray-600">{r.size}</td>
                        <td className="px-5 py-3 text-center">
                          <span className="inline-flex items-center justify-center w-7 h-7 rounded-full bg-amber-100 text-amber-700 font-bold text-xs">{r.kegs.length}</span>
                        </td>
                        <td className="px-5 py-3 text-gray-500 text-xs">{r.kegs.join(", ")}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── KEG RECEIVED PAGE ────────────────────────────────────────────────────
    function KegReceivedPage({ stockOut, barKegIn, setBarKegIn, supplierKegIn, setSupplierKegIn, tapLog, setTapLog, currentUser }) {
      const [tab, setTab]               = useState("brewery");
      const [receivedBy, setReceivedBy] = useState(currentUser?.name || "");
      const [search, setSearch]         = useState("");
      const [sortAsc, setSortAsc]       = useState(false); // newest first by default
      const [confirmingId, setConfirmingId] = useState(null); // which row is showing date confirm
      const [confirmDate, setConfirmDate]   = useState(today());
      // Supplier form state
      const [supForm, setSupForm]   = useState({ supplier:"", keg_ref:"", size:"20 L", beer_name:"", style:"", abv:"", note:"" });
      const [supFormOpen, setSupFormOpen] = useState(false);
      const SUPPLIERS = ["Group B","Guest Tap"];

      // Kegs sent to UPB from brewery (destination="UPB")
      const breweryAll = stockOut.filter(s => s.destination === "UPB" && !barKegIn.some(b => b.stock_out_id === s.id));
      const breweryFiltered = breweryAll
        .filter(s => !search || s.beer_name?.toLowerCase().includes(search.toLowerCase()) || s.keg_id?.toLowerCase().includes(search.toLowerCase()))
        .sort((a,b) => { const d = (a.date_out||"").localeCompare(b.date_out||""); return sortAsc ? d : -d; });
      const breweryReceived = barKegIn.filter(b => b.received === "true" || b.received === true);

      function openConfirm(s) { setConfirmingId(s.id); setConfirmDate(today()); }

      function confirmReceive(s) {
        const newId = (barKegIn.length ? Math.max(...barKegIn.map(b=>b.id||0)) : 0) + 1;
        const entry = { id: newId, stock_out_id: s.id, keg_id: s.keg_id, size: s.keg_size, beer_name: s.beer_name,
          sent_by: s.recorded_by, received: "true", received_date: confirmDate, received_by: receivedBy, note: "", remark: "" };
        setBarKegIn(prev => [...prev, entry]);
        const tapId = (tapLog.length ? Math.max(...tapLog.map(t=>t.id||0)) : 0) + 1;
        setTapLog(prev => [...prev, { id: tapId, source:"Brewery", supplier:"UPB", keg_id: s.keg_id, size: s.keg_size,
          beer_name: s.beer_name, received_date: confirmDate, received_by: receivedBy,
          ready:"false", tap_line:"", date_tapped:"", date_untapped:"", status:"Pending", note:"", price:"" }]);
        setConfirmingId(null);
      }

      function addSupplierKeg() {
        const newId = (supplierKegIn.length ? Math.max(...supplierKegIn.map(x=>x.id||0)) : 0) + 1;
        const entry = { ...supForm, id: newId, received: "true", received_date: today(), received_by: receivedBy };
        setSupplierKegIn(prev => [...prev, entry]);
        const tapId = (tapLog.length ? Math.max(...tapLog.map(t=>t.id||0)) : 0) + 1;
        setTapLog(prev => [...prev, { id: tapId, source:"Supplier", supplier: supForm.supplier, keg_id: supForm.keg_ref, size: supForm.size,
          beer_name: supForm.beer_name, received_date: today(), received_by: receivedBy,
          ready:"false", tap_line:"", date_tapped:"", date_untapped:"", status:"Pending", note:"", price:"" }]);
        setSupForm({ supplier:"", keg_ref:"", size:"20 L", beer_name:"", style:"", abv:"", note:"" });
        setSupFormOpen(false);
      }

      const tabBtn = (id, label, count) => (
        <button onClick={()=>setTab(id)} className={`px-4 py-2 rounded-xl text-sm font-medium transition-all ${tab===id?"bg-amber-500 text-white shadow-sm":"text-gray-500 hover:text-gray-700"}`}>

        </button>

      return (
        <div>
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-gray-800">Keg Received</h1>
            <p className="text-sm text-gray-400 mt-1">Verify incoming kegs from Brewery or external suppliers</p>
          </div>

          {/* Receive settings */}
          <div className="bg-white rounded-2xl border border-gray-100 p-5 mb-5 flex flex-wrap gap-4 items-end">
            <div>
              <label className="block text-xs font-medium text-gray-500 mb-1.5">Received By</label>
              <input value={receivedBy} onChange={e=>setReceivedBy(e.target.value)} placeholder="Your name"
                className={inputCls + " w-40"} />
            </div>
          </div>

          <div className="flex gap-2 mb-5">{tabBtn("brewery","From Brewery",breweryAll.length)}{tabBtn("supplier","From Suppliers",0)}</div>

          {tab === "brewery" && (
            <div className="space-y-4">
              <div className="bg-white rounded-2xl border border-gray-100">
                <div className="px-6 py-4 border-b border-gray-100 flex flex-wrap items-center gap-3">
                  <h2 className="font-semibold text-gray-800 mr-auto">Pending from Brewery</h2>
                  {/* Search */}
                  <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search beer or keg ID…"
                    className="border border-gray-200 rounded-xl px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-amber-400 w-52"/>
                  {/* Sort toggle */}
                  <button onClick={()=>setSortAsc(v=>!v)}
                    className="flex items-center gap-1.5 text-xs text-gray-500 border border-gray-200 rounded-xl px-3 py-1.5 hover:bg-gray-50 transition-colors">
                    Date Out {sortAsc ? "↑ Oldest" : "↓ Newest"}
                  </button>
                  <span className="text-xs text-amber-600 font-medium">{breweryFiltered.length} awaiting</span>
                </div>
                {breweryFiltered.length === 0 ? (
                  <div className="p-10 text-center text-gray-400"><div className="text-3xl mb-2">✅</div>
                    <p>{search ? "No kegs match your search" : "All brewery kegs confirmed"}</p></div>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead><tr className="bg-gray-50 text-xs text-gray-500 uppercase tracking-wider">

                        <th className="px-5 py-3 text-left">Size</th><th className="px-5 py-3 text-left">Sent By</th>
                        <th className="px-5 py-3 text-left cursor-pointer select-none" onClick={()=>setSortAsc(v=>!v)}>
