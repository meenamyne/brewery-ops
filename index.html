    async function gFetch(method, path, body) {
      const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}${path}`, {
        method,
        headers: { Authorization: `Bearer ${_gTok}`, ...(body ? {"Content-Type":"application/json"} : {}) },
        ...(body ? { body: JSON.stringify(body) } : {}),
      });
      if (r.status === 401) throw Object.assign(new Error("Token expired"), { code: 401 });
      if (!r.ok) throw new Error(`Sheets API ${r.status}`);
      return r.json();
    }

    async function sheetsLoadAll() {
      const names = Object.keys(SHEET_COLS);
      const qp = names.map(n => `ranges=${encodeURIComponent(n+"!A1:Z")}`).join("&");
      const { valueRanges } = await gFetch("GET", `/values:batchGet?${qp}`);
      const out = {};
      names.forEach((name, i) => {
        const rows = valueRanges[i]?.values || [];
        if (!rows.length) { out[name] = []; return; }
        const headers = rows[0];
        const nums = SHEET_NUMS[name] || [];
        out[name] = rows.slice(1).filter(r => r.some(Boolean)).map(row => {
          const obj = {};
          headers.forEach((h, j) => {
            let v = row[j] ?? "";
            if (nums.includes(h) && v !== "") v = parseFloat(v) || 0;
            if (name === "Brewsheets" && h === "data") try { v = JSON.parse(v); } catch {}
            // Parse array fields stored as JSON strings (e.g. assigned_to: '["Gent","Gunn"]')
            if (h === "assigned_to" && typeof v === "string" && v.startsWith("[")) {
              try { const p = JSON.parse(v); if (Array.isArray(p)) v = p; } catch {}
            }
            obj[h] = v;
          });
          return obj;
        });
      });
      return out;
    }

    async function sheetsSave(name, items) {
      const cols = SHEET_COLS[name];
      const values = [cols, ...items.map(item => cols.map(c => {
        const v = item[c];
        if (v == null) return "";
        if (typeof v === "object") return JSON.stringify(v);
        return String(v);
      }))];
      await gFetch("PUT", `/values/${encodeURIComponent(name+"!A1")}?valueInputOption=RAW`, { values });
    }

    // Auto-creates any missing sheet tabs in the spreadsheet
    async function ensureSheetsExist() {
      const meta = await gFetch("GET", "?fields=sheets.properties.title");
      const existing = new Set((meta.sheets || []).map(s => s.properties.title));
      const missing = Object.keys(SHEET_COLS).filter(n => !existing.has(n));
      if (!missing.length) return;
      await gFetch("POST", ":batchUpdate", {
        requests: missing.map(title => ({
          addSheet: { properties: { title } }
        }))
      });
    }

      return tasks.filter(t => {
        if (seenIds.has(t.id)) return false;
        seenIds.add(t.id);
        const sig = `${t.batch_id}|${t.task}|${t.start_date || t.day}|${t.fermenter || ""}`;

    // ─── STAT CARD ────────────────────────────────────────────────────────────
    function StatCard({ label, value, sub, color }) {

        amber:   "bg-amber-50 text-amber-600",
        emerald: "bg-emerald-50 text-emerald-600",

        </div>
      );
    }

    // ─── DASHBOARD ────────────────────────────────────────────────────────────
    // ─── SHARED MINI BAR CHART ───────────────────────────────────────────────
    function BarList({ items, color = "bg-amber-400" }) {
      if (!items.length) return <p className="text-sm text-gray-400">No data</p>;
      const max = items[0][1];
      return (
        <div className="space-y-2.5">
          {items.map(([label, count]) => (
            <div key={label}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-xs text-gray-600 truncate pr-2 max-w-48">{label}</span>
                <span className="text-xs font-semibold text-gray-800 shrink-0">{count}</span>
              </div>
              <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                <div className={`h-full ${color} rounded-full transition-all`} style={{width:`${(count/max)*100}%`}}></div>
              </div>
            </div>
          ))}
        </div>
      );
    }

    // ─── TAB 1: KEG SUMMARY ──────────────────────────────────────────────────
    function KegSummaryTab({ kegStatus, fillLog, stockOut, beerList }) {
      const total  = kegStatus.length;
      const filled = kegStatus.filter(k => k.status === "Filled").length;
      const outKegs = kegStatus.filter(k => k.status === "Out");
      const out    = outKegs.length;
      const ret    = kegStatus.filter(k => k.status === "Return").length;
      const broken = kegStatus.filter(k => k.status === "Broken").length;
      const empty  = kegStatus.filter(k => k.status === "Empty").length;
      const totalLitres = fillLog.reduce((s,r) => s + (parseFloat(r.litres)||0), 0);

      // Out breakdown by keg TYPE (from keg_id prefix)
      const kegTypeLabel = id => {
        if (!id) return "Unknown";
        if (id.startsWith("OW_"))  return "One Way";
        if (id.startsWith("K50_")) return "50L KeyKeg";
        if (id.startsWith("K30_")) return "30L KeyKeg";
        if (id.startsWith("K20_")) return "20L KeyKeg";
        return id.split("_")[0];
      };
      const TYPE_ORDER = ["20L KeyKeg","30L KeyKeg","50L KeyKeg","One Way"];
      const outTypeMap = {};
      outKegs.forEach(k => {
        const t = kegTypeLabel(k.keg_id);
        outTypeMap[t] = (outTypeMap[t]||0) + 1;
      });
      const outBySize = Object.entries(outTypeMap)
        .sort((a,b) => {
          const ai = TYPE_ORDER.indexOf(a[0]), bi = TYPE_ORDER.indexOf(b[0]);
          return (ai===-1?99:ai) - (bi===-1?99:bi);
        });

      const beerCount = {};
      kegStatus.filter(k => k.status === "Filled" && k.beer_name).forEach(k => {
        beerCount[k.beer_name] = (beerCount[k.beer_name]||0) + 1;
      });
      const topBeers = Object.entries(beerCount).sort((a,b)=>b[1]-a[1]).slice(0,6);

      const destCount = {};
      stockOut.filter(s=>!s.date_returned).forEach(s => {
        destCount[s.destination] = (destCount[s.destination]||0) + 1;
      });
      const topDest = Object.entries(destCount).sort((a,b)=>b[1]-a[1]);

      const sizeCount = {};
      kegStatus.forEach(k => { sizeCount[k.size] = (sizeCount[k.size]||0) + 1; });
      const bySizes = Object.entries(sizeCount).sort((a,b)=>b[1]-a[1]);

      const recentFills = [...fillLog].sort((a,b)=>b.date_filled.localeCompare(a.date_filled)).slice(0,6);

      return (
        <div className="space-y-5">
          <div className="grid grid-cols-3 lg:grid-cols-6 gap-3">
            <StatCard label="Total Kegs"    value={total}  sub="all assets"         color="gray"    />
            <StatCard label="Filled"        value={filled} sub="ready in storage"   color="emerald" />
            {/* OUT card — broken down by keg size */}
            <div className="bg-white rounded-2xl p-5 border border-amber-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Out</p>
              <p className="text-3xl font-bold text-amber-600">{out}</p>
              <p className="text-xs text-gray-400 mt-1.5">at destinations</p>
              {outBySize.length > 0 && (
                <div className="mt-3 pt-2.5 border-t border-amber-50 space-y-1">
                  {outBySize.map(([size, count]) => (
                    <div key={size} className="flex items-center justify-between">
                      <span className="text-xs text-gray-400">{size}</span>
                      <span className="text-xs font-semibold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded-md">{count}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <StatCard label="Returned"      value={ret}    sub="back at brewery"    color="sky"     />
            <StatCard label="Broken/Lost"   value={broken} sub="needs attention"    color="red"     />
            <StatCard label="Empty"         value={empty}  sub="awaiting fill"      color="gray"    />
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div className="bg-white rounded-2xl p-5 border border-gray-100 flex flex-wrap gap-6 lg:col-span-4">
              <div><p className="text-2xl font-bold text-gray-800">{totalLitres.toLocaleString()} L</p><p className="text-xs text-gray-400 mt-0.5">Total litres logged</p></div>
              <div><p className="text-2xl font-bold text-gray-800">{fillLog.length}</p><p className="text-xs text-gray-400 mt-0.5">Fill log entries</p></div>
              <div><p className="text-2xl font-bold text-gray-800">{stockOut.length}</p><p className="text-xs text-gray-400 mt-0.5">Stock out entries</p></div>
              <div><p className="text-2xl font-bold text-gray-800">{beerList.length}</p><p className="text-xs text-gray-400 mt-0.5">Beer styles</p></div>
              <div><p className="text-2xl font-bold text-gray-800">{bySizes.length}</p><p className="text-xs text-gray-400 mt-0.5">Keg sizes</p></div>
            </div>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Filled Kegs by Beer</p>
              <BarList items={topBeers} color="bg-emerald-400" />
            </div>
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Kegs Currently Out by Destination</p>
              {topDest.length === 0 ? <p className="text-sm text-gray-400">No kegs out</p> : (
                <div className="space-y-2">
                  {topDest.map(([dest, count]) => (
                    <div key={dest} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                      <span className="text-sm text-gray-700">{dest}</span>
                      <span className="inline-flex items-center justify-center w-7 h-7 rounded-full bg-amber-50 text-amber-700 text-xs font-semibold">{count}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Recent Fills</p>
              <div className="space-y-3">
                {recentFills.map(f => (
                  <div key={f.id} className="flex items-start gap-2.5">
                    <div className="w-1.5 h-1.5 rounded-full bg-emerald-400 mt-1.5 shrink-0"></div>
                    <div className="min-w-0">
                      <p className="text-sm text-gray-700 truncate">{f.beer_name}</p>
                      <p className="text-xs text-gray-400">{f.keg_id} · {f.keg_size} · {fmt(f.date_filled)}</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── TAB 2: KEG IN STORAGE ────────────────────────────────────────────────
    function KegStorageTab({ kegStatus }) {
      const [search, setSearch] = useState("");
      const [expandedBeer, setExpandedBeer] = useState(null);
      const stored = kegStatus.filter(k => k.status === "Filled");

      // Parse litres from size string e.g. "20 L" → 20
      const parseL = size => { const m = (size||"").match(/(\d+(\.\d+)?)/); return m ? parseFloat(m[1]) : 0; };

      // Total litres by beer (with per-size breakdown)
      const beerLitreMap = {};
      stored.forEach(k => {
        const beer = k.beer_name || "Unknown";
        const l = parseL(k.size);
        if (!beerLitreMap[beer]) beerLitreMap[beer] = { totalLitres:0, kegs:[] };
        beerLitreMap[beer].totalLitres += l;
        beerLitreMap[beer].kegs.push(k);
      });
      const beerLitreRows = Object.entries(beerLitreMap)
        .sort((a,b) => b[1].totalLitres - a[1].totalLitres);

      // by beer (keg count)
      const beerMap = {};
      stored.forEach(k => { beerMap[k.beer_name||"Unknown"] = (beerMap[k.beer_name||"Unknown"]||0) + 1; });
      const byBeer = Object.entries(beerMap).sort((a,b)=>b[1]-a[1]);

      // by size
      const sizeMap = {};
      stored.forEach(k => { sizeMap[k.size] = (sizeMap[k.size]||0) + 1; });
      const bySize = Object.entries(sizeMap).sort((a,b)=>b[1]-a[1]);

      // by location
      const locMap = {};
      stored.forEach(k => { locMap[k.location||"Unknown"] = (locMap[k.location||"Unknown"]||0) + 1; });
      const byLoc = Object.entries(locMap).sort((a,b)=>b[1]-a[1]);

      const filtered = stored.filter(k => {
        const s = search.toLowerCase();
        return !s || k.keg_id.toLowerCase().includes(s) || (k.beer_name||"").toLowerCase().includes(s);
      });
      const sortedKegs = [...filtered].sort((a,b)=>(b.fill_date||"").localeCompare(a.fill_date||""));

      return (
        <div className="space-y-5">
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <StatCard label="Filled in Storage" value={stored.length}  sub="ready to ship"        color="emerald" />
            <StatCard label="Beer Styles"        value={byBeer.length}  sub="distinct beers"       color="amber"   />
            <StatCard label="Keg Sizes"          value={bySize.length}  sub="size variants"        color="sky"     />
            <StatCard label="Locations"          value={byLoc.length}   sub="storage locations"    color="gray"    />
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">By Beer</p>
              <BarList items={byBeer} color="bg-emerald-400" />
            </div>
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">By Keg Size</p>
              <BarList items={bySize} color="bg-sky-400" />
            </div>
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">By Location</p>
              <BarList items={byLoc} color="bg-violet-400" />
            </div>
          </div>
          {/* ── Total Litres by Beer (drilldown) ──────────────────────────── */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="px-5 py-3 border-b border-gray-100 flex items-center gap-2">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider flex-1">Total Litres In-Stock by Beer</p>
              <span className="text-xs text-gray-400">{stored.length} kegs · click row to expand</span>
            </div>
            <table className="w-full text-sm">
              <thead>
                <tr className="border-b border-gray-100 bg-emerald-600">
                  <th className="text-left px-4 py-2.5 text-xs font-semibold text-white uppercase tracking-wide">Beer Name</th>
                  <th className="text-right px-4 py-2.5 text-xs font-semibold text-white uppercase tracking-wide">Total Litres (In-Stock)</th>
                </tr>
                <tr className="border-b border-gray-100 bg-emerald-500">
                  <th className="text-left px-4 py-1.5 text-xs text-emerald-100"></th>
                  <th className="text-right px-4 py-1.5 text-xs text-emerald-100 font-medium">sum</th>
                </tr>
              </thead>
              <tbody>
                {beerLitreRows.map(([beer, data]) => {
                  const isOpen = expandedBeer === beer;
                  // group by size within this beer
                  const sizeGroups = {};
                  data.kegs.forEach(k => {
                    if (!sizeGroups[k.size]) sizeGroups[k.size] = { count:0, ids:[] };
                    sizeGroups[k.size].count++;
                    sizeGroups[k.size].ids.push(k.keg_id);
                  });
                  const sizeRows = Object.entries(sizeGroups).sort((a,b)=>(parseInt(a[0])||0)-(parseInt(b[0])||0));
                  return (
                    <React.Fragment key={beer}>
                      <tr className={`border-b border-gray-100 cursor-pointer hover:bg-emerald-50 transition-colors ${isOpen?"bg-emerald-50":""}`}

                        <td className="px-4 py-2.5 font-medium text-gray-800 flex items-center gap-2">
                          <span className={`text-emerald-500 transition-transform text-xs ${isOpen?"rotate-90":"rotate-0"}`} style={{display:"inline-block"}}>▶</span>
                          {beer}
                        </td>
                        <td className="px-4 py-2.5 text-right font-semibold text-gray-700">{data.totalLitres.toLocaleString()}</td>
                      </tr>
                      {isOpen && (
                        <tr className="border-b border-emerald-100">
                          <td colSpan={2} className="px-5 pt-0 pb-3 bg-emerald-50/60">
                            <table className="w-full text-xs rounded-lg overflow-hidden" style={{tableLayout:"fixed"}}>
                              <colgroup>
                                <col style={{width:"110px"}}/>
                                <col style={{width:"80px"}}/>
                                <col/>
                              </colgroup>
                              <thead>
                                <tr className="bg-gray-200">
                                  <th className="text-left px-3 py-2 font-semibold text-gray-500 uppercase tracking-wide">Size (L)</th>
                                  <th className="text-center px-3 py-2 font-semibold text-gray-500 uppercase tracking-wide">Kegs</th>
                                  <th className="text-left px-3 py-2 font-semibold text-gray-500 uppercase tracking-wide">Keg ID</th>
                                </tr>
                              </thead>
                              <tbody>
                                {sizeRows.map(([size, sg], si) => (
                                  <tr key={size} className={`border-t border-gray-100 ${si%2===0?"bg-white":"bg-gray-50"}`}>
                                    <td className="px-3 py-2 font-medium text-gray-700">{size}</td>
                                    <td className="px-3 py-2 text-center font-bold text-emerald-600">{sg.count}</td>
                                    <td className="px-3 py-2 text-gray-500 font-mono" style={{wordBreak:"break-word"}}>{sg.ids.join(", ")}</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* ── All Filled Kegs list ─────────────────────────────────────────── */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="px-5 py-3 border-b border-gray-100 flex items-center gap-3">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider flex-1">All Filled Kegs ({stored.length})</p>
              <div className="relative">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" className="pl-8 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 w-44" />
              </div>
            </div>
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Size</th>

                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Fill Date</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Location</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Updated By</th>
                  </tr>
                </thead>
                <tbody>
                  {sortedKegs.map((k,i) => (
                    <tr key={k.keg_id} className={`border-b border-gray-50 hover:bg-gray-50 ${i%2===0?"":"bg-gray-50/40"}`}>
                      <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700">{k.keg_id}</td>
                      <td className="px-4 py-3 text-gray-600">{k.size}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{k.beer_name||"—"}</td>

    // ─── TAB 3: KEG FILL DASHBOARD ────────────────────────────────────────────
    function KegFillTab({ fillLog }) {
      const totalLitres = fillLog.reduce((s,r)=>s+(parseFloat(r.litres)||0),0);
      const avgLitres   = fillLog.length ? (totalLitres/fillLog.length).toFixed(1) : 0;

      const today = new Date();
      const thisMonth = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}`;
      const fillsThisMonth = fillLog.filter(r => r.date_filled && r.date_filled.startsWith(thisMonth)).length;

      // By beer
      const beerMap = {};
      fillLog.forEach(r => { beerMap[r.beer_name] = (beerMap[r.beer_name]||0) + 1; });
      const byBeer = Object.entries(beerMap).sort((a,b)=>b[1]-a[1]).slice(0,8);

      // By staff
      const staffMap = {};
      fillLog.forEach(r => { const s = (r.filled_by||"").trim(); staffMap[s] = (staffMap[s]||0) + 1; });
      const byStaff = Object.entries(staffMap).sort((a,b)=>b[1]-a[1]);

      // By month
      const monthMap = {};
      fillLog.forEach(r => {
        if (!r.date_filled) return;
        const m = r.date_filled.slice(0,7);
        if (!monthMap[m]) monthMap[m] = { count:0, litres:0 };
        monthMap[m].count++;
        monthMap[m].litres += parseFloat(r.litres)||0;
      });
      const byMonth = Object.entries(monthMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(-8);
      const maxMonthCount = byMonth.length ? Math.max(...byMonth.map(([,v])=>v.count)) : 1;

      // By size
      const sizeMap = {};
      fillLog.forEach(r => { sizeMap[r.keg_size] = (sizeMap[r.keg_size]||0) + 1; });
      const bySize = Object.entries(sizeMap).sort((a,b)=>b[1]-a[1]);

      const recent = [...fillLog].sort((a,b)=>b.date_filled.localeCompare(a.date_filled)).slice(0,8);

      return (
        <div className="space-y-5">
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <StatCard label="Total Fills"       value={fillLog.length}          sub="all entries"        color="emerald" />
            <StatCard label="Total Litres"       value={`${totalLitres.toLocaleString()} L`} sub="produced" color="amber" />
            <StatCard label="Avg per Fill"       value={`${avgLitres} L`}        sub="average fill size"  color="sky"     />
            <StatCard label="This Month"         value={fillsThisMonth}          sub="fills logged"       color="gray"    />
          </div>

          {/* Monthly trend */}
          <div className="bg-white rounded-2xl p-5 border border-gray-100">
            <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-5">Monthly Fill Volume</p>
            <div className="flex items-end gap-3 h-28">
              {byMonth.map(([month, v]) => (
                <div key={month} className="flex-1 flex flex-col items-center gap-1 min-w-0">
                  <span className="text-xs text-gray-500 font-medium">{v.count}</span>
                  <div className="w-full rounded-t-lg bg-amber-400 transition-all" style={{height:`${Math.max(4,(v.count/maxMonthCount)*80)}px`}}></div>
                  <span className="text-xs text-gray-400 truncate w-full text-center">{month.slice(5)}/{month.slice(2,4)}</span>
                </div>
              ))}
              {byMonth.length === 0 && <p className="text-sm text-gray-400">No data</p>}
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Fills by Beer</p>
              <BarList items={byBeer} color="bg-emerald-400" />
            </div>
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Fills by Staff</p>
              <BarList items={byStaff} color="bg-amber-400" />
              <div className="mt-4 pt-4 border-t border-gray-100 space-y-2.5">
                <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-3">Fills by Keg Size</p>
                <BarList items={bySize} color="bg-sky-400" />
              </div>
            </div>
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Recent Fills</p>
              <div className="space-y-2.5">
                {recent.map(f => (
                  <div key={f.id} className="flex items-start gap-2.5 py-1.5 border-b border-gray-50 last:border-0">
                    <div className="min-w-0 flex-1">
                      <p className="text-xs font-medium text-gray-700 truncate">{f.beer_name}</p>
                      <p className="text-xs text-gray-400">{f.keg_id} · {f.keg_size} · {f.litres} L</p>
                    </div>
                    <p className="text-xs text-gray-400 whitespace-nowrap shrink-0">{fmt(f.date_filled)}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ─── TAB 4: KEG OUT DASHBOARD ────────────────────────────────────────────
    function KegOutTab({ stockOut }) {
      const [search, setSearch] = useState("");
      const currentlyOut = stockOut.filter(r => !r.date_returned);
      const returned     = stockOut.filter(r => !!r.date_returned);

      // Days out calculation
      const today = new Date();
      const daysOut = r => {
        if (!r.date_out) return 0;
        return Math.floor((today - new Date(r.date_out)) / 86400000);
      };
      const overdue = currentlyOut.filter(r => daysOut(r) > 30);
      const avgDays = returned.length
        ? Math.round(returned.reduce((s,r) => {
            if (!r.date_out || !r.date_returned) return s;
            return s + Math.floor((new Date(r.date_returned)-new Date(r.date_out))/86400000);
          }, 0) / returned.length)
        : 0;

      // By destination (currently out)
      const destMap = {};
      currentlyOut.forEach(r => { destMap[r.destination] = (destMap[r.destination]||0) + 1; });
      const byDest = Object.entries(destMap).sort((a,b)=>b[1]-a[1]);

      // By beer (currently out)
      const beerMap = {};
      currentlyOut.forEach(r => { beerMap[r.beer_name||"Unknown"] = (beerMap[r.beer_name||"Unknown"]||0) + 1; });
      const byBeer = Object.entries(beerMap).sort((a,b)=>b[1]-a[1]).slice(0,6);

      const filteredOut = currentlyOut.filter(r => {
        const s = search.toLowerCase();
        return !s || r.keg_id.toLowerCase().includes(s) || (r.beer_name||"").toLowerCase().includes(s) || (r.destination||"").toLowerCase().includes(s);
      }).sort((a,b) => daysOut(b)-daysOut(a));

      return (
        <div className="space-y-5">
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <StatCard label="Currently Out"   value={currentlyOut.length} sub="not yet returned"      color="amber"   />
            <StatCard label="Returned"        value={returned.length}     sub="completed trips"       color="emerald" />
            <StatCard label="Overdue (30d+)"  value={overdue.length}      sub="needs follow-up"       color="red"     />
            <StatCard label="Avg Days Out"    value={`${avgDays}d`}       sub="for returned kegs"     color="sky"     />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Currently Out by Destination</p>
              <BarList items={byDest} color="bg-amber-400" />
            </div>
            <div className="bg-white rounded-2xl p-5 border border-gray-100">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider mb-4">Currently Out by Beer</p>
              <BarList items={byBeer} color="bg-sky-400" />
            </div>
          </div>

          {overdue.length > 0 && (
            <div className="bg-red-50 rounded-2xl border border-red-100 overflow-hidden">
              <div className="px-5 py-3 border-b border-red-100 flex items-center gap-2">
                <svg className="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                <p className="text-xs font-semibold text-red-600 uppercase tracking-wider">Overdue — Out More Than 30 Days ({overdue.length})</p>
              </div>
              <div className="table-scroll">
                <table className="w-full text-sm">
                  <thead><tr className="border-b border-red-100">
                    <th className="text-left px-4 py-2.5 text-xs font-medium text-red-400 uppercase tracking-wide">Keg ID</th>
                    <th className="text-left px-4 py-2.5 text-xs font-medium text-red-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-2.5 text-xs font-medium text-red-400 uppercase tracking-wide">Destination</th>
                    <th className="text-left px-4 py-2.5 text-xs font-medium text-red-400 uppercase tracking-wide whitespace-nowrap">Date Out</th>
                    <th className="text-left px-4 py-2.5 text-xs font-medium text-red-400 uppercase tracking-wide whitespace-nowrap">Days Out</th>
                  </tr></thead>
                  <tbody>
                    {overdue.sort((a,b)=>daysOut(b)-daysOut(a)).map((r,i) => (
                      <tr key={r.id} className="border-b border-red-50 last:border-0">
                        <td className="px-4 py-2.5 font-mono text-xs font-medium text-gray-700">{r.keg_id}</td>
                        <td className="px-4 py-2.5 text-gray-700 max-w-40 truncate">{r.beer_name||"—"}</td>
                        <td className="px-4 py-2.5 text-gray-600">{r.destination}</td>
                        <td className="px-4 py-2.5 text-gray-500 whitespace-nowrap">{fmt(r.date_out)}</td>
                        <td className="px-4 py-2.5 font-semibold text-red-600">{daysOut(r)}d</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="px-5 py-3 border-b border-gray-100 flex items-center gap-3">
              <p className="text-xs font-medium text-gray-400 uppercase tracking-wider flex-1">All Currently Out ({currentlyOut.length})</p>
              <div className="relative">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search…" className="pl-8 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 w-44" />
              </div>
            </div>
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead><tr className="border-b border-gray-100">
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Keg ID</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Destination</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Out</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Days Out</th>
                  <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Recorded By</th>
                </tr></thead>
                <tbody>
                  {filteredOut.length === 0
                    ? <tr><td colSpan={6} className="text-center py-8 text-gray-400 text-sm">No kegs currently out</td></tr>
                    : filteredOut.map((r,i) => {
                      const d = daysOut(r);
                      return (
                        <tr key={r.id} className={`border-b border-gray-50 hover:bg-gray-50 ${i%2===0?"":"bg-gray-50/40"}`}>
                          <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700">{r.keg_id}</td>
                          <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{r.beer_name||"—"}</td>
                          <td className="px-4 py-3 text-gray-600">{r.destination}</td>
                          <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_out)}</td>
                          <td className="px-4 py-3 whitespace-nowrap">
                            <span className={`font-semibold text-xs ${d>30?"text-red-600":d>14?"text-amber-600":"text-gray-600"}`}>{d}d</span>
                          </td>
                          <td className="px-4 py-3 text-gray-500">{r.recorded_by}</td>
                        </tr>
                      );
                    })
                  }
                </tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ─── KEG STATUS PAGE ─────────────────────────────────────────────────────
    function KegStatusPage({ kegStatus, setKegStatus }) {
      const [search, setSearch] = useState("");
      const [filterStatus, setFilterStatus] = useState("All");
      const [filterSize, setFilterSize] = useState("All");
      const [showAddKeg, setShowAddKeg] = useState(false);
      const [kegForm, setKegForm] = useState({ size: "20", qty: 1 });
      const [editSizeKeg, setEditSizeKeg] = useState(null); // { keg_id, size }
      function handleEditSize(e) {
        e.preventDefault();
        setKegStatus(prev => prev.map(k =>
          k.keg_id === editSizeKeg.keg_id ? { ...k, size: editSizeKeg.size } : k
        ));
        setEditSizeKeg(null);
      }
      const [dateMode, setDateMode] = useState("all"); // "today" | "period" | "all"
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo,   setDateTo]   = useState("");

      const statuses = ["All", ...Object.keys(STATUS_CONFIG)];
      const sizes = ["All", ...KEG_SIZES];

      const filtered = useMemo(() => {
        const todayStr = new Date().toISOString().split("T")[0];
        return kegStatus.filter(k => {
          const s = search.toLowerCase();
          const matchSearch = !s || k.keg_id.toLowerCase().includes(s) || (k.beer_name||"").toLowerCase().includes(s) || (k.location||"").toLowerCase().includes(s);
          const matchStatus = filterStatus === "All" || k.status === filterStatus;
          const matchSize   = filterSize === "All" || k.size === filterSize;
          let matchDate = true;
          if (dateMode === "today")  matchDate = k.fill_date === todayStr;
          if (dateMode === "period") matchDate = (!dateFrom || (k.fill_date||"") >= dateFrom) && (!dateTo || (k.fill_date||"") <= dateTo);
          return matchSearch && matchStatus && matchSize && matchDate;
        });
      }, [kegStatus, search, filterStatus, filterSize, dateMode, dateFrom, dateTo]);

      function nextKegNum(sizeKey) {
        const prefix = sizeKey === "OW" ? "OW_" : `K${sizeKey}_`;
        const nums = kegStatus
          .filter(k => k.keg_id.startsWith(prefix))
          .map(k => parseInt(k.keg_id.slice(prefix.length)) || 0);
        return nums.length ? Math.max(...nums) : 0;
      }

      function handleAddKeg(e) {
        e.preventDefault();
        const isOW = kegForm.size === "OW";
        const prefix = isOW ? "OW" : `K${kegForm.size}`;
        const sizeLabel = isOW ? "20 L" : `${kegForm.size} L`;
        const qty = Math.max(1, Math.min(100, parseInt(kegForm.qty) || 1));
        const startNum = nextKegNum(kegForm.size) + 1;
        const newKegs = Array.from({ length: qty }, (_, i) => ({
          keg_id: `${prefix}_${String(startNum + i).padStart(3, "0")}`,
          size: sizeLabel,
          status: "Empty",
          beer_name: "",
          fill_date: "",
          date_out: "",
          return_date: "",
          location: "Brewery",
          last_updated_by: "Meena",
        }));
        setKegStatus(prev => [...prev, ...newKegs]);
        setShowAddKeg(false);
        setKegForm({ size: "20", qty: 1 });
      }

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Keg Status</h1>
              <p className="text-sm text-gray-400 mt-0.5">{filtered.length} of {kegStatus.length} kegs</p>
            </div>
            <button onClick={() => setShowAddKeg(true)} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Add Keg
            </button>
          </div>

          {/* Filters */}
          <div className="bg-white rounded-2xl p-4 border border-gray-100 space-y-3">
            <div className="flex flex-wrap gap-3">
              <div className="relative flex-1 min-w-48">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search keg ID, beer, location…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
              </div>
              <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                {statuses.map(s => <option key={s}>{s}</option>)}
              </select>
              <select value={filterSize} onChange={e => setFilterSize(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                {sizes.map(s => <option key={s}>{s}</option>)}
              </select>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <span className="text-xs text-gray-400">Fill date:</span>
              {[{id:"all",label:"Show All"},{id:"today",label:"Today"},{id:"period",label:"By Period"}].map(opt => (
                <button key={opt.id} onClick={() => setDateMode(opt.id)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${dateMode===opt.id?"bg-amber-500 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                  {opt.label}
                </button>
              ))}
              {dateMode === "period" && (<>
                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
                <span className="text-xs text-gray-400">–</span>
                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
              </>)}
            </div>
          </div>

          {/* Table */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Size</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Status</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Fill Date</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Out</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Return Date</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Location</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Updated By</th>
                    <th className="w-8"></th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.length === 0 ? (
                    <tr><td colSpan={10} className="text-center py-10 text-gray-400 text-sm">No kegs match your filters</td></tr>
                  ) : filtered.map((k, i) => (
                    <tr key={k.keg_id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i % 2 === 0 ? "" : "bg-gray-50/40"}`}>
                      <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{k.keg_id}</td>
                      <td className="px-4 py-3 whitespace-nowrap">
                        <span className="text-gray-600">{k.size}</span>
                      </td>
                      <td className="px-4 py-3"><StatusBadge status={k.status} /></td>
                      <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{k.beer_name || "—"}</td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(k.fill_date)}</td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(k.date_out)}</td>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(k.return_date)}</td>
                      <td className="px-4 py-3 text-gray-600 whitespace-nowrap">{k.location || "—"}</td>
                      <td className="px-4 py-3 text-gray-500">{k.last_updated_by}</td>
                      <td className="px-4 py-3 text-right">
                        <button onClick={() => setEditSizeKeg({ keg_id: k.keg_id, size: k.size })}
                          title="Edit keg size"
                          className="p-1 text-gray-300 hover:text-amber-500 transition-colors">
                          <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {editSizeKeg && (
            <Modal title={`Fix Keg Size — ${editSizeKeg.keg_id}`} onClose={() => setEditSizeKeg(null)}>
              <form onSubmit={handleEditSize} className="space-y-4">
                <p className="text-xs text-gray-500">Correct the physical capacity of this keg. This does not affect fill log history.</p>
                <div>
                  <label className="block text-xs font-medium text-gray-500 mb-1.5">Physical Capacity</label>
                  <div className="grid grid-cols-3 gap-2">
                    {KEG_SIZES.map(s => (
                      <button type="button" key={s}
                        onClick={() => setEditSizeKeg(k => ({...k, size: s}))}
                        className={`py-2 rounded-xl border text-sm font-medium transition-colors ${editSizeKeg.size === s ? "border-amber-500 bg-amber-50 text-amber-700" : "border-gray-200 text-gray-600 hover:border-amber-300"}`}>
                        {s}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => setEditSizeKeg(null)}
                    className="flex-1 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50">Cancel</button>
                  <button type="submit"
                    className="flex-1 py-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-xl text-sm font-medium">Save</button>
                </div>
              </form>
            </Modal>
          )}

          {showAddKeg && (
            <Modal title="Add New Empty Kegs" onClose={() => setShowAddKeg(false)}>
              <form onSubmit={handleAddKeg} className="space-y-5">
                <Field label="Keg Type">
                  <div className="grid grid-cols-4 gap-2">
                    {[
                      { key:"20", label:"20 L",     sub:"K20_XXX" },
                      { key:"30", label:"30 L",     sub:"K30_XXX" },
                      { key:"50", label:"50 L",     sub:"K50_XXX" },
                      { key:"OW", label:"One Way",  sub:"OW_XXX"  },
                    ].map(({ key, label, sub }) => (
                      <label key={key} className={`flex flex-col items-center gap-1.5 py-3 rounded-xl border-2 cursor-pointer transition-all ${kegForm.size === key ? "border-amber-400 bg-amber-50" : "border-gray-200 hover:border-gray-300"}`}>
                        <input type="radio" name="kegSize" value={key} checked={kegForm.size === key} onChange={e => setKegForm(f => ({...f, size: e.target.value}))} className="sr-only" />
                        <span className="text-sm font-bold text-gray-700">{label}</span>
                        <span className="text-xs text-gray-400 font-mono">{sub}</span>
                      </label>
                    ))}
                  </div>
                </Field>
                {kegForm.size === "OW" && (
                  <p className="text-xs text-amber-600 bg-amber-50 rounded-lg px-3 py-2">One-way kegs are always <span className="font-semibold">20 L</span></p>
                )}
                <Field label="Quantity">
                  <input type="number" min={1} max={100} required value={kegForm.qty} onChange={e => setKegForm(f => ({...f, qty: e.target.value}))} className={inputCls} />
                  <p className="text-xs text-gray-400 mt-1">
                    {(() => {
                      const isOW = kegForm.size === "OW";
                      const prefix = isOW ? "OW" : `K${kegForm.size}`;
                      const n = nextKegNum(kegForm.size) + 1;
                      const q = Math.max(1, Math.min(100, parseInt(kegForm.qty)||1));
                      const end = n + q - 1;
                      return `Will create: ${prefix}_${String(n).padStart(3,"0")}${q>1?" → "+prefix+"_"+String(end).padStart(3,"0"):""}`;
                    })()}
                  </p>
                </Field>
                <p className="text-xs text-gray-400 bg-gray-50 rounded-lg px-3 py-2">New kegs will be added with status <span className="font-medium text-gray-600">Empty</span> and location <span className="font-medium text-gray-600">Brewery</span>.</p>
                <div className="flex gap-3 pt-1">
                  <button type="button" onClick={() => setShowAddKeg(false)} className="flex-1 px-4 py-2.5 rounded-xl border border-gray-200 text-sm text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 rounded-xl bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium transition-colors">Add Kegs</button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── FILL LOG PAGE ────────────────────────────────────────────────────────
    function FillLogPage({ fillLog, setFillLog, beerList, kegStatus, setKegStatus, batches }) {
      const STAFF = React.useContext(StaffCtx);
      const [showModal, setShowModal] = useState(false);
      const [search, setSearch] = useState("");
      const [kegSearch, setKegSearch] = useState("");
      const [dateMode, setDateMode] = useState("all"); // "today" | "period" | "all"
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo,   setDateTo]   = useState("");

      function makeBlankForm() {
        return {
          date_filled: new Date().toISOString().split("T")[0],
          batch_id: "",
          keg_size: "20 L",
          selected_kegs: [],
          std_litres: 20,
          last_litres: 20,
          filled_by: STAFF[0],
          remark: "",
        };
      }
      const [form, setForm] = useState(makeBlankForm);

      // Sort batches newest-first for the dropdown
      const sortedBatches = [...batches].sort((a,b) => parseInt(b.batch_id) - parseInt(a.batch_id));
      const selectedBatch = sortedBatches.find(b => b.batch_id === form.batch_id);
      const beerName = selectedBatch?.beer_name || "";

      // Only show Empty kegs for the selected size, with optional search
      const availableKegs = [...kegStatus]
        .filter(k => k.size === form.keg_size && k.status === "Empty")
        .filter(k => !kegSearch || k.keg_id.toLowerCase().includes(kegSearch.toLowerCase()))
        .sort((a,b) => a.keg_id.localeCompare(b.keg_id));

      const multiKeg = form.selected_kegs.length > 1;
      const totalLitres = multiKeg
        ? (form.selected_kegs.length - 1) * (parseFloat(form.std_litres) || 0) + (parseFloat(form.last_litres) || 0)
        : (parseFloat(form.std_litres) || 0);

      function handleSizeChange(size) {
        setKegSearch("");
        setForm(f => ({
          ...f,
          keg_size: size,
          std_litres: parseInt(size) || 20,
          last_litres: parseInt(size) || 20,
          selected_kegs: [],
        }));
      }

      function toggleKeg(kegId) {
        setForm(f => ({
          ...f,
          selected_kegs: f.selected_kegs.includes(kegId)
            ? f.selected_kegs.filter(k => k !== kegId)
            : [...f.selected_kegs, kegId],
        }));
      }

      function handleDeleteFill(id, keg_id) {
        // Pass keg_id directly to avoid stale-closure lookup failures
        // Only revert keg if no other fill log entries remain for this keg
        const otherFills = fillLog.filter(r => r.id !== id && r.keg_id === keg_id);
        setFillLog(prev => prev.filter(r => r.id !== id));
        if (otherFills.length === 0) {
          setKegStatus(prev => prev.map(k =>
            k.keg_id === keg_id && k.status === "Filled"
              ? { ...k, status: "Empty", beer_name: "", fill_date: "", last_updated_by: k.last_updated_by }
              : k
          ));
        }
      }

      function handleSubmit(e) {
        e.preventDefault();
        if (!form.batch_id || !form.selected_kegs.length) return;
        const now = Date.now();
        const newEntries = form.selected_kegs.map((kegId, i) => {
          const isLast = i === form.selected_kegs.length - 1;
          // Always use the keg's registered physical capacity from KegStatus,
          // NOT form.keg_size (which is just a filter). This prevents the keg
          // size from being recorded as the fill amount on partial fills.
          const kegRecord = kegStatus.find(k => k.keg_id === kegId);
          return {
            id: now + i,
            date_filled: form.date_filled,
            beer_name: beerName,
            keg_size: kegRecord?.size || form.keg_size,
            keg_id: kegId,
            filled_by: form.filled_by,
            batch_no: form.batch_id,
            litres: isLast && multiKeg
              ? parseFloat(form.last_litres) || 0
              : parseFloat(form.std_litres) || 0,
            remark: form.remark,
          };
        });
        setFillLog(prev => [...newEntries.reverse(), ...prev]);
        // Update keg status: Empty → Filled
        const filledSet = new Set(form.selected_kegs);
        setKegStatus(prev => prev.map(k =>
          filledSet.has(k.keg_id)
            ? { ...k, status: "Filled", beer_name: beerName, fill_date: form.date_filled, last_updated_by: form.filled_by }
            : k
        ));
        setShowModal(false);
        setKegSearch("");
        setForm(makeBlankForm());
      }

      const filtered = useMemo(() => {
        const todayStr = new Date().toISOString().split("T")[0];
        return fillLog.filter(r => {
          const s = search.toLowerCase();
          const matchSearch = !search || r.keg_id.toLowerCase().includes(s) || r.beer_name.toLowerCase().includes(s) || (r.filled_by||"").toLowerCase().includes(s);
          let matchDate = true;
          if (dateMode === "today")  matchDate = r.date_filled === todayStr;
          if (dateMode === "period") matchDate = (!dateFrom || r.date_filled >= dateFrom) && (!dateTo || r.date_filled <= dateTo);
          return matchSearch && matchDate;
        });
      }, [fillLog, search, dateMode, dateFrom, dateTo]);

      const sorted = [...filtered].sort((a,b) => b.date_filled.localeCompare(a.date_filled));

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Fill Log</h1>
              <p className="text-sm text-gray-400 mt-0.5">{fillLog.length} entries</p>
            </div>
            <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Log Fill
            </button>
          </div>

          <div className="bg-white rounded-2xl p-4 border border-gray-100 space-y-3">
            <div className="relative">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search keg ID, beer or staff…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
            </div>
            <div className="flex flex-wrap items-center gap-2">
              {[{id:"all",label:"Show All"},{id:"today",label:"Today"},{id:"period",label:"By Period"}].map(opt => (
                <button key={opt.id} onClick={() => setDateMode(opt.id)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${dateMode===opt.id?"bg-amber-500 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                  {opt.label}
                </button>
              ))}
              {dateMode === "period" && (<>
                <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
                <span className="text-xs text-gray-400">–</span>
                <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} className="px-2.5 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
              </>)}
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="table-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-gray-100">
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Date Filled</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Keg ID</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Size</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Litres</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Filled By</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Batch #</th>
                    <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Remark</th>
                    <th className="px-4 py-3"></th>
                  </tr>
                </thead>
                <tbody>
                  {sorted.length === 0 ? (
                    <tr><td colSpan={9} className="text-center py-10 text-gray-400 text-sm">No fill log entries</td></tr>
                  ) : sorted.map((r, i) => (
                    <tr key={r.id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i % 2 === 0 ? "" : "bg-gray-50/40"}`}>
                      <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(r.date_filled)}</td>
                      <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{r.beer_name}</td>
                      <td className="px-4 py-3 font-mono text-xs font-medium text-gray-700 whitespace-nowrap">{r.keg_id}</td>
                      <td className="px-4 py-3 text-gray-600 whitespace-nowrap">{kegStatus.find(k=>k.keg_id===r.keg_id)?.size || r.keg_size}</td>
                      <td className="px-4 py-3 text-gray-700 font-medium">{r.litres} L</td>
                      <td className="px-4 py-3 text-gray-600">{r.filled_by}</td>
                      <td className="px-4 py-3 text-gray-500">{r.batch_no || "—"}</td>
                      <td className="px-4 py-3 text-gray-400 max-w-40 truncate">{r.remark || "—"}</td>
                      <td className="px-4 py-3 text-right">
                        <button onClick={() => handleDeleteFill(r.id, r.keg_id)} className="text-xs text-red-400 hover:text-red-600 transition-colors px-2 py-0.5 rounded hover:bg-red-50">Delete</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {showModal && (
            <Modal title="Log a Keg Fill" onClose={() => { setShowModal(false); setKegSearch(""); setForm(makeBlankForm()); }}>
              <form onSubmit={handleSubmit} className="space-y-4">
                {/* Date + Filled By */}
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Date Filled">
                    <input type="date" required value={form.date_filled} onChange={e => setForm(f=>({...f,date_filled:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Filled By">
                    <select value={form.filled_by} onChange={e => setForm(f=>({...f,filled_by:e.target.value}))} className={inputCls}>
                      {STAFF.map(s => <option key={s}>{s}</option>)}
                    </select>
                  </Field>
                </div>

                {/* Batch selector → auto-fills beer name */}
                <Field label="Batch #">
                  <select required value={form.batch_id} onChange={e => setForm(f=>({...f, batch_id: e.target.value, selected_kegs: []}))} className={inputCls}>
                    <option value="">— Select batch —</option>
                    {sortedBatches.map(b => (
                      <option key={b.batch_id} value={b.batch_id}>
                        {b.batch_id} — {b.beer_name}  [{b.status}]
                      </option>
                    ))}
                  </select>
                  {beerName && (
                    <p className="text-xs mt-1.5 text-gray-500 flex items-center gap-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-amber-400 inline-block"></span>
                      {beerName}
                    </p>
                  )}
                </Field>

                {/* Keg Size toggle — 20 / 30 / 50 only */}
                <Field label="Keg Size">
                  <div className="flex gap-2">
                    {["20 L","30 L","50 L"].map(s => (
                      <label key={s} className={`flex-1 flex items-center justify-center py-2.5 rounded-xl border-2 cursor-pointer text-sm font-semibold transition-all ${form.keg_size === s ? "border-amber-400 bg-amber-50 text-amber-700" : "border-gray-200 text-gray-400 hover:border-gray-300"}`}>
                        <input type="radio" name="fillKegSize" value={s} checked={form.keg_size === s} onChange={() => handleSizeChange(s)} className="sr-only" />
                        {s}
                      </label>
                    ))}
                  </div>
                </Field>

                {/* Multi-select keg checkbox list — Empty kegs only */}
                <div className="flex flex-col gap-1.5">
                  <div className="flex items-center justify-between">
                    <label className="text-xs font-medium text-gray-500 uppercase tracking-wide">
                      Select Empty Kegs ({form.selected_kegs.length} selected)
                    </label>
                    {form.selected_kegs.length > 0 && (
                      <button type="button" onClick={() => setForm(f=>({...f, selected_kegs:[]}))} className="text-xs text-gray-400 hover:text-gray-600 transition-colors">Clear</button>
                    )}
                  </div>
                  <div className="relative">
                    <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input value={kegSearch} onChange={e => setKegSearch(e.target.value)} placeholder="Search keg ID…" className="w-full pl-8 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400" />
                  </div>
                  <div className="border border-gray-200 rounded-xl overflow-hidden max-h-44 overflow-y-auto">
                    {availableKegs.length === 0 ? (
                      <p className="text-xs text-gray-400 text-center py-4">
                        {kegSearch ? `No empty ${form.keg_size} kegs matching "${kegSearch}"` : `No empty ${form.keg_size} kegs available`}
                      </p>
                    ) : availableKegs.map(k => (
                      <label key={k.keg_id} className={`flex items-center gap-2.5 px-3 py-2 cursor-pointer border-b border-gray-50 last:border-0 transition-colors ${form.selected_kegs.includes(k.keg_id) ? "bg-amber-50" : "hover:bg-gray-50"}`}>
                        <input type="checkbox" checked={form.selected_kegs.includes(k.keg_id)} onChange={() => toggleKeg(k.keg_id)} className="w-4 h-4 rounded accent-amber-500 shrink-0" />
                        <span className="font-mono text-xs font-semibold text-gray-700 flex-1">{k.keg_id}</span>
                        <span className="text-xs text-gray-400">{k.location || "Brewery"}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {/* Litres fields */}
                <div className="grid grid-cols-2 gap-4">
                  <Field label={multiKeg ? "Litres / Keg (standard)" : "Litres"}>
                    <input type="number" min={0} step={0.5} required value={form.std_litres} onChange={e => setForm(f=>({...f, std_litres: e.target.value}))} className={inputCls} />
                  </Field>
                  {multiKeg && (
                    <Field label={`Last Keg (${form.selected_kegs[form.selected_kegs.length - 1]})`}>
                      <input type="number" min={0} step={0.5} value={form.last_litres} onChange={e => setForm(f=>({...f, last_litres: e.target.value}))} className={inputCls} />
                      <p className="text-xs text-gray-400 mt-0.5">For partial last keg</p>
                    </Field>
                  )}
                </div>

                {/* Total summary pill */}
                {form.selected_kegs.length > 0 && (
                  <div className="flex items-center gap-2 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-xl px-3 py-2 text-xs font-medium">
                    <svg className="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>{form.selected_kegs.length} keg{form.selected_kegs.length > 1 ? "s" : ""} · Total: <strong>{totalLitres} L</strong></span>
                    {multiKeg && parseFloat(form.last_litres) !== parseFloat(form.std_litres) && (
                      <span className="text-emerald-600 font-normal">
                        ({form.selected_kegs.length - 1} × {form.std_litres} L + {form.last_litres} L last)
                      </span>
                    )}
                  </div>
                )}

                {/* Remark */}
                <Field label="Remark">
                  <input placeholder="Optional note" value={form.remark} onChange={e => setForm(f=>({...f,remark:e.target.value}))} className={inputCls} />
                </Field>

                <div className="flex gap-3 pt-1">
                  <button type="button" onClick={() => { setShowModal(false); setForm(makeBlankForm()); }} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" disabled={!form.batch_id || !form.selected_kegs.length} className="flex-1 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 disabled:bg-gray-200 disabled:text-gray-400 text-white text-sm font-medium rounded-xl transition-colors">
                    Save Fill{form.selected_kegs.length > 1 ? ` (${form.selected_kegs.length} kegs)` : ""}
                  </button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── STOCK OUT PAGE ───────────────────────────────────────────────────────
    function StockOutPage({ stockOut, setStockOut, kegStatus, setKegStatus }) {
      const STAFF = React.useContext(StaffCtx);
      const [showModal, setShowModal] = useState(false);
      const [returnTarget, setReturnTarget] = useState(null);
      const [returnForm, setReturnForm] = useState({ date_returned: new Date().toISOString().split("T")[0], recorded_by: STAFF[0] });
      const [search, setSearch] = useState("");
      const [filterDest, setFilterDest] = useState("All");
      const [filterStatus, setFilterStatus] = useState("All");
      const [kegSearch, setKegSearch] = useState("");
      const [dateMode, setDateMode] = useState("all"); // "today" | "period" | "all"
      const [dateFrom, setDateFrom] = useState("");
      const [dateTo,   setDateTo]   = useState("");
      // Batch return
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [showBatchReturn, setShowBatchReturn] = useState(false);
      const [batchReturnForm, setBatchReturnForm] = useState({ date_returned: new Date().toISOString().split("T")[0], recorded_by: STAFF[0] });
      // View toggle: "out" | "returned"
      const [outView, setOutView] = useState("out");

      function makeBlankForm() {
        return {
          date_out: new Date().toISOString().split("T")[0],
          selected_kegs: [],
          destination: DESTINATIONS[0],
          recorded_by: STAFF[0],
          date_returned: "",
          remark: "",
        };
      }
      const [form, setForm] = useState(makeBlankForm);

      // Only Filled kegs can go out, filtered by optional search
      const filledKegs = [...kegStatus]
        .filter(k => k.status === "Filled")
        .filter(k => !kegSearch || k.keg_id.toLowerCase().includes(kegSearch.toLowerCase()) || (k.beer_name||"").toLowerCase().includes(kegSearch.toLowerCase()))
        .sort((a,b) => a.keg_id.localeCompare(b.keg_id));

      function toggleKeg(kegId) {
        setForm(f => ({
          ...f,
          selected_kegs: f.selected_kegs.includes(kegId)
            ? f.selected_kegs.filter(k => k !== kegId)
            : [...f.selected_kegs, kegId],
        }));
      }

      function handleSubmit(e) {
        e.preventDefault();
        if (!form.selected_kegs.length) return;
        const now = Date.now();
        const newEntries = form.selected_kegs.map((kegId, i) => {
          const keg = kegStatus.find(k => k.keg_id === kegId);
          return {
            id: now + i,
            date_out: form.date_out,
            keg_id: kegId,
            beer_name: keg?.beer_name || "",
            keg_size: keg?.size || "",
            destination: form.destination,
            recorded_by: form.recorded_by,
            date_returned: form.date_returned,
            remark: form.remark || "",
          };
        });
        setStockOut(prev => [...newEntries.reverse(), ...prev]);
        // Update keg status: Filled → Out
        const outSet = new Set(form.selected_kegs);
        setKegStatus(prev => prev.map(k =>
          outSet.has(k.keg_id)
            ? { ...k, status: "Out", date_out: form.date_out, location: form.destination, last_updated_by: form.recorded_by }
            : k
        ));
        setShowModal(false);
        setKegSearch("");
        setForm(makeBlankForm());
      }

      function handleDeleteStockOut(id, keg_id, beer_name) {
        // Revert keg: Out → Filled (only if still Out; leave alone if already Returned/Broken)
        setKegStatus(prev => prev.map(k =>
          k.keg_id === keg_id && k.status === "Out"
            ? { ...k, status: "Filled", beer_name: beer_name || k.beer_name, date_out: "", location: "Brewery", last_updated_by: k.last_updated_by }
            : k
        ));
        setStockOut(prev => prev.filter(r => r.id !== id));
      }

      function openReturn(row) {
        setReturnTarget(row);
        setReturnForm({ date_returned: new Date().toISOString().split("T")[0], recorded_by: STAFF[0] });
      }

      function handleReturnSubmit(e) {
        e.preventDefault();
        // Update stock out record
        setStockOut(prev => prev.map(r =>
          r.id === returnTarget.id ? { ...r, date_returned: returnForm.date_returned } : r
        ));
        // Update keg status
        setKegStatus(prev => prev.map(k =>
          k.keg_id === returnTarget.keg_id
            ? { ...k, status: "Return", return_date: returnForm.date_returned, location: "Brewery", last_updated_by: returnForm.recorded_by }
            : k
        ));
        setReturnTarget(null);
      }

      function handleUndoReturn(row) {
        // Clear date_returned on StockOut record
        setStockOut(prev => prev.map(r =>
          r.id === row.id ? { ...r, date_returned: "" } : r
        ));
        // Revert keg status back to Out
        setKegStatus(prev => prev.map(k =>
          k.keg_id === row.keg_id
            ? { ...k, status: "Out", return_date: "", location: row.destination, last_updated_by: row.recorded_by }
            : k
        ));
      }

      function handleBatchReturn(e) {
        e.preventDefault();
        const ids = selectedIds;
        const affectedKegIds = new Set(stockOut.filter(r => ids.has(r.id)).map(r => r.keg_id));
        setStockOut(prev => prev.map(r =>
          ids.has(r.id) ? { ...r, date_returned: batchReturnForm.date_returned } : r
        ));
        setKegStatus(prev => prev.map(k =>
          affectedKegIds.has(k.keg_id)
            ? { ...k, status: "Return", return_date: batchReturnForm.date_returned, location: "Brewery", last_updated_by: batchReturnForm.recorded_by }
            : k
        ));
        setSelectedIds(new Set());
        setShowBatchReturn(false);
      }

      function toggleSelect(id) {
        setSelectedIds(prev => {
          const next = new Set(prev);
          next.has(id) ? next.delete(id) : next.add(id);
          return next;
        });
      }

      function toggleSelectAll(outRows) {
        const outIds = new Set(outRows.map(r => r.id));
        const allSelected = outRows.every(r => selectedIds.has(r.id));
        if (allSelected) {
          setSelectedIds(prev => { const next = new Set(prev); outIds.forEach(id => next.delete(id)); return next; });
        } else {
          setSelectedIds(prev => { const next = new Set(prev); outIds.forEach(id => next.add(id)); return next; });
        }
      }

      const allDests = ["All", ...DESTINATIONS];

      const filtered = useMemo(() => {
        const todayStr = new Date().toISOString().split("T")[0];
        return stockOut.filter(r => {
          const s = search.toLowerCase();
          const matchSearch = !s || r.keg_id.toLowerCase().includes(s) || (r.beer_name||"").toLowerCase().includes(s) || (r.destination||"").toLowerCase().includes(s);
          const matchDest   = filterDest === "All" || r.destination === filterDest;
          const matchStatus = filterStatus === "All" || (filterStatus === "Out" ? !r.date_returned : !!r.date_returned);
          let matchDate = true;
          if (dateMode === "today")  matchDate = r.date_out === todayStr;
          if (dateMode === "period") matchDate = (!dateFrom || r.date_out >= dateFrom) && (!dateTo || r.date_out <= dateTo);
          return matchSearch && matchDest && matchStatus && matchDate;
        });
      }, [stockOut, search, filterDest, filterStatus, dateMode, dateFrom, dateTo]);

      const sorted = [...filtered].sort((a,b) => b.date_out.localeCompare(a.date_out));

      return (
        <div className="space-y-5">
          <div className="flex items-center justify-between gap-3">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Stock Out</h1>
              <p className="text-sm text-gray-400 mt-0.5">{stockOut.length} entries · {stockOut.filter(s => !s.date_returned).length} currently out</p>
            </div>
            <div className="flex items-center gap-2">
              {selectedIds.size > 0 && (
                <button onClick={() => { setBatchReturnForm({ date_returned: new Date().toISOString().split("T")[0], recorded_by: STAFF[0] }); setShowBatchReturn(true); }}
                  className="flex items-center gap-2 px-4 py-2.5 bg-sky-500 hover:bg-sky-600 text-white text-sm font-medium rounded-xl transition-colors">
                  <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg>
                  Mark Returned ({selectedIds.size})
                </button>
              )}
              <button onClick={() => setShowModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                Log Stock Out
              </button>
            </div>
          </div>

          <div className="bg-white rounded-2xl p-4 border border-gray-100 space-y-3">
            <div className="flex flex-wrap gap-3">
              <div className="relative flex-1 min-w-48">
                <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search keg ID, beer, destination…" className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
              </div>
              <select value={filterDest} onChange={e => setFilterDest(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white text-gray-700">
                {allDests.map(d => <option key={d}>{d}</option>)}
              </select>
