                      <label className="block text-xs font-medium text-gray-600 mb-1.5">Fermenter Lane <span className="text-gray-400 font-normal">(optional — shows on Gantt)</span></label>
                      <select value={taskForm.fermenter}
                        onChange={e => setTaskForm(f => ({...f, fermenter: e.target.value}))}
                        className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-300">
                        <option value="">— No specific fermenter —</option>
                        {FERMENTER_IDS.map(fid => <option key={fid} value={fid}>{fid}</option>)}
                      </select>
                    </div>
                  )}

                  {/* Task name */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Task</label>
                    <input type="text" value={taskForm.task}
                      onChange={e => setTaskForm(f => ({...f, task: e.target.value}))}
                      placeholder="e.g. Check gravity" required
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 mb-2" />
                    <div className="flex flex-wrap gap-1.5">
                      {TASK_PRESETS.map(p => (
                        <button type="button" key={p}
                          onClick={() => setTaskForm(f => ({...f, task: p}))}
                          className={`px-2.5 py-1 rounded-full text-xs border transition-all ${taskForm.task===p ? "bg-amber-500 text-white border-amber-500" : "border-gray-200 text-gray-600 hover:border-amber-300 hover:text-amber-700"}`}>
                          {p}
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Date range */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Date</label>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <p className="text-xs text-gray-400 mb-1">Start Date</p>
                        <input type="date" required value={taskForm.start_date}
                          min={taskForm.is_batch && selectedBatch?.brew_day ? selectedBatch.brew_day : undefined}
                          max={taskForm.is_batch && selectedBatch?.release_date ? selectedBatch.release_date : undefined}
                          onChange={e => setTaskForm(f => ({...f, start_date: e.target.value,
                            end_date: (!f.end_date || f.end_date < e.target.value) ? e.target.value : f.end_date
                          }))}
                          className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" />
                      </div>
                      <div>
                        <p className="text-xs text-gray-400 mb-1">End Date <span className="text-gray-300">(multi-day)</span></p>
                        <input type="date" value={taskForm.end_date}
                          min={taskForm.start_date || (taskForm.is_batch && selectedBatch?.brew_day ? selectedBatch.brew_day : undefined)}
                          max={taskForm.is_batch && selectedBatch?.release_date ? selectedBatch.release_date : undefined}
                          onChange={e => setTaskForm(f => ({...f, end_date: e.target.value}))}
                          className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" />
                      </div>
                    </div>
                    {taskForm.is_batch && selectedBatch && (
                      <p className="text-xs text-amber-600 mt-1.5 flex items-center gap-1">
                        <svg className="w-3 h-3 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd"/></svg>
                        Must fall within batch: {selectedBatch.brew_day} → {selectedBatch.release_date || "TBD"}
                      </p>
                    )}
                  </div>

                  {/* Assigned To */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Assigned To <span className="text-gray-400 font-normal">(optional)</span></label>
                    <StaffMultiSelect value={taskForm.assigned_to} onChange={v => setTaskForm(f => ({...f, assigned_to: v}))} />
                  </div>

                  {/* OT */}
                  <div className="p-3 bg-orange-50 rounded-xl space-y-3 border border-orange-100">
                    <label className="flex items-center gap-2 cursor-pointer select-none">
                      <input type="checkbox" checked={!!taskForm.is_ot}
                        onChange={e => setTaskForm(f => ({...f, is_ot: e.target.checked, ot_hours: e.target.checked ? f.ot_hours : ""}))}
                        className="w-4 h-4 rounded accent-orange-500" />
                      <span className="text-sm font-medium text-orange-700">Overtime (OT)</span>
                    </label>
                    {taskForm.is_ot && (
                      <div>
                        <label className="text-xs font-medium text-orange-600 mb-1 block">OT Duration</label>
                        <select required={taskForm.is_ot} value={taskForm.ot_hours}
                          onChange={e => setTaskForm(f => ({...f, ot_hours: e.target.value}))}
                          className="w-full border border-orange-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-300 bg-white">
                          <option value="">— Select —</option>
                          <option value="0.5">Half Day (0.5d)</option>
                          <option value="1">Full Day (1d)</option>
                        </select>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-3 pt-1">
                    <button type="button" onClick={() => { setShowAddTask(false); setTaskForm(BLANK_TASK_FORM); }}
                      className="flex-1 border border-gray-200 text-gray-600 rounded-lg py-2 text-sm hover:bg-gray-50 transition-colors">Cancel</button>
                    <button type="submit"
                      className="flex-1 bg-amber-500 text-white rounded-lg py-2 text-sm font-medium hover:bg-amber-600 transition-colors">Add Task</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ── Edit Task Modal ── */}
          {editTask && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
                <div className="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-100">
                  <h3 className="font-semibold text-gray-800">Edit Task</h3>
                  <button type="button" onClick={() => setEditTask(null)}
                    className="w-7 h-7 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 text-sm transition-colors">✕</button>
                </div>
                <form onSubmit={handleEditSave} className="px-5 py-4 space-y-4">
                  {/* Task name */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Task Name <span className="text-red-400">*</span></label>
                    <input type="text" required value={editForm.task}
                      onChange={e => setEditForm(f => ({...f, task: e.target.value}))}
                      placeholder="e.g. Dry hop addition"
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" />
                  </div>

                  {/* Date range */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Date Range <span className="text-red-400">*</span></label>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <p className="text-xs text-gray-400 mb-1">Start Date</p>

    // ─── STAFF MANAGEMENT PAGE ────────────────────────────────────────────────

        e.preventDefault();
        if (!form.name.trim()) return;
        if (editId !== null) {
          setStaff(prev => prev.map(s => s.id === editId ? { ...s, name:form.name.trim(), dept:form.dept } : s));

          const newId = staff.length > 0 ? Math.max(...staff.map(s=>s.id))+1 : 1;

                <div className="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-100">
                  <h3 className="font-semibold text-gray-800">{editId !== null ? "Edit Staff Member" : "Add Staff Member"}</h3>
                  <button onClick={() => setShowModal(false)} className="w-7 h-7 rounded-full bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-gray-500 text-sm">✕</button>
                </div>
                <form onSubmit={handleSave} className="px-5 py-4 space-y-4">
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Full Name <span className="text-red-400">*</span></label>
                    <input type="text" required value={form.name}
                      onChange={e => setForm(f => ({...f, name: e.target.value}))}
                      placeholder="e.g. John"
                      className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300" />

    // ─── FERMENTER DASHBOARD (tabbed wrapper) ─────────────────────────────────

    // ─── BREWSHEET PAGE ───────────────────────────────────────────────────────
    function BrewsheetPage({ batch, brewsheet, onSave, onBack }) {
      const [tab, setTab] = useState("brewday");
      // Local copy for editing
      const empty = { water_in:"",malt_kg:"",malt_multiplier:4,mash_in_time:"",mash_in_temp:"",mash_out_temp:"",sparge_in:"",target_ph:"",
        mash_steps:[{time:"",temp:"",duration:""},{time:"",temp:"",duration:""},{time:"",temp:"",duration:""}],
        caso4:"",cacl2:"",mgso4:"",baking_soda:"",acid:"",other_addition:"",acid_type:"Lactic Acid",acid_amount:"",
        mash_readings:[{ph:"",gravity:""},{ph:"",gravity:""},{ph:"",gravity:""},{ph:"",gravity:""}],
        lauter_start:"",lauter_finish:"",sparge_volume:"",
        preboil_est_gravity:"",preboil_est_volume:500,preboil_rec_ph:"",preboil_rec_gravity:"",
        boil_start:"",boil_end:"",
        boil_additions:[{min:"",addition:"",weight:"",ibu:"",note:""},{min:"",addition:"",weight:"",ibu:"",note:""},{min:"",addition:"",weight:"",ibu:"",note:""},{min:"",addition:"",weight:"",ibu:"",note:""}],
        cooldown_temp:"",cooldown_start:"",cooldown_end:"",
        aroma_hops:false,aroma_hops_list:[{name:"",time:"",qty:""}],
        load_start:"",load_end:"",
        final_temp_in:"",final_start_time:"",final_end_time:"",target_temp:"",final_ph:"",final_gravity:"",final_volume:"",
        yeast_list:[{strain:"",source:"",qty:""}],oxygen_lmin:"",oxygen_time:"",aldc:false,brew_notes:"",
        daily_log: Array.from({length:26},(_,i)=>({day:i+1,sg:null,ph:null,psi:null,temp:null,note:""})),
      };
      const [bs, setBs] = useState(() => brewsheet ? JSON.parse(JSON.stringify(brewsheet)) : empty);
      const [saved, setSaved] = useState(false);

      function upd(field, val) { setBs(b => ({...b, [field]: val})); setSaved(false); }
      function updStep(i, field, val) { setBs(b => { const s=[...b.mash_steps]; s[i]={...s[i],[field]:val}; return {...b,mash_steps:s}; }); setSaved(false); }
      function updReading(i, field, val) { setBs(b => { const r=[...b.mash_readings]; r[i]={...r[i],[field]:val}; return {...b,mash_readings:r}; }); setSaved(false); }
      function updBoil(i, field, val) { setBs(b => { const a=[...b.boil_additions]; a[i]={...a[i],[field]:val}; return {...b,boil_additions:a}; }); setSaved(false); }
      function updLog(i, field, val) { setBs(b => { const l=[...b.daily_log]; l[i]={...l[i],[field]:val===""?null:isNaN(val)?val:parseFloat(val)}; return {...b,daily_log:l}; }); setSaved(false); }

      function handleSave() { onSave(batch.batch_id, bs); setSaved(true); }

      // Add boil row
      function addBoilRow() { setBs(b => ({...b, boil_additions:[...b.boil_additions,{min:"",addition:"",weight:"",ibu:"",note:""}]})); }
      function removeBoilRow(i) { setBs(b => { const a=b.boil_additions.filter((_,idx)=>idx!==i); return {...b,boil_additions:a}; }); }

      // Aroma hops list helpers (supports multiple hops)
      function getAromaList(b) {
        // Migrate legacy single-hop fields to list format on-the-fly
        if (b.aroma_hops_list && b.aroma_hops_list.length > 0) return b.aroma_hops_list;
        if (b.aroma_hops_name) return [{name:b.aroma_hops_name, time:b.aroma_time||"", qty:b.aroma_qty||""}];
        return [{name:"",time:"",qty:""}];
      }
      function updAromaHop(i, field, val) {
        setBs(b => { const list=[...getAromaList(b)]; list[i]={...list[i],[field]:val}; return {...b,aroma_hops_list:list}; });
        setSaved(false);
      }
      function addAromaHop() {
        setBs(b => ({...b, aroma_hops_list:[...getAromaList(b),{name:"",time:"",qty:""}]}));
        setSaved(false);
      }
      function removeAromaHop(i) {
        setBs(b => { const list=getAromaList(b).filter((_,idx)=>idx!==i); return {...b,aroma_hops_list:list.length?list:[{name:"",time:"",qty:""}]}; });
        setSaved(false);
      }

      // Yeast list helpers (supports multiple yeast strains)
      function getYeastList(b) {
        if (b.yeast_list && b.yeast_list.length > 0) return b.yeast_list;
        // Migrate legacy single-yeast fields
        if (b.yeast) return [{strain:b.yeast, source:b.yeast_source||"", qty:b.yeast_qty||""}];
        return [{strain:"",source:"",qty:""}];
      }
      function updYeast(i, field, val) {
        setBs(b => { const list=[...getYeastList(b)]; list[i]={...list[i],[field]:val}; return {...b,yeast_list:list}; });
        setSaved(false);
      }
      function addYeast() {
        setBs(b => ({...b, yeast_list:[...getYeastList(b),{strain:"",source:"",qty:""}]}));
        setSaved(false);
      }
      function removeYeast(i) {
        setBs(b => { const list=getYeastList(b).filter((_,idx)=>idx!==i); return {...b,yeast_list:list.length?list:[{strain:"",source:"",qty:""}]}; });
        setSaved(false);
      }

      // ── SVG mini charts ──────────────────────────────────────────────────────
      function MiniChart({ data, color, label, yDecimals=3 }) {
        const pts = data.map((d,i)=>({x:i,y:d})).filter(p=>p.y!=null);
        if (pts.length < 2) return <div className="flex items-center justify-center h-full text-xs text-gray-400">No data yet</div>;
        const W=340, H=90, PAD=6;
        const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
        const minX=Math.min(...xs), maxX=Math.max(...xs);
        const minY=Math.min(...ys), maxY=Math.max(...ys);
        const rangeY = maxY - minY || 0.001;
        const sx = v => PAD + (v-minX)/(maxX-minX||1)*(W-PAD*2);
        const sy = v => H-PAD - (v-minY)/rangeY*(H-PAD*2);
        const path = pts.map((p,i)=>`${i===0?"M":"L"}${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`).join(" ");
        const area = `${path} L${sx(pts[pts.length-1].x)},${H-PAD} L${sx(pts[0].x)},${H-PAD} Z`;
        return (
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{height:H}}>
            <defs>
              <linearGradient id={`grad-${label}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
                <stop offset="100%" stopColor={color} stopOpacity="0.03"/>
              </linearGradient>
            </defs>
            {[0.25,0.5,0.75,1].map(r=>(
              <line key={r} x1={PAD} y1={sy(minY+rangeY*r)} x2={W-PAD} y2={sy(minY+rangeY*r)}
                stroke="#e5e7eb" strokeWidth="1" strokeDasharray="3,3"/>
            ))}
            <path d={area} fill={`url(#grad-${label})`}/>
            <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
            {pts.map(p=>(
              <circle key={p.x} cx={sx(p.x)} cy={sy(p.y)} r="3" fill="white" stroke={color} strokeWidth="2"/>
            ))}
            {/* Y labels */}
            {[minY, (minY+maxY)/2, maxY].map(v=>(
              <text key={v} x={PAD} y={sy(v)+4} fontSize="8" fill="#9ca3af">{v.toFixed(yDecimals)}</text>
            ))}
          </svg>
        );
      }

      // Compute brew day date for each log day
      function dayDate(dayNum) {
        if (!batch?.brew_day) return "";
        const d = new Date(batch.brew_day);
        d.setDate(d.getDate() + dayNum - 1);
        return d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
      }

      const inp = "w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300";
      const sec = "bg-white rounded-2xl border border-gray-100 p-5 space-y-3";
      const secH = "text-sm font-semibold text-gray-700 border-b border-gray-100 pb-2 mb-3";
      const lbl = "text-xs text-gray-500 mb-0.5";

      return (
        <div className="space-y-5">
          {/* Header */}
          <div className="flex items-center gap-3">
            <button onClick={onBack} className="p-2 rounded-xl hover:bg-gray-100 transition-colors text-gray-500">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </button>
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Brewsheet — Batch #{batch.batch_id}</h1>
              <p className="text-sm text-gray-400 mt-0.5">{batch.beer_name} · {batch.fermenter} · Brew day {fmt(batch.brew_day)}</p>
            </div>
            <div className="ml-auto flex items-center gap-2">
              {saved && <span className="text-xs text-emerald-600 font-medium px-3 py-1.5 bg-emerald-50 rounded-lg">Saved ✓</span>}
              <button onClick={handleSave} className="px-4 py-2 bg-amber-500 text-white text-sm font-medium rounded-xl hover:bg-amber-600 transition-colors shadow-sm">
                Save Brewsheet
              </button>
            </div>
          </div>

          {/* Tabs */}
          <div className="flex gap-1 bg-gray-100 p-1 rounded-xl w-fit">
            {[{id:"brewday",label:"🍺 Brew Day"},{id:"fermentation",label:"📈 Fermentation Log"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)}
                className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all whitespace-nowrap ${tab===t.id?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                {t.label}
              </button>
            ))}
          </div>

          {/* ── BREW DAY TAB ── */}
          {tab === "brewday" && (
            <div className="space-y-4">

              {/* MASH */}
              <div className={sec}>
                <p className={secH}>Mash</p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                  <div><p className={lbl}>Water in (L)</p><input className={inp} value={bs.water_in} onChange={e=>upd("water_in",e.target.value)}/></div>
                  <div>
                    <p className={lbl}>Malt (KG)</p>
                    <div className="flex gap-1.5">
                      <input className={inp + " flex-1 min-w-0"} value={bs.malt_kg} onChange={e=>upd("malt_kg",e.target.value)}/>
                      <select title="Batch multiplier" value={bs.malt_multiplier??4} onChange={e=>upd("malt_multiplier",parseFloat(e.target.value))}
                        className="border border-amber-300 rounded-lg px-1.5 py-1.5 text-xs bg-amber-50 text-amber-700 font-semibold focus:outline-none focus:ring-2 focus:ring-amber-400 w-14 shrink-0">
                        <option value="3">×3</option>
                        <option value="3.5">×3.5</option>
                        <option value="4">×4</option>
                      </select>
                    </div>
                  </div>
                  <div><p className={lbl}>Mash in Time</p><input className={inp} value={bs.mash_in_time} onChange={e=>upd("mash_in_time",e.target.value)}/></div>
                  <div><p className={lbl}>Mash in Temp (°C)</p><input className={inp} value={bs.mash_in_temp} onChange={e=>upd("mash_in_temp",e.target.value)}/></div>
                  <div><p className={lbl}>Mash out Temp (°C)</p><input className={inp} value={bs.mash_out_temp} onChange={e=>upd("mash_out_temp",e.target.value)}/></div>
                  <div><p className={lbl}>Sparge In</p><input className={inp} value={bs.sparge_in} onChange={e=>upd("sparge_in",e.target.value)}/></div>
                  <div><p className={lbl}>Target pH</p><input className={inp} value={bs.target_ph} onChange={e=>upd("target_ph",e.target.value)}/></div>
                  <div><p className={lbl}>Mash Vol (auto)</p>
                    <div className="border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm bg-gray-50 text-gray-600">
                      {(parseFloat(bs.water_in)||0)+(parseFloat(bs.malt_kg)||0)} L
                    </div>
                  </div>
                </div>
                <div className="mt-2">
                  <p className="text-xs font-medium text-gray-500 mb-1">Mash Steps</p>
                  <div className="grid grid-cols-3 gap-1 text-xs text-gray-400 mb-1 px-1"><span>Time</span><span>Temp (°C)</span><span>Duration (min)</span></div>
                  {bs.mash_steps.map((s,i)=>(
                    <div key={i} className="grid grid-cols-3 gap-2 mb-1.5">
                      <input placeholder="HH:MM" className={inp} value={s.time} onChange={e=>updStep(i,"time",e.target.value)}/>
                      <input type="number" className={inp} value={s.temp} onChange={e=>updStep(i,"temp",e.target.value)}/>
                      <input type="number" className={inp} value={s.duration} onChange={e=>updStep(i,"duration",e.target.value)}/>
                    </div>
                  ))}
                </div>
                <div className="mt-2">
                  <p className="text-xs font-medium text-gray-500 mb-1">pH / Gravity Readings</p>
                  <div className="grid grid-cols-8 gap-1 text-xs text-gray-400 mb-1 px-1"><span className="col-span-1">#</span><span className="col-span-3">pH</span><span className="col-span-4">Gravity</span></div>
                  {bs.mash_readings.map((r,i)=>(
                    <div key={i} className="grid grid-cols-8 gap-2 mb-1.5 items-center">
                      <span className="col-span-1 text-xs text-gray-400 pl-1">#{i+1}</span>
                      <input type="number" step="0.01" placeholder="5.5" className={`col-span-3 ${inp}`} value={r.ph} onChange={e=>updReading(i,"ph",e.target.value)}/>
                      <input type="number" step="0.001" placeholder="1.050" className={`col-span-4 ${inp}`} value={r.gravity} onChange={e=>updReading(i,"gravity",e.target.value)}/>
                    </div>
                  ))}
                </div>
              </div>

              {/* WATER CHEMISTRY */}
              <div className={sec}>
                <p className={secH}>Water Chemistry</p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                  {[["CaSO₄ (g)","caso4"],["CaCl₂ (g)","cacl2"],["MgSO₄ (g)","mgso4"],["Baking Soda (g)","baking_soda"],["Acid (g)","acid"],["Other Addition (g)","other_addition"]].map(([label,key])=>(
                    <div key={key}><p className={lbl}>{label}</p><input type="number" className={inp} value={bs[key]} onChange={e=>upd(key,e.target.value)}/></div>
                  ))}
                  <div><p className={lbl}>Acid Type</p>
                    <select className={inp} value={bs.acid_type} onChange={e=>upd("acid_type",e.target.value)}>
                      {["Lactic Acid","Phosphoric Acid","Citric Acid","Tartaric Acid"].map(a=><option key={a}>{a}</option>)}
                    </select>
                  </div>
                  <div><p className={lbl}>Acid Amount (g)</p><input type="number" className={inp} value={bs.acid_amount} onChange={e=>upd("acid_amount",e.target.value)}/></div>
                </div>
              </div>

              {/* LAUTERING + PRE-BOIL */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className={sec}>
                  <p className={secH}>Lautering</p>
                  <div className="grid grid-cols-2 gap-3">
                    <div><p className={lbl}>Start</p><input placeholder="HH:MM" className={inp} value={bs.lauter_start} onChange={e=>upd("lauter_start",e.target.value)}/></div>
                    <div><p className={lbl}>Finish</p><input placeholder="HH:MM" className={inp} value={bs.lauter_finish} onChange={e=>upd("lauter_finish",e.target.value)}/></div>
                    <div><p className={lbl}>Total Time (min)</p>
                      <div className="border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm bg-gray-50 text-gray-600">
                        {(()=>{ try{ const s=bs.lauter_start.split(":"), f=bs.lauter_finish.split(":"); const d=(+f[0]*60+ +f[1])-(+s[0]*60+ +s[1]); return d>0?d+"min":"—"; }catch{return "—";} })()}
                      </div>
                    </div>
                    <div><p className={lbl}>Sparge Volume (L)</p><input type="number" className={inp} value={bs.sparge_volume} onChange={e=>upd("sparge_volume",e.target.value)}/></div>
                  </div>
                </div>
                <div className={sec}>
                  <p className={secH}>Pre-Boil</p>
                  <div className="grid grid-cols-2 gap-3">
                    <div><p className={lbl}>Est. SG</p><input type="number" step="0.001" className={inp} value={bs.preboil_est_gravity} onChange={e=>upd("preboil_est_gravity",e.target.value)}/></div>
                    <div><p className={lbl}>Est. Volume (L)</p><input type="number" className={inp} value={bs.preboil_est_volume} onChange={e=>upd("preboil_est_volume",e.target.value)}/></div>
                    <div><p className={lbl}>Rec. pH</p><input type="number" step="0.01" className={inp} value={bs.preboil_rec_ph} onChange={e=>upd("preboil_rec_ph",e.target.value)}/></div>
                    <div><p className={lbl}>Rec. SG</p><input type="number" step="0.001" className={inp} value={bs.preboil_rec_gravity} onChange={e=>upd("preboil_rec_gravity",e.target.value)}/></div>
                  </div>
                </div>
              </div>

              {/* BOIL */}
              <div className={sec}>
                <p className={secH}>Boil</p>
                <div className="grid grid-cols-2 gap-3 mb-3">
                  <div><p className={lbl}>Boil Start</p><input placeholder="HH:MM" className={inp} value={bs.boil_start} onChange={e=>upd("boil_start",e.target.value)}/></div>
                  <div><p className={lbl}>Boil End</p><input placeholder="HH:MM" className={inp} value={bs.boil_end} onChange={e=>upd("boil_end",e.target.value)}/></div>
                </div>
                <p className="text-xs font-medium text-gray-500 mb-1">Hop / Addition Schedule</p>
                <div className="overflow-x-auto">
                  <table className="w-full text-xs border-separate" style={{borderSpacing:"0 4px"}}>
                    <thead><tr className="text-gray-400 font-medium">
                      <th className="text-left pb-1 pr-3" style={{width:"68px"}}>Min</th>
                      <th className="text-left pb-1 pr-3">Addition</th>
                      <th className="text-left pb-1 pr-3" style={{width:"88px"}}>Weight</th>
                      <th className="text-left pb-1 pr-3" style={{width:"68px"}}>IBU</th>
                      <th className="text-left pb-1 pr-3">Note</th>
                      <th style={{width:"24px"}}></th>
                    </tr></thead>
                    <tbody>
                      {bs.boil_additions.map((a,i)=>(
                        <tr key={i} className="group">
                          <td className="pr-3 py-0.5">
                            <input type="number" placeholder="60" value={a.min} onChange={e=>updBoil(i,"min",e.target.value)}
                              className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-center focus:outline-none focus:ring-2 focus:ring-amber-300 bg-white"/>
                          </td>
                          <td className="pr-3 py-0.5">
                            <input placeholder="e.g. Magnum" value={a.addition} onChange={e=>updBoil(i,"addition",e.target.value)}
                              className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 bg-white"/>
                          </td>
                          <td className="pr-3 py-0.5">
                            <input placeholder="g / pcs" value={a.weight} onChange={e=>updBoil(i,"weight",e.target.value)}
                              className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 bg-white"/>
                          </td>
                          <td className="pr-3 py-0.5">
                            <input type="number" placeholder="—" value={a.ibu} onChange={e=>updBoil(i,"ibu",e.target.value)}
                              className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm text-center focus:outline-none focus:ring-2 focus:ring-amber-300 bg-white"/>
                          </td>
                          <td className="pr-3 py-0.5">
                            <input placeholder="—" value={a.note} onChange={e=>updBoil(i,"note",e.target.value)}
                              className="w-full border border-gray-200 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 bg-white"/>
                          </td>
                          <td className="py-0.5 text-center">
                            <button onClick={()=>removeBoilRow(i)}
                              className="w-6 h-6 flex items-center justify-center rounded-full text-gray-300 hover:text-red-400 hover:bg-red-50 transition-colors text-base leading-none">×</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <button onClick={addBoilRow} className="mt-2 text-xs text-amber-600 hover:text-amber-700 font-medium flex items-center gap-1">
                  <span className="text-base leading-none">+</span> Add row
                </button>
              </div>

              {/* COOL DOWN / WHIRLPOOL / LOAD / FINAL / YEAST */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div className={sec}>
                  <p className={secH}>Cool Down & Whirlpool</p>
                  <div className="grid grid-cols-3 gap-3 mb-3">
                    <div><p className={lbl}>Temp (°C)</p><input type="number" className={inp} value={bs.cooldown_temp} onChange={e=>upd("cooldown_temp",e.target.value)}/></div>
                    <div><p className={lbl}>Start</p><input placeholder="HH:MM" className={inp} value={bs.cooldown_start} onChange={e=>upd("cooldown_start",e.target.value)}/></div>
                    <div><p className={lbl}>End</p><input placeholder="HH:MM" className={inp} value={bs.cooldown_end} onChange={e=>upd("cooldown_end",e.target.value)}/></div>
                  </div>
                  <div className="flex items-center gap-2 mb-2">
                    <input type="checkbox" id="aromaHops" checked={!!bs.aroma_hops} onChange={e=>upd("aroma_hops",e.target.checked)} className="accent-amber-500"/>
                    <label htmlFor="aromaHops" className="text-xs text-gray-600 font-medium">Aroma Hops (Whirlpool)</label>
                  </div>
                  {bs.aroma_hops && (
                    <div className="space-y-2">
                      {/* Column headers */}
                      <div className="grid gap-2" style={{gridTemplateColumns:"1fr auto auto auto"}}>
                        <p className={lbl}>Hops</p>
                        <p className={lbl + " w-20 text-center"}>Time (min)</p>
                        <p className={lbl + " w-20 text-center"}>Qty (g)</p>
                        <div className="w-6"/>
                      </div>
                      {getAromaList(bs).map((hop, i) => (
                        <div key={i} className="grid gap-2 items-center" style={{gridTemplateColumns:"1fr auto auto auto"}}>
                          <input className={inp} placeholder="Hop name" value={hop.name} onChange={e=>updAromaHop(i,"name",e.target.value)}/>
                          <input type="number" className={inp + " w-20 text-center"} placeholder="—" value={hop.time} onChange={e=>updAromaHop(i,"time",e.target.value)}/>
                          <input type="number" className={inp + " w-20 text-center"} placeholder="—" value={hop.qty} onChange={e=>updAromaHop(i,"qty",e.target.value)}/>
                          <button onClick={()=>removeAromaHop(i)} disabled={getAromaList(bs).length===1}
                            className="w-6 h-6 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors text-sm font-bold">
                            ✕
                          </button>
                        </div>
                      ))}
                      <button onClick={addAromaHop}
                        className="mt-1 flex items-center gap-1.5 text-xs text-amber-600 hover:text-amber-700 font-medium">
                        <span className="w-4 h-4 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 text-xs font-bold">+</span>
                        Add hop
                      </button>
                    </div>
                  )}
                  <div className="grid grid-cols-2 gap-3 mt-3">
                    <div><p className={lbl}>Load Start</p><input placeholder="HH:MM" className={inp} value={bs.load_start} onChange={e=>upd("load_start",e.target.value)}/></div>
                    <div><p className={lbl}>Load End</p><input placeholder="HH:MM" className={inp} value={bs.load_end} onChange={e=>upd("load_end",e.target.value)}/></div>
                  </div>
                </div>
                <div className={sec}>
                  <p className={secH}>Final Wort & Yeast</p>
                  <div className="grid grid-cols-3 gap-3 mb-3">
                    <div><p className={lbl}>Final pH</p><input type="number" step="0.01" className={inp} value={bs.final_ph} onChange={e=>upd("final_ph",e.target.value)}/></div>
                    <div><p className={lbl}>Final SG</p><input type="number" step="0.001" className={inp} value={bs.final_gravity} onChange={e=>upd("final_gravity",e.target.value)}/></div>
                    <div><p className={lbl}>Volume (L)</p><input type="number" className={inp} value={bs.final_volume} onChange={e=>upd("final_volume",e.target.value)}/></div>
                    <div><p className={lbl}>Temp in (°C)</p><input type="number" className={inp} value={bs.final_temp_in} onChange={e=>upd("final_temp_in",e.target.value)}/></div>
                    <div><p className={lbl}>Start Time</p><input placeholder="HH:MM" className={inp} value={bs.final_start_time} onChange={e=>upd("final_start_time",e.target.value)}/></div>
                    <div><p className={lbl}>End Time</p><input placeholder="HH:MM" className={inp} value={bs.final_end_time||""} onChange={e=>upd("final_end_time",e.target.value)}/></div>
                    <div><p className={lbl}>Target Temp (°C)</p><input type="number" className={inp} value={bs.target_temp} onChange={e=>upd("target_temp",e.target.value)}/></div>
                  </div>
                  {/* Yeast list */}
                  <div className="border-t border-gray-100 pt-3">
                    <div className="flex items-center justify-between mb-2">
                      <p className="text-xs font-medium text-gray-500">Yeast</p>
                      <button onClick={addYeast}
                        className="flex items-center gap-1 text-xs text-amber-600 hover:text-amber-700 font-medium">
                        <span className="w-4 h-4 rounded-full bg-amber-100 flex items-center justify-center text-amber-600 text-xs font-bold leading-none">+</span>
                        Add yeast
                      </button>
                    </div>
                    <div className="space-y-2">
                      {/* Column headers */}
                      <div className="grid gap-2 items-end" style={{gridTemplateColumns:"1fr 1fr auto auto"}}>
                        <p className={lbl}>Strain</p>
                        <p className={lbl}>Source / Batch</p>
                        <p className={lbl + " w-20 text-center"}>Qty</p>
                        <div className="w-6"/>
                      </div>
                      {getYeastList(bs).map((y, i) => (
                        <div key={i} className="grid gap-2 items-center" style={{gridTemplateColumns:"1fr 1fr auto auto"}}>
                          <input className={inp} placeholder="e.g. W34/70" value={y.strain} onChange={e=>updYeast(i,"strain",e.target.value)}/>
                          <input className={inp} placeholder="New pack / #batch" value={y.source} onChange={e=>updYeast(i,"source",e.target.value)}/>
                          <input className={inp + " w-20 text-center"} placeholder="—" value={y.qty} onChange={e=>updYeast(i,"qty",e.target.value)}/>
                          <button onClick={()=>removeYeast(i)} disabled={getYeastList(bs).length===1}
                            className="w-6 h-6 flex items-center justify-center rounded-full text-gray-400 hover:text-red-500 hover:bg-red-50 disabled:opacity-30 disabled:cursor-not-allowed transition-colors text-sm font-bold">
                            ✕
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                  {/* O₂ & ALDC */}
                  <div className="grid grid-cols-3 gap-3 border-t border-gray-100 pt-3">
                    <div><p className={lbl}>O₂ (L/min)</p><input type="number" className={inp} value={bs.oxygen_lmin} onChange={e=>upd("oxygen_lmin",e.target.value)}/></div>
                    <div><p className={lbl}>O₂ Time (min)</p><input type="number" className={inp} value={bs.oxygen_time} onChange={e=>upd("oxygen_time",e.target.value)}/></div>
                    <div className="flex items-center gap-2 mt-5">
                      <input type="checkbox" id="aldc" checked={!!bs.aldc} onChange={e=>upd("aldc",e.target.checked)} className="accent-amber-500"/>
                      <label htmlFor="aldc" className="text-xs text-gray-600">ALDC 10g</label>
                    </div>
                  </div>
                </div>
              </div>

              {/* Brewer's Notes */}
              <div className={sec}>
                <p className={secH}>Brewer's Notes</p>
                <textarea
                  rows={6}
                  placeholder="Write any observations, issues, adjustments, or reminders for this brew day…"
                  value={bs.brew_notes||""}
                  onChange={e=>upd("brew_notes",e.target.value)}
                  className="w-full border border-gray-200 rounded-xl px-3.5 py-3 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-amber-300 resize-y leading-relaxed placeholder-gray-300"
                />
              </div>

            </div>
          )}

          {/* ── FERMENTATION LOG TAB ── */}
          {tab === "fermentation" && (
            <div className="space-y-5">

              {/* Charts */}
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {[
                  {label:"SG",key:"sg",color:"#3b82f6",dec:3},
                  {label:"pH",key:"ph",color:"#f59e0b",dec:2},
                  {label:"Pressure (PSI)",key:"psi",color:"#8b5cf6",dec:1},
                  {label:"Temp (°C)",key:"temp",color:"#10b981",dec:1},
                ].map(({label,key,color,dec})=>(
                  <div key={key} className="bg-white rounded-2xl border border-gray-100 p-4">
                    <p className="text-xs font-semibold text-gray-500 mb-2">{label}</p>
                    <MiniChart data={bs.daily_log.map(d=>d[key])} color={color} label={key} yDecimals={dec}/>
                  </div>
                ))}
              </div>

              {/* Daily log table */}
              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between">

    // ─── HELPERS ──────────────────────────────────────────────────────────────
    const today = () => new Date().toISOString().slice(0,10);

    // ─── STORAGE INVENTORY PAGE ───────────────────────────────────────────────
    function StorageInventoryPage({ kegStatus }) {
      const inStorage = kegStatus.filter(k => k.status === "Filled" && k.location === "Brewery");
      // group by beer_name + size
      const grouped = {};
      inStorage.forEach(k => {
        const key = `${k.beer_name}||${k.size}`;
        if (!grouped[key]) grouped[key] = { beer_name: k.beer_name, size: k.size, kegs: [] };
        grouped[key].kegs.push(k.keg_id);
      });
      const rows = Object.values(grouped).sort((a,b) => a.beer_name.localeCompare(b.beer_name));
      return (
        <div>
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-gray-800">Storage Inventory</h1>
            <p className="text-sm text-gray-400 mt-1">Filled kegs currently in Brewery storage — read-only view from Keg Status</p>
          </div>
          <div className="grid grid-cols-3 gap-4 mb-6">
            {[
              { label:"Total Kegs in Storage", value: inStorage.length, color:"amber" },
              { label:"Unique Beers", value: rows.length, color:"sky" },
              { label:"Ready to Dispatch", value: inStorage.length, color:"emerald" },
            ].map(c => <StatCard key={c.label} label={c.label} value={c.value} color={c.color}/>)}
          </div>
          <div className="bg-white rounded-2xl border border-gray-100">
            <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
              <h2 className="font-semibold text-gray-800">Kegs in Storage</h2>
              <span className="text-xs text-gray-400">{inStorage.length} kegs total</span>
            </div>
            {rows.length === 0 ? (
              <div className="p-12 text-center text-gray-400">
                <div className="text-4xl mb-3">📦</div>
                <p className="font-medium">No filled kegs in storage</p>
                <p className="text-xs mt-1">Kegs will appear here when status is "Filled" and location is "Brewery"</p>
              </div>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead><tr className="bg-gray-50 text-xs text-gray-500 uppercase tracking-wider">
                    <th className="px-5 py-3 text-left">Beer Name</th>
                    <th className="px-5 py-3 text-left">Size</th>
                    <th className="px-5 py-3 text-center">Kegs</th>

    // ─── KEG RECEIVED PAGE ────────────────────────────────────────────────────

        .filter(s => !search || s.beer_name?.toLowerCase().includes(search.toLowerCase()) || s.keg_id?.toLowerCase().includes(search.toLowerCase()))

          <div className="flex gap-2 mb-5">{tabBtn("brewery","From Brewery",breweryAll.length)}{tabBtn("supplier","From Suppliers",0)}</div>

                  {/* Sort toggle */}
                  <button onClick={()=>setSortAsc(v=>!v)}

                  </button>

                      <input value={supForm.keg_ref} onChange={e=>setSupForm(p=>({...p,keg_ref:e.target.value}))} placeholder="e.g. Brainfill Osiris" className={inputCls}/>

                    <div>
                      <label className="block text-xs font-medium text-gray-500 mb-1.5">Beer Name</label>

    // ─── TAP MANAGEMENT PAGE ──────────────────────────────────────────────────
    function TapManagementPage({ tapLog, setTapLog }) {
      const BAR_STAFF = React.useContext(BarStaffCtx);
      const [tab, setTab] = useState("queue");
      const TAP_LINES = Array.from({length:14}, (_,i) => `Tap ${i+1}`);

      const pending  = tapLog.filter(t => t.status === "Pending" || t.status === "Queued");
      const active   = tapLog.filter(t => t.status === "Active");
      const finished = tapLog.filter(t => t.status === "Finished");

      function setField(id, field, value) {
        setTapLog(prev => prev.map(t => {
          if (t.id !== id) return t;
          const updated = { ...t, [field]: value };
          // Recompute status
          if (updated.date_untapped) updated.status = "Finished";
          else if (updated.ready === "true" && updated.tap_line && updated.date_tapped) updated.status = "Active";
          else if (updated.ready === "true") updated.status = "Queued";
          else updated.status = "Pending";
          return updated;
        }));
      }

      // Set of tap lines currently occupied by an active beer
      const occupiedLines = new Set(active.map(t => t.tap_line).filter(Boolean));

      function markReady(id) { setField(id, "ready", "true"); }
      function assignTap(id, line) {
        if (occupiedLines.has(line)) return; // guard: refuse if line is taken
        setTapLog(prev => prev.map(t => {
          if (t.id !== id) return t;
          const updated = { ...t, tap_line: line, date_tapped: t.date_tapped || today() };
          updated.status = "Active";
          return updated;
        }));

      function markEmpty(id) { setField(id, "date_untapped", today()); }
      function daysOnTap(t) {
        if (!t.date_tapped) return null;
        const end = t.date_untapped || today();
        return Math.max(0, Math.round((new Date(end) - new Date(t.date_tapped)) / 86400000));

    // ─── BAR DASHBOARD PAGE ───────────────────────────────────────────────────
    function BarDashboardPage({ tapLog, barKegIn, supplierKegIn }) {
      const todayStr = today();
      const active   = tapLog.filter(t => t.status === "Active");
      const finToday = tapLog.filter(t => t.date_untapped === todayStr);
      const recToday = [
        ...barKegIn.filter(b => b.received_date === todayStr),
        ...supplierKegIn.filter(s => s.received_date === todayStr),
      ];
      const avgDays = active.length > 0
        ? (active.reduce((sum,t)=>{
            const d = Math.max(0, Math.round((new Date(todayStr)-new Date(t.date_tapped))/86400000));
            return sum+d;
          },0) / active.length).toFixed(1)
        : "—";

      // Build tap board: tap 1–14
      const tapBoard = Array.from({length:14}, (_,i) => {
        const num = i+1;
        const beer = active.find(t => t.tap_line === `Tap ${num}`);
        return { num, beer };
      });

      const daysOnTap = t => {
        if (!t.date_tapped) return 0;
        return Math.max(0, Math.round((new Date(todayStr)-new Date(t.date_tapped))/86400000));
      };

      const pending = tapLog.filter(t => t.status === "Pending" || t.status === "Queued");

      return (
        <div>
          <div className="mb-6">
            <h1 className="text-2xl font-bold text-gray-800">Bar Dashboard</h1>
            <p className="text-sm text-gray-400 mt-1">Real-time overview of taps, keg stock, and daily activity</p>
          </div>

          {/* KPI row */}
          <div className="grid grid-cols-4 gap-4 mb-6">
            <StatCard label="Active Taps" value={active.length} sub={`of 14 taps in use`} color="emerald"/>
            <StatCard label="Finished Today" value={finToday.length} sub={finToday.map(t=>t.beer_name).join(", ")||"None"} color="amber"/>
            <StatCard label="Kegs Received Today" value={recToday.length} sub="From brewery + suppliers" color="sky"/>
            <StatCard label="Avg Days on Tap" value={avgDays} sub="Active taps only" color="gray"/>
          </div>

          {/* Tap Board */}
          <div className="bg-white rounded-2xl border border-gray-100 mb-6">
            <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
              <h2 className="font-semibold text-gray-800">🍺 Tap Board — 14 Taps</h2>
              <div className="flex items-center gap-3 text-xs">
                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-emerald-400 inline-block"></span>Active</span>
                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-gray-200 inline-block"></span>Available</span>
              </div>
            </div>
            <div className="p-5 grid grid-cols-7 gap-3">
              {tapBoard.map(({num, beer}) => (
                <div key={num} className={`rounded-2xl p-3 border-2 transition-all ${
                  beer ? "border-emerald-200 bg-emerald-50" : "border-gray-100 bg-gray-50"
                }`}>
                  <div className={`text-xs font-bold mb-2 ${beer?"text-emerald-700":"text-gray-400"}`}>Tap {num}</div>
                  {beer ? (
                    <>
                      <div className="text-xs font-semibold text-gray-800 leading-tight mb-1.5" style={{fontSize:"11px"}}>{beer.beer_name}</div>
                      <div className={`text-xs font-bold ${
                        daysOnTap(beer)>14?"text-red-600":daysOnTap(beer)>7?"text-amber-600":"text-emerald-600"
                      }`}>{daysOnTap(beer)}d</div>
                      <div className="mt-1 flex items-center justify-between">
                        {beer.source==="Brewery"
                          ? <span className="text-amber-600 text-xs">🏭</span>
                          : <span className="text-sky-600 text-xs">🚚</span>}
                        {beer.price && <span className="text-gray-500 text-xs font-medium">฿{beer.price}</span>}
                      </div>
                    </>
                  ) : (
                    <div className="text-xs text-gray-300 mt-1">Available</div>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Bottom row */}
          <div className="grid grid-cols-2 gap-5">

            <div className="bg-white rounded-2xl border border-gray-100">
              <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between">
                <h3 className="font-semibold text-gray-800 text-sm">Tap Queue</h3>

              </div>
              {pending.length === 0 ? (
                <div className="p-6 text-center text-sm text-gray-400">Queue is empty</div>
              ) : (
                <div className="divide-y divide-gray-50">
                  {pending.slice(0,6).map(t => (
                    <div key={t.id} className="px-5 py-3 flex items-center justify-between">

            </div>
          </div>

    // ─── APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [page, setPage] = useState("dashboard");
      const [kegStatus, setKegStatus]   = useState(INITIAL_KEG_STATUS);
      const [fillLog, setFillLog]       = useState(INITIAL_FILL_LOG);
      const [stockOut, setStockOut]     = useState(INITIAL_STOCK_OUT);
      const [brokenLog, setBrokenLog]   = useState(INITIAL_BROKEN_LOG);
      const [batches, setBatches]       = useState(INITIAL_BATCHES);
      const [beerList, setBeerList]     = useState(INITIAL_BEER_LIST);
      const [batchTasks, setBatchTasks] = useState(INITIAL_BATCH_TASKS);
      const [brewsheets, setBrewsheets] = useState(INITIAL_BREWSHEETS);
      const [staff, setStaff]           = useState(INITIAL_STAFF);
      const [selectedBatchId, setSelectedBatchId] = useState(null);
      const [barKegIn, setBarKegIn]         = useState([]);
      const [supplierKegIn, setSupplierKegIn] = useState([]);
      const [tapLog, setTapLog]             = useState([]);

      // ── Auth state ──────────────────────────────────────────────────────────
      const [authState, setAuthState]     = useState(OFFLINE_MODE ? "offline" : "idle");
      const [currentUser, setCurrentUser] = useState(null);
      const [authError, setAuthError]     = useState(null);
      const [syncStatus, setSyncStatus]   = useState(null);
      const dataReadyRef = useRef(false);

      // ── Auto-login on mount: if a previous session was saved, silently re-auth ─
      useEffect(() => {
        if (OFFLINE_MODE) return;
        const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } })();
        if (!saved?.email) return; // no saved session
        // We have a previous user — silently request a fresh token (no popup)
        setAuthState("signing-in");
        try {
          const tc = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email",
            prompt: "",          // empty = silent, no account chooser popup
            login_hint: saved.email,
            callback: handleTokenCallback,
          });
          tc.requestAccessToken();
        } catch(e) {
          // Silent auth failed — clear stale session and show login page
          localStorage.removeItem(STORAGE_KEY);
          setAuthState("idle");
        }
      }, []); // eslint-disable-line react-hooks/exhaustive-deps

      // ── Google Sign-In ───────────────────────────────────────────────────────
      async function handleSignIn() {
        if (OFFLINE_MODE) { setAuthState("offline"); return; }
        setAuthError(null);
        setAuthState("signing-in");
        try {
          const tc = google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email",
            callback: handleTokenCallback,
          });
          tc.requestAccessToken();
        } catch(e) {
          setAuthError("Could not start sign-in. Make sure you opened the app via HTTP (not file://).");
          setAuthState("idle");
        }
      }

      async function handleTokenCallback(resp) {
        if (resp.error) {
          // Silent re-auth failed (e.g. user revoked access) — clear saved session
          localStorage.removeItem(STORAGE_KEY);
          setAuthError(resp.error === "interaction_required" ? null : `Sign-in failed: ${resp.error}`);
          setAuthState("idle");
          return;
        }
        _gTok = resp.access_token;
        setAuthState("loading");
        try {
          const uResp = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers:{ Authorization:`Bearer ${_gTok}` } });
          const user = await uResp.json();
          const userObj = { name: user.name, email: user.email, picture: user.picture };
          setCurrentUser(userObj);
          // Persist session so the next page load auto-signs in silently
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(userObj)); } catch {}
          // Ensure all sheet tabs exist (creates any missing ones automatically)
          await ensureSheetsExist();
          const data = await sheetsLoadAll();
          // Track which sheets were empty so we can seed them
          const emptySheets = [];
          if (data.KegStatus.length)  setKegStatus(data.KegStatus);   else emptySheets.push(["KegStatus",  INITIAL_KEG_STATUS]);
          if (data.FillLog.length)    setFillLog(data.FillLog);        else emptySheets.push(["FillLog",    INITIAL_FILL_LOG]);
          if (data.StockOut.length)   setStockOut(data.StockOut);      else emptySheets.push(["StockOut",   INITIAL_STOCK_OUT]);
          if (data.BrokenLog.length)  setBrokenLog(data.BrokenLog);    else emptySheets.push(["BrokenLog",  INITIAL_BROKEN_LOG]);
          if (data.Batches.length)    setBatches(data.Batches);        else emptySheets.push(["Batches",    INITIAL_BATCHES]);
          if (data.BeerList.length)   setBeerList(data.BeerList);      else emptySheets.push(["BeerList",   INITIAL_BEER_LIST]);
          if (data.BatchTasks.length) setBatchTasks(deduplicateTasks(data.BatchTasks));  else emptySheets.push(["BatchTasks", INITIAL_BATCH_TASKS]);
          if (data.Staff && data.Staff.length) setStaff(data.Staff); else emptySheets.push(["Staff", INITIAL_STAFF]);
          if (data.BarKegIn.length)      setBarKegIn(data.BarKegIn);
          if (data.SupplierKegIn.length) setSupplierKegIn(data.SupplierKegIn);
          if (data.TapLog.length)        setTapLog(data.TapLog);
          if (data.Brewsheets.length) {
            const bs = {};
            data.Brewsheets.forEach(r => { if (r.batch_id) bs[r.batch_id] = r.data; });
            setBrewsheets(bs);
          } else {
            emptySheets.push(["Brewsheets", Object.entries(INITIAL_BREWSHEETS).map(([batch_id, d]) => ({ batch_id, data: d }))]);
          }
          setAuthState("ready");
          // Seed empty sheets with initial data immediately (no debounce)
          if (emptySheets.length) {
            setSyncStatus("saving");
            try {
              await Promise.all(emptySheets.map(([name, items]) => sheetsSave(name, items)));
              setSyncStatus("saved");
              setTimeout(() => setSyncStatus(s => s === "saved" ? null : s), 2500);
            } catch(e) { setSyncStatus("error"); }
          }
          setTimeout(() => { dataReadyRef.current = true; }, 500);
        } catch(e) {
          setAuthError(e.code === 401 ? "Session expired. Please sign in again." : `Failed to load data: ${e.message}`);
          setAuthState("idle");
        }
      }

      function handleSignOut() {
        _gTok = null; dataReadyRef.current = false;
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        // Revoke the Google token so it truly signs out
        try { google.accounts.oauth2.revoke(_gTok, () => {}); } catch {}
        setCurrentUser(null); setAuthState("idle"); setSyncStatus(null);
      }

      // ── Auto-save (debounced, only after initial load) ──────────────────────
      function useSave(sheetName, data, deps) {
        useEffect(() => {
          if (!dataReadyRef.current || authState !== "ready") return;
          const t = setTimeout(async () => {
            setSyncStatus("saving");
            try {
              await sheetsSave(sheetName, data);
              setSyncStatus("saved");
              setTimeout(() => setSyncStatus(s => s === "saved" ? null : s), 2500);
            } catch(e) {
              setSyncStatus("error"); // errors stay visible until next save
              if (e.code === 401) handleSignOut();
            }
          }, 1200);
          return () => clearTimeout(t);
        }, deps); // eslint-disable-line react-hooks/exhaustive-deps
      }
      useSave("KegStatus",  kegStatus,  [kegStatus]);
      useSave("FillLog",    fillLog,    [fillLog]);
      useSave("StockOut",   stockOut,   [stockOut]);
      useSave("BrokenLog",  brokenLog,  [brokenLog]);
      useSave("Batches",    batches,    [batches]);
      useSave("BeerList",   beerList,   [beerList]);
      useSave("BatchTasks",    batchTasks,    [batchTasks]);
      useSave("Staff",         staff,         [staff]);

      // Keep module-level STAFF in sync so useState() defaults in components work
      const breweryStaff = useMemo(() => staff.filter(s => s.dept === "Brewery").map(s => s.name), [staff]);
      const barStaff     = useMemo(() => staff.filter(s => s.dept === "Bar").map(s => s.name), [staff]);
      useEffect(() => { STAFF.length = 0; breweryStaff.forEach(n => STAFF.push(n)); }, [breweryStaff]);
      useSave("BarKegIn",      barKegIn,      [barKegIn]);
      useSave("SupplierKegIn", supplierKegIn, [supplierKegIn]);
      useSave("TapLog",        tapLog,        [tapLog]);
      useEffect(() => {
        if (!dataReadyRef.current || authState !== "ready") return;
        const items = Object.entries(brewsheets).map(([batch_id, data]) => ({ batch_id, data }));
        const t = setTimeout(async () => {
          setSyncStatus("saving");
          try {
            await sheetsSave("Brewsheets", items);
            setSyncStatus("saved");
            setTimeout(() => setSyncStatus(s => s === "saved" ? null : s), 2500);
          } catch(e) { setSyncStatus("error"); if (e.code === 401) handleSignOut(); }
        }, 1200);
        return () => clearTimeout(t);
      }, [brewsheets]);

      // ── Brewsheet nav ────────────────────────────────────────────────────────
      function openBrewsheet(batchId) { setSelectedBatchId(batchId); setPage("brewsheet"); }
      function saveBrewsheet(batchId, data) { setBrewsheets(prev => ({...prev, [batchId]: data})); }

      // ── Sync badge ───────────────────────────────────────────────────────────
      const syncBadge = syncStatus && (
        <div className={`fixed bottom-5 right-5 z-50 px-3.5 py-2 rounded-xl text-xs font-medium shadow-lg flex items-center gap-2 cursor-pointer ${
          syncStatus==="saving" ? "bg-amber-500 text-white" :
          syncStatus==="saved"  ? "bg-emerald-500 text-white" : "bg-red-600 text-white"
        }`} onClick={() => syncStatus !== "saving" && setSyncStatus(null)}>
          {syncStatus==="saving" && <div className="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></div>}
          {syncStatus==="saving" ? "Saving to Sheets…" :
           syncStatus==="saved"  ? "✓ Saved to Sheets" :
           "⚠ Save failed — check Sheets API & permissions"}
        </div>
      );

      // ── Auth gates ───────────────────────────────────────────────────────────
      if (authState === "idle" || authState === "signing-in")
        return <LoginPage onSignIn={handleSignIn} error={authError} />;
      if (authState === "loading")
        return <LoadingScreen message="Loading brewery data from Google Sheets…" />;

      // ── Main app (offline or ready) ──────────────────────────────────────────
      return (
        <StaffCtx.Provider value={breweryStaff}>
        <BarStaffCtx.Provider value={barStaff}>
        <div className="min-h-screen bg-gray-50">
          {syncBadge}
          <Sidebar page={page} setPage={setPage} currentUser={currentUser} onSignOut={authState==="ready" ? handleSignOut : null} />
          <main className="ml-56 p-8 min-h-screen">
            <div className="max-w-6xl mx-auto">
              {page === "dashboard"  && <Dashboard  kegStatus={kegStatus} fillLog={fillLog} stockOut={stockOut} beerList={beerList} />}
              {page === "keg-status" && <KegStatusPage kegStatus={kegStatus} setKegStatus={setKegStatus} />}
              {page === "fill-log"   && <FillLogPage   fillLog={fillLog} setFillLog={setFillLog} beerList={beerList} kegStatus={kegStatus} setKegStatus={setKegStatus} batches={batches} />}
              {page === "stock-out"     && <StockOutPage     stockOut={stockOut} setStockOut={setStockOut} kegStatus={kegStatus} setKegStatus={setKegStatus} />}
              {page === "keg-cleaning"  && <KegCleaningPage  kegStatus={kegStatus} setKegStatus={setKegStatus} brokenLog={brokenLog} setBrokenLog={setBrokenLog} stockOut={stockOut} />}
              {page === "broken-log"    && <BrokenLogPage    brokenLog={brokenLog} setBrokenLog={setBrokenLog} kegStatus={kegStatus} setKegStatus={setKegStatus} />}
              {page === "batches"     && <BatchesPage    batches={batches} setBatches={setBatches} beerList={beerList} setBeerList={setBeerList} fillLog={fillLog} batchTasks={batchTasks} setBatchTasks={setBatchTasks} onOpenBrewsheet={openBrewsheet} />}
              {page === "fermenters"  && <FermenterDashboard batches={batches} setBatches={setBatches} fillLog={fillLog} batchTasks={batchTasks} setBatchTasks={setBatchTasks} />}
              {page === "team"        && <StaffPage staff={staff} setStaff={setStaff} />}
              {page === "brewsheet"   && (() => { const b = batches.find(x=>x.batch_id===selectedBatchId); return b ? <BrewsheetPage batch={b} brewsheet={brewsheets[b.batch_id]} onSave={saveBrewsheet} onBack={()=>setPage("batches")}/> : null; })()}
              {page === "bar-dashboard"     && <BarDashboardPage tapLog={tapLog} barKegIn={barKegIn} supplierKegIn={supplierKegIn} />}
              {page === "storage-inventory" && <StorageInventoryPage kegStatus={kegStatus} />}
              {page === "keg-received"      && <KegReceivedPage stockOut={stockOut} barKegIn={barKegIn} setBarKegIn={setBarKegIn} supplierKegIn={supplierKegIn} setSupplierKegIn={setSupplierKegIn} tapLog={tapLog} setTapLog={setTapLog} currentUser={currentUser} />}
              {page === "tap-management"    && <TapManagementPage tapLog={tapLog} setTapLog={setTapLog} />}
            </div>
          </main>
        </div>
        </BarStaffCtx.Provider>
        </StaffCtx.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
