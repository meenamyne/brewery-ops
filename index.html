                              {b.style ? <span className="px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded-full">{b.style}</span> : <span className="text-gray-300">—</span>}
                            </td>
                            <td className="px-4 py-2.5">
                              {b.abv ? <span className="px-2 py-0.5 bg-amber-50 text-amber-700 text-xs rounded-full font-medium">{b.abv}%</span> : <span className="text-gray-300">—</span>}
                            </td>
                            <td className="px-4 py-2.5">
                              {b.contract === "true"
                                ? <span className="px-2 py-0.5 bg-indigo-50 text-indigo-600 text-xs rounded-full font-medium">Contract</span>
                                : <span className="px-2 py-0.5 bg-gray-50 text-gray-400 text-xs rounded-full">House</span>}
                            </td>
                            <td className="px-4 py-2.5">
                              <div className="flex gap-1 justify-end">
                                <button onClick={() => openEditBeer(b._idx)} className="p-1.5 rounded-lg text-amber-600 hover:bg-amber-50 transition-colors" title="Edit">
                                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                                <button onClick={() => handleDeleteBeer(b._idx)} className="p-1.5 rounded-lg text-red-400 hover:bg-red-50 hover:text-red-600 transition-colors" title="Delete">
                                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              );
            })()}
          </>)}

          {/* ── ADD BATCH MODAL ───────────────────────────────────────── */}
          {showBatchModal && (
            <Modal
              title={editBatchId ? `Edit Batch #${batchForm.batch_id}` : "Add Batch"}
              onClose={() => { setShowBatchModal(false); setEditBatchId(null); setBatchForm(emptyBatchForm()); }}
            >
              <form onSubmit={editBatchId ? handleEditBatch : handleAddBatch} className="space-y-4">
                {/* Status first — drives which fields are required */}
                <Field label="Status">
                  <select value={batchForm.status}
                    onChange={e=>setBatchForm(f=>({...f,status:e.target.value}))} className={inputCls}>
                    {BATCH_STATUSES.map(s=><option key={s}>{s}</option>)}
                  </select>
                </Field>

                {/* Planned-mode hint */}
                {batchForm.status === "Planned" && (
                  <div className="px-3 py-2.5 bg-indigo-50 border border-indigo-100 rounded-xl text-xs text-indigo-700 flex items-start gap-2">
                    <span className="mt-0.5 text-base leading-none">📋</span>
                    <span>Planning mode — <strong>Brew Day</strong> and <strong>Fermenter</strong> can be left as TBD and updated when the brew is confirmed.</span>
                  </div>
                )}

                <div className="grid grid-cols-2 gap-4">
                  <Field label="Batch #">
                    <input type="number" required value={batchForm.batch_id}
                      readOnly={!!editBatchId}
                      onChange={e=>setBatchForm(f=>({...f,batch_id:e.target.value}))}
                      className={`${inputCls} ${editBatchId ? "bg-gray-50 text-gray-400 cursor-not-allowed" : ""}`} />
                  </Field>
                  <Field label={batchForm.status === "Planned" ? "Target Brew Day (optional)" : "Brew Day"}>
                    <input type="date" required={batchForm.status !== "Planned"} value={batchForm.brew_day}
                      onChange={e=>setBatchForm(f=>({...f,brew_day:e.target.value}))} className={inputCls} />
                  </Field>
                </div>
                <Field label="Beer Name">
                  <select value={batchForm.beer_name}
                    onChange={e=>setBatchForm(f=>({...f,beer_name:e.target.value}))} className={inputCls}>
                    {beerList.map(b=><option key={b.name}>{b.name}</option>)}
                  </select>
                </Field>
                <div className="grid grid-cols-2 gap-4">
                  <Field label={batchForm.status === "Planned" ? "Fermenter (TBD ok)" : "Fermenter"}>
                    <select value={batchForm.fermenter}
                      onChange={e=>setBatchForm(f=>({...f,fermenter:e.target.value}))} className={inputCls}>
                      {batchForm.status === "Planned" && <option value="TBD">TBD — Not yet assigned</option>}
                      {FERMENTER_IDS.map(fid => (
                        <option key={fid} value={fid}>
                          {fid}{activeFermenters[fid] ? ` — ${activeFermenters[fid].slice(0,18)}` : " — Available"}
                        </option>
                      ))}
                    </select>
                  </Field>
                  <Field label="Volume (L)">
                    <input type="number" min="1" required value={batchForm.volume}
                      onChange={e=>setBatchForm(f=>({...f,volume:e.target.value}))} className={inputCls} />
                  </Field>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Fermentation Days">
                    <input type="number" min="1" required value={batchForm.fermentation_days}
                      onChange={e=>setBatchForm(f=>({...f,fermentation_days:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="Condition Days">
                    <input type="number" min="0" value={batchForm.condition_days}
                      onChange={e=>setBatchForm(f=>({...f,condition_days:e.target.value}))} className={inputCls} />
                  </Field>
                </div>
                {/* Release date preview */}
                {previewRelease && (
                  <div className="px-3 py-2 bg-amber-50 rounded-lg flex items-center justify-between">
                    <span className="text-xs text-amber-700 font-medium">
                      {batchForm.status === "Planned" ? "Estimated Release (if confirmed)" : "Estimated Release Date"}
                    </span>
                    <span className="text-xs font-bold text-amber-800">{fmt(previewRelease)}</span>
                  </div>
                )}
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => { setShowBatchModal(false); setEditBatchId(null); setBatchForm(emptyBatchForm()); }} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">
                    {editBatchId ? "Save Changes" : batchForm.status === "Planned" ? "Save Plan" : "Save Batch"}
                  </button>
                </div>
              </form>
            </Modal>
          )}

          {/* ── ADD BEER MODAL ────────────────────────────────────────── */}
          {showBeerModal && (
            <Modal title={editBeerIdx !== null ? "Edit Beer" : "Add New Beer"} onClose={() => { setShowBeerModal(false); setEditBeerIdx(null); setBeerForm({ brand:"", name:"", style:"", abv:"" }); }}>
              <form onSubmit={handleAddBeer} className="space-y-4">
                <Field label="Brand">
                  <input placeholder="e.g. UPB, Sandport, Yodbeer…" value={beerForm.brand}
                    onChange={e=>setBeerForm(f=>({...f,brand:e.target.value}))} className={inputCls} />
                </Field>
                <Field label="Beer Name">
                  <input required placeholder="e.g. UPB Tropical IPA" value={beerForm.name}
                    onChange={e=>setBeerForm(f=>({...f,name:e.target.value}))} className={inputCls} />
                </Field>
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Beer Style">
                    <input placeholder="e.g. Hazy IPA, Lager…" value={beerForm.style}
                      onChange={e=>setBeerForm(f=>({...f,style:e.target.value}))} className={inputCls} />
                  </Field>
                  <Field label="ABV (%)">
                    <input type="number" step="0.1" min="0" max="25" placeholder="e.g. 5.5" value={beerForm.abv}
                      onChange={e=>setBeerForm(f=>({...f,abv:e.target.value}))} className={inputCls} />
                  </Field>
                </div>
                {/* Contract brewing toggle */}
                <label className="flex items-center gap-3 p-3 rounded-xl border border-gray-100 hover:bg-indigo-50/40 cursor-pointer transition-colors select-none">
                  <input type="checkbox" checked={!!beerForm.contract}
                    onChange={e=>setBeerForm(f=>({...f,contract:e.target.checked}))}
                    className="w-4 h-4 accent-indigo-500 rounded" />
                  <div>
                    <p className="text-sm font-medium text-gray-700">Contract Brewing</p>
                    <p className="text-xs text-gray-400">Check if this beer is brewed under contract for another brand</p>
                  </div>
                  {beerForm.contract && <span className="ml-auto px-2 py-0.5 bg-indigo-50 text-indigo-600 text-xs rounded-full font-medium">Contract</span>}
                </label>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={() => { setShowBeerModal(false); setEditBeerIdx(null); setBeerForm({ brand:"", name:"", style:"", abv:"", contract: false }); }} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-white text-sm font-medium rounded-xl transition-colors">{editBeerIdx !== null ? "Save Changes" : "Save Beer"}</button>
                </div>
              </form>
            </Modal>
          )}

          {/* ── DELETE CONFIRM MODAL ─────────────────────────────────── */}
          {deleteConfirm && deleteConfirm.type === "beer" && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden">
                <div className="px-6 py-4 border-b border-red-100 bg-red-50 flex items-start gap-3">
                  <svg className="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                  <div>
                    <h2 className="font-semibold text-red-700">Cannot delete — beer is in use</h2>
                    <p className="text-xs text-red-500 mt-0.5">
                      <span className="font-medium">"{deleteConfirm.name}"</span> is referenced in {deleteConfirm.linkedBatches.length} batch{deleteConfirm.linkedBatches.length !== 1 ? "es" : ""}.
                    </p>
                  </div>
                </div>
                <div className="px-6 py-4">
                  <p className="text-xs font-medium text-gray-500 uppercase tracking-wide mb-2">Linked Batches</p>
                  <div className="space-y-1 max-h-40 overflow-y-auto">
                    {deleteConfirm.linkedBatches.map(b => (
                      <div key={b.id} className="flex items-center justify-between px-3 py-1.5 bg-gray-50 rounded-lg text-xs">
                        <span className="font-mono text-amber-600 font-semibold">#{b.batch_id}</span>
                        <span className="text-gray-500 mx-2 truncate flex-1">{b.beer_name}</span>
                        <span className={`px-1.5 py-0.5 rounded-full text-xs ${BATCH_STATUS_CONFIG[b.status]?.bg||"bg-gray-100"} ${BATCH_STATUS_CONFIG[b.status]?.text||"text-gray-500"}`}>{b.status}</span>
                      </div>
                    ))}
                  </div>
                  <p className="text-xs text-gray-400 mt-3">
                    To delete this beer, first reassign or delete the linked batches above.<br/>
                    Or force-delete — affected batches will be flagged <span className="text-red-500 font-medium">⚠ Missing</span>.
                  </p>
                </div>
                <div className="px-6 pb-5 flex gap-3">
                  <button onClick={() => setDeleteConfirm(null)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                    Keep Beer
                  </button>
                  <button onClick={() => confirmDeleteBeer(true)} className="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-colors">
                    Force Delete
                  </button>
                </div>
              </div>
            </div>
          )}

          {deleteConfirm && deleteConfirm.type === "batch" && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden">
                <div className="px-6 py-4 border-b border-gray-100 flex items-start gap-3">
                  <svg className="w-5 h-5 text-red-400 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  <div>
                    <h2 className="font-semibold text-gray-800">Delete Batch #{deleteConfirm.batch.batch_id}?</h2>
                    <p className="text-xs text-gray-500 mt-0.5">{deleteConfirm.batch.beer_name}</p>
                  </div>
                </div>
                <div className="px-6 py-4 space-y-2">
                  <div className="flex items-center gap-2 text-sm text-gray-600">
                    <svg className="w-4 h-4 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span>Batch log entry will be permanently removed</span>
                  </div>
                  {deleteConfirm.taskCount > 0 && (
                    <div className="flex items-center gap-2 text-sm text-orange-600">
                      <svg className="w-4 h-4 text-orange-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                      <span>{deleteConfirm.taskCount} planned task{deleteConfirm.taskCount !== 1 ? "s" : ""} will also be removed</span>
                    </div>
                  )}
                  <p className="text-xs text-gray-400 pt-1">This action cannot be undone.</p>
                </div>
                <div className="px-6 pb-5 flex gap-3">
                  <button onClick={() => setDeleteConfirm(null)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50 transition-colors">Cancel</button>
                  <button onClick={confirmDeleteBatch} className="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white text-sm font-medium rounded-xl transition-colors">Delete</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // ─── FERMENTER DASHBOARD ──────────────────────────────────────────────────
    // ─── FERMENTER STATUS TAB ─────────────────────────────────────────────────
    function FermenterStatusTab({ batches, setBatches, fillLog }) {
      function handleStatusChange(batchId, newStatus) {
        setBatches(prev => prev.map(b => b.id === batchId ? { ...b, status: newStatus } : b));
      }
      const TODAY_D = new Date("2026-03-16");

      // Active batch per fermenter (Done = empty tank)
      const activeMap = {};
      FERMENTER_IDS.forEach(id => { activeMap[id] = null; });
      [...batches]
        .filter(b => b.status !== "Done")
        .sort((a,b) => (b.brew_day||"").localeCompare(a.brew_day||""))
        .forEach(b => { if (b.fermenter && activeMap[b.fermenter] === null) activeMap[b.fermenter] = b; });

      // Last completed batch per fermenter (for "Last:" hint on empty tanks)
      const lastDoneMap = {};
      [...batches]
        .filter(b => b.status === "Done")
        .sort((a,b) => (b.brew_day||"").localeCompare(a.brew_day||""))
        .forEach(b => { if (b.fermenter && !lastDoneMap[b.fermenter]) lastDoneMap[b.fermenter] = b; });

      // Age in days from brew day to today
      function ageDays(brewDay) {
        if (!brewDay) return null;
        const diff = TODAY_D - new Date(brewDay);
        return Math.max(0, Math.floor(diff / 86400000));
      }

      // Filled litres for a batch from fill log
      function filledLitres(batchId) {
        return fillLog.filter(f => String(f.batch_no) === String(batchId))
          .reduce((s,f) => s + (parseFloat(f.litres)||0), 0);
      }

      const statusColor = {
        Pending:    { ring:"ring-gray-300",    bg:"bg-gray-100",    badge:"bg-gray-200 text-gray-500",       icon:"⏳" },
        Brewing:    { ring:"ring-amber-300",   bg:"bg-amber-50",    badge:"bg-amber-100 text-amber-700",     icon:"🔥" },
        Fermenting: { ring:"ring-sky-300",     bg:"bg-sky-50",      badge:"bg-sky-100 text-sky-700",         icon:"🧪" },
        Condition:  { ring:"ring-violet-300",  bg:"bg-violet-50",   badge:"bg-violet-100 text-violet-700",   icon:"❄️" },
        Ready:      { ring:"ring-emerald-300", bg:"bg-emerald-50",  badge:"bg-emerald-100 text-emerald-700", icon:"✅" },
        Filling:    { ring:"ring-blue-300",    bg:"bg-blue-50",     badge:"bg-blue-100 text-blue-700",       icon:"💧" },
        Available:  { ring:"ring-gray-100",    bg:"bg-white",       badge:"bg-gray-50 text-gray-400",        icon:"○"  },
      };

      return (
        <div className="space-y-5">
          {/* Legend */}
          <div className="flex flex-wrap gap-2">
            {Object.entries(statusColor).map(([s,c]) => (
              <span key={s} className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium ${c.badge}`}>
                <span>{c.icon}</span>{s}
              </span>
            ))}
          </div>

          {/* Tank grid */}
          <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
            {FERMENTER_IDS.map(id => {
              const b = activeMap[id];
              const last = lastDoneMap[id];
              const st = b ? b.status : "Available";
              const c = statusColor[st] || statusColor.Available;
              const age = b ? ageDays(b.brew_day) : null;
              const filled = b ? filledLitres(b.batch_id) : 0;

              return (
                <div key={id} className={`rounded-2xl p-4 border-2 ${c.ring} ${c.bg} transition-all`}>
                  {/* Header */}
                  <div className="flex items-center justify-between mb-2">
                    <span className="font-mono text-sm font-bold text-gray-700">{id}</span>
                    <span className="text-base leading-none">{c.icon}</span>
                  </div>

                  {b ? (<>
                    {/* Active batch info */}
                    <p className="text-xs font-semibold text-gray-800 leading-snug mb-0.5 truncate">{b.beer_name}</p>
                    <p className="text-xs text-gray-400 mb-0.5">Batch #{b.batch_id}</p>
                    <p className="text-xs text-gray-400">Brew: {fmt(b.brew_day)}</p>
                    <p className="text-xs text-gray-400 mb-2">Release: {fmt(b.release_date)}</p>

                    {/* Filled / Volume bar */}
                    <div className="mb-2">
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-xs text-gray-400">Filled</span>
                        <span className="text-xs font-semibold text-gray-700">{filled} / {b.volume} L</span>
                      </div>
                      <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div
                          className={`h-full rounded-full transition-all ${c.badge.split(" ")[0].replace("bg-","bg-").replace("-100","-400")}`}
                          style={{width:`${Math.min(100,(filled/(b.volume||1))*100).toFixed(1)}%`}}
                        ></div>
                      </div>
                    </div>

                    {/* Age + Status badge row */}
                    <div className="flex items-center justify-between">
                      <select
                        value={b.status}
                        onChange={e => handleStatusChange(b.id, e.target.value)}
                        className={`text-xs font-medium px-2 py-0.5 rounded-full border-0 cursor-pointer focus:outline-none focus:ring-1 focus:ring-amber-400 ${c.badge}`}
                      >
                        {BATCH_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                      {age !== null && (
                        <span className="text-xs text-gray-400">Day {age}</span>
                      )}
                    </div>
                  </>) : (<>
                    {/* Empty tank */}
                    {last ? (<>
                      <p className="text-xs text-gray-400 truncate mb-0.5">Last: {last.beer_name}</p>
                      <p className="text-xs text-gray-300 mb-2">#{last.batch_id}</p>
                    </>) : (
                      <p className="text-xs text-gray-300 mb-2">No batches yet</p>
                    )}
                    <div className="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium border border-gray-200 text-gray-400 bg-white">Available</div>
                  </>)}
                </div>
              );
            })}
          </div>

          {/* Active & Done batch table */}
          {(() => {
            const [bTab, setBTab] = React.useState("active");
            const [bPage, setBPage] = React.useState(1);
            const [bSearch, setBSearch] = React.useState("");
            const PAGE_SIZE = 20;
            const pool = batches.filter(b =>
              bTab === "active" ? b.status !== "Done" : b.status === "Done"
            ).filter(b =>
              !bSearch || b.beer_name?.toLowerCase().includes(bSearch.toLowerCase()) ||
              String(b.batch_id).includes(bSearch) || (b.fermenter||"").toLowerCase().includes(bSearch.toLowerCase())
            ).sort((a,b) => (b.brew_day||"").localeCompare(a.brew_day||""));
            const totalPages = Math.max(1, Math.ceil(pool.length / PAGE_SIZE));
            const page = Math.min(bPage, totalPages);
            const rows = pool.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);
            return (
              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                {/* Header: tabs + search */}
                <div className="px-5 py-3 border-b border-gray-100 flex flex-wrap items-center gap-3">
                  <div className="flex gap-1 bg-gray-100 p-1 rounded-xl">
                    {[
                      { id:"active", label:"Active & Upcoming", count: batches.filter(b=>b.status!=="Done").length },
                      { id:"done",   label:"Done",               count: batches.filter(b=>b.status==="Done").length },
                    ].map(tb => (
                      <button key={tb.id} onClick={() => { setBTab(tb.id); setBPage(1); setBSearch(""); }}
                        className={`px-3 py-1 rounded-lg text-xs font-medium transition-all flex items-center gap-1.5 ${bTab===tb.id?"bg-white text-gray-800 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                        {tb.label}
                        <span className={`px-1.5 py-0.5 rounded-full text-xs font-bold ${tb.id==="active"?"bg-amber-100 text-amber-700":"bg-emerald-100 text-emerald-700"}`}>{tb.count}</span>
                      </button>
                    ))}
                  </div>
                  <div className="relative ml-auto">
                    <svg className="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    <input value={bSearch} onChange={e=>{setBSearch(e.target.value);setBPage(1);}} placeholder="Search…"
                      className="pl-8 pr-3 py-1.5 text-xs border border-gray-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-amber-300 w-44" />
                  </div>
                </div>
                <div className="table-scroll">
                  <table className="w-full text-sm">
                    <thead><tr className="border-b border-gray-100">
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Fermenter</th>
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Batch #</th>
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Beer</th>
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Brew Day</th>
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Age</th>
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Filled / Vol</th>
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">Release</th>
                      <th className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">Status</th>
                    </tr></thead>
                    <tbody>
                      {rows.length === 0
                        ? <tr><td colSpan={8} className="text-center py-8 text-sm text-gray-400">No batches found</td></tr>
                        : rows.map((b,i) => (
                          <tr key={b.id} className={`border-b border-gray-50 hover:bg-gray-50 ${i%2===0?"":"bg-gray-50/40"}`}>
                            <td className="px-4 py-3 font-mono text-xs font-bold text-gray-600">{b.fermenter}</td>
                            <td className="px-4 py-3 font-mono text-xs font-semibold text-amber-600">#{b.batch_id}</td>
                            <td className="px-4 py-3 text-gray-700 max-w-48 truncate">{b.beer_name}</td>
                            <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(b.brew_day)}</td>
                            <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{ageDays(b.brew_day) !== null ? `Day ${ageDays(b.brew_day)}` : "—"}</td>
                            <td className="px-4 py-3 text-gray-700 whitespace-nowrap font-medium">{filledLitres(b.batch_id)} / {b.volume} L</td>
                            <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(b.release_date)}</td>
                            <td className="px-4 py-3">
                              <select value={b.status} onChange={e => handleStatusChange(b.id, e.target.value)}
                                className={`text-xs font-medium px-2.5 py-1 rounded-full border-0 cursor-pointer focus:outline-none focus:ring-2 focus:ring-amber-400 ${BATCH_STATUS_CONFIG[b.status]?.bg||"bg-gray-100"} ${BATCH_STATUS_CONFIG[b.status]?.text||"text-gray-500"}`}>
                                {BATCH_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
                              </select>
                            </td>
                          </tr>
                        ))
                      }
                    </tbody>
                  </table>
                </div>
                {/* Pagination */}
                {totalPages > 1 && (
                  <div className="flex items-center justify-between px-5 py-3 border-t border-gray-50">
                    <span className="text-xs text-gray-400">Showing {(page-1)*PAGE_SIZE+1}–{Math.min(page*PAGE_SIZE, pool.length)} of {pool.length}</span>
                    <div className="flex items-center gap-1">
                      <button onClick={()=>setBPage(p=>Math.max(1,p-1))} disabled={page<=1}
                        className="px-2.5 py-1.5 rounded-lg text-xs border border-gray-200 disabled:opacity-40 hover:bg-gray-50">← Prev</button>
                      {Array.from({length:totalPages},(_,i)=>i+1).map(p=>(
                        <button key={p} onClick={()=>setBPage(p)}
                          className={`w-7 h-7 rounded-lg text-xs font-medium ${p===page?"bg-amber-500 text-white":"border border-gray-200 hover:bg-gray-50 text-gray-600"}`}>{p}</button>
                      ))}
                      <button onClick={()=>setBPage(p=>Math.min(totalPages,p+1))} disabled={page>=totalPages}
                        className="px-2.5 py-1.5 rounded-lg text-xs border border-gray-200 disabled:opacity-40 hover:bg-gray-50">Next →</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })()}
        </div>
      );
    }

    // ─── FERMENTER TIMELINE TAB (GANTT + TASK PLANNING) ──────────────────────
    const TASK_STATUS_OPTS = ["Pending","In Progress","Done"];
    const TASK_STATUS_CFG = {
      "Pending":    { bg:"bg-gray-100",    text:"text-gray-600" },
      "In Progress":{ bg:"bg-blue-100",    text:"text-blue-600" },
      "Done":       { bg:"bg-emerald-100", text:"text-emerald-700" },
    };
    function StaffMultiSelect({ value, onChange }) {
      const [open, setOpen] = useState(false);
      const STAFF = React.useContext(StaffCtx); // reactive brewery staff from context
      const arr = Array.isArray(value) ? value : (value ? [value] : []);
      return (
        <div className="relative">
          <button type="button" onClick={() => setOpen(o => !o)}
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-left flex items-start justify-between min-h-[38px] gap-2 focus:outline-none focus:ring-2 focus:ring-amber-300">
            {arr.length === 0
              ? <span className="text-gray-400 self-center">— Unassigned —</span>
              : <div className="flex flex-wrap gap-1 flex-1">
                  {arr.map(s => (
                    <span key={s} className="inline-flex items-center gap-0.5 px-2 py-0.5 bg-amber-100 text-amber-700 rounded-full text-xs font-medium">
                      {s}
                      <button type="button" onClick={ev => { ev.stopPropagation(); onChange(arr.filter(x => x !== s)); }}
                        className="ml-0.5 text-amber-400 hover:text-red-500 leading-none font-bold">&times;</button>
                    </span>
                  ))}
                </div>
            }
            <svg className="w-4 h-4 text-gray-400 shrink-0 self-center" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/></svg>
          </button>
          {open && (
            <div className="absolute top-full left-0 right-0 z-30 bg-white border border-gray-200 rounded-lg shadow-xl mt-1 max-h-48 overflow-y-auto">
              {STAFF.map(s => (
                <label key={s} className="flex items-center gap-2.5 px-3 py-2 hover:bg-amber-50 cursor-pointer">
                  <input type="checkbox" checked={arr.includes(s)}
                    onChange={() => onChange(arr.includes(s) ? arr.filter(x => x !== s) : [...arr, s])}
                    className="w-3.5 h-3.5 accent-amber-500" />
                  <span className="text-sm text-gray-700">{s}</span>
                </label>
              ))}
              <div className="border-t border-gray-100 px-3 py-1.5">
                <button type="button" onClick={() => setOpen(false)} className="text-xs text-gray-400 hover:text-gray-600">Done</button>
              </div>
            </div>
          )}
        </div>
      );
    }
    function FermenterTimelineTab({ batches, batchTasks, setBatchTasks }) {
      const TODAY = useMemo(() => {
        const d = new Date(); d.setHours(0,0,0,0); return d;
      }, []);

      const BLANK_TASK_FORM = { is_batch:true, batch_id:"", fermenter:"", task:"", start_date:"", end_date:"", assigned_to:[], is_ot:false, ot_hours:"" };
      const BLANK_EDIT_FORM  = { task:"", start_date:"", end_date:"", assigned_to:[], is_ot:false, ot_hours:"", status:"Pending", remark:"" };
      const WIN_BACK = 84;
      const WIN_FWD  = 56;
      const [viewOffset, setViewOffset] = useState(0);
      const WIN_START = useMemo(() => {
        const d = new Date(TODAY); d.setDate(d.getDate() - WIN_BACK + viewOffset); return d;
      }, [TODAY, viewOffset]);
      const WIN_END = useMemo(() => {
        const d = new Date(TODAY); d.setDate(d.getDate() + WIN_FWD + viewOffset); return d;
      }, [TODAY, viewOffset]);
      const TOTAL_MS = WIN_END - WIN_START;

      const [mainView, setMainView]   = useState("tasks");       // "tasks" | "performance"
      const [taskListTab, setTaskListTab] = useState("active");  // "active" | "done"
      const [showAddTask, setShowAddTask] = useState(false);
      const [taskForm, setTaskForm]   = useState(BLANK_TASK_FORM);
      const [editTask, setEditTask]   = useState(null);
      const [editForm, setEditForm]   = useState(BLANK_EDIT_FORM);
      const [hoveredTask, setHoveredTask] = useState(null);

      // Monday-aligned week ticks
      const weeks = [];
      const cursor = new Date(WIN_START);
      cursor.setDate(cursor.getDate() - cursor.getDay() + 1);
      while (cursor <= WIN_END) {
        if (cursor >= WIN_START) weeks.push(new Date(cursor));
        cursor.setDate(cursor.getDate() + 7);
      }

      function pct(date) { return ((new Date(date) - WIN_START) / TOTAL_MS * 100).toFixed(2); }

      const BAR_COLOR = {
        Planned:"bg-indigo-200", Pending:"bg-gray-300", Brewing:"bg-amber-400", Fermenting:"bg-sky-400",
        Condition:"bg-violet-400", Ready:"bg-emerald-400", Filling:"bg-blue-400", Done:"bg-gray-200",
      };
      const TEXT_COLOR = {
        Planned:"text-indigo-700", Pending:"text-gray-600", Brewing:"text-white", Fermenting:"text-white",
        Condition:"text-white", Ready:"text-white", Filling:"text-white", Done:"text-gray-500",
      };
      const BAR_DASHED = { Planned: true };

      const TASK_PRESETS = ["Check gravity","Drain yeast","Cold crash","Add dry hops","Add hops","Dry hop","Rack beer","Take gravity","Clean tank","Fining/Gelatine","Cleaning Day"];
      const TASK_PIN_COLORS = ["bg-orange-400","bg-pink-400","bg-purple-400","bg-teal-400","bg-red-400","bg-yellow-500","bg-indigo-400","bg-lime-500","bg-cyan-500","bg-rose-400","bg-slate-400"];
      function taskPinColor(taskName) {
        const idx = TASK_PRESETS.indexOf(taskName);
        return idx >= 0 ? TASK_PIN_COLORS[idx] : "bg-orange-400";
      }

      const activeBatches = batches.filter(b => b.status !== "Done" && b.brew_day);
      const todayPct = parseFloat(pct(TODAY));

      // Resolve task dates (supports new start_date or legacy day field)
      function getTaskDate(t) {
        if (t.start_date) return new Date(t.start_date);
        const b = batches.find(x => x.batch_id === t.batch_id);
        if (!b?.brew_day) return null;
        const d = new Date(b.brew_day);
        d.setDate(d.getDate() + (t.day || 1) - 1);
        return d;
      }
      function getTaskEndDate(t) {
        if (t.end_date) return new Date(t.end_date);
        return getTaskDate(t);
      }
      // Backward-compat: assigned_to can be string (legacy) or array (new)
      function getAssignedStaff(t) {
        if (!t.assigned_to) return [];
        let val = t.assigned_to;
        // Google Sheets may store arrays as JSON strings e.g. '["Gent","Gunn"]'
        if (typeof val === "string") {
          const trimmed = val.trim();
          if (trimmed.startsWith("[")) {
            try { val = JSON.parse(trimmed); } catch(e) { /* keep as string */ }
          }
        }
        const arr = Array.isArray(val) ? val : [val];
        return arr.filter(s => s && String(s).trim() !== "");
      }



      // Selected batch for the add/edit modal
      const selectedBatch = useMemo(() => {
        if (!taskForm.is_batch || !taskForm.batch_id) return null;
        return batches.find(b => b.batch_id === taskForm.batch_id) || null;
      }, [taskForm.batch_id, taskForm.is_batch, batches]);

      const editTaskBatch = useMemo(() => {
        if (!editTask?.batch_id) return null;
        return batches.find(b => b.batch_id === editTask.batch_id) || null;
      }, [editTask, batches]);

      // All staff who appear in tasks (for performance table columns)
      const perfStaff = useMemo(() => {
        const s = new Set();
        batchTasks.forEach(t => getAssignedStaff(t).forEach(st => s.add(st)));
        return [...s].sort();
      }, [batchTasks]);

      // OT summary: group by YYYY-MM → staff → total OT hours
      const otSummary = useMemo(() => {
        const map = {};
        batchTasks.forEach(t => {
          if (!t.is_ot || !t.ot_hours) return;
          const staff = getAssignedStaff(t);
          if (!staff.length) return;
          const d = getTaskDate(t); if (!d) return;
          const ym = d.toISOString().slice(0, 7);
          if (!map[ym]) map[ym] = {};
          staff.forEach(s => { map[ym][s] = (map[ym][s] || 0) + (parseFloat(t.ot_hours) || 0); });
        });
        return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
      }, [batchTasks, batches]);

      // Completion summary: group by YYYY-MM → staff → { done, total }
      const completionSummary = useMemo(() => {
        const map = {};
        batchTasks.forEach(t => {
          const staff = getAssignedStaff(t);
          if (!staff.length) return;
          const d = getTaskDate(t); if (!d) return;
          const ym = d.toISOString().slice(0, 7);
          if (!map[ym]) map[ym] = {};
          const isDone = t.status === "Done";
          staff.forEach(s => {
            if (!map[ym][s]) map[ym][s] = { done:0, total:0 };
            map[ym][s].total++;
            if (isDone) map[ym][s].done++;
          });
        });
        return Object.entries(map).sort((a, b) => b[0].localeCompare(a[0]));
      }, [batchTasks, batches]);

      function handleAddTask(e) {
        e.preventDefault();
        if (!taskForm.task || !taskForm.start_date) return;
        if (taskForm.is_batch && !taskForm.batch_id) return;
        // Prevent exact duplicates (same batch + task + start_date)
        const dupSig = `${taskForm.is_batch ? taskForm.batch_id : ""}|${taskForm.task}|${taskForm.start_date}|${taskForm.fermenter || ""}`;
        const isDup = batchTasks.some(t => `${t.batch_id}|${t.task}|${t.start_date || t.day}|${t.fermenter || ""}` === dupSig);
        if (isDup) { alert("A task with the same batch, name, and start date already exists."); return; }
        const newId = batchTasks.length > 0 ? Math.max(...batchTasks.map(t => t.id)) + 1 : 1;
        setBatchTasks(prev => [...prev, {
          id: newId,
          batch_id: taskForm.is_batch ? taskForm.batch_id : "",
          fermenter: taskForm.is_batch ? "" : (taskForm.fermenter || ""),
          task: taskForm.task,
          start_date: taskForm.start_date,
          end_date: taskForm.end_date || taskForm.start_date,
          day: 1,
          assigned_to: Array.isArray(taskForm.assigned_to) ? taskForm.assigned_to : [],
          status: "Pending",
          remark: "",
          is_ot: !!taskForm.is_ot,
          ot_hours: taskForm.is_ot ? (parseFloat(taskForm.ot_hours) || 0) : 0,
        }]);
        setShowAddTask(false);
        setTaskForm(BLANK_TASK_FORM);
      }

      function handleDeleteTask(id) {
        setBatchTasks(prev => prev.filter(t => t.id !== id));
      }

      function handleUpdateTask(id, updates) {
        setBatchTasks(prev => prev.map(t => t.id === id ? { ...t, ...updates } : t));
      }

      function openEditTask(t) {
        setEditTask(t);
        setEditForm({
          task: t.task || "",
          start_date: t.start_date || "",
          end_date: t.end_date || t.start_date || "",
          assigned_to: getAssignedStaff(t),
          is_ot: !!t.is_ot,
          ot_hours: t.ot_hours || "",
          status: t.status || "Pending",
          remark: t.remark || "",
        });
      }

      function handleEditSave(e) {
        e.preventDefault();
        if (!editTask || !editForm.task || !editForm.start_date) return;
        handleUpdateTask(editTask.id, {
          task: editForm.task,
          start_date: editForm.start_date,
          end_date: editForm.end_date || editForm.start_date,
          assigned_to: Array.isArray(editForm.assigned_to) ? editForm.assigned_to : [],
          is_ot: !!editForm.is_ot,
          ot_hours: editForm.is_ot ? (parseFloat(editForm.ot_hours) || 0) : 0,
          status: editForm.status,
          remark: editForm.remark,
        });
        setEditTask(null);
      }

      return (
        <div className="space-y-5">

          {/* ── View toggle: Tasks ↔ Performance ── */}
          <div className="flex gap-1 bg-gray-100 p-1 rounded-xl w-fit">
            {[{id:"tasks",label:"📋 Tasks"},{id:"performance",label:"📊 Performance"}].map(v => (
              <button key={v.id} onClick={() => setMainView(v.id)}
                className={`px-4 py-1.5 rounded-lg text-sm font-medium transition-all whitespace-nowrap ${mainView===v.id ? "bg-white text-gray-800 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}>
                {v.label}
              </button>
            ))}
          </div>

          {/* ── PERFORMANCE VIEW ── */}
          {mainView === "performance" && (
            <div className="space-y-6">
              {/* OT Summary */}
              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="px-5 py-3 border-b border-gray-100">
                  <h3 className="font-semibold text-gray-800 text-sm flex items-center gap-2">
                    <span className="px-2 py-0.5 bg-orange-100 text-orange-600 rounded-full text-xs font-bold">OT</span>
                    Overtime by Month &amp; Staff
                  </h3>
                </div>
                {otSummary.length === 0 ? (
                  <p className="px-5 py-8 text-sm text-gray-400 text-center">No OT recorded yet. Assign OT tasks to see data here.</p>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="bg-gray-50/60 text-xs font-medium text-gray-500 uppercase tracking-wide">
                          <th className="px-4 py-2.5 text-left">Month</th>
                          {perfStaff.map(s => <th key={s} className="px-4 py-2.5 text-center whitespace-nowrap">{s}</th>)}
                          <th className="px-4 py-2.5 text-center font-bold">Total</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-50">
                        {otSummary.map(([ym, staffMap]) => {
                          const [yr, mo] = ym.split("-");
                          const mLabel = new Date(parseInt(yr), parseInt(mo)-1, 1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});
                          const total = perfStaff.reduce((s, st) => s + (staffMap[st] || 0), 0);
                          return (
                            <tr key={ym} className="hover:bg-orange-50/30">
                              <td className="px-4 py-2.5 font-medium text-gray-700">{mLabel}</td>
                              {perfStaff.map(s => (
                                <td key={s} className="px-4 py-2.5 text-center">
                                  {staffMap[s] ? <span className="text-orange-600 font-semibold">{staffMap[s]}d</span> : <span className="text-gray-300">—</span>}
                                </td>
                              ))}
                              <td className="px-4 py-2.5 text-center font-bold text-orange-700">{total}d</td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>

              {/* Task Completion Summary */}
              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="px-5 py-3 border-b border-gray-100">
                  <h3 className="font-semibold text-gray-800 text-sm flex items-center gap-2">
                    <span className="px-2 py-0.5 bg-emerald-100 text-emerald-700 rounded-full text-xs font-bold">✓</span>
                    Task Completion by Month &amp; Staff
                  </h3>
                </div>
                {completionSummary.length === 0 ? (
                  <p className="px-5 py-8 text-sm text-gray-400 text-center">No tasks found. Add tasks and assign them to staff to see performance data.</p>
                ) : (
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                      <thead>
                        <tr className="bg-gray-50/60 text-xs font-medium text-gray-500 uppercase tracking-wide">
                          <th className="px-4 py-2.5 text-left">Month</th>
                          {perfStaff.map(s => <th key={s} className="px-4 py-2.5 text-center whitespace-nowrap">{s}</th>)}
                          <th className="px-4 py-2.5 text-center font-bold">Total</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-50">
                        {completionSummary.map(([ym, staffMap]) => {
                          const [yr, mo] = ym.split("-");
                          const mLabel = new Date(parseInt(yr), parseInt(mo)-1, 1).toLocaleDateString("en-GB",{month:"long",year:"numeric"});
                          const tDone = perfStaff.reduce((s, st) => s + (staffMap[st]?.done || 0), 0);
                          const tAll  = perfStaff.reduce((s, st) => s + (staffMap[st]?.total || 0), 0);
                          return (
                            <tr key={ym} className="hover:bg-emerald-50/20">
                              <td className="px-4 py-2.5 font-medium text-gray-700">{mLabel}</td>
                              {perfStaff.map(s => {
                                const d = staffMap[s];
                                if (!d) return <td key={s} className="px-4 py-2.5 text-center"><span className="text-gray-300">—</span></td>;
                                const pct = d.total > 0 ? Math.round(d.done / d.total * 100) : 0;
                                return (
                                  <td key={s} className="px-4 py-2.5 text-center">
                                    <div className="flex flex-col items-center gap-1">
                                      <span className={`font-semibold text-sm ${d.done===d.total ? "text-emerald-600" : "text-gray-700"}`}>{d.done}/{d.total}</span>
                                      <div className="w-16 h-1.5 bg-gray-100 rounded-full overflow-hidden">
                                        <div className={`h-full rounded-full ${d.done===d.total ? "bg-emerald-400" : "bg-amber-400"}`} style={{width:`${pct}%`}}></div>
                                      </div>
                                    </div>
                                  </td>
                                );
                              })}
                              <td className="px-4 py-2.5 text-center">
                                <span className={`font-bold ${tDone===tAll ? "text-emerald-600" : "text-gray-700"}`}>{tDone}/{tAll}</span>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            </div>
          )}

          {mainView === "tasks" && (<>

          {/* Timeline header: navigation + legend + Add Task */}
          <div className="space-y-2">
            {/* Navigation row */}
            <div className="flex items-center gap-2 flex-wrap">
              <button
                onClick={() => setViewOffset(v => v - 28)}
                className="flex items-center gap-1 px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600 transition-colors shadow-sm"
              >
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                4 weeks
              </button>
              <button
                onClick={() => setViewOffset(v => v - 7)}
                className="flex items-center gap-1 px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600 transition-colors shadow-sm"
              >
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                1 week
              </button>
              {viewOffset !== 0 && (
                <button
                  onClick={() => setViewOffset(0)}
                  className="px-3 py-1.5 text-sm bg-red-50 border border-red-200 text-red-600 rounded-lg hover:bg-red-100 transition-colors font-medium shadow-sm"
                >
                  Jump to Today
                </button>
              )}
              <button
                onClick={() => setViewOffset(v => v + 7)}
                className="flex items-center gap-1 px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600 transition-colors shadow-sm"
              >
                1 week
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
              </button>
              <button
                onClick={() => setViewOffset(v => v + 28)}
                className="flex items-center gap-1 px-3 py-1.5 text-sm bg-white border border-gray-200 rounded-lg hover:bg-gray-50 text-gray-600 transition-colors shadow-sm"
              >
                4 weeks
                <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
              </button>
              <span className="ml-auto text-xs text-gray-400 bg-gray-50 border border-gray-100 rounded-lg px-3 py-1.5">
                {WIN_START.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})} — {WIN_END.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}
              </span>
              <button
                onClick={() => setShowAddTask(true)}
                className="px-3.5 py-1.5 bg-amber-500 text-white text-sm font-medium rounded-lg hover:bg-amber-600 transition-colors flex items-center gap-1.5 shadow-sm"
              >
                <span className="text-base leading-none font-bold">+</span> Add Task
              </button>
            </div>
            {/* Legend row */}
            <div className="flex flex-wrap gap-2 items-center">
              {Object.entries(BAR_COLOR).map(([s,c]) => (
                <span key={s} className="inline-flex items-center gap-1.5 text-xs text-gray-500">
                  <span className={`w-3 h-3 rounded ${c} ${BAR_DASHED[s] ? "border border-dashed border-indigo-400" : ""}`}></span>{s}
                </span>
              ))}
              <span className="inline-flex items-center gap-1.5 text-xs text-gray-500 ml-1">
                <span className="w-0.5 h-3 bg-red-400 inline-block"></span>Today
              </span>
              <span className="inline-flex items-center gap-1.5 text-xs text-gray-500 ml-1">
                <span className="w-2.5 h-2.5 rounded-full bg-orange-400 border-2 border-white shadow inline-block"></span>Task pin
              </span>
            </div>
          </div>

          {/* Gantt Chart */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div style={{overflowX:"auto"}}>
              <div style={{minWidth:"860px"}}>

                {/* Column header: week dates */}
                <div className="flex border-b border-gray-100 bg-gray-50/60">
                  <div className="shrink-0 w-14 px-3 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">Tank</div>
                  <div className="flex-1 relative h-8">
                    {weeks.map((w,i) => {
                      const l = parseFloat(pct(w));
                      if (l<0||l>100) return null;
                      return (
                        <div key={i} className="absolute top-0 h-full flex items-center" style={{left:`${l}%`}}>
                          <span className="text-xs text-gray-400 pl-1 whitespace-nowrap">
                            {w.toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}
                          </span>
                        </div>
                      );
                    })}
                    <div className="absolute top-0 h-full border-l-2 border-red-400" style={{left:`${todayPct}%`}}></div>
                  </div>
                </div>

                {/* Fermenter rows */}
                {FERMENTER_IDS.map((fid, ri) => {
                  const fBatches = batches.filter(b => b.fermenter === fid && b.brew_day && b.release_date);
                  const fStandaloneTasks = batchTasks.filter(t => !t.batch_id && t.fermenter === fid && t.start_date);
                  return (
                    <div key={fid} className={`flex border-b border-gray-50 ${ri%2===0?"":"bg-gray-50/30"}`} style={{minHeight:"52px"}}>
                      <div className="shrink-0 w-14 px-3 flex items-center">
                        <span className="font-mono text-xs font-bold text-gray-600">{fid}</span>
                      </div>
                      <div className="flex-1 relative" style={{paddingTop:"14px", paddingBottom:"6px"}}>
                        {weeks.map((w,i) => {
                          const l = parseFloat(pct(w)); if (l<0||l>100) return null;
                          return <div key={i} className="absolute top-0 h-full border-l border-gray-100" style={{left:`${l}%`}}></div>;
                        })}
                        <div className="absolute top-0 h-full border-l-2 border-red-300 z-20" style={{left:`${todayPct}%`}}></div>
                        {/* Standalone task bars */}
                        {fStandaloneTasks.map(t => {
                          const tS = new Date(t.start_date);
                          const tE = t.end_date ? new Date(t.end_date) : tS;
                          const rawL = (tS - WIN_START) / TOTAL_MS * 100;
                          const rawW = (Math.max(tE - tS, 0) + 86400000) / TOTAL_MS * 100;
                          const left = Math.max(0, rawL);
                          const width = Math.min(100 - left, rawW - Math.max(0, -rawL));
                          if (width <= 0) return null;
                          const pinC = taskPinColor(t.task);
                          return (
                            <div key={`st-${t.id}`} className="absolute z-10"
                              style={{left:`${left}%`, width:`${width}%`, top:"14px", bottom:"6px"}}>
                              <div title={`${t.task}\n${t.start_date}${t.end_date && t.end_date!==t.start_date?" → "+t.end_date:""}\n${t.assigned_to||"Unassigned"}`}
                                className={`absolute inset-0 rounded-md ${pinC} opacity-80 flex items-center px-1.5 overflow-hidden cursor-default`}>
                                <span className="text-white text-xs font-medium truncate">{t.task}</span>
                              </div>
                            </div>
                          );
                        })}
                        {/* Batch bars + task pins */}
                        {fBatches.map(b => {
                          const start  = new Date(b.brew_day);
                          const end    = new Date(b.release_date);
                          const spanMs = end - start;
                          const rawL   = (start - WIN_START) / TOTAL_MS * 100;
                          const rawW   = spanMs / TOTAL_MS * 100;
                          const left   = Math.max(0, rawL);
                          const width  = Math.min(100 - left, rawW - Math.max(0, -rawL));
                          if (width <= 0 || spanMs <= 0) return null;
                          const barC   = BAR_COLOR[b.status]  || BAR_COLOR.Done;
                          const textC  = TEXT_COLOR[b.status] || TEXT_COLOR.Done;
                          const isDashed = !!BAR_DASHED[b.status];
                          const bTasks = batchTasks.filter(t => t.batch_id === b.batch_id);
                          return (
                            <div key={b.id} className="absolute z-10"
                              style={{left:`${left}%`, width:`${width}%`, top:"14px", bottom:"6px"}}>
                              <div title={`Batch #${b.batch_id} · ${b.beer_name}\n${b.brew_day||"TBD"} → ${b.release_date||"TBD"} · ${b.status}`}
                                className={`absolute inset-0 rounded-lg ${barC} flex items-center px-2 overflow-hidden cursor-default ${isDashed ? "border-2 border-dashed border-indigo-400" : ""}`}>
                                <span className={`text-xs font-medium truncate ${textC}`}>#{b.batch_id} {b.beer_name}</span>
                              </div>
                              {bTasks.map(t => {
                                const taskD = getTaskDate(t);
                                if (!taskD) return null;
                                const relPct = ((taskD - start) / spanMs * 100);
                                if (relPct < 0 || relPct > 100) return null;
                                const pinC = taskPinColor(t.task);
                                const dateStr = taskD.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short",year:"numeric"});
                                const isHovered = hoveredTask && hoveredTask.id === t.id;
                                const isDone = t.status === "Done";
                                return (
                                  <div key={t.id} className="absolute z-30 -top-2 transform -translate-x-1/2"
                                    style={{left:`${relPct.toFixed(2)}%`}}
                                    onMouseEnter={e => {
                                      const rect = e.currentTarget.getBoundingClientRect();
                                      setHoveredTask({ id: t.id, task: t.task, assigned_to: t.assigned_to, dateStr, pinC, rect, status: t.status });
                                    }}
                                    onMouseLeave={() => setHoveredTask(null)}>
                                    <div className={`w-3 h-3 rounded-full border-2 border-white shadow-md ${isDone ? "bg-emerald-400" : pinC} cursor-pointer transition-transform ${isHovered ? "scale-150" : "hover:scale-125"} ${isDone ? "opacity-60" : ""}`}></div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}

                {/* ── TBD row: unassigned planned batches + no-fermenter standalone tasks ── */}
                {(() => {
                  const plannedNoBatch = batches.filter(b =>
                    b.status === "Planned" && b.brew_day && b.release_date &&
                    (!b.fermenter || b.fermenter === "TBD")
                  );
                  const floatingTasks = batchTasks.filter(t => !t.batch_id && !t.fermenter && t.start_date);
                  if (plannedNoBatch.length === 0 && floatingTasks.length === 0) return null;
                  return (
                    <div className="flex border-b border-gray-50 border-dashed bg-indigo-50/20" style={{minHeight:"52px"}}>
                      <div className="shrink-0 w-14 px-2 flex items-center">
                        <span className="font-mono text-xs font-bold text-indigo-400">TBD</span>
                      </div>
                      <div className="flex-1 relative" style={{paddingTop:"14px", paddingBottom:"6px"}}>
                        {weeks.map((w,i) => {
                          const l = parseFloat(pct(w)); if (l<0||l>100) return null;
                          return <div key={i} className="absolute top-0 h-full border-l border-indigo-100" style={{left:`${l}%`}}></div>;
                        })}
                        <div className="absolute top-0 h-full border-l-2 border-red-300 z-20" style={{left:`${todayPct}%`}}></div>
                        {plannedNoBatch.map(b => {
                          const start  = new Date(b.brew_day);
                          const end    = new Date(b.release_date);
                          const spanMs = end - start;
                          const rawL   = (start - WIN_START) / TOTAL_MS * 100;
                          const rawW   = spanMs / TOTAL_MS * 100;
                          const left   = Math.max(0, rawL);
                          const width  = Math.min(100 - left, rawW - Math.max(0, -rawL));
                          if (width <= 0 || spanMs <= 0) return null;
                          return (
                            <div key={b.id} className="absolute z-10"
                              style={{left:`${left}%`, width:`${width}%`, top:"14px", bottom:"6px"}}>
                              <div title={`Batch #${b.batch_id} · ${b.beer_name}\nPlanned: ${b.brew_day} → ${b.release_date}`}
                                className="absolute inset-0 rounded-lg bg-indigo-200 border-2 border-dashed border-indigo-400 flex items-center px-2 overflow-hidden cursor-default">
                                <span className="text-xs font-medium truncate text-indigo-700">#{b.batch_id} {b.beer_name}</span>
                              </div>
                            </div>
                          );
                        })}
                        {floatingTasks.map(t => {
                          const tS = new Date(t.start_date);
                          const tE = t.end_date ? new Date(t.end_date) : tS;
                          const rawL = (tS - WIN_START) / TOTAL_MS * 100;
                          const rawW = (Math.max(tE - tS, 0) + 86400000) / TOTAL_MS * 100;
                          const left = Math.max(0, rawL);
                          const width = Math.min(100 - left, rawW - Math.max(0, -rawL));
                          if (width <= 0) return null;
                          return (
                            <div key={`ft-${t.id}`} className="absolute z-10"
                              style={{left:`${left}%`, width:`${width}%`, top:"14px", bottom:"6px"}}>
                              <div title={`${t.task}\n${t.assigned_to||"Unassigned"}`}
                                className={`absolute inset-0 rounded-md ${taskPinColor(t.task)} opacity-80 flex items-center px-1.5 overflow-hidden`}>
                                <span className="text-white text-xs font-medium truncate">{t.task}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })()}

              </div>
            </div>
          </div>

          {/* Planned Tasks List */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            {/* Header + Active/Done tabs */}
            <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between flex-wrap gap-2">
              <div className="flex gap-1 bg-gray-100 p-1 rounded-xl">
                {[{id:"active",label:"Active"},{id:"done",label:"Done"}].map(tb => (
                  <button key={tb.id} onClick={() => setTaskListTab(tb.id)}
                    className={`px-3 py-1 rounded-lg text-xs font-medium transition-all ${taskListTab===tb.id ? "bg-white text-gray-800 shadow-sm" : "text-gray-500 hover:text-gray-700"}`}>
                    {tb.label}
                    <span className="ml-1.5 px-1.5 py-0.5 rounded-full text-xs font-bold
                      ${tb.id==='active' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}">
                      {batchTasks.filter(t => tb.id==="active" ? (t.status||"Pending")!=="Done" : t.status==="Done").length}
                    </span>
                  </button>
                ))}
              </div>
              <span className="text-xs text-gray-400">{batchTasks.length} task{batchTasks.length !== 1 ? "s" : ""} total</span>
            </div>
            {(() => {
              const filtered = batchTasks.filter(t =>
                taskListTab === "active" ? (t.status || "Pending") !== "Done" : t.status === "Done"
              );
              if (filtered.length === 0) return (
                <div className="px-5 py-8 text-center text-sm text-gray-400">
                  {taskListTab === "active"
                    ? <>No active tasks. Click <span className="font-semibold text-amber-600">+ Add Task</span> to schedule one.</>
                    : "No completed tasks yet."}
                </div>
              );
              // Group tasks (multi-staff) first, then individual staff A-Z, then Unassigned
              const byDate = (a, b) => (getTaskDate(a)?.getTime()||0) - (getTaskDate(b)?.getTime()||0);
              const groupTasks    = [...filtered].filter(t => getAssignedStaff(t).length > 1).sort(byDate);
              const soloTasks     = [...filtered].filter(t => getAssignedStaff(t).length === 1);
              const unassignedTs  = [...filtered].filter(t => getAssignedStaff(t).length === 0).sort(byDate);
              // Group solo tasks by staff name
              const soloByStaff = {};
              soloTasks.forEach(t => {
                const s = getAssignedStaff(t)[0];
                if (!soloByStaff[s]) soloByStaff[s] = [];
                soloByStaff[s].push(t);
              });
              const soloStaffNames = Object.keys(soloByStaff).sort();
              soloStaffNames.forEach(s => soloByStaff[s].sort(byDate));

              const renderRow = (t, rowBg) => {
                const batch = t.batch_id ? batches.find(x => x.batch_id === t.batch_id) : null;
                const tStart = getTaskDate(t);
                const tEnd   = getTaskEndDate(t);
                const fmtD = d => d ? d.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—";
                const pinC = taskPinColor(t.task);
                const sCfg = TASK_STATUS_CFG[t.status || "Pending"] || TASK_STATUS_CFG["Pending"];
                const staff = getAssignedStaff(t);
                return (
                  <tr key={t.id} className={`${rowBg} ${t.status==="Done" ? "opacity-60" : ""}`}>
                    <td className="px-4 py-2.5 font-mono text-xs text-gray-600">
                      {t.batch_id ? `#${t.batch_id}` : <span className="text-purple-500 font-semibold text-xs">Standalone</span>}
                    </td>
                    <td className="px-4 py-2.5 text-gray-700 max-w-[110px] truncate">
                      {batch ? batch.beer_name : (t.fermenter || <span className="text-gray-300">—</span>)}
                    </td>
                    <td className="px-4 py-2.5 whitespace-nowrap">
                      <span className="inline-flex items-center gap-1.5">
                        <span className={`w-2 h-2 rounded-full shrink-0 ${pinC}`}></span>
                        {t.task}
                        {t.is_ot && <span className="px-1.5 py-0.5 bg-orange-100 text-orange-600 rounded text-xs font-bold">OT</span>}
                      </span>
                    </td>
                    <td className="px-4 py-2.5 text-gray-600 whitespace-nowrap text-xs">{fmtD(tStart)}</td>
                    <td className="px-4 py-2.5 text-gray-500 whitespace-nowrap text-xs">{fmtD(tEnd)}</td>
                    <td className="px-4 py-2.5">
                      {staff.length > 0
                        ? <div className="flex flex-wrap gap-1">
                            {staff.map(s => <span key={s} className="px-2 py-0.5 bg-amber-50 text-amber-700 rounded-full text-xs font-medium whitespace-nowrap">{s}</span>)}
                          </div>
                        : <span className="text-gray-300 text-xs">—</span>}
                    </td>
                    <td className="px-4 py-2.5">
                      <select value={t.status || "Pending"}
                        onChange={e => handleUpdateTask(t.id, { status: e.target.value })}
                        className={`text-xs px-2 py-1 rounded-full border-0 font-medium cursor-pointer focus:outline-none focus:ring-1 focus:ring-offset-1 focus:ring-gray-300 ${sCfg.bg} ${sCfg.text}`}>
                        {TASK_STATUS_OPTS.map(s => <option key={s} value={s}>{s}</option>)}
                      </select>
                    </td>
                    <td className="px-4 py-2.5 text-center text-xs text-orange-600 font-semibold whitespace-nowrap">
                      {t.is_ot
                        ? (parseFloat(t.ot_hours) === 0.5 ? "Half Day" : parseFloat(t.ot_hours) === 1 ? "Full Day" : t.ot_hours > 0 ? `${t.ot_hours}d` : <span className="text-gray-300">—</span>)
                        : <span className="text-gray-300">—</span>}
                    </td>
                    <td className="px-4 py-2.5 min-w-[110px]">
                      <input type="text" value={t.remark || ""}
                        onChange={e => handleUpdateTask(t.id, { remark: e.target.value })}
                        placeholder="Add remark…"
                        className="w-full text-xs border-0 bg-transparent text-gray-600 placeholder-gray-300 focus:outline-none focus:ring-1 focus:ring-amber-300 rounded px-1" />
                    </td>
                    <td className="px-4 py-2.5 text-right whitespace-nowrap">
                      <div className="flex items-center justify-end gap-1.5">
                        <button onClick={() => openEditTask(t)}
                          className="text-xs text-blue-500 hover:text-blue-700 transition-colors px-2 py-0.5 rounded hover:bg-blue-50">Edit</button>
                        <button onClick={() => handleDeleteTask(t.id)}
                          className="text-xs text-red-400 hover:text-red-600 transition-colors px-2 py-0.5 rounded hover:bg-red-50">Delete</button>
                      </div>
                    </td>
                  </tr>
                );
              };

              const sectionHdr = (key, label, bgHdr, textColor, count) => (
                <tr key={`hdr-${key}`}>
                  <td colSpan={10} className={`px-4 py-1.5 ${bgHdr}`}>
                    <div className="flex items-center gap-2">
                      <span className={`text-xs font-bold uppercase tracking-widest ${textColor}`}>{label}</span>
                      <span className={`text-xs font-semibold ${textColor} opacity-60`}>({count})</span>
                    </div>
                  </td>
                </tr>
              );

              const rows = [];
              // ── Group Tasks ──
              if (groupTasks.length > 0) {
                rows.push(sectionHdr("group", "👥 Group Tasks", "bg-violet-100/70", "text-violet-700", groupTasks.length));
                groupTasks.forEach(t => rows.push(renderRow(t, "bg-violet-50/40 hover:bg-violet-50/70")));
              }
              // ── Individual staff ──
              soloStaffNames.forEach(s => {
                rows.push(sectionHdr(`staff-${s}`, `👤 ${s}`, "bg-amber-50/80", "text-amber-700", soloByStaff[s].length));
                soloByStaff[s].forEach(t => rows.push(renderRow(t, "hover:bg-amber-50/30")));
              });
              // ── Unassigned ──
              if (unassignedTs.length > 0) {
                rows.push(sectionHdr("unassigned", "⚪ Unassigned", "bg-gray-100/80", "text-gray-500", unassignedTs.length));
                unassignedTs.forEach(t => rows.push(renderRow(t, "bg-gray-50/50 hover:bg-gray-100/50")));
              }

              return (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="bg-gray-50/60 text-xs font-medium text-gray-500 uppercase tracking-wide">
                        <th className="px-4 py-2.5 text-left">Batch</th>
                        <th className="px-4 py-2.5 text-left">Beer / Lane</th>
                        <th className="px-4 py-2.5 text-left">Task</th>
                        <th className="px-4 py-2.5 text-left whitespace-nowrap">Start</th>
                        <th className="px-4 py-2.5 text-left whitespace-nowrap">End</th>
                        <th className="px-4 py-2.5 text-left">Assigned</th>
                        <th className="px-4 py-2.5 text-left">Status</th>
                        <th className="px-4 py-2.5 text-center">OT</th>
                        <th className="px-4 py-2.5 text-left">Remark</th>
                        <th className="px-4 py-2.5"></th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-50">{rows}</tbody>
                  </table>
                </div>
              );
            })()}
          </div>

          {/* Add Task Modal */}
          {showAddTask && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[92vh] overflow-y-auto">
                <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl z-10">
                  <h2 className="font-semibold text-gray-800">Add Planned Task</h2>
                  <button onClick={() => { setShowAddTask(false); setTaskForm(BLANK_TASK_FORM); }} className="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
                </div>
                <form onSubmit={handleAddTask} className="p-6 space-y-4">

                  {/* Batch / Standalone toggle */}
                  <div>
                    <label className="block text-xs font-medium text-gray-600 mb-1.5">Task Type</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button type="button" onClick={() => setTaskForm(f => ({...f, is_batch:true, fermenter:""}))}
                        className={`py-2 text-sm font-medium rounded-lg border transition-colors ${taskForm.is_batch ? "bg-amber-500 text-white border-amber-500" : "bg-white text-gray-600 border-gray-200 hover:bg-gray-50"}`}>
                        Linked to Batch
                      </button>
                      <button type="button" onClick={() => setTaskForm(f => ({...f, is_batch:false, batch_id:""}))}
                        className={`py-2 text-sm font-medium rounded-lg border transition-colors ${!taskForm.is_batch ? "bg-purple-500 text-white border-purple-500" : "bg-white text-gray-600 border-gray-200 hover:bg-gray-50"}`}>
                        Standalone
                      </button>
                    </div>
                  </div>

                  {/* Batch selector */}
                  {taskForm.is_batch && (
                    <div>
                      <label className="block text-xs font-medium text-gray-600 mb-1.5">Batch</label>
                      <select value={taskForm.batch_id}
                        onChange={e => {
                          const b = activeBatches.find(x => x.batch_id === e.target.value);
                          setTaskForm(f => ({...f, batch_id: e.target.value,
                            start_date: b?.brew_day || f.start_date,
                            end_date: b?.brew_day || f.end_date,
                          }));
                        }}
                        required={taskForm.is_batch}
                        className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300">
                        <option value="">Select batch…</option>
                        {activeBatches.map(b => (
                          <option key={b.batch_id} value={b.batch_id}>#{b.batch_id} · {b.beer_name}{b.fermenter ? ` (${b.fermenter})` : ""}</option>
                        ))}
                      </select>
                      {selectedBatch && (
                        <p className="text-xs text-gray-400 mt-1">Batch period: <span className="text-amber-600 font-medium">{selectedBatch.brew_day}</span> → <span className="text-amber-600 font-medium">{selectedBatch.release_date || "TBD"}</span></p>
                      )}
                    </div>
                  )}

                  {/* Fermenter lane (standalone) */}
                  {!taskForm.is_batch && (
                    <div>
