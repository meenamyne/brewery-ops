<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UPB Work Scheduler</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .table-scroll { overflow-x: auto; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }
    .day-panel { animation: slideIn 0.2s ease-out; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const GOOGLE_CLIENT_ID = "787778307584-v1bfnkpnfgu9j1ueni9mi97chlpdu2ec.apps.googleusercontent.com";
    const SHEET_ID         = "1k7HErQWTGnEJ_wKTqge7kwfuMOOZM9V4Kj7aAYi-4g4";
    const OFFLINE_MODE     = !GOOGLE_CLIENT_ID || GOOGLE_CLIENT_ID.includes("PASTE");
    const STORAGE_KEY      = "upb_scheduler_user";
    const PAGE_SIZE        = 35;

    const BRANCHES     = [{ id:"HQ", label:"UPB HQ" }, { id:"LC", label:"UPB Lake Club" }];
    const ROLES        = ["Cashier","Bar","Service","Host"];
    const AVAIL_STATUS = ["Yes","Off","Leave","Unavailable"];

    // ─── SHEET COLUMNS ────────────────────────────────────────────────────────
    const SHEET_COLS = {
      Employees:    ["emp_id","name","role","hq_eligible","lc_eligible","max_days_per_week","active"],
      Demand:       ["date","day","hq_needed","lc_needed"],
      Availability: ["emp_id","date","status"],
      Schedule:     ["id","date","branch","emp_id","recorded_by"],
      Holidays:     ["id","date","name","closed_hq","closed_lc"],
    };

    // ─── GOOGLE SHEETS API ────────────────────────────────────────────────────
    let _gTok = null;

    async function gFetch(method, path, body) {
      const base = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;
      const res = await fetch(base + path, {
        method,
        headers: { Authorization:`Bearer ${_gTok}`, "Content-Type":"application/json" },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function sheetsLoadAll() {
      const names = Object.keys(SHEET_COLS);
      const qp = names.map(n => `ranges=${encodeURIComponent(n+"!A1:Z")}`).join("&");
      const { valueRanges } = await gFetch("GET", `/values:batchGet?${qp}`);
      const out = {};
      valueRanges.forEach((vr, i) => {
        const name = names[i];
        const cols = SHEET_COLS[name];
        const [, ...rows] = vr.values || [[]];
        out[name] = rows
          .map(r => { const o={}; cols.forEach((c,ci)=>{ o[c]=r[ci]??""; }); return o; })
          .filter(o => o[cols[0]]);
      });
      return out;
    }

    async function sheetsSave(name, items) {
      const cols = SHEET_COLS[name];
      const values = [cols, ...items.map(item => cols.map(c => { const v=item[c]; if(v==null)return""; return String(v); }))];
      await gFetch("PUT", `/values/${encodeURIComponent(name+"!A1")}?valueInputOption=RAW`, {
        range: name+"!A1", majorDimension:"ROWS", values,
      });
    }

    async function ensureSheetsExist() {
      const meta = await gFetch("GET", "?fields=sheets.properties.title");
      const existing = new Set((meta.sheets||[]).map(s=>s.properties.title));
      const missing = Object.keys(SHEET_COLS).filter(n=>!existing.has(n));
      if (!missing.length) return;
      await gFetch("POST", ":batchUpdate", {
        requests: missing.map(title => ({ addSheet:{ properties:{ title } } }))
      });
    }

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    // Always use local calendar date — never toISOString() which converts to UTC
    function toLocalDateStr(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }
    const TODAY      = toLocalDateStr(new Date());
    const THIS_YEAR  = new Date().getFullYear();
    const THIS_MONTH = new Date().getMonth() + 1;

    function fmt(d) {
      if (!d) return "—";
      return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
    }
    function fmtShort(d) {
      if (!d) return "";
      return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
    }
    function getMonthDays(year, month) {
      const days=[]; const d=new Date(year,month-1,1);
      while(d.getMonth()===month-1){ days.push(toLocalDateStr(d)); d.setDate(d.getDate()+1); }
      return days;
    }
    function getWeekStart(dateStr) {
      const d=new Date(dateStr+"T00:00:00"); const day=d.getDay();
      const diff=day===0?-6:1-day; d.setDate(d.getDate()+diff);
      return toLocalDateStr(d);
    }
    function getWeekDates(dateStr) {
      const ws=getWeekStart(dateStr);
      return Array.from({length:7},(_,i)=>{ const d=new Date(ws+"T00:00:00"); d.setDate(d.getDate()+i); return toLocalDateStr(d); });
    }
    function getDayName(dateStr) {
      return new Date(dateStr+"T00:00:00").toLocaleDateString("en-US",{weekday:"short"});
    }
    function generateId() { return String(Date.now()+Math.floor(Math.random()*1000)); }
    function generateEmpId(employees) {
      const nums=employees.map(e=>parseInt(e.emp_id?.replace(/\D/g,""))||0);
      return `E${String((nums.length?Math.max(...nums):0)+1).padStart(3,"0")}`;
    }

    // ─── AUTO-SAVE HOOK ───────────────────────────────────────────────────────
    function useSave(name, data, ready) {
      const timer=useRef(null); const prev=useRef(null);
      useEffect(()=>{
        if(!ready||OFFLINE_MODE) return;
        const json=JSON.stringify(data);
        if(json===prev.current) return;
        prev.current=json;
        clearTimeout(timer.current);
        timer.current=setTimeout(()=>sheetsSave(name,data).catch(console.error),1800);
      },[data,ready]);
    }

    // ─── SAMPLE DATA ─────────────────────────────────────────────────────────
    const SAMPLE_EMPLOYEES = [
      {emp_id:"E001",name:"Alice Suwannee",  role:"Cashier",hq_eligible:"Yes",lc_eligible:"Yes",max_days_per_week:"5",active:"Yes"},
      {emp_id:"E002",name:"Bob Tanaka",       role:"Bar",    hq_eligible:"Yes",lc_eligible:"Yes",max_days_per_week:"5",active:"Yes"},
      {emp_id:"E003",name:"Cathy Malee",      role:"Service",hq_eligible:"Yes",lc_eligible:"No", max_days_per_week:"4",active:"Yes"},
      {emp_id:"E004",name:"David Petcharat",  role:"Host",   hq_eligible:"No", lc_eligible:"Yes",max_days_per_week:"5",active:"Yes"},
      {emp_id:"E005",name:"Emma Siriporn",    role:"Service",hq_eligible:"Yes",lc_eligible:"Yes",max_days_per_week:"6",active:"Yes"},
    ];

    // ─── SHARED UI ────────────────────────────────────────────────────────────
    const inputCls = "w-full border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent bg-white";

    function Modal({ title, onClose, children, wide }) {
      return (
        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4"
          onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className={`bg-white rounded-2xl shadow-2xl w-full ${wide?"max-w-2xl":"max-w-md"} max-h-[90vh] flex flex-col`}>
            <div className="flex items-center justify-between px-6 py-4 border-b border-gray-100 shrink-0">
              <h3 className="font-semibold text-gray-800">{title}</h3>
              <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            <div className="overflow-y-auto p-6">{children}</div>
          </div>
        </div>
      );
    }

    function Field({ label, children }) {
      return (
        <div>
          <label className="block text-xs font-medium text-gray-500 mb-1.5 uppercase tracking-wide">{label}</label>
          {children}
        </div>
      );
    }

    function RoleBadge({ role }) {
      const map={Cashier:"bg-purple-50 text-purple-600",Bar:"bg-amber-50 text-amber-600",Service:"bg-teal-50 text-teal-600",Host:"bg-pink-50 text-pink-600"};
      return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${map[role]||"bg-gray-100 text-gray-500"}`}>{role}</span>;
    }

    function AvailBadge({ status }) {
      const map={Yes:"bg-emerald-50 text-emerald-600",Off:"bg-gray-100 text-gray-500",Leave:"bg-blue-50 text-blue-500",Unavailable:"bg-red-50 text-red-500"};
      return <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${map[status]||"bg-gray-100 text-gray-400"}`}>{status||"—"}</span>;
    }

    // ─── PAGINATION COMPONENT ─────────────────────────────────────────────────
    function Pagination({ page, total, perPage, onPage }) {
      const totalPages = Math.max(1, Math.ceil(total / perPage));
      if (totalPages <= 1) return null;
      const start = (page-1)*perPage + 1;
      const end   = Math.min(page*perPage, total);
      // Build page number array with ellipsis
      function pageNums() {
        const nums = [];
        for (let p=1; p<=totalPages; p++) {
          if (p===1||p===totalPages||Math.abs(p-page)<=1) nums.push(p);
          else if (nums[nums.length-1]!=="…") nums.push("…");
        }
        return nums;
      }
      return (
        <div className="flex items-center justify-between px-4 py-3 border-t border-gray-100 bg-gray-50/40">
          <span className="text-xs text-gray-400">Showing {start}–{end} of {total}</span>
          <div className="flex items-center gap-1">
            <button onClick={()=>onPage(page-1)} disabled={page===1}
              className="px-2.5 py-1.5 text-xs rounded-lg border border-gray-200 text-gray-600 disabled:opacity-30 hover:bg-gray-100 transition-colors">
              ← Prev
            </button>
            {pageNums().map((p,i)=>
              p==="…"
                ? <span key={`e${i}`} className="px-1 text-gray-300 text-xs">…</span>
                : <button key={p} onClick={()=>onPage(p)}
                    className={`w-8 h-8 text-xs rounded-lg transition-colors ${p===page?"bg-teal-500 text-white shadow-sm":"border border-gray-200 text-gray-600 hover:bg-gray-100"}`}>
                    {p}
                  </button>
            )}
            <button onClick={()=>onPage(page+1)} disabled={page===totalPages}
              className="px-2.5 py-1.5 text-xs rounded-lg border border-gray-200 text-gray-600 disabled:opacity-30 hover:bg-gray-100 transition-colors">
              Next →
            </button>
          </div>
        </div>
      );
    }

    // ─── NAVIGATION ───────────────────────────────────────────────────────────
    const NAV = [
      { id:"calendar",     label:"Schedule",     icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg> },
      { id:"availability", label:"Availability", icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> },
      { id:"demand",       label:"Demand",       icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg> },
      { id:"holidays",     label:"Holidays",     icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>, dividerAfter:true },
      { id:"employees",    label:"Employees",    icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg> },
      { id:"summary",        label:"Summary",        icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> },
      { id:"branch-summary", label:"Branch View",    icon:<svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M3 14h18M10 3v18M14 3v18"/></svg> },
    ];

    // ─── SIDEBAR ──────────────────────────────────────────────────────────────
    function Sidebar({ page, setPage, user, onSignOut }) {
      return (
        <div className="w-56 shrink-0 bg-white border-r border-gray-100 flex flex-col h-full">
          <div className="px-5 py-5 border-b border-gray-100">
            <div className="flex items-center gap-2.5">
              <div className="w-8 h-8 rounded-xl bg-teal-500 flex items-center justify-center shrink-0">
                <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <div>
                <p className="text-sm font-bold text-gray-800">UPB Scheduler</p>
                <p className="text-xs text-gray-400">Work Planner</p>
              </div>
            </div>
          </div>
          <nav className="flex-1 px-3 py-4 space-y-0.5 overflow-y-auto">
            {NAV.map(item => (
              <React.Fragment key={item.id}>
                <button onClick={()=>setPage(item.id)}
                  className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-all
                    ${page===item.id?"bg-teal-50 text-teal-700":"text-gray-500 hover:bg-gray-50 hover:text-gray-700"}`}>
                  <span className={page===item.id?"text-teal-500":"text-gray-400"}>{item.icon}</span>
                  {item.label}
                </button>
                {item.dividerAfter && <div className="h-px bg-gray-100 my-1.5 mx-1"/>}
              </React.Fragment>
            ))}
          </nav>
          {user && (
            <div className="px-3 py-4 border-t border-gray-100 shrink-0">
              <div className="flex items-center gap-2.5 px-3 py-2 rounded-xl bg-gray-50">
                {user.picture
                  ? <img src={user.picture} className="w-7 h-7 rounded-full shrink-0" alt=""/>
                  : <div className="w-7 h-7 rounded-full bg-teal-200 flex items-center justify-center text-xs font-bold text-teal-700 shrink-0">{user.name?.[0]}</div>
                }
                <div className="flex-1 min-w-0">
                  <p className="text-xs font-medium text-gray-700 truncate">{user.name}</p>
                  <p className="text-xs text-gray-400 truncate">{user.email}</p>
                </div>
              </div>
              <button onClick={onSignOut} className="w-full mt-2 text-xs text-gray-400 hover:text-red-400 py-1.5 text-left px-3 transition-colors">Sign out</button>
            </div>
          )}
        </div>
      );
    }

    // ─── DAY PANEL ────────────────────────────────────────────────────────────
    function DayPanel({ dateStr, onClose, employees, demandMap, scheduleMap, availMap, schedule, setSchedule, user, holidays }) {
      const [addingBranch, setAddingBranch] = useState(null);
      const [empSearch,    setEmpSearch]    = useState("");
      const [roleFilter,   setRoleFilter]   = useState("All");
      const [selected,     setSelected]     = useState(new Set()); // checked emp_ids

      const demand   = demandMap[dateStr] || {};
      const sched    = scheduleMap[dateStr] || { HQ:[], LC:[] };
      const hqNeeded = parseInt(demand.hq_needed) || 0;
      const lcNeeded = parseInt(demand.lc_needed)  || 0;

      const holiday = useMemo(()=>holidays.find(h=>h.date===dateStr), [holidays, dateStr]);
      const empMap  = useMemo(()=>{ const m={}; employees.forEach(e=>{m[e.emp_id]=e;}); return m; }, [employees]);

      // Reset selection whenever the branch picker changes
      useEffect(()=>setSelected(new Set()), [addingBranch]);

      function canAssign(emp, branch) {
        if (emp.active!=="Yes") return {ok:false,reason:"Inactive"};
        if (branch==="HQ"&&emp.hq_eligible!=="Yes") return {ok:false,reason:"Not HQ eligible"};
        if (branch==="LC"&&emp.lc_eligible!=="Yes")  return {ok:false,reason:"Not LC eligible"};
        const avail=availMap[emp.emp_id]?.[dateStr];
        if (avail&&avail!=="Yes") return {ok:false,reason:avail};
        const other=branch==="HQ"?"LC":"HQ";
        if (sched[other]?.some(x=>x.emp_id===emp.emp_id)) return {ok:false,reason:"At other branch"};
        if (sched[branch]?.some(x=>x.emp_id===emp.emp_id)) return {ok:false,reason:"Already assigned"};
        const weekDates=getWeekDates(dateStr);
        const weekCount=schedule.filter(x=>x.emp_id===emp.emp_id&&weekDates.includes(x.date)).length;
        const maxDays=parseInt(emp.max_days_per_week)||6;
        if (weekCount>=maxDays) return {ok:false,reason:`Max ${maxDays}d/wk`};
        return {ok:true};
      }

      function toggleSelect(empId) {
        setSelected(prev=>{ const n=new Set(prev); n.has(empId)?n.delete(empId):n.add(empId); return n; });
      }

      function assignSelected(branch) {
        const toAssign=[...selected]
          .map(id=>employees.find(e=>e.emp_id===id))
          .filter(emp=>emp&&canAssign(emp,branch).ok);
        if(!toAssign.length) return;
        const now=Date.now();
        setSchedule(prev=>[...prev,...toAssign.map((emp,i)=>({
          id:String(now+i), date:dateStr, branch,
          emp_id:emp.emp_id, recorded_by:user?.name||"Manager",
        }))]);
        setAddingBranch(null); setEmpSearch(""); setSelected(new Set());
      }

      function unassign(id) { setSchedule(prev=>prev.filter(x=>x.id!==id)); }

      function selectAllEligible(branch) {
        const eligible=pool.filter(e=>canAssign(e,branch).ok).map(e=>e.emp_id);
        setSelected(new Set(eligible));
      }

      const pool = employees.filter(e=>{
        if (e.active!=="Yes") return false;
        if (empSearch&&!e.name.toLowerCase().includes(empSearch.toLowerCase())) return false;
        if (roleFilter!=="All"&&e.role!==roleFilter) return false;
        return true;
      });

      const dayLabel = new Date(dateStr+"T00:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

      return (
        <div className="day-panel fixed right-0 top-0 h-full w-96 bg-white border-l border-gray-100 shadow-2xl z-40 flex flex-col">
          <div className="px-5 py-4 border-b border-gray-100 shrink-0">
            <div className="flex items-center justify-between">
              <div>
                <p className="text-xs text-gray-400 uppercase tracking-wide font-medium">Day Detail</p>
                <h2 className="text-sm font-semibold text-gray-800 mt-0.5">{dayLabel}</h2>
              </div>
              <button onClick={onClose} className="p-1.5 rounded-lg text-gray-400 hover:text-gray-600 hover:bg-gray-100 transition-colors">
                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </div>

          <div className="flex-1 overflow-y-auto p-5 space-y-4">
            {/* Holiday banner */}
            {holiday&&(
              <div className={`rounded-xl p-3 text-xs font-medium border
                ${(holiday.closed_hq==="Yes"||holiday.closed_lc==="Yes")
                  ? "bg-red-50 border-red-200 text-red-700"
                  : "bg-purple-50 border-purple-200 text-purple-700"}`}>
                🎌 <strong>{holiday.name}</strong>
                {(holiday.closed_hq==="Yes"||holiday.closed_lc==="Yes")&&(
                  <span className="ml-1">— Closed:
                    {holiday.closed_hq==="Yes"?" HQ":""}
                    {holiday.closed_hq==="Yes"&&holiday.closed_lc==="Yes"?" &":""}
                    {holiday.closed_lc==="Yes"?" Lake Club":""}
                  </span>
                )}
              </div>
            )}
            {!demand.date&&!holiday&&(
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-xs text-amber-700">
                ⚠ No headcount demand set for this date.
              </div>
            )}

            {BRANCHES.map(br=>{
              const brId     = br.id;
              const needed   = brId==="HQ"?hqNeeded:lcNeeded;
              const assigned = sched[brId]||[];
              const filled   = assigned.length;
              const isAdding = addingBranch===brId;
              const isClosed = (brId==="HQ"&&holiday?.closed_hq==="Yes")||(brId==="LC"&&holiday?.closed_lc==="Yes");
              const fillColor= filled>=needed&&needed>0?"text-emerald-600":filled===0&&needed>0?"text-red-500":needed>0?"text-amber-600":"text-gray-400";
              const eligibleInPool = pool.filter(e=>canAssign(e,brId).ok).length;
              const selectedCount  = [...selected].filter(id=>{ const e=employees.find(x=>x.emp_id===id); return e&&canAssign(e,brId).ok; }).length;

              return (
                <div key={brId} className={`rounded-2xl p-4 space-y-3 ${isClosed?"bg-red-50 border border-red-100":"bg-gray-50"}`}>
                  {/* Branch header */}
                  <div className="flex items-center justify-between">
                    <div>
                      <p className="text-sm font-semibold text-gray-700">{br.label}</p>
                      {isClosed
                        ? <p className="text-xs text-red-500 font-medium mt-0.5">Closed (Holiday)</p>
                        : <p className={`text-xs font-medium mt-0.5 ${fillColor}`}>{filled} / {needed>0?needed:"?"} filled</p>
                      }
                    </div>
                    {!isAdding&&!isClosed&&(
                      <button onClick={()=>{setAddingBranch(brId);setEmpSearch("");setRoleFilter("All");}}
                        className="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-teal-600 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">
                        <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
                        Add Staff
                      </button>
                    )}
                  </div>

                  {/* Already assigned */}
                  {assigned.length>0?(
                    <div className="space-y-1.5">
                      {assigned.map(a=>{
                        const emp=empMap[a.emp_id]; if(!emp)return null;
                        return (
                          <div key={a.id} className="flex items-center justify-between bg-white rounded-xl px-3 py-2 border border-gray-100">
                            <div className="flex items-center gap-2 min-w-0">
                              <div className="w-7 h-7 rounded-full bg-teal-100 flex items-center justify-center shrink-0">
                                <span className="text-xs font-bold text-teal-600">{emp.name[0]}</span>
                              </div>
                              <div className="min-w-0">
                                <p className="text-xs font-medium text-gray-700 truncate">{emp.name}</p>
                                <RoleBadge role={emp.role}/>
                              </div>
                            </div>
                            <button onClick={()=>unassign(a.id)} className="text-gray-300 hover:text-red-400 transition-colors shrink-0 ml-2 p-1">
                              <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  ):(
                    !isClosed&&<p className="text-xs text-gray-400 text-center py-1">No staff assigned yet</p>
                  )}

                  {/* Multi-select picker */}
                  {isAdding&&(
                    <div className="space-y-2 border-t border-gray-200 pt-3">
                      {/* Search + filter row */}
                      <div className="flex gap-2 items-center">
                        <input value={empSearch} onChange={e=>setEmpSearch(e.target.value)}
                          placeholder="Search name…" autoFocus
                          className="flex-1 border border-gray-200 rounded-lg px-2.5 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-teal-400"/>
                        <select value={roleFilter} onChange={e=>setRoleFilter(e.target.value)}
                          className="border border-gray-200 rounded-lg px-2 py-1.5 text-xs bg-white text-gray-600 focus:outline-none">
                          <option value="All">All</option>
                          {ROLES.map(r=><option key={r}>{r}</option>)}
                        </select>
                        <button onClick={()=>{setAddingBranch(null);setEmpSearch("");}} className="p-1 text-gray-400 hover:text-gray-600">
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                      </div>
                      {/* Select-all helper */}
                      {eligibleInPool>0&&(
                        <div className="flex items-center justify-between px-1">
                          <span className="text-xs text-gray-400">{eligibleInPool} eligible · {selectedCount} selected</span>
                          <button onClick={()=>selectAllEligible(brId)}
                            className="text-xs text-teal-500 hover:text-teal-700 font-medium transition-colors">
                            Select all eligible
                          </button>
                        </div>
                      )}
                      {/* Employee list with checkboxes */}
                      <div className="space-y-1 max-h-52 overflow-y-auto pr-1">
                        {pool.length===0
                          ? <p className="text-xs text-gray-400 text-center py-3">No employees match</p>
                          : pool.map(emp=>{
                              const check   = canAssign(emp,brId);
                              const avail   = availMap[emp.emp_id]?.[dateStr]||"Yes";
                              const checked = selected.has(emp.emp_id);
                              return (
                                <label key={emp.emp_id}
                                  className={`flex items-center gap-2.5 px-3 py-2 rounded-xl transition-colors border select-none
                                    ${!check.ok
                                      ? "bg-gray-50/80 border-gray-100 opacity-50 cursor-not-allowed"
                                      : checked
                                        ? "bg-teal-50 border-teal-200 cursor-pointer"
                                        : "bg-white border-gray-100 hover:bg-gray-50 cursor-pointer"}`}>
                                  <input type="checkbox" checked={checked} disabled={!check.ok}
                                    onChange={()=>check.ok&&toggleSelect(emp.emp_id)}
                                    className="rounded accent-teal-500 shrink-0" />
                                  <div className={`w-6 h-6 rounded-full flex items-center justify-center shrink-0 text-xs font-bold
                                    ${check.ok?(checked?"bg-teal-200 text-teal-700":"bg-teal-100 text-teal-600"):"bg-gray-100 text-gray-400"}`}>
                                    {emp.name[0]}
                                  </div>
                                  <div className="flex-1 min-w-0">
                                    <p className="text-xs font-medium text-gray-700 truncate">{emp.name}</p>
                                    <RoleBadge role={emp.role}/>
                                  </div>
                                  <div className="shrink-0">
                                    {check.ok
                                      ? <AvailBadge status={avail}/>
                                      : <span className="text-xs text-red-400 whitespace-nowrap">{check.reason}</span>
                                    }
                                  </div>
                                </label>
                              );
                            })
                        }
                      </div>
                      {/* Assign button */}
                      <button
                        onClick={()=>assignSelected(brId)}
                        disabled={selectedCount===0}
                        className={`w-full py-2.5 text-xs font-semibold rounded-xl transition-colors
                          ${selectedCount>0
                            ? "bg-teal-500 hover:bg-teal-600 text-white shadow-sm"
                            : "bg-gray-100 text-gray-400 cursor-not-allowed"}`}>
                        {selectedCount>0
                          ? `Assign ${selectedCount} staff to ${br.label}`
                          : "Check employees above to assign"}
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ─── CALENDAR PAGE ────────────────────────────────────────────────────────
    function CalendarPage({ employees, demand, availability, schedule, setSchedule, month, year, setMonth, setYear, user, holidays }) {
      const [selectedDay, setSelectedDay] = useState(null);

      const scheduleMap = useMemo(()=>{
        const m={};
        schedule.forEach(s=>{ if(!m[s.date])m[s.date]={HQ:[],LC:[]}; if(s.branch==="HQ")m[s.date].HQ.push(s); else m[s.date].LC.push(s); });
        return m;
      },[schedule]);

      const demandMap = useMemo(()=>{ const m={}; demand.forEach(d=>{m[d.date]=d;}); return m; },[demand]);

      const availMap = useMemo(()=>{
        const m={};
        availability.forEach(a=>{ if(!m[a.emp_id])m[a.emp_id]={}; m[a.emp_id][a.date]=a.status; });
        return m;
      },[availability]);

      const holidayMap = useMemo(()=>{ const m={}; holidays.forEach(h=>{m[h.date]=h;}); return m; },[holidays]);

      const monthDays  = getMonthDays(year, month);
      const firstDow   = new Date(year,month-1,1).getDay();
      const padDays    = firstDow===0?6:firstDow-1;
      const monthLabel = new Date(year,month-1,1).toLocaleString("en-US",{month:"long",year:"numeric"});

      function prevMonth(){ if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1); }
      function nextMonth(){ if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1); }

      function dayBg(dateStr) {
        const hol = holidayMap[dateStr];
        const hqClosed = hol?.closed_hq==="Yes";
        const lcClosed = hol?.closed_lc==="Yes";
        // Both branches closed → full purple
        if (hqClosed && lcClosed) return "bg-purple-50 border-purple-200 hover:bg-purple-100";
        const d=demandMap[dateStr];
        const s=scheduleMap[dateStr];
        const hqF=s?.HQ?.length??0, lcF=s?.LC?.length??0;
        // For open branches only, compute staffing status
        const hqN=hqClosed?hqF:(parseInt(d?.hq_needed)||0);
        const lcN=lcClosed?lcF:(parseInt(d?.lc_needed)||0);
        if(!d&&!hol) return "bg-white border-gray-100 hover:bg-gray-50";
        if(hqF>=hqN&&lcF>=lcN&&(hqN+lcN)>0) return "bg-emerald-50 border-emerald-200 hover:bg-emerald-100";
        if((hqF===0&&hqN>0)||(lcF===0&&lcN>0)) return "bg-red-50 border-red-200 hover:bg-red-100";
        if((hqN+lcN)>0) return "bg-amber-50 border-amber-200 hover:bg-amber-100";
        return "bg-white border-gray-100 hover:bg-gray-50";
      }

      return (
        <div className="flex h-full relative">
          <div className={`flex-1 min-w-0 overflow-y-auto transition-all duration-200 ${selectedDay?"mr-96":""}`}>
            <div className="p-6 space-y-4">
              <div className="flex items-center justify-between flex-wrap gap-3">
                <div>
                  <h1 className="text-xl font-semibold text-gray-800">Work Schedule</h1>
                  <p className="text-sm text-gray-400 mt-0.5">Monthly roster · UPB HQ & Lake Club</p>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={prevMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                  </button>
                  <span className="text-sm font-semibold text-gray-700 w-36 text-center">{monthLabel}</span>
                  <button onClick={nextMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                  </button>
                  <button onClick={()=>{setMonth(THIS_MONTH);setYear(THIS_YEAR);}}
                    className="px-3 py-1.5 text-xs font-medium text-teal-600 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">Today</button>
                </div>
              </div>

              <div className="flex items-center gap-4 flex-wrap text-xs text-gray-500">
                {[
                  ["bg-emerald-100 border-emerald-200","Fully staffed"],
                  ["bg-amber-100 border-amber-200","Understaffed"],
                  ["bg-red-100 border-red-200","Critical / 0 assigned"],
                  ["bg-purple-100 border-purple-200","Holiday / Closed"],
                  ["bg-white border-gray-200","No demand set"],
                ].map(([cls,label])=>(
                  <span key={label} className="flex items-center gap-1.5">
                    <span className={`w-3 h-3 rounded border ${cls}`}></span>{label}
                  </span>
                ))}
              </div>

              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="grid grid-cols-7 border-b border-gray-100">
                  {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>(
                    <div key={d} className="px-2 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide text-center">{d}</div>
                  ))}
                </div>
                <div className="grid grid-cols-7">
                  {Array(padDays).fill(null).map((_,i)=>(
                    <div key={`p${i}`} className="min-h-24 border-b border-r border-gray-50 bg-gray-50/20"/>
                  ))}
                  {monthDays.map((dateStr,idx)=>{
                    const d=demandMap[dateStr]; const s=scheduleMap[dateStr];
                    const hqF=s?.HQ?.length??0, lcF=s?.LC?.length??0;
                    const hqN=parseInt(d?.hq_needed)||0, lcN=parseInt(d?.lc_needed)||0;
                    const dayNum=parseInt(dateStr.split("-")[2]);
                    const isToday=dateStr===TODAY; const isSel=selectedDay===dateStr;
                    const colIdx=(padDays+idx)%7; const isWE=colIdx>=5;
                    const hol=holidayMap[dateStr];
                    const hqColor=hqN===0?"text-gray-300":hqF>=hqN?"text-emerald-600":hqF===0?"text-red-500":"text-amber-600";
                    const lcColor=lcN===0?"text-gray-300":lcF>=lcN?"text-emerald-600":lcF===0?"text-red-500":"text-amber-600";
                    return (
                      <div key={dateStr} onClick={()=>setSelectedDay(isSel?null:dateStr)}
                        className={`min-h-24 border-b border-r border-gray-100 p-2 cursor-pointer transition-all select-none
                          ${dayBg(dateStr)} ${isSel?"ring-2 ring-inset ring-teal-400 !bg-teal-50":""} ${isWE?"opacity-80":""}`}>
                        <div className="flex items-start justify-between mb-1.5">
                          <span className={`text-sm font-semibold leading-none
                            ${isToday?"w-6 h-6 rounded-full bg-teal-500 text-white flex items-center justify-center text-xs":"text-gray-700"}`}>
                            {dayNum}
                          </span>
                          {hol&&<span className="text-xs text-purple-500 leading-none" title={hol.name}>🎌</span>}
                          {!hol&&isWE&&<span className="text-xs text-gray-400 leading-none">WE</span>}
                        </div>
                        {(hol?.closed_hq==="Yes"&&hol?.closed_lc==="Yes")?(
                          <p className="text-xs text-purple-600 font-medium leading-tight truncate">{hol.name}</p>
                        ):(
                          <div className="space-y-0.5">
                            {hol&&<p className="text-xs text-purple-600 font-medium leading-tight truncate mb-0.5">{hol.name}</p>}
                            {hol?.closed_hq==="Yes"?(
                              <div className="text-xs text-purple-400 italic leading-tight">HQ closed</div>
                            ):(hqN>0||hqF>0)?(
                              <div className={`text-xs flex items-center gap-1 ${hqColor}`}>
                                <span className="font-mono font-bold text-xs">{hqF}/{hqN}</span>
                                <span className="text-gray-400 text-xs">HQ</span>
                              </div>
                            ):null}
                            {hol?.closed_lc==="Yes"?(
                              <div className="text-xs text-purple-400 italic leading-tight">LC closed</div>
                            ):(lcN>0||lcF>0)?(
                              <div className={`text-xs flex items-center gap-1 ${lcColor}`}>
                                <span className="font-mono font-bold text-xs">{lcF}/{lcN}</span>
                                <span className="text-gray-400 text-xs">LC</span>
                              </div>
                            ):null}
                            {!hol&&hqN===0&&lcN===0&&hqF===0&&lcF===0&&(
                              <div className="text-xs text-gray-200">—</div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          {selectedDay&&(
            <DayPanel
              dateStr={selectedDay} onClose={()=>setSelectedDay(null)}
              employees={employees} demandMap={demandMap} scheduleMap={scheduleMap}
              availMap={availMap} schedule={schedule} setSchedule={setSchedule}
              user={user} holidays={holidays}
            />
          )}
        </div>
      );
    }

    // ─── EMPLOYEES PAGE (with pagination) ────────────────────────────────────
    function EmployeesPage({ employees, setEmployees }) {
      const [showModal,    setShowModal]    = useState(false);
      const [editTarget,   setEditTarget]   = useState(null);
      const [search,       setSearch]       = useState("");
      const [roleFilter,   setRoleFilter]   = useState("All");
      const [statusFilter, setStatusFilter] = useState("Active");
      const [page,         setPage]         = useState(1);

      const emptyForm = {emp_id:"",name:"",role:"Cashier",hq_eligible:"Yes",lc_eligible:"Yes",max_days_per_week:"5",active:"Yes"};
      const [form, setForm] = useState(emptyForm);
      const upd = (k,v) => setForm(f=>({...f,[k]:v}));

      function openAdd()  { setForm({...emptyForm,emp_id:generateEmpId(employees)}); setEditTarget(null); setShowModal(true); }
      function openEdit(e){ setForm({...e}); setEditTarget(e); setShowModal(true); }

      function handleSubmit(ev) {
        ev.preventDefault();
        if (editTarget) setEmployees(prev=>prev.map(e=>e.emp_id===editTarget.emp_id?form:e));
        else            setEmployees(prev=>[...prev,form]);
        setShowModal(false);
      }

      function toggleActive(emp) {
        setEmployees(prev=>prev.map(e=>e.emp_id===emp.emp_id?{...e,active:e.active==="Yes"?"No":"Yes"}:e));
      }

      const filtered = employees.filter(e=>{
        const q=search.toLowerCase();
        if(q&&!e.name.toLowerCase().includes(q)&&!e.emp_id.toLowerCase().includes(q)) return false;
        if(roleFilter!=="All"&&e.role!==roleFilter) return false;
        if(statusFilter==="Active"&&e.active!=="Yes") return false;
        if(statusFilter==="Inactive"&&e.active==="Yes") return false;
        return true;
      });

      // Reset page when filters change
      useEffect(()=>setPage(1),[search,roleFilter,statusFilter]);

      const totalPages = Math.ceil(filtered.length/PAGE_SIZE)||1;
      const paginated  = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

      return (
        <div className="p-6 space-y-5 overflow-y-auto h-full">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Employees</h1>
              <p className="text-sm text-gray-400 mt-0.5">{employees.filter(e=>e.active==="Yes").length} active · {employees.length} total</p>
            </div>
            <button onClick={openAdd} className="flex items-center gap-2 px-4 py-2.5 bg-teal-500 hover:bg-teal-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Add Employee
            </button>
          </div>

          <div className="flex flex-wrap gap-3">
            <div className="relative flex-1 min-w-48">
              <svg className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search name or ID…"
                className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400"/>
            </div>
            <select value={roleFilter} onChange={e=>setRoleFilter(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none">
              <option value="All">All Roles</option>
              {ROLES.map(r=><option key={r}>{r}</option>)}
            </select>
            <select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none">
              <option>Active</option><option>Inactive</option><option>All</option>
            </select>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden table-scroll">
            <table className="w-full text-sm min-w-max">
              <thead>
                <tr className="border-b border-gray-100 bg-gray-50/60">
                  {["ID","Name","Role","HQ Eligible","LC Eligible","Max Days/Wk","Status",""].map(h=>(
                    <th key={h} className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {paginated.length===0?(
                  <tr><td colSpan={8} className="text-center py-12 text-gray-400 text-sm">No employees found</td></tr>
                ):paginated.map((e,i)=>(
                  <tr key={e.emp_id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i%2===0?"":"bg-gray-50/40"}`}>
                    <td className="px-4 py-3 font-mono text-xs text-gray-400">{e.emp_id}</td>
                    <td className="px-4 py-3 font-medium text-gray-700">{e.name}</td>
                    <td className="px-4 py-3"><RoleBadge role={e.role}/></td>
                    <td className="px-4 py-3 text-center">{e.hq_eligible==="Yes"?<span className="text-emerald-500 text-xs font-semibold">✓</span>:<span className="text-gray-200">—</span>}</td>
                    <td className="px-4 py-3 text-center">{e.lc_eligible==="Yes"?<span className="text-emerald-500 text-xs font-semibold">✓</span>:<span className="text-gray-200">—</span>}</td>
                    <td className="px-4 py-3 text-center text-gray-600">{e.max_days_per_week}</td>
                    <td className="px-4 py-3">
                      <span className={`inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium ${e.active==="Yes"?"bg-emerald-50 text-emerald-600":"bg-gray-100 text-gray-400"}`}>
                        {e.active==="Yes"?"Active":"Inactive"}
                      </span>
                    </td>
                    <td className="px-4 py-3">
                      <div className="flex items-center gap-2 justify-end">
                        <button onClick={()=>openEdit(e)} className="text-xs text-teal-500 hover:text-teal-700 px-2 py-1 rounded hover:bg-teal-50 transition-colors">Edit</button>
                        <button onClick={()=>toggleActive(e)} className={`text-xs px-2 py-1 rounded transition-colors ${e.active==="Yes"?"text-gray-400 hover:text-red-400 hover:bg-red-50":"text-emerald-500 hover:bg-emerald-50"}`}>
                          {e.active==="Yes"?"Deactivate":"Activate"}
                        </button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
            <Pagination page={page} total={filtered.length} perPage={PAGE_SIZE} onPage={setPage}/>
          </div>

          {showModal&&(
            <Modal title={editTarget?"Edit Employee":"Add Employee"} onClose={()=>setShowModal(false)}>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Employee ID">
                    <input value={form.emp_id} onChange={e=>upd("emp_id",e.target.value)} required className={inputCls} placeholder="E001" readOnly={!!editTarget}/>
                  </Field>
                  <Field label="Role">
                    <select value={form.role} onChange={e=>upd("role",e.target.value)} className={inputCls}>
                      {ROLES.map(r=><option key={r}>{r}</option>)}
                    </select>
                  </Field>
                </div>
                <Field label="Full Name">
                  <input value={form.name} onChange={e=>upd("name",e.target.value)} required className={inputCls} placeholder="Full name"/>
                </Field>
                <div className="grid grid-cols-2 gap-4">
                  <Field label="HQ Eligible">
                    <select value={form.hq_eligible} onChange={e=>upd("hq_eligible",e.target.value)} className={inputCls}>
                      <option value="Yes">Yes</option><option value="No">No</option>
                    </select>
                  </Field>
                  <Field label="Lake Club Eligible">
                    <select value={form.lc_eligible} onChange={e=>upd("lc_eligible",e.target.value)} className={inputCls}>
                      <option value="Yes">Yes</option><option value="No">No</option>
                    </select>
                  </Field>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Max Days / Week">
                    <input type="number" min="1" max="7" value={form.max_days_per_week} onChange={e=>upd("max_days_per_week",e.target.value)} className={inputCls}/>
                  </Field>
                  <Field label="Status">
                    <select value={form.active} onChange={e=>upd("active",e.target.value)} className={inputCls}>
                      <option value="Yes">Active</option><option value="No">Inactive</option>
                    </select>
                  </Field>
                </div>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={()=>setShowModal(false)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-teal-500 hover:bg-teal-600 text-white text-sm font-medium rounded-xl transition-colors">{editTarget?"Save Changes":"Add Employee"}</button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── AVAILABILITY PAGE ────────────────────────────────────────────────────
    function AvailabilityPage({ employees, availability, setAvailability, month, year, setMonth, setYear }) {
      const [tab,          setTab]          = useState("calendar"); // "calendar" | "list"
      const [calEmp,       setCalEmp]       = useState("");         // emp_id for calendar view
      const [paintStatus,  setPaintStatus]  = useState("Off");      // paint mode status
      const [isPainting,   setIsPainting]   = useState(false);      // mouse-drag active
      // List view state
      const [filterEmp,    setFilterEmp]    = useState("All");
      const [filterStatus, setFilterStatus] = useState("All");
      const [listPage,     setListPage]     = useState(1);

      const activeEmps = employees.filter(e=>e.active==="Yes");
      const empMap     = useMemo(()=>{ const m={}; employees.forEach(e=>{m[e.emp_id]=e;}); return m; },[employees]);
      const monthStr   = `${year}-${String(month).padStart(2,"0")}`;

      // Auto-select first employee when list loads
      useEffect(()=>{
        if(!calEmp&&activeEmps.length>0) setCalEmp(activeEmps[0].emp_id);
      },[activeEmps.length]);

      // Calendar geometry
      const monthDays = getMonthDays(year, month);
      const firstDow  = new Date(year,month-1,1).getDay();
      const padDays   = firstDow===0?6:firstDow-1;
      const monthLabel= new Date(year,month-1,1).toLocaleString("en-US",{month:"long",year:"numeric"});

      function prevMonth(){ if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1); }
      function nextMonth(){ if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1); }

      // Build per-employee availability map
      const availMap = useMemo(()=>{
        const m={};
        availability.forEach(a=>{ if(!m[a.emp_id])m[a.emp_id]={}; m[a.emp_id][a.date]=a.status; });
        return m;
      },[availability]);

      // Paint a single day for the currently selected employee
      function paintDay(dateStr) {
        if(!calEmp) return;
        if(paintStatus==="Clear") {
          setAvailability(prev=>prev.filter(a=>!(a.emp_id===calEmp&&a.date===dateStr)));
        } else {
          setAvailability(prev=>[
            ...prev.filter(a=>!(a.emp_id===calEmp&&a.date===dateStr)),
            {emp_id:calEmp, date:dateStr, status:paintStatus}
          ]);
        }
      }

      // Clear all entries for this employee in the current month
      function clearMonth() {
        if(!calEmp) return;
        if(!window.confirm(`Clear all availability entries for ${empMap[calEmp]?.name||calEmp} in ${monthLabel}?`)) return;
        setAvailability(prev=>prev.filter(a=>!(a.emp_id===calEmp&&a.date.startsWith(monthStr))));
      }

      // Paint style config
      const paintStyles = {
        Off:         {bg:"bg-gray-500",  light:"bg-gray-100 text-gray-600 hover:bg-gray-200",  cell:"bg-gray-100 text-gray-600 border-gray-200"},
        Leave:       {bg:"bg-blue-500",  light:"bg-blue-50 text-blue-600 hover:bg-blue-100",   cell:"bg-blue-50 text-blue-600 border-blue-200"},
        Unavailable: {bg:"bg-red-500",   light:"bg-red-50 text-red-500 hover:bg-red-100",      cell:"bg-red-50 text-red-500 border-red-200"},
        Clear:       {bg:"bg-teal-500",  light:"bg-teal-50 text-teal-600 hover:bg-teal-100",   cell:""},
      };

      // ── List view data
      const listFiltered = availability
        .filter(a=>{
          if(!a.date.startsWith(monthStr)) return false;
          if(filterEmp!=="All"&&a.emp_id!==filterEmp) return false;
          if(filterStatus!=="All"&&a.status!==filterStatus) return false;
          return true;
        })
        .sort((a,b)=>a.date.localeCompare(b.date));
      useEffect(()=>setListPage(1),[filterEmp,filterStatus,month,year]);
      const listPaginated = listFiltered.slice((listPage-1)*PAGE_SIZE, listPage*PAGE_SIZE);

      // Count this-month entries for the selected employee
      const calEmpMonthCount = calEmp
        ? availability.filter(a=>a.emp_id===calEmp&&a.date.startsWith(monthStr)).length
        : 0;

      return (
        <div className="p-6 space-y-4 overflow-y-auto h-full">
          {/* Header */}
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Availability</h1>
              <p className="text-sm text-gray-400 mt-0.5">Manage leave, off days and unavailability per employee</p>
            </div>
            {/* Tab switcher */}
            <div className="flex gap-1 p-1 bg-gray-100 rounded-xl">
              <button onClick={()=>setTab("calendar")}
                className={`px-4 py-2 text-xs font-medium rounded-lg transition-colors ${tab==="calendar"?"bg-white shadow text-gray-800":"text-gray-500 hover:text-gray-700"}`}>
                📅 Calendar
              </button>
              <button onClick={()=>setTab("list")}
                className={`px-4 py-2 text-xs font-medium rounded-lg transition-colors ${tab==="list"?"bg-white shadow text-gray-800":"text-gray-500 hover:text-gray-700"}`}>
                📋 All Records
              </button>
            </div>
          </div>

          {/* ── CALENDAR TAB ─────────────────────────────────────────────── */}
          {tab==="calendar"&&(
            <>
              {/* Controls row */}
              <div className="flex flex-wrap items-center gap-3">
                {/* Employee selector */}
                <select value={calEmp} onChange={e=>setCalEmp(e.target.value)}
                  className="flex-1 min-w-48 px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-teal-400">
                  <option value="">— Select employee —</option>
                  {activeEmps.map(e=>(
                    <option key={e.emp_id} value={e.emp_id}>{e.name} ({e.role})</option>
                  ))}
                </select>
                {/* Month nav */}
                <div className="flex items-center gap-1">
                  <button onClick={prevMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                  </button>
                  <span className="text-sm font-semibold text-gray-700 w-36 text-center">{monthLabel}</span>
                  <button onClick={nextMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                  </button>
                  <button onClick={()=>{setMonth(THIS_MONTH);setYear(THIS_YEAR);}}
                    className="ml-1 px-3 py-1.5 text-xs font-medium text-teal-600 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">Today</button>
                </div>
              </div>

              {/* Paint mode + clear */}
              <div className="flex flex-wrap items-center gap-2">
                <span className="text-xs text-gray-400 font-medium mr-1">Paint mode:</span>
                {["Off","Leave","Unavailable","Clear"].map(s=>(
                  <button key={s} onClick={()=>setPaintStatus(s)}
                    className={`px-3 py-1.5 text-xs font-medium rounded-lg transition-colors border
                      ${paintStatus===s
                        ? `${paintStyles[s].bg} text-white border-transparent shadow-sm`
                        : `${paintStyles[s].light} border-transparent`}`}>
                    {s==="Clear"?"✕ Clear":s}
                  </button>
                ))}
                <div className="ml-auto flex items-center gap-2">
                  {calEmp&&calEmpMonthCount>0&&(
                    <span className="text-xs text-gray-400">{calEmpMonthCount} entr{calEmpMonthCount===1?"y":"ies"} this month</span>
                  )}
                  {calEmp&&calEmpMonthCount>0&&(
                    <button onClick={clearMonth}
                      className="text-xs text-red-400 hover:text-red-600 px-3 py-1.5 border border-red-200 hover:bg-red-50 rounded-lg transition-colors">
                      Clear Month
                    </button>
                  )}
                </div>
              </div>

              {/* Instruction hint */}
              <p className="text-xs text-gray-400">Select a paint mode above, then click or drag across days to apply. Drag to paint multiple days at once.</p>

              {/* Calendar grid */}
              {!calEmp?(
                <div className="bg-gray-50 rounded-2xl border border-gray-100 p-12 text-center">
                  <div className="text-4xl mb-3">👆</div>
                  <p className="text-sm font-medium text-gray-500">Select an employee above to view and edit their availability</p>
                </div>
              ):(
                <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden select-none"
                  onMouseLeave={()=>setIsPainting(false)}
                  onMouseUp={()=>setIsPainting(false)}>
                  {/* Day-of-week headers */}
                  <div className="grid grid-cols-7 border-b border-gray-100 bg-gray-50/60">
                    {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>(
                      <div key={d} className="px-2 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide text-center">{d}</div>
                    ))}
                  </div>
                  {/* Day cells */}
                  <div className="grid grid-cols-7">
                    {Array(padDays).fill(null).map((_,i)=>(
                      <div key={`pad${i}`} className="min-h-16 border-b border-r border-gray-50 bg-gray-50/20"/>
                    ))}
                    {monthDays.map((dateStr,idx)=>{
                      const status  = availMap[calEmp]?.[dateStr];
                      const isToday = dateStr===TODAY;
                      const dayNum  = parseInt(dateStr.split("-")[2]);
                      const colIdx  = (padDays+idx)%7;
                      const isWE    = colIdx>=5;
                      const style   = status?paintStyles[status]:null;
                      return (
                        <div key={dateStr}
                          onMouseDown={e=>{ e.preventDefault(); setIsPainting(true); paintDay(dateStr); }}
                          onMouseEnter={()=>{ if(isPainting) paintDay(dateStr); }}
                          className={`min-h-16 border-b border-r border-gray-100 p-2 cursor-pointer transition-all
                            ${isWE&&!status?"bg-gray-50/40":!status?"hover:bg-teal-50/20":""}`}>
                          {/* Day number */}
                          <div className="flex items-start justify-between mb-1.5">
                            <span className={`text-sm font-semibold leading-none
                              ${isToday?"w-6 h-6 rounded-full bg-teal-500 text-white flex items-center justify-center text-xs":"text-gray-700"}`}>
                              {dayNum}
                            </span>
                          </div>
                          {/* Status badge */}
                          {status&&(
                            <div className={`text-xs font-medium px-1.5 py-0.5 rounded-lg text-center border ${style?.cell||"bg-gray-100 text-gray-500 border-gray-200"}`}>
                              {status}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Legend */}
              <div className="flex items-center gap-4 flex-wrap text-xs text-gray-400">
                {["Off","Leave","Unavailable"].map(s=>(
                  <span key={s} className="flex items-center gap-1.5">
                    <span className={`px-2 py-0.5 rounded-lg border text-xs font-medium ${paintStyles[s].cell}`}>{s}</span>
                  </span>
                ))}
                <span className="text-gray-300">· Click a day to paint, drag to paint multiple days</span>
              </div>
            </>
          )}

          {/* ── LIST TAB ─────────────────────────────────────────────────── */}
          {tab==="list"&&(
            <>
              {/* Month nav + filters */}
              <div className="flex flex-wrap items-center gap-3">
                <div className="flex items-center gap-1">
                  <button onClick={prevMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
                  </button>
                  <span className="text-sm font-semibold text-gray-700 w-36 text-center">{monthLabel}</span>
                  <button onClick={nextMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
                    <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
                  </button>
                  <button onClick={()=>{setMonth(THIS_MONTH);setYear(THIS_YEAR);}}
                    className="ml-1 px-3 py-1.5 text-xs font-medium text-teal-600 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">Today</button>
                </div>
                <select value={filterEmp} onChange={e=>setFilterEmp(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none">
                  <option value="All">All Employees</option>
                  {activeEmps.map(e=><option key={e.emp_id} value={e.emp_id}>{e.name}</option>)}
                </select>
                <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none">
                  <option value="All">All Status</option>
                  {AVAIL_STATUS.filter(s=>s!=="Yes").map(s=><option key={s}>{s}</option>)}
                </select>
                <span className="text-xs text-gray-400 ml-auto">{listFiltered.length} record{listFiltered.length!==1?"s":""}</span>
              </div>

              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden table-scroll">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-gray-100 bg-gray-50/60">
                      {["Employee","Role","Date","Status",""].map(h=>(
                        <th key={h} className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {listPaginated.length===0?(
                      <tr><td colSpan={5} className="text-center py-12 text-gray-400 text-sm">No entries for {monthLabel}</td></tr>
                    ):listPaginated.map((a,i)=>{
                      const emp=empMap[a.emp_id];
                      return (
                        <tr key={`${a.emp_id}-${a.date}`} className={`border-b border-gray-50 hover:bg-gray-50 ${i%2===0?"":"bg-gray-50/40"}`}>
                          <td className="px-4 py-3 font-medium text-gray-700">{emp?.name||a.emp_id}</td>
                          <td className="px-4 py-3">{emp&&<RoleBadge role={emp.role}/>}</td>
                          <td className="px-4 py-3 text-gray-500 whitespace-nowrap">{fmt(a.date)}</td>
                          <td className="px-4 py-3"><AvailBadge status={a.status}/></td>
                          <td className="px-4 py-3 text-right">
                            <button onClick={()=>setAvailability(prev=>prev.filter(x=>!(x.emp_id===a.emp_id&&x.date===a.date)))}
                              className="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 transition-colors">Remove</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
                <Pagination page={listPage} total={listFiltered.length} perPage={PAGE_SIZE} onPage={setListPage}/>
              </div>
            </>
          )}
        </div>
      );
    }

    // ─── DEMAND CELL (sub-component to avoid hooks-in-loops) ─────────────────
    function DemandCell({ dateStr, hqVal, lcVal, isHolidayHQ, isHolidayLC, holName, isToday, isWE, upsert }) {
      const [hq, setHq] = useState(hqVal);
      const [lc, setLc] = useState(lcVal);
      // Sync when external data changes (e.g. after Bulk Set)
      useEffect(()=>{ setHq(hqVal); },[hqVal]);
      useEffect(()=>{ setLc(lcVal); },[lcVal]);

      const dayNum = parseInt(dateStr.split("-")[2]);
      const isClosed = isHolidayHQ && isHolidayLC;

      function save() {
        if (hq!==""||lc!=="") upsert(dateStr, hq, lc);
      }

      return (
        <div className={`border-b border-r border-gray-100 p-2 min-h-[5.5rem] flex flex-col
          ${isClosed?"bg-purple-50":holName?"bg-purple-50/50":isWE?"bg-gray-50/40":"bg-white"}`}>
          {/* Day number + holiday flag */}
          <div className="flex items-start justify-between mb-1 shrink-0">
            <span className={`text-sm font-semibold leading-none
              ${isToday?"w-6 h-6 rounded-full bg-teal-500 text-white flex items-center justify-center text-xs":
                holName?"text-purple-600":"text-gray-700"}`}>
              {dayNum}
            </span>
            {holName&&<span className="text-purple-400 text-xs leading-none" title={holName}>🎌</span>}
          </div>
          {/* Inputs or Closed label */}
          {isClosed?(
            <div className="flex-1 flex items-center justify-center">
              <span className="text-xs font-medium text-red-400">Closed</span>
            </div>
          ):(
            <div className="space-y-1 flex-1">
              <div className="flex items-center gap-1">
                <span className="text-xs text-gray-400 w-5 shrink-0">HQ</span>
                {isHolidayHQ
                  ? <span className="text-xs text-red-400 font-medium">Closed</span>
                  : <input type="number" min="0" max="99" value={hq}
                      onChange={e=>setHq(e.target.value)}
                      onBlur={save}
                      onKeyDown={e=>e.key==="Enter"&&e.target.blur()}
                      placeholder="—"
                      className="w-full min-w-0 border border-gray-200 rounded px-1.5 py-0.5 text-xs text-center focus:outline-none focus:ring-1 focus:ring-teal-400 focus:border-teal-400 bg-white"/>
                }
              </div>
              <div className="flex items-center gap-1">
                <span className="text-xs text-gray-400 w-5 shrink-0">LC</span>
                {isHolidayLC
                  ? <span className="text-xs text-red-400 font-medium">Closed</span>
                  : <input type="number" min="0" max="99" value={lc}
                      onChange={e=>setLc(e.target.value)}
                      onBlur={save}
                      onKeyDown={e=>e.key==="Enter"&&e.target.blur()}
                      placeholder="—"
                      className="w-full min-w-0 border border-gray-200 rounded px-1.5 py-0.5 text-xs text-center focus:outline-none focus:ring-1 focus:ring-teal-400 focus:border-teal-400 bg-white"/>
                }
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── DEMAND PAGE ──────────────────────────────────────────────────────────
    function DemandPage({ demand, setDemand, month, year, setMonth, setYear, holidays }) {
      const [showBulkModal, setShowBulkModal] = useState(false);
      const [bulkForm,      setBulkForm]      = useState({
        hq_needed:"3", lc_needed:"2",
        days:{Mon:true,Tue:true,Wed:true,Thu:true,Fri:true,Sat:true,Sun:true}
      });

      const monthDays  = getMonthDays(year, month);
      const demandMap  = useMemo(()=>{ const m={}; demand.forEach(d=>{m[d.date]=d;}); return m; },[demand]);
      const holidayMap = useMemo(()=>{ const m={}; holidays.forEach(h=>{m[h.date]=h;}); return m; },[holidays]);
      const monthLabel = new Date(year,month-1,1).toLocaleString("en-US",{month:"long",year:"numeric"});
      const firstDow   = new Date(year,month-1,1).getDay();
      const padDays    = firstDow===0?6:firstDow-1; // Mon-start

      function prevMonth(){ if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1); }
      function nextMonth(){ if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1); }

      function upsert(date,hq,lc) {
        const day=getDayName(date);
        setDemand(prev=>{
          const exists=prev.find(d=>d.date===date);
          if(exists) return prev.map(d=>d.date===date?{...d,hq_needed:String(hq),lc_needed:String(lc)}:d);
          return [...prev,{date,day,hq_needed:String(hq),lc_needed:String(lc)}];
        });
      }

      function applyBulk() {
        const dayMap={Sun:0,Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6};
        monthDays.forEach(dateStr=>{
          const hol=holidayMap[dateStr];
          if(hol&&hol.closed_hq==="Yes"&&hol.closed_lc==="Yes") return;
          const dow=new Date(dateStr+"T00:00:00").getDay();
          const dn=Object.keys(dayMap).find(k=>dayMap[k]===dow);
          if(bulkForm.days[dn]) upsert(dateStr,bulkForm.hq_needed,bulkForm.lc_needed);
        });
        setShowBulkModal(false);
      }

      const thisMonthHols = holidays.filter(h=>h.date.startsWith(`${year}-${String(month).padStart(2,"0")}`));

      return (
        <div className="p-6 space-y-4 overflow-y-auto h-full">
          {/* Header */}
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Demand</h1>
              <p className="text-sm text-gray-400 mt-0.5">Set required headcount per branch — click any cell to edit inline</p>
            </div>
            <button onClick={()=>setShowBulkModal(true)} className="flex items-center gap-2 px-4 py-2.5 bg-teal-500 hover:bg-teal-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
              Bulk Fill
            </button>
          </div>

          {/* Month navigation */}
          <div className="flex items-center gap-2">
            <button onClick={prevMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
            </button>
            <span className="text-sm font-semibold text-gray-700 w-36 text-center">{monthLabel}</span>
            <button onClick={nextMonth} className="p-2 rounded-xl hover:bg-gray-100 text-gray-500 transition-colors">
              <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
            </button>
            <button onClick={()=>{setMonth(THIS_MONTH);setYear(THIS_YEAR);}}
              className="ml-1 px-3 py-1.5 text-xs font-medium text-teal-600 bg-teal-50 hover:bg-teal-100 rounded-lg transition-colors">Today</button>
          </div>

          {/* Holiday notice */}
          {thisMonthHols.length>0&&(
            <div className="bg-purple-50 border border-purple-200 rounded-xl px-4 py-2.5 text-xs text-purple-700 flex items-center gap-2">
              🎌 <span><strong>{thisMonthHols.length} holiday{thisMonthHols.length>1?"s":""}</strong> this month highlighted in purple. Fully-closed days show "Closed" instead of inputs. Bulk Fill skips fully-closed days.</span>
            </div>
          )}

          {/* Legend */}
          <div className="flex items-center gap-4 text-xs text-gray-400 flex-wrap">
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-white border border-gray-200"></span>Normal day</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-purple-100 border border-purple-200"></span>Holiday</span>
            <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-gray-100 border border-gray-200"></span>Weekend</span>
            <span className="text-gray-300">· Type a number and press Tab or Enter to save</span>

                  <DemandCell
                    key={dateStr}
                    dateStr={dateStr}
                    hqVal={d.hq_needed||""}
                    lcVal={d.lc_needed||""}
                    isHolidayHQ={hol?.closed_hq==="Yes"}
                    isHolidayLC={hol?.closed_lc==="Yes"}

                        onClick={()=>setBulkForm(f=>({...f,days:{...f.days,[d]:!f.days[d]}}))}
