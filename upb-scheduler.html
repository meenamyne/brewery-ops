    // ─── HOLIDAY PAGE ─────────────────────────────────────────────────────────
    function HolidayPage({ holidays, setHolidays }) {
      const [showModal,   setShowModal]   = useState(false);
      const [editTarget,  setEditTarget]  = useState(null);
      const [yearFilter,  setYearFilter]  = useState(String(THIS_YEAR));
      const [page,        setPage]        = useState(1);

      const emptyForm = {id:"",date:"",name:"",closed_hq:"Yes",closed_lc:"Yes"};
      const [form, setForm] = useState(emptyForm);
      const upd = (k,v) => setForm(f=>({...f,[k]:v}));

      function openAdd()  { setForm({...emptyForm,id:generateId()}); setEditTarget(null); setShowModal(true); }
      function openEdit(h){ setForm({...h}); setEditTarget(h); setShowModal(true); }

      function handleSubmit(ev) {
        ev.preventDefault();
        if(!form.date||!form.name) return;
        if(editTarget) setHolidays(prev=>prev.map(h=>h.id===editTarget.id?form:h));
        else           setHolidays(prev=>[...prev,form].sort((a,b)=>a.date.localeCompare(b.date)));
        setShowModal(false);
      }

      function remove(id) {
        if(window.confirm("Delete this holiday?")) setHolidays(prev=>prev.filter(h=>h.id!==id));
      }

      const years = useMemo(()=>{
        const ys=new Set(holidays.map(h=>h.date.split("-")[0]));
        ys.add(String(THIS_YEAR)); ys.add(String(THIS_YEAR+1));
        return [...ys].sort();
      },[holidays]);

      const filtered = holidays
        .filter(h=>!yearFilter||h.date.startsWith(yearFilter))
        .sort((a,b)=>a.date.localeCompare(b.date));

      useEffect(()=>setPage(1),[yearFilter]);

      const paginated = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

      return (
        <div className="p-6 space-y-5 overflow-y-auto h-full">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Holidays & Closed Days</h1>
              <p className="text-sm text-gray-400 mt-0.5">Public holidays and branch-specific restaurant closure days</p>
            </div>
            <button onClick={openAdd} className="flex items-center gap-2 px-4 py-2.5 bg-teal-500 hover:bg-teal-600 text-white text-sm font-medium rounded-xl transition-colors">
              <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/></svg>
              Add Holiday
            </button>
          </div>

          {/* Info banner */}
          <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 text-xs text-purple-700 space-y-1">
            <p className="font-semibold">How holidays affect the app:</p>
            <p>• <strong>Schedule:</strong> Holiday days are highlighted 🎌 on the calendar grid.</p>
            <p>• <strong>Day Panel:</strong> A closed-branch warning appears when opening a holiday day.</p>
            <p>• <strong>Demand:</strong> Closed branches show "Closed" instead of headcount. Bulk Set skips closed holidays.</p>
          </div>

          <div className="flex gap-3 flex-wrap items-center">
            <select value={yearFilter} onChange={e=>setYearFilter(e.target.value)} className="px-3 py-2 text-sm border border-gray-200 rounded-lg bg-white text-gray-700 focus:outline-none">
              <option value="">All Years</option>
              {years.map(y=><option key={y} value={y}>{y}</option>)}
            </select>
            <span className="text-xs text-gray-400">{filtered.length} record{filtered.length!==1?"s":""}</span>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden table-scroll">
            <table className="w-full text-sm min-w-max">
              <thead>
                <tr className="border-b border-gray-100 bg-gray-50/60">
                  {["Date","Day","Holiday / Event Name","HQ Closed","LC Closed",""].map(h=>(
                    <th key={h} className="text-left px-4 py-3 text-xs font-medium text-gray-400 uppercase tracking-wide whitespace-nowrap">{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {paginated.length===0?(
                  <tr><td colSpan={6} className="text-center py-12 text-gray-400 text-sm">
                    No holidays defined{yearFilter?` for ${yearFilter}`:""}. Click "Add Holiday" to get started.
                  </td></tr>
                ):paginated.map((h,i)=>{
                  const bothClosed=h.closed_hq==="Yes"&&h.closed_lc==="Yes";
                  const eitherClosed=h.closed_hq==="Yes"||h.closed_lc==="Yes";
                  return (
                    <tr key={h.id} className={`border-b border-gray-50 hover:bg-gray-50 transition-colors ${i%2===0?"":"bg-gray-50/40"}`}>
                      <td className="px-4 py-3 text-gray-600 whitespace-nowrap font-medium">{fmt(h.date)}</td>
                      <td className="px-4 py-3 text-gray-400 whitespace-nowrap">{h.date?getDayName(h.date):""}</td>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2">
                          <span className="text-base">🎌</span>
                          <span className="font-medium text-gray-700">{h.name}</span>
                          {eitherClosed&&(
                            <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${bothClosed?"bg-red-50 text-red-600":"bg-orange-50 text-orange-600"}`}>
                              {bothClosed?"All Branches Closed":"Partial Closure"}
                            </span>
                          )}
                        </div>
                      </td>
                      <td className="px-4 py-3 text-center">
                        {h.closed_hq==="Yes"
                          ? <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-red-50 text-red-600">Closed</span>
                          : <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-600">Open</span>
                        }
                      </td>
                      <td className="px-4 py-3 text-center">
                        {h.closed_lc==="Yes"
                          ? <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-red-50 text-red-600">Closed</span>
                          : <span className="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-600">Open</span>
                        }
                      </td>
                      <td className="px-4 py-3">
                        <div className="flex items-center gap-2 justify-end">
                          <button onClick={()=>openEdit(h)} className="text-xs text-teal-500 hover:text-teal-700 px-2 py-1 rounded hover:bg-teal-50 transition-colors">Edit</button>
                          <button onClick={()=>remove(h.id)} className="text-xs text-red-400 hover:text-red-600 px-2 py-1 rounded hover:bg-red-50 transition-colors">Delete</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
            <Pagination page={page} total={filtered.length} perPage={PAGE_SIZE} onPage={setPage}/>
          </div>

          {showModal&&(
            <Modal title={editTarget?"Edit Holiday":"Add Holiday"} onClose={()=>setShowModal(false)}>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="grid grid-cols-2 gap-4">
                  <Field label="Date">
                    <input type="date" value={form.date} onChange={e=>upd("date",e.target.value)} required className={inputCls}/>
                  </Field>
                  <Field label="Day">
                    <input readOnly value={form.date?getDayName(form.date):""} className={`${inputCls} bg-gray-50 text-gray-400`}/>
                  </Field>
                </div>
                <Field label="Holiday / Event Name">
                  <input value={form.name} onChange={e=>upd("name",e.target.value)} required placeholder="e.g. Songkran Festival, New Year's Day" className={inputCls}/>
                </Field>
                <div className="space-y-2">
                  <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">Branch Closure</p>
                  <div className="grid grid-cols-2 gap-3">
                    <label className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition-colors
                      ${form.closed_hq==="Yes"?"border-red-300 bg-red-50":"border-gray-200 hover:border-gray-300"}`}>
                      <input type="checkbox" checked={form.closed_hq==="Yes"} onChange={e=>upd("closed_hq",e.target.checked?"Yes":"No")} className="rounded"/>
                      <div>
                        <p className="text-sm font-medium text-gray-700">UPB HQ</p>
                        <p className="text-xs text-gray-400">Closed this day</p>
                      </div>
                    </label>
                    <label className={`flex items-center gap-3 p-3 rounded-xl border-2 cursor-pointer transition-colors
                      ${form.closed_lc==="Yes"?"border-red-300 bg-red-50":"border-gray-200 hover:border-gray-300"}`}>
                      <input type="checkbox" checked={form.closed_lc==="Yes"} onChange={e=>upd("closed_lc",e.target.checked?"Yes":"No")} className="rounded"/>
                      <div>
                        <p className="text-sm font-medium text-gray-700">Lake Club</p>
                        <p className="text-xs text-gray-400">Closed this day</p>
                      </div>
                    </label>
                  </div>
                  {form.closed_hq!=="Yes"&&form.closed_lc!=="Yes"&&(
                    <p className="text-xs text-amber-600 bg-amber-50 px-3 py-2 rounded-lg">ℹ Both branches open — this holiday is informational only.</p>
                  )}
                </div>
                <div className="flex gap-3 pt-2">
                  <button type="button" onClick={()=>setShowModal(false)} className="flex-1 px-4 py-2.5 border border-gray-200 rounded-xl text-sm font-medium text-gray-600 hover:bg-gray-50">Cancel</button>
                  <button type="submit" className="flex-1 px-4 py-2.5 bg-teal-500 hover:bg-teal-600 text-white text-sm font-medium rounded-xl transition-colors">{editTarget?"Save Changes":"Add Holiday"}</button>
                </div>
              </form>
            </Modal>
          )}
        </div>
      );
    }

    // ─── SUMMARY PAGE ─────────────────────────────────────────────────────────
    function SummaryPage({ employees, demand, availability, schedule, month, year }) {
      const monthStr   = `${year}-${String(month).padStart(2,"0")}`;
      const monthLabel = new Date(year,month-1,1).toLocaleString("en-US",{month:"long",year:"numeric"});
      const monthDays  = getMonthDays(year, month);
      const [empPage,  setEmpPage]  = useState(1);

      const empMap   = useMemo(()=>{ const m={}; employees.forEach(e=>{m[e.emp_id]=e;}); return m; },[employees]);
      const availMap = useMemo(()=>{
        const m={}; availability.forEach(a=>{if(!m[a.emp_id])m[a.emp_id]={}; m[a.emp_id][a.date]=a.status;}); return m;
      },[availability]);
      const demandMap = useMemo(()=>{ const m={}; demand.forEach(d=>{m[d.date]=d;}); return m; },[demand]);
      const schedMap  = useMemo(()=>{
        const m={}; schedule.forEach(s=>{ if(!m[s.date])m[s.date]={HQ:[],LC:[]}; if(s.branch==="HQ")m[s.date].HQ.push(s); else m[s.date].LC.push(s); }); return m;
      },[schedule]);

      const monthSched = schedule.filter(s=>s.date.startsWith(monthStr));

      const empStats = employees.filter(e=>e.active==="Yes")
        .map(emp=>{ const rows=monthSched.filter(s=>s.emp_id===emp.emp_id); return {emp,total:rows.length,hq:rows.filter(s=>s.branch==="HQ").length,lc:rows.filter(s=>s.branch==="LC").length}; })
        .sort((a,b)=>b.total-a.total);

      const understaffed = monthDays.filter(d=>{ const dem=demandMap[d]; if(!dem)return false; const s=schedMap[d]; return(s?.HQ?.length??0)<parseInt(dem.hq_needed||0)||(s?.LC?.length??0)<parseInt(dem.lc_needed||0); });
      const conflicts    = monthSched.filter(s=>{ const st=availMap[s.emp_id]?.[s.date]; return st&&st!=="Yes"; });
      const overloads    = [];
      employees.filter(e=>e.active==="Yes").forEach(emp=>{
        const max=parseInt(emp.max_days_per_week)||6; const byWeek={};
        monthSched.filter(s=>s.emp_id===emp.emp_id).forEach(s=>{ const ws=getWeekStart(s.date); if(!byWeek[ws])byWeek[ws]=[]; byWeek[ws].push(s); });
        Object.entries(byWeek).forEach(([ws,rows])=>{ if(rows.length>max)overloads.push({emp,weekStart:ws,count:rows.length,max}); });
      });

      const KPI=[
        {label:"Total Assignments",     value:monthSched.length,    color:"text-teal-600 bg-teal-50"},
        {label:"Understaffed Days",      value:understaffed.length,  color:understaffed.length?"text-amber-600 bg-amber-50":"text-emerald-600 bg-emerald-50"},
        {label:"Availability Conflicts", value:conflicts.length,     color:conflicts.length?"text-red-600 bg-red-50":"text-emerald-600 bg-emerald-50"},
        {label:"Weekly Overloads",       value:overloads.length,     color:overloads.length?"text-orange-600 bg-orange-50":"text-emerald-600 bg-emerald-50"},
      ];

      const paginatedEmpStats = empStats.slice((empPage-1)*PAGE_SIZE, empPage*PAGE_SIZE);

      return (
        <div className="p-6 space-y-6 overflow-y-auto h-full">
          <div>
            <h1 className="text-xl font-semibold text-gray-800">Summary</h1>
            <p className="text-sm text-gray-400 mt-0.5">{monthLabel} · Staffing validation report</p>
          </div>

          <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
            {KPI.map(({label,value,color})=>(
              <div key={label} className="bg-white rounded-2xl border border-gray-100 p-4">
                <p className="text-xs text-gray-400 mb-2 leading-tight">{label}</p>
                <p className={`text-2xl font-bold px-2 py-0.5 rounded-xl inline-block ${color}`}>{value}</p>
              </div>
            ))}
          </div>

          {conflicts.length>0&&(
            <div className="bg-white rounded-2xl border border-red-100 overflow-hidden">
              <div className="px-5 py-3 bg-red-50 border-b border-red-100">
                <p className="text-sm font-semibold text-red-700">⚠ Availability Conflicts ({conflicts.length})</p>
                <p className="text-xs text-red-500 mt-0.5">Staff assigned on days they marked as unavailable</p>
              </div>
              <table className="w-full text-sm">
                <thead><tr className="border-b border-gray-100 bg-gray-50/40">
                  {["Employee","Date","Branch","Availability Status"].map(h=>(
                    <th key={h} className="text-left px-4 py-2 text-xs text-gray-400 font-medium">{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {conflicts.map((s,i)=>(
                    <tr key={i} className="border-b border-gray-50">
                      <td className="px-4 py-2.5 font-medium text-gray-700">{empMap[s.emp_id]?.name||s.emp_id}</td>
                      <td className="px-4 py-2.5 text-gray-500 whitespace-nowrap">{fmt(s.date)}</td>
                      <td className="px-4 py-2.5 text-gray-600">{s.branch==="HQ"?"UPB HQ":"Lake Club"}</td>
                      <td className="px-4 py-2.5"><AvailBadge status={availMap[s.emp_id]?.[s.date]}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {understaffed.length>0&&(
            <div className="bg-white rounded-2xl border border-amber-100 overflow-hidden">
              <div className="px-5 py-3 bg-amber-50 border-b border-amber-100">
                <p className="text-sm font-semibold text-amber-700">⚡ Understaffed Days ({understaffed.length})</p>
              </div>
              <div className="p-4 flex flex-wrap gap-2">
                {understaffed.map(dateStr=>{
                  const d=demandMap[dateStr]; const s=schedMap[dateStr];
                  const hF=s?.HQ?.length??0, lF=s?.LC?.length??0;
                  return (
                    <div key={dateStr} className="bg-amber-50 border border-amber-200 rounded-xl px-3 py-2 text-xs">
                      <p className="font-semibold text-amber-700 whitespace-nowrap">{fmtShort(dateStr)} ({getDayName(dateStr)})</p>
                      <p className="text-amber-600">HQ {hF}/{d.hq_needed} · LC {lF}/{d.lc_needed}</p>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {overloads.length>0&&(
            <div className="bg-white rounded-2xl border border-orange-100 overflow-hidden">
              <div className="px-5 py-3 bg-orange-50 border-b border-orange-100">
                <p className="text-sm font-semibold text-orange-700">📅 Weekly Overloads ({overloads.length})</p>
                <p className="text-xs text-orange-500 mt-0.5">Staff exceeding their max days per week</p>
              </div>
              <table className="w-full text-sm">
                <thead><tr className="border-b border-gray-100 bg-gray-50/40">
                  {["Employee","Week of","Assigned","Max"].map(h=>(
                    <th key={h} className="text-left px-4 py-2 text-xs text-gray-400 font-medium">{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {overloads.map((o,i)=>(
                    <tr key={i} className="border-b border-gray-50">
                      <td className="px-4 py-2.5 font-medium text-gray-700">{o.emp.name}</td>
                      <td className="px-4 py-2.5 text-gray-500 whitespace-nowrap">{fmtShort(o.weekStart)}</td>
                      <td className="px-4 py-2.5 font-semibold text-orange-600">{o.count}d</td>
                      <td className="px-4 py-2.5 text-gray-500">{o.max}d</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="px-5 py-3 border-b border-gray-100">
              <p className="text-sm font-semibold text-gray-700">Employee Workload — {monthLabel}</p>
            </div>
            <table className="w-full text-sm">
              <thead><tr className="border-b border-gray-100 bg-gray-50/60">
                {["Employee","Role","HQ Days","LC Days","Total"].map(h=>(
                  <th key={h} className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {paginatedEmpStats.length===0?(
                  <tr><td colSpan={5} className="text-center py-10 text-gray-400 text-sm">No schedule data for this month</td></tr>
                ):paginatedEmpStats.map(({emp,total,hq,lc},i)=>(
                  <tr key={emp.emp_id} className={`border-b border-gray-50 ${i%2===0?"":"bg-gray-50/40"}`}>
                    <td className="px-4 py-2.5 font-medium text-gray-700">{emp.name}</td>
                    <td className="px-4 py-2.5"><RoleBadge role={emp.role}/></td>
                    <td className="px-4 py-2.5 text-gray-600">{hq||"—"}</td>
                    <td className="px-4 py-2.5 text-gray-600">{lc||"—"}</td>
                    <td className="px-4 py-2.5 font-semibold text-gray-700">{total||"—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <Pagination page={empPage} total={empStats.length} perPage={PAGE_SIZE} onPage={setEmpPage}/>
          </div>

          {conflicts.length===0&&understaffed.length===0&&overloads.length===0&&monthSched.length>0&&(
            <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-5 text-center">
              <p className="text-2xl mb-2">✅</p>
              <p className="text-sm font-semibold text-emerald-700">All good for {monthLabel}!</p>
              <p className="text-xs text-emerald-600 mt-1">No conflicts, no understaffed days, no overloads detected.</p>
            </div>
          )}
        </div>
      );
    }

    // ─── BRANCH SUMMARY PAGE ─────────────────────────────────────────────────
    function BranchSummaryPage({ employees, availability, schedule, holidays, month, year, setMonth, setYear }) {
      const [branch,   setBranch]   = useState("HQ");
      const [viewMode, setViewMode] = useState("calendar"); // "calendar" | "table"

      const monthStr   = `${year}-${String(month).padStart(2,"0")}`;
      const monthLabel = new Date(year,month-1,1).toLocaleString("en-US",{month:"long",year:"numeric"});
      const days       = getMonthDays(year, month);

      const empMap = useMemo(()=>{ const m={}; employees.forEach(e=>{ m[e.emp_id]=e; }); return m; },[employees]);

      const availMap = useMemo(()=>{
        const m={};
        availability.forEach(a=>{ if(!m[a.emp_id])m[a.emp_id]={}; m[a.emp_id][a.date]=a.status; });
        return m;
      },[availability]);

      const schedSet = useMemo(()=>{
        const m={};
        schedule.forEach(s=>{ m[`${s.emp_id}|${s.date}|${s.branch}`]=true; });
        return m;
      },[schedule]);

      // schedByDate[dateStr] = [emp_id, ...] scheduled for current branch
      const schedByDate = useMemo(()=>{
        const m={};
        schedule.filter(s=>s.branch===branch).forEach(s=>{
          if(!m[s.date]) m[s.date]=[];
          m[s.date].push(s.emp_id);
        });
        return m;
      },[schedule, branch]);

      const holidayMap = useMemo(()=>{
        const m={};
        holidays.forEach(h=>{ m[h.date]={ closedHQ:h.closed_hq==="Yes"||h.closed_hq===true, closedLC:h.closed_lc==="Yes"||h.closed_lc===true, name:h.name }; });
        return m;
      },[holidays]);

      const eligibleField = branch==="HQ" ? "hq_eligible" : "lc_eligible";
      const activeEmps = useMemo(()=>
        employees.filter(e=>e.active==="Yes" && e[eligibleField]==="Yes")
          .sort((a,b)=>a.name.localeCompare(b.name))
      ,[employees, eligibleField]);

      // Assign a stable color per employee based on their emp_id
      const EMP_COLORS = [
        {bg:"#dbeafe",text:"#1d4ed8"}, // blue
        {bg:"#fce7f3",text:"#9d174d"}, // pink
        {bg:"#d1fae5",text:"#065f46"}, // green
        {bg:"#fef3c7",text:"#92400e"}, // amber
        {bg:"#ede9fe",text:"#5b21b6"}, // violet
        {bg:"#fee2e2",text:"#991b1b"}, // red
        {bg:"#ccfbf1",text:"#0f766e"}, // teal
        {bg:"#fef9c3",text:"#854d0e"}, // yellow
        {bg:"#e0e7ff",text:"#3730a3"}, // indigo
        {bg:"#fdf2f8",text:"#831843"}, // fuchsia
        {bg:"#ffedd5",text:"#9a3412"}, // orange
        {bg:"#f0fdf4",text:"#14532d"}, // emerald dark
      ];
      const empColorMap = useMemo(()=>{
        const m={};
        [...employees].sort((a,b)=>a.emp_id.localeCompare(b.emp_id))
          .forEach((e,i)=>{ m[e.emp_id]=EMP_COLORS[i%EMP_COLORS.length]; });
        return m;
      },[employees]);

      function prevMonth() { if(month===1){setMonth(12);setYear(y=>y-1);}else setMonth(m=>m-1); }
      function nextMonth() { if(month===12){setMonth(1);setYear(y=>y+1);}else setMonth(m=>m+1); }
      function goToday()   { setMonth(THIS_MONTH); setYear(THIS_YEAR); }

      function getCellData(empId, dateStr) {
        const hol = holidayMap[dateStr];
        const branchClosed = hol && (branch==="HQ" ? hol.closedHQ : hol.closedLC);
        if (branchClosed) return { code:"H", bg:"bg-purple-100", text:"text-purple-700", title:hol.name };
        if (schedSet[`${empId}|${dateStr}|${branch}`]) return { code:"W", bg:"bg-emerald-100", text:"text-emerald-700", title:"Scheduled" };
        const avail = availMap[empId]?.[dateStr];
        if (avail==="Off")         return { code:"O", bg:"bg-gray-200",  text:"text-gray-600",  title:"Day Off" };
        if (avail==="Leave")       return { code:"L", bg:"bg-blue-100",  text:"text-blue-700",  title:"Leave" };
        if (avail==="Unavailable") return { code:"U", bg:"bg-red-100",   text:"text-red-700",   title:"Unavailable" };
        return null;
      }

      // Calendar grid helpers
      // Week starts Monday: Mon=0 … Sun=6
      function dayColIndex(dateStr) {
        const jsDay = new Date(dateStr+"T00:00:00").getDay(); // 0=Sun
        return jsDay===0 ? 6 : jsDay-1;
      }
      const CAL_HEADERS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
      const branchLabel = branch==="HQ" ? "UPB HQ" : "Lake Club";
      const DAY_INITIALS = ["Su","Mo","Tu","We","Th","Fr","Sa"];

      // Build calendar weeks array: array of 7-element arrays (null = empty padding)
      const calWeeks = useMemo(()=>{
        const weeks = []; let week = new Array(7).fill(null);
        const startOffset = dayColIndex(days[0]);
        days.forEach((dateStr,i)=>{
          const col = (startOffset + i) % 7;
          if (i>0 && col===0) { weeks.push(week); week=new Array(7).fill(null); }
          week[col] = dateStr;
        });
        weeks.push(week);
        return weeks;
      },[days]);

      // ── Legend bar (shared) ──────────────────────────────────────────────────
      const Legend = ()=>(
        <div className="px-4 py-2.5 border-t border-gray-100 bg-gray-50/70 flex flex-wrap items-center gap-x-5 gap-y-1.5 shrink-0">
          {[
            {code:"W",bg:"bg-emerald-100",text:"text-emerald-700",label:"Scheduled"},
            {code:"O",bg:"bg-gray-200",   text:"text-gray-600",   label:"Day Off"},
            {code:"L",bg:"bg-blue-100",   text:"text-blue-700",   label:"Leave"},
            {code:"U",bg:"bg-red-100",    text:"text-red-700",    label:"Unavailable"},
            {code:"H",bg:"bg-purple-100", text:"text-purple-700", label:"Holiday / Closed"},
          ].map(({code,bg,text,label})=>(
            <div key={code} className="flex items-center gap-1.5 text-xs text-gray-500">
              <span className={`inline-flex items-center justify-center rounded font-bold ${bg} ${text}`}
                style={{width:20,height:20,fontSize:10}}>{code}</span>
              {label}
            </div>
          ))}
          <div className="flex items-center gap-2 text-xs text-gray-400 ml-auto">
            <span className="inline-flex items-center gap-1"><span className="inline-block w-4 h-4 rounded bg-teal-50 border border-teal-300"></span>Today</span>
            <span className="inline-flex items-center gap-1"><span className="inline-block w-4 h-4 rounded bg-slate-100 border border-slate-200"></span>Weekend</span>
          </div>
        </div>
      );

      return (
        <div className="p-6 space-y-4 overflow-y-auto h-full">

          {/* ── Header ── */}
          <div className="flex items-center justify-between flex-wrap gap-3">
            <div>
              <h1 className="text-xl font-semibold text-gray-800">Branch View</h1>
              <p className="text-sm text-gray-400 mt-0.5">Monthly schedule — capture as screenshot for staff</p>
            </div>
            {/* Branch + View toggles */}
            <div className="flex items-center gap-3">
              <div className="flex gap-1.5">
                {BRANCHES.map(b=>(
                  <button key={b.id} onClick={()=>setBranch(b.id)}
                    className={`px-3.5 py-1.5 rounded-xl text-sm font-medium transition-colors ${branch===b.id?"bg-teal-500 text-white shadow-sm":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                    {b.label}
                  </button>
                ))}
              </div>
              <div className="w-px h-6 bg-gray-200"/>
              <div className="flex gap-1 bg-gray-100 p-1 rounded-xl">
                <button onClick={()=>setViewMode("calendar")}
                  title="Calendar view"
                  className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5 ${viewMode==="calendar"?"bg-white text-gray-700 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                  Calendar
                </button>
                <button onClick={()=>setViewMode("table")}
                  title="Table view"
                  className={`px-3 py-1 rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5 ${viewMode==="table"?"bg-white text-gray-700 shadow-sm":"text-gray-500 hover:text-gray-700"}`}>
                  <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 10h18M3 14h18M10 3v18M14 3v18"/></svg>
                  Table
                </button>
              </div>
            </div>
          </div>

          {/* ── Month nav ── */}
          <div className="flex items-center gap-2">
            <button onClick={prevMonth} className="p-1.5 rounded-lg hover:bg-gray-100">
              <svg className="w-4 h-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7"/></svg>
            </button>
            <span className="text-sm font-semibold text-gray-700 w-36 text-center">{monthLabel}</span>
            <button onClick={nextMonth} className="p-1.5 rounded-lg hover:bg-gray-100">
              <svg className="w-4 h-4 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7"/></svg>
            </button>
            <button onClick={goToday} className="px-3 py-1 text-xs rounded-lg bg-gray-100 text-gray-600 hover:bg-gray-200 ml-1">Today</button>
          </div>

          {/* ════════════════════════════════════════════════════
               CALENDAR VIEW
          ════════════════════════════════════════════════════ */}
          {viewMode==="calendar" && (
            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col">
              {/* title bar */}
              <div className="px-5 py-3 border-b border-gray-100 bg-teal-50 flex items-center gap-2 shrink-0">
                <span className="text-sm font-semibold text-teal-700">{branchLabel} — {monthLabel}</span>
                <span className="text-xs text-teal-500 ml-1">· {activeEmps.length} eligible staff</span>
              </div>

              {/* Day-of-week headers */}
              <div className="grid grid-cols-7 border-b border-gray-100">
                {CAL_HEADERS.map((h,i)=>(
                  <div key={h} className={`py-2 text-center text-xs font-semibold tracking-wide uppercase ${i>=5?"text-slate-400":"text-gray-400"}`}>{h}</div>
                ))}
              </div>

              {/* Weeks */}
              <div className="flex-1">
                {calWeeks.map((week,wi)=>(
                  <div key={wi} className="grid grid-cols-7" style={{borderBottom:"1px solid #f3f4f6"}}>
                    {week.map((dateStr,ci)=>{
                      if (!dateStr) return (
                        <div key={ci} className="bg-gray-50/60" style={{minHeight:110,borderRight:"1px solid #f3f4f6"}}/>
                      );
                      const d = new Date(dateStr+"T00:00:00");
                      const dayNum = d.getDate();
                      const isToday = dateStr===TODAY;
                      const isWE = ci>=5;
                      const hol = holidayMap[dateStr];
                      const branchClosed = hol && (branch==="HQ" ? hol.closedHQ : hol.closedLC);
                      const scheduledIds = schedByDate[dateStr] || [];
                      // employee objects scheduled today for this branch
                      const scheduledEmps = scheduledIds.map(id=>empMap[id]).filter(Boolean).sort((a,b)=>a.name.localeCompare(b.name));
                      const totalCount = scheduledEmps.length;

                      return (
                        <div key={dateStr} style={{
                          minHeight:110,
                          borderRight:"1px solid #f3f4f6",
                          background: isToday?"#f0fdf4": branchClosed?"#faf5ff": isWE?"#f8fafc":"#ffffff",
                          padding:"6px 7px",
                          display:"flex", flexDirection:"column", gap:3
                        }}>
                          {/* Day number */}
                          <div className="flex items-center justify-between mb-0.5">
                            <span className={`text-sm font-bold leading-none ${isToday?"text-teal-600 bg-teal-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs":branchClosed?"text-purple-600":isWE?"text-slate-400":"text-gray-700"}`}
                              style={isToday?{display:"inline-flex",alignItems:"center",justifyContent:"center",width:22,height:22,borderRadius:"50%",background:"#14b8a6",color:"#fff",fontSize:12}:{}}>
                              {dayNum}
                            </span>
                            {totalCount>0&&(
                              <span className="text-xs text-emerald-600 font-semibold bg-emerald-50 rounded-full px-1.5 leading-tight" style={{fontSize:10}}>
                                {totalCount}
                              </span>
                            )}
                          </div>

                          {/* Holiday banner */}
                          {branchClosed&&(
                            <div className="text-xs text-purple-600 font-medium bg-purple-50 rounded px-1.5 py-0.5 leading-tight truncate" title={hol.name}>
                              🎌 {hol.name}
                            </div>
                          )}

                          {/* Scheduled names */}
                          {!branchClosed && scheduledEmps.map(emp=>{
                            const clr = empColorMap[emp.emp_id] || EMP_COLORS[0];
                            return (
                              <div key={emp.emp_id}
                                className="rounded px-1.5 py-0.5 leading-tight truncate font-medium"
                                title={`${emp.name} · ${emp.role}`}
                                style={{fontSize:11, background:clr.bg, color:clr.text}}>
                                {emp.name}
                              </div>
                            );
                          })}

                          {/* No one scheduled + not a holiday */}
                          {!branchClosed && totalCount===0 && (
                            <div className="text-gray-300 text-xs italic" style={{fontSize:10}}>—</div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>

              {/* Legend */}
              <div className="px-4 py-2.5 border-t border-gray-100 bg-gray-50/70 flex flex-wrap items-center gap-x-5 gap-y-1.5 shrink-0">
                <div className="flex items-center gap-1.5 text-xs text-gray-500">
                  <span className="inline-flex items-center justify-center rounded-full font-bold bg-teal-500 text-white" style={{width:18,height:18,fontSize:10}}>8</span>
                  Today
                </div>
                <div className="flex items-center gap-1.5 text-xs text-gray-500">
                  <span className="inline-block w-4 h-3 rounded bg-emerald-50 border border-emerald-200"></span>
                  Scheduled name
                </div>
                <div className="flex items-center gap-1.5 text-xs text-gray-500">
                  <span className="inline-block w-4 h-3 rounded bg-purple-50 border border-purple-200"></span>
                  Holiday / Closed
                </div>
                <div className="flex items-center gap-1.5 text-xs text-gray-500">
                  <span className="inline-block w-4 h-3 rounded bg-slate-50 border border-slate-200"></span>
                  Weekend
                </div>
                <div className="flex items-center gap-1.5 text-xs text-emerald-600 font-semibold ml-auto">
                  <span className="bg-emerald-50 rounded-full px-1.5" style={{fontSize:10}}>3</span>
                  = staff count
                </div>
              </div>
            </div>
          )}

          {/* ════════════════════════════════════════════════════
               TABLE VIEW
          ════════════════════════════════════════════════════ */}
          {viewMode==="table" && (
            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col">
              {/* title bar */}
              <div className="px-5 py-3 border-b border-gray-100 bg-teal-50 flex items-center gap-2 shrink-0">
                <span className="text-sm font-semibold text-teal-700">{branchLabel} — {monthLabel}</span>
                <span className="text-xs text-teal-500 ml-1">· {activeEmps.length} eligible staff</span>
              </div>

              <div style={{overflowX:"auto",overflowY:"auto",maxHeight:"60vh"}}>
                <table style={{borderCollapse:"collapse",tableLayout:"fixed",minWidth:`${200+days.length*34}px`}} className="text-xs">
                  <thead>
                    <tr>
                      <th style={{position:"sticky",left:0,zIndex:10,background:"#f9fafb",width:200,minWidth:200,
                        textAlign:"left",padding:"8px 14px",borderRight:"2px solid #e5e7eb",borderBottom:"2px solid #e5e7eb"}}
                        className="text-xs font-medium text-gray-500 uppercase tracking-wide whitespace-nowrap">
                        Employee
                      </th>
                      {days.map(dateStr=>{
                        const d = new Date(dateStr+"T00:00:00");
                        const dayNum = d.getDate();
                        const dayInit = DAY_INITIALS[d.getDay()];
                        const isToday = dateStr===TODAY;
                        const isWE = d.getDay()===0||d.getDay()===6;
                        const hol = holidayMap[dateStr];
                        const closed = hol&&(branch==="HQ"?hol.closedHQ:hol.closedLC);
                        return (
                          <th key={dateStr} title={closed?hol.name:undefined}
                            style={{width:34,minWidth:34,padding:"4px 1px",textAlign:"center",
                              background:isToday?"#ccfbf1":closed?"#f3e8ff":isWE?"#f8fafc":"#f9fafb",
                              borderBottom:"2px solid #e5e7eb"}}>
                            <div className={`font-bold leading-tight ${isToday?"text-teal-600":closed?"text-purple-600":isWE?"text-slate-400":"text-gray-700"}`}>{dayNum}</div>
                            <div className={`leading-tight ${isToday?"text-teal-400":closed?"text-purple-400":isWE?"text-slate-300":"text-gray-400"}`}>{dayInit}</div>
                          </th>
                        );
                      })}
                    </tr>
                  </thead>
                  <tbody>
                    {activeEmps.length===0?(
                      <tr><td colSpan={days.length+1} className="text-center py-12 text-gray-400">
                        No staff eligible for {branchLabel}
                      </td></tr>
                    ):activeEmps.map((emp,ri)=>{
                      const rowBg = ri%2===0 ? "#ffffff" : "#fafafa";
                      return (
                        <tr key={emp.emp_id} style={{borderBottom:"1px solid #f3f4f6"}}>
                          <td style={{position:"sticky",left:0,zIndex:5,background:rowBg,
                            borderRight:"2px solid #e5e7eb",padding:"5px 14px",width:200,minWidth:200}}>
                            <div className="font-medium text-gray-700 truncate" style={{maxWidth:172}}>{emp.name}</div>
                            <div className="text-gray-400" style={{fontSize:"10px"}}>{emp.role}</div>
                          </td>
                          {days.map(dateStr=>{
                            const cell = getCellData(emp.emp_id, dateStr);
                            const d = new Date(dateStr+"T00:00:00");
                            const isWE = d.getDay()===0||d.getDay()===6;
                            return (
                              <td key={dateStr} title={cell?.title}
                                style={{width:34,minWidth:34,padding:"3px 1px",textAlign:"center",
                                  background:isWE?"#f8fafc":rowBg}}>
                                {cell&&(
                                  <span className={`inline-flex items-center justify-center rounded font-bold ${cell.bg} ${cell.text}`}
                                    style={{width:24,height:24,fontSize:11}}>
                                    {cell.code}
                                  </span>
                                )}
                              </td>
                            );
                          })}
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>

              <Legend/>
            </div>
          )}
        </div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [authState, setAuthState] = useState("idle");
      const [user,      setUser]      = useState(null);
      const [page,      setPage]      = useState("calendar");
      const [month,     setMonth]     = useState(THIS_MONTH);
      const [year,      setYear]      = useState(THIS_YEAR);

      const [employees,    setEmployees]    = useState(OFFLINE_MODE ? SAMPLE_EMPLOYEES : []);
      const [demand,       setDemand]       = useState([]);
      const [availability, setAvailability] = useState([]);
      const [schedule,     setSchedule]     = useState([]);
      const [holidays,     setHolidays]     = useState([]);
      const [sheetsReady,  setSheetsReady]  = useState(OFFLINE_MODE);

      useSave("Employees",    employees,    sheetsReady);
      useSave("Demand",       demand,       sheetsReady);
      useSave("Availability", availability, sheetsReady);
      useSave("Schedule",     schedule,     sheetsReady);
      useSave("Holidays",     holidays,     sheetsReady);

      function handleTokenCallback(resp) {
        if (resp.error) { setAuthState("error"); return; }
        _gTok = resp.access_token;
        fetch("https://www.googleapis.com/oauth2/v3/userinfo",{ headers:{ Authorization:`Bearer ${_gTok}` } })
          .then(r=>r.json())
          .then(info=>{
            const u={name:info.name,email:info.email,picture:info.picture};
            setUser(u);
            try { localStorage.setItem(STORAGE_KEY,JSON.stringify(u)); } catch {}
            return ensureSheetsExist();
          })
          .then(()=>sheetsLoadAll())
          .then(data=>{
            if(data.Employees?.length)    setEmployees(data.Employees);
            if(data.Demand?.length)       setDemand(data.Demand);
            if(data.Availability?.length) setAvailability(data.Availability);
            if(data.Schedule?.length)     setSchedule(data.Schedule);
            if(data.Holidays?.length)     setHolidays(data.Holidays);
            setSheetsReady(true); setAuthState("ready");
          })
          .catch(err=>{ console.error(err); setAuthState("error"); });
      }

      function signIn() {
        setAuthState("signing-in");
        google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope:"https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile",
          callback: handleTokenCallback,
        }).requestAccessToken();
      }

      function signOut() {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        try { google.accounts.oauth2.revoke(_gTok,()=>{}); } catch {}
        _gTok=null; setUser(null); setAuthState("idle"); setSheetsReady(false);
        setEmployees([]); setDemand([]); setAvailability([]); setSchedule([]); setHolidays([]);
      }

      useEffect(()=>{
        if(OFFLINE_MODE) return;
        const saved=(()=>{ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } })();
        if(!saved?.email) return;
        setUser(saved); setAuthState("signing-in");
        google.accounts.oauth2.initTokenClient({
          client_id:GOOGLE_CLIENT_ID,
          scope:"https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile",
          prompt:"", login_hint:saved.email, callback:handleTokenCallback,
        }).requestAccessToken();
      },[]);

      if (!OFFLINE_MODE && authState!=="ready") {
        return (
          <div className="min-h-screen bg-gradient-to-br from-teal-50 via-white to-emerald-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-sm w-full text-center space-y-6">
              <div className="w-16 h-16 rounded-2xl bg-teal-500 flex items-center justify-center mx-auto shadow-lg shadow-teal-200">
                <svg className="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
              </div>
              <div>
                <h1 className="text-2xl font-bold text-gray-800">UPB Scheduler</h1>
                <p className="text-sm text-gray-400 mt-1">Work Schedule Planner · HQ & Lake Club</p>
              </div>
              {authState==="signing-in"?(
                <div className="flex items-center justify-center gap-2 text-gray-400">
                  <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                  </svg>
                  Signing in…
                </div>
              ):authState==="error"?(
                <div className="space-y-3">
                  <p className="text-sm text-red-500">Sign in failed. Please try again.</p>
                  <button onClick={signIn} className="w-full py-3 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-medium text-sm transition-colors">Try Again</button>
                </div>
              ):(
                <button onClick={signIn} className="w-full py-3 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-medium text-sm transition-colors flex items-center justify-center gap-2.5">
                  <svg className="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="white"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="white"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="white"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="white"/>
                  </svg>
                  Sign in with Google
                </button>
              )}
            </div>
          </div>
        );
      }

      const sharedMonthProps = { month, year, setMonth, setYear };

      return (
        <div className="flex h-screen bg-gray-50 overflow-hidden">
          <Sidebar page={page} setPage={setPage} user={user} onSignOut={signOut}/>
          <main className="flex-1 overflow-hidden relative">
            {page==="calendar"     && <CalendarPage employees={employees} demand={demand} availability={availability} schedule={schedule} setSchedule={setSchedule} user={user} holidays={holidays} {...sharedMonthProps}/>}
            {page==="availability" && <AvailabilityPage employees={employees} availability={availability} setAvailability={setAvailability} month={month} year={year} setMonth={setMonth} setYear={setYear}/>}
            {page==="demand"       && <DemandPage demand={demand} setDemand={setDemand} holidays={holidays} month={month} year={year} setMonth={setMonth} setYear={setYear}/>}
            {page==="holidays"     && <HolidayPage holidays={holidays} setHolidays={setHolidays}/>}
            {page==="employees"    && <EmployeesPage employees={employees} setEmployees={setEmployees}/>}
            {page==="summary"        && <SummaryPage employees={employees} demand={demand} availability={availability} schedule={schedule} {...sharedMonthProps}/>}
            {page==="branch-summary" && <BranchSummaryPage employees={employees} availability={availability} schedule={schedule} holidays={holidays} month={month} year={year} setMonth={setMonth} setYear={setYear}/>}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
