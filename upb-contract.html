<style>
  *,*::before,*::after{box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#f1f5f9;margin:0;color:#111827;}
  /* Sidebar */
  .sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:12px;
    font-size:14px;font-weight:500;transition:all .15s;width:100%;text-align:left;
    border:none;cursor:pointer;background:transparent;}
  .sidebar-link.active{background:#1e4d6b;color:#fff;}
  .sidebar-link:not(.active){color:#64748b;}
  .sidebar-link:not(.active):hover{background:#e2e8f0;color:#1e293b;}
  /* Cards */
  .card{background:#fff;border-radius:16px;border:1px solid #f3f4f6;
    box-shadow:0 1px 4px rgba(0,0,0,.06);}
  /* Inputs */
  .input-cls{width:100%;border:1.5px solid #e5e7eb;border-radius:8px;
    padding:9px 12px;font-size:14px;background:#fff;font-family:'Inter',sans-serif;
    outline:none;color:#111827;transition:border-color .15s,box-shadow .15s;}
  .input-cls:focus{border-color:#2dd4bf;box-shadow:0 0 0 3px rgba(45,212,191,.18);}
  /* Buttons */
  .btn-primary{padding:9px 18px;background:#0d9488;color:#fff;font-size:14px;font-weight:600;
    border-radius:12px;transition:background .15s;display:inline-flex;align-items:center;
    gap:7px;border:none;cursor:pointer;font-family:'Inter',sans-serif;line-height:1.4;}
  .btn-primary:hover{background:#0f766e;}
  .btn-ghost{padding:9px 18px;border:1.5px solid #e5e7eb;color:#374151;font-size:14px;
    font-weight:500;border-radius:12px;transition:all .15s;background:#fff;cursor:pointer;
    font-family:'Inter',sans-serif;line-height:1.4;}
  .btn-ghost:hover{background:#f9fafb;border-color:#d1d5db;}
  /* Badges */
  .badge{display:inline-flex;align-items:center;padding:3px 10px;
    border-radius:9999px;font-size:12px;font-weight:600;gap:5px;}
  /* Table */
  .table-scroll{overflow-x:auto;}
  /* Labels inside forms */
  .form-label{display:block;font-size:12px;font-weight:600;color:#6b7280;
    margin-bottom:5px;letter-spacing:.02em;text-transform:uppercase;}
  /* Scrollbar */
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:#f1f5f9;}
  ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
  /* Modal overlay */
  .modal-overlay{position:fixed;inset:0;z-index:50;display:flex;align-items:center;
    justify-content:center;padding:16px;background:rgba(15,23,42,.55);backdrop-filter:blur(2px);}
  .modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;
    max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);}
</style>

// ─── GOOGLE SHEETS JSONP READ ───────────────────────────────────────────────
function gvizFetch(spreadsheetId, sheetName){
  return new Promise((resolve,reject)=>{
    const cbName = "_gviz_cb_"+uid();
    const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&tq=select+*&sheet=${encodeURIComponent(sheetName)}&cb=${cbName}`;
    window[cbName] = (data)=>{ delete window[cbName]; document.head.removeChild(s); resolve(data); };
    const s = document.createElement("script"); s.src=url;
    s.onerror=()=>{ delete window[cbName]; reject(new Error("gviz fetch failed")); };
    document.head.appendChild(s);
    setTimeout(()=>{ if(window[cbName]){ delete window[cbName]; reject(new Error("timeout")); } },10000);
  });
}
async function sheetsRead(spreadsheetId, sheetName){
  try{
    const raw = await gvizFetch(spreadsheetId, sheetName);
    const cols = (raw.table?.cols||[]).map(c=>c.label||c.id||"");
    const rows = (raw.table?.rows||[]).map(r=>{
      const obj={}; (r.c||[]).forEach((cell,i)=>{ obj[cols[i]] = cell?.v??cell?.f??""; }); return obj;
    });
    return rows.filter(r=>Object.values(r).some(v=>v!==null&&v!==""));
  }catch(e){ return null; }
}

// ─── GOOGLE SHEETS API READ (authenticated) ─────────────────────────────────
async function sheetsApiRead(token, spreadsheetId, tabName){
  try{
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(tabName)}`,
      {headers:{"Authorization":"Bearer "+token}}
    );
    if(!res.ok) return null;
    const json = await res.json();
    const values = json.values||[];
    if(values.length<2) return null;
    const hdrs = values[0];
    return values.slice(1)
      .map(row=>{ const o={}; hdrs.forEach((h,i)=>{ o[h]=row[i]??""; }); return o; })
      .filter(r=>Object.values(r).some(v=>v!==""));
  }catch(e){ return null; }
}

// ─── GOOGLE SHEETS API WRITE ────────────────────────────────────────────────
async function sheetsApiWrite(token, spreadsheetId, tabName, headers, rows){
  const body = [headers, ...rows.map(r=>headers.map(h=>r[h]??""  ))];
  const range = `${tabName}!A1`;
  await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(range)}?valueInputOption=RAW`, {
    method:"PUT", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
    body:JSON.stringify({range,majorDimension:"ROWS",values:body})
  });
}
async function sheetsEnsure(token, spreadsheetId, tabName, headers){
  // Add sheet tab if missing
  const meta = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}?fields=sheets.properties.title`,
    {headers:{"Authorization":"Bearer "+token}}).then(r=>r.json());
  const exists = (meta.sheets||[]).some(s=>s.properties.title===tabName);
  if(!exists){
    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}:batchUpdate`,{
      method:"POST", headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({requests:[{addSheet:{properties:{title:tabName}}}]})
    });
    // Write header row
    await sheetsApiWrite(token, spreadsheetId, tabName, headers, []);
  }
}

// ─── AUTH STATE ─────────────────────────────────────────────────────────────
function useAuth(){
  const [token,setToken] = useState(null);
  const [gisReady,setGisReady] = useState(false);
  const clientRef = useRef(null);

  useEffect(()=>{
    const s=document.createElement("script"); s.src="https://accounts.google.com/gsi/client"; s.async=true;
    s.onload=()=>setGisReady(true); document.head.appendChild(s);
  },[]);

  const initClient = useCallback(()=>{
    if(!gisReady||clientRef.current) return;
    clientRef.current = google.accounts.oauth2.initTokenClient({
      client_id: GOOGLE_CLIENT_ID, scope: SCOPES,
      callback:(resp)=>{ if(resp.access_token){ setToken(resp.access_token); } }
    });
  },[gisReady]);

  useEffect(()=>{ initClient(); },[initClient]);

  const login = useCallback(()=>{ if(clientRef.current) clientRef.current.requestAccessToken(); },[]);

  return { token, login, gisReady };
}

// ─── useSave HOOK ────────────────────────────────────────────────────────────
function useSave(tabName, headers, initial){
  const [data,   setData]   = useState(initial);
  const [synced, setSynced] = useState(false);
  const [dirty,  setDirty]  = useState(false);
  const tokenRef = useRef(null);

  // On login: authenticated read from Sheets to get the latest data,
  // then push seed data if the tab is empty.
  const setToken = useCallback((t)=>{
    tokenRef.current = t;
    if(SPREADSHEET_ID==="YOUR_SPREADSHEET_ID_HERE") return;
    sheetsApiRead(t, SPREADSHEET_ID, tabName).then(rows=>{
      if(rows && rows.length>0){
        setData(rows);   // ← sync latest Sheets data into local state
      } else {
        setDirty(true);  // ← sheet empty: push seed/current data up
      }
    });
  },[tabName]);

  // On mount: unauthenticated read (works for public sheets / gviz)
  useEffect(()=>{
    if(SPREADSHEET_ID==="YOUR_SPREADSHEET_ID_HERE") return;
    sheetsRead(SPREADSHEET_ID, tabName).then(rows=>{
      if(rows && rows.length>0) setData(rows);
      setSynced(true);
    }).catch(()=>setSynced(true));
  },[tabName]);

  // Write to Sheets whenever dirty and token is available
  useEffect(()=>{
    if(!dirty||!tokenRef.current||SPREADSHEET_ID==="YOUR_SPREADSHEET_ID_HERE") return;
    const t = setTimeout(async ()=>{
      await sheetsEnsure(tokenRef.current, SPREADSHEET_ID, tabName, headers);
      await sheetsApiWrite(tokenRef.current, SPREADSHEET_ID, tabName, headers, data);
      setDirty(false);
    },1200);
    return ()=>clearTimeout(t);
  },[data, dirty, tabName, headers]);

  // Force push (called by Sync button)
  const forcePush = useCallback(()=>{ if(tokenRef.current) setDirty(true); },[]);

  const update = useCallback((fn)=>{ setData(fn); setDirty(true); },[]);
  return [data, update, synced, setToken, forcePush];
}

      <h3 style={{fontSize:17,fontWeight:700,color:"#111827",margin:"0 0 8px"}}>{title}</h3>
      <p style={{fontSize:14,color:"#6b7280",margin:"0 0 24px",lineHeight:1.6}}>{message}</p>
      <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
        <button onClick={onCancel} className="btn-ghost">Cancel</button>
        <button onClick={onConfirm} style={{padding:"9px 20px",borderRadius:12,border:"none",cursor:"pointer",
          fontSize:14,fontWeight:600,color:"#fff",
          background:danger?"#ef4444":"#0d9488"}}>Confirm</button>
      </div>
    </div>
  </div>;
}

function KpiCard({label,value,sub,color}){
  return <div className="card p-5">
    <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>{label}</p>
    <p style={{fontSize:30,fontWeight:800,margin:"4px 0 2px"}} className={color||""}>{value}</p>
    {sub&&<p style={{fontSize:12,color:"#9ca3af"}}>{sub}</p>}
  </div>;
}

function SectionHeader({title,action}){
  return <div className="flex items-center justify-between mb-5">
    <h2 style={{fontSize:22,fontWeight:700,color:"#111827",margin:0}}>{title}</h2>
    {action}
  </div>;
}

// ─── DASHBOARD PAGE ─────────────────────────────────────────────────────────
function DashboardPage({orders,customers,queue}){
  const active  = orders.filter(o=>!["Delivered","Rejected"].includes(o.status));
  const pending = orders.filter(o=>["Initiated","Processing","Quotation Sent"].includes(o.status));
  const brewing = orders.filter(o=>["Scheduled","Brewing","Tasting","Packaging"].includes(o.status));
  const ready   = orders.filter(o=>o.status==="Ready");

  // pipeline counts
  const pipelineCounts = CONTRACT_STATUSES.filter(s=>s!=="Rejected").map(s=>({
    status:s, count:orders.filter(o=>o.status===s).length
  })).filter(x=>x.count>0);

  const recentOrders = [...orders].sort((a,b)=>(b.order_no||"").localeCompare(a.order_no||"")).slice(0,6);

  return <div className="space-y-6">
    <div>
      <h2 className="text-2xl font-bold text-gray-900 mb-1">Dashboard</h2>
      <p className="text-sm text-gray-400">Contract brewing overview</p>
    </div>

    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
      <KpiCard label="Active Orders" value={active.length} color="text-blue-600"/>
      <KpiCard label="Pending Quote" value={pending.length} color="text-yellow-600"/>
      <KpiCard label="In Production" value={brewing.length} color="text-teal-600"/>
      <KpiCard label="Ready to Ship" value={ready.length} color="text-green-600"/>
    </div>

    <div className="grid lg:grid-cols-2 gap-6">
      {/* Pipeline */}
      <div className="card p-5">
        <h3 className="font-semibold text-gray-800 mb-4">Order Pipeline</h3>
        <div className="space-y-2">
          {pipelineCounts.length===0
            ? <p className="text-sm text-gray-400">No active orders</p>
            : pipelineCounts.map(({status,count})=>{
                const cfg = STATUS_CFG[status]||{};
                return <div key={status} className="flex items-center gap-3">
                  <StatusBadge status={status}/>
                  <div className="flex-1 bg-gray-100 rounded-full h-2">
                    <div className={`h-2 rounded-full ${cfg.dot||"bg-gray-300"}`} style={{width:`${Math.min(100,count*20)}%`}}/>
                  </div>
                  <span className="text-sm font-medium text-gray-600 w-6 text-right">{count}</span>
                </div>;
              })
          }
        </div>
      </div>

      {/* Recent orders */}
      <div className="card p-5">
        <h3 className="font-semibold text-gray-800 mb-4">Recent Orders</h3>
        {recentOrders.length===0
          ? <p className="text-sm text-gray-400">No orders yet</p>
          : <div className="space-y-2">
              {recentOrders.map(o=><div key={o.id} className="flex items-start justify-between py-2 border-b border-gray-50 last:border-0">
                <div>
                  <p className="text-sm font-medium text-gray-800">{o.beer_name||"—"}</p>
                  <p className="text-xs text-gray-400">{o.customer_name} · #{o.order_no}</p>
                </div>
                <StatusBadge status={o.status}/>
              </div>)}
            </div>
        }
      </div>
    </div>

    {/* Customers summary */}
    <div className="card p-5">
      <h3 className="font-semibold text-gray-800 mb-3">Customers ({customers.length})</h3>
      {customers.length===0
        ? <p className="text-sm text-gray-400">No customers yet. Add your first customer in the Customers section.</p>
        : <div className="flex flex-wrap gap-2">
            {customers.map(c=>{
              const cnt = orders.filter(o=>o.customer_id===c.id).length;
              return <div key={c.id} className="flex items-center gap-2 bg-gray-50 rounded-xl px-3 py-2">
                <div className="w-7 h-7 rounded-full bg-teal-100 flex items-center justify-center text-xs font-bold text-teal-700">
                  {(c.name||"?")[0].toUpperCase()}
                </div>
                <div>
                  <p className="text-sm font-medium text-gray-800">{c.name}</p>
                  <p className="text-xs text-gray-400">{cnt} order{cnt!==1?"s":""}</p>
                </div>
              </div>;
            })}

      }
    </div>
  </div>;
}

// ─── CUSTOMERS PAGE ──────────────────────────────────────────────────────────
function CustomersPage({customers,setCustomers,cbeers,setCbeers,orders}){
  const [showModal,setShowModal] = useState(false);
  const [editId, setEditId]      = useState(null);
  const [form,setForm]           = useState({name:"",contact_name:"",phone:"",email:"",address:"",notes:""});
  const [view,setView]           = useState(null); // customer id being viewed
  const [delId,setDelId]         = useState(null);
  const [beerModal,setBeerModal] = useState(false);
  const [beerForm,setBeerForm]   = useState({brand:"",beer_name:"",style:"",abv:"",recipe_id:"",notes:""});
  const [editBeerId,setEditBeerId]=useState(null);

  const openAdd  = ()=>{ setForm({name:"",contact_name:"",phone:"",email:"",address:"",notes:""}); setEditId(null); setShowModal(true); };
  const openEdit = (c)=>{ setForm({name:c.name,contact_name:c.contact_name||"",phone:c.phone||"",email:c.email||"",address:c.address||"",notes:c.notes||""}); setEditId(c.id); setShowModal(true); };

  const handleSave = (e)=>{
    e.preventDefault();
    if(editId){
      setCustomers(p=>p.map(c=>c.id===editId?{...c,...form}:c));
    } else {
      setCustomers(p=>[...p,{id:uid(),...form,created_date:today()}]);
    }
    setShowModal(false);
  };

  const handleDelete = ()=>{
    setCustomers(p=>p.filter(c=>c.id!==delId));
    setCbeers(p=>p.filter(b=>b.customer_id!==delId));
    if(view===delId) setView(null);
    setDelId(null);
  };

  // Beer management for viewed customer
  const openAddBeer = ()=>{ setBeerForm({brand:"",beer_name:"",style:"",abv:"",recipe_id:"",notes:""}); setEditBeerId(null); setBeerModal(true); };
  const openEditBeer= (b)=>{ setBeerForm({brand:b.brand||"",beer_name:b.beer_name||"",style:b.style||"",abv:b.abv||"",recipe_id:b.recipe_id||"",notes:b.notes||""}); setEditBeerId(b.id); setBeerModal(true); };
  const handleSaveBeer=(e)=>{
    e.preventDefault();
    if(editBeerId){
      setCbeers(p=>p.map(b=>b.id===editBeerId?{...b,...beerForm}:b));
    } else {
      setCbeers(p=>[...p,{id:uid(),customer_id:view,...beerForm}]);
    }
    setBeerModal(false);
  };

  const viewedCustomer = customers.find(c=>c.id===view);
  const viewedBeers    = cbeers.filter(b=>b.customer_id===view);
  const viewedOrders   = orders.filter(o=>o.customer_id===view);

  if(view && viewedCustomer) return (
    <div className="space-y-6">
      <div className="flex items-center gap-3">
        <button onClick={()=>setView(null)} className="btn-ghost text-sm">← Back</button>
        <div>
          <h2 className="text-2xl font-bold text-gray-900">{viewedCustomer.name}</h2>
          <p className="text-sm text-gray-400">{viewedCustomer.contact_name} · {viewedCustomer.phone} · {viewedCustomer.email}</p>
        </div>
        <button onClick={()=>openEdit(viewedCustomer)} className="ml-auto btn-ghost text-sm">Edit Profile</button>
      </div>

      {/* Beer list for customer */}
      <div className="card p-5">
        <SectionHeader title="Their Beers" action={<button onClick={openAddBeer} className="btn-primary text-xs px-3 py-2">+ Add Beer</button>}/>
        {viewedBeers.length===0
          ? <p className="text-sm text-gray-400">No beers added yet.</p>
          : <div className="table-scroll">
              <table className="w-full text-sm">
                <thead><tr className="text-left text-xs text-gray-400 border-b border-gray-100">
                  <th className="pb-2 font-medium">Brand</th><th className="pb-2 font-medium">Beer Name</th>
                  <th className="pb-2 font-medium">Style</th><th className="pb-2 font-medium">ABV</th><th className="pb-2"/>
                </tr></thead>
                <tbody>{viewedBeers.map(b=><tr key={b.id} className="border-b border-gray-50 hover:bg-gray-50">
                  <td className="py-2 pr-3 font-medium text-gray-800">{b.brand||"—"}</td>
                  <td className="py-2 pr-3">{b.beer_name}</td>
                  <td className="py-2 pr-3 text-gray-500">{b.style||"—"}</td>
                  <td className="py-2 pr-3 text-gray-500">{b.abv||"—"}%</td>
                  <td className="py-2 flex gap-2 justify-end">
                    <button onClick={()=>openEditBeer(b)} className="text-xs text-indigo-500 hover:text-indigo-700">Edit</button>
                    <button onClick={()=>setCbeers(p=>p.filter(x=>x.id!==b.id))} className="text-xs text-red-400 hover:text-red-600">Del</button>
                  </td>
                </tr>)}</tbody>
              </table>
            </div>
        }
      </div>

      {/* Order history */}
      <div className="card p-5">
        <SectionHeader title={`Order History (${viewedOrders.length})`}/>
        {viewedOrders.length===0
          ? <p className="text-sm text-gray-400">No orders yet.</p>
          : <div className="space-y-2">
              {viewedOrders.map(o=><div key={o.id} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                <div>
                  <p className="text-sm font-medium text-gray-800">{o.beer_name}</p>
                  <p className="text-xs text-gray-400">#{o.order_no} · {o.volume_litres}L · {o.brew_date||"—"}</p>
                </div>
                <StatusBadge status={o.status}/>
              </div>)}
            </div>
        }
      </div>

      {/* Beer modal */}
      <Modal open={beerModal} onClose={()=>setBeerModal(false)} title={editBeerId?"Edit Beer":"Add Beer"}>
        <form onSubmit={handleSaveBeer} className="space-y-3">
          <div className="grid grid-cols-2 gap-3">
            <div><label className="form-label">Brand</label><input className="input-cls" value={beerForm.brand} onChange={e=>setBeerForm(f=>({...f,brand:e.target.value}))}/></div>
            <div><label className="form-label">Beer Name *</label><input required className="input-cls" value={beerForm.beer_name} onChange={e=>setBeerForm(f=>({...f,beer_name:e.target.value}))}/></div>
            <div><label className="form-label">Style</label><input className="input-cls" value={beerForm.style} onChange={e=>setBeerForm(f=>({...f,style:e.target.value}))}/></div>
            <div><label className="form-label">ABV %</label><input type="number" step="0.1" className="input-cls" value={beerForm.abv} onChange={e=>setBeerForm(f=>({...f,abv:e.target.value}))}/></div>
          </div>
          <div><label className="form-label">Notes</label><textarea className="input-cls" rows={2} value={beerForm.notes} onChange={e=>setBeerForm(f=>({...f,notes:e.target.value}))}/></div>
          <div className="flex gap-3 justify-end pt-2">
            <button type="button" onClick={()=>setBeerModal(false)} className="btn-ghost">Cancel</button>
            <button type="submit" className="btn-primary">Save</button>
          </div>
        </form>
      </Modal>
    </div>
  );

  return (
    <div className="space-y-6">
      <SectionHeader title="Customers" action={<button onClick={openAdd} className="btn-primary">+ Add Customer</button>}/>

      {customers.length===0
        ? <div className="card p-10 text-center text-gray-400">No customers yet. Add your first client.</div>
        : <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
            {customers.map(c=>{
              const cnt = orders.filter(o=>o.customer_id===c.id).length;
              return <div key={c.id} className="card p-5 cursor-pointer hover:shadow-md transition-shadow" onClick={()=>setView(c.id)}>
                <div className="flex items-start justify-between mb-3">
                  <div className="w-10 h-10 rounded-full bg-teal-100 flex items-center justify-center text-lg font-bold text-teal-700">
                    {(c.name||"?")[0].toUpperCase()}
                  </div>
                  <div className="flex gap-1" onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>openEdit(c)} className="p-1 rounded hover:bg-gray-100 text-gray-400 text-sm">✏️</button>
                    <button onClick={()=>setDelId(c.id)} className="p-1 rounded hover:bg-gray-100 text-red-300 text-sm">🗑</button>
                  </div>
                </div>
                <p className="font-semibold text-gray-900">{c.name}</p>
                <p className="text-sm text-gray-500">{c.contact_name}</p>
                <p className="text-xs text-gray-400 mt-1">{c.email}</p>
                <p className="text-xs text-gray-400">{c.phone}</p>
                <div className="mt-3 pt-3 border-t border-gray-100 flex gap-4 text-xs text-gray-400">
                  <span>{cnt} order{cnt!==1?"s":""}</span>
                  <span>{cbeers.filter(b=>b.customer_id===c.id).length} beer{cbeers.filter(b=>b.customer_id===c.id).length!==1?"s":""}</span>
                </div>
              </div>;
            })}
          </div>
      }

      {/* Add/Edit modal */}
      <Modal open={showModal} onClose={()=>setShowModal(false)} title={editId?"Edit Customer":"New Customer"}>
        <form onSubmit={handleSave} className="space-y-3">
          <div><label className="form-label">Company / Customer Name *</label><input required className="input-cls" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div className="grid grid-cols-2 gap-3">
            <div><label className="form-label">Contact Person</label><input className="input-cls" value={form.contact_name} onChange={e=>setForm(f=>({...f,contact_name:e.target.value}))}/></div>
            <div><label className="form-label">Phone</label><input className="input-cls" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))}/></div>
            <div><label className="form-label">Email</label><input type="email" className="input-cls" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))}/></div>
            <div><label className="form-label">Address</label><input className="input-cls" value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))}/></div>
          </div>
          <div><label className="form-label">Notes</label><textarea className="input-cls" rows={2} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
          <div className="flex gap-3 justify-end pt-2">
            <button type="button" onClick={()=>setShowModal(false)} className="btn-ghost">Cancel</button>
            <button type="submit" className="btn-primary">Save</button>
          </div>
        </form>
      </Modal>

      <ConfirmModal open={!!delId} danger title="Delete Customer"
        message="This will also delete all their beers. Orders will remain. Continue?"
        onConfirm={handleDelete} onCancel={()=>setDelId(null)}/>
    </div>
  );
}

// ─── INGREDIENTS PAGE ────────────────────────────────────────────────────────
function IngredientsPage({ingredients,setIngredients}){
  const [catFilter,setCatFilter] = useState("All");
  const [search,setSearch]       = useState("");
  const [showModal,setShowModal] = useState(false);
  const [editId,setEditId]       = useState(null);
  const emptyForm = ()=>({category:"Misc",supplier:"",name:"",purchase_size:"",purchase_unit:"kg",purchase_price:"",use_qty:"",use_unit:"g",cost_per_unit:""});
  const [form,setForm] = useState(emptyForm());

  const categories = ["All","Malt","Hop","Yeast","Misc"];
  const filtered = useMemo(()=> ingredients.filter(i=>{
    const catOk = catFilter==="All"||i.category===catFilter;
    const srchOk = !search||(i.name||"").toLowerCase().includes(search.toLowerCase())||(i.supplier||"").toLowerCase().includes(search.toLowerCase());
    return catOk&&srchOk;
  }),[ingredients,catFilter,search]);

  const openAdd  = ()=>{ setForm(emptyForm()); setEditId(null); setShowModal(true); };
  const openEdit = (ing)=>{ setForm({...ing}); setEditId(ing.id); setShowModal(true); };

  const autoCalc = (f)=>{
    const ps = parseFloat(f.purchase_size)||1;
    const pp = parseFloat(f.purchase_price)||0;
    const uq = parseFloat(f.use_qty)||1;
    // cost_per_unit = price / (purchase_size * 1000 / use_qty) when units match
    // simplified: price per use_unit = pp / (ps * factor)
    const cpu = ps>0 && uq>0 ? pp/ps/(uq>0?uq:1) : 0;
    return {...f, cost_per_unit: cpu>0?+cpu.toFixed(4):f.cost_per_unit};
  };

  const handleSave=(e)=>{
    e.preventDefault();
    const calc = autoCalc(form);
    if(editId){
      setIngredients(p=>p.map(i=>i.id===editId?{...i,...calc}:i));
    } else {
      const maxId = ingredients.reduce((m,i)=>Math.max(m,+i.id||0),0);
      setIngredients(p=>[...p,{id:maxId+1,...calc}]);
    }
    setShowModal(false);
  };

  const catColors = {Malt:"bg-amber-100 text-amber-700",Hop:"bg-green-100 text-green-700",Yeast:"bg-purple-100 text-purple-700",Misc:"bg-gray-100 text-gray-600"};

  return <div className="space-y-5">
    <SectionHeader title="Ingredients & Pricing" action={<button onClick={openAdd} className="btn-primary">+ Add Ingredient</button>}/>

    <div className="flex flex-wrap gap-3">
      <input className="input-cls flex-1 min-w-40 max-w-64" placeholder="Search name or supplier…" value={search} onChange={e=>setSearch(e.target.value)}/>
      <div className="flex gap-1 flex-wrap">
        {categories.map(c=><button key={c} onClick={()=>setCatFilter(c)}
          className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-colors ${catFilter===c?"bg-teal-600 text-white":"bg-white border border-gray-200 text-gray-600 hover:bg-gray-50"}`}>{c}</button>)}
      </div>
    </div>

    <div className="card table-scroll">
      <table className="w-full text-sm">
        <thead className="bg-gray-50 border-b border-gray-100">
          <tr className="text-left text-xs text-gray-400">
            <th className="px-4 py-3 font-medium">Category</th>
            <th className="px-4 py-3 font-medium">Name</th>
            <th className="px-4 py-3 font-medium">Supplier</th>
            <th className="px-4 py-3 font-medium text-right">Pack Size</th>
            <th className="px-4 py-3 font-medium text-right">Pack Price (฿)</th>
            <th className="px-4 py-3 font-medium text-right">Use Qty</th>
            <th className="px-4 py-3 font-medium text-right">Cost/Unit (฿)</th>
            <th className="px-4 py-3 font-medium"/>
          </tr>
        </thead>
        <tbody>
          {filtered.length===0
            ? <tr><td colSpan={8} className="px-4 py-8 text-center text-gray-400">No ingredients match filter</td></tr>
            : filtered.map(ing=><tr key={ing.id} className="border-b border-gray-50 hover:bg-gray-50">
                <td className="px-4 py-2.5"><span className={`badge ${catColors[ing.category]||"bg-gray-100 text-gray-600"}`}>{ing.category}</span></td>
                <td className="px-4 py-2.5 font-medium text-gray-800">{ing.name}</td>
                <td className="px-4 py-2.5 text-gray-500">{ing.supplier||"—"}</td>
                <td className="px-4 py-2.5 text-right text-gray-500">{ing.purchase_size} {ing.purchase_unit}</td>
                <td className="px-4 py-2.5 text-right text-gray-700">฿{(+ing.purchase_price||0).toLocaleString()}</td>
                <td className="px-4 py-2.5 text-right text-gray-500">{ing.use_qty} {ing.use_unit}</td>
                <td className="px-4 py-2.5 text-right font-medium text-teal-700">฿{(+ing.cost_per_unit||0).toFixed(3)}</td>
                <td className="px-4 py-2.5 text-right">
                  <button onClick={()=>openEdit(ing)} className="text-xs text-indigo-500 hover:text-indigo-700 mr-2">Edit</button>
                  <button onClick={()=>setIngredients(p=>p.filter(x=>x.id!==ing.id))} className="text-xs text-red-400 hover:text-red-600">Del</button>
                </td>
              </tr>)
          }
        </tbody>
      </table>
    </div>
    <p className="text-xs text-gray-400">{filtered.length} of {ingredients.length} ingredients</p>

    <Modal open={showModal} onClose={()=>setShowModal(false)} title={editId?"Edit Ingredient":"Add Ingredient"}>
      <form onSubmit={handleSave} className="space-y-3">
        <div className="grid grid-cols-2 gap-3">
          <div>
            <label className="form-label">Category</label>
            <select className="input-cls" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
              {["Misc","Malt","Hop","Yeast"].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div><label className="form-label">Name *</label><input required className="input-cls" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div>
          <div><label className="form-label">Supplier</label><input className="input-cls" value={form.supplier} onChange={e=>setForm(f=>({...f,supplier:e.target.value}))}/></div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="form-label">Pack Size</label><input type="number" step="0.001" className="input-cls" value={form.purchase_size} onChange={e=>setForm(f=>({...f,purchase_size:e.target.value}))}/></div>
            <div><label className="form-label">Unit</label>
              <select className="input-cls" value={form.purchase_unit} onChange={e=>setForm(f=>({...f,purchase_unit:e.target.value}))}>
                {["kg","g","L","mL","tablet","sachet","packet"].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
          </div>
          <div><label className="form-label">Pack Price (฿)</label><input type="number" step="0.01" className="input-cls" value={form.purchase_price} onChange={e=>setForm(f=>({...f,purchase_price:e.target.value}))}/></div>
          <div className="grid grid-cols-2 gap-2">
            <div><label className="form-label">Use Qty</label><input type="number" step="0.001" className="input-cls" value={form.use_qty} onChange={e=>setForm(f=>({...f,use_qty:e.target.value}))}/></div>
            <div><label className="form-label">Use Unit</label>
              <select className="input-cls" value={form.use_unit} onChange={e=>setForm(f=>({...f,use_unit:e.target.value}))}>
                {["g","kg","mL","L","tablet","sachet"].map(u=><option key={u}>{u}</option>)}
              </select>
            </div>
          </div>
          <div><label className="form-label">Cost / Use Unit (฿) <span className="text-teal-500">(auto)</span></label>
            <input type="number" step="0.0001" className="input-cls" value={form.cost_per_unit} onChange={e=>setForm(f=>({...f,cost_per_unit:e.target.value}))}/>
          </div>
        </div>
        <div className="flex gap-3 justify-end pt-2">
          <button type="button" onClick={()=>setShowModal(false)} className="btn-ghost">Cancel</button>
          <button type="submit" className="btn-primary">Save</button>
        </div>
      </form>
    </Modal>
  </div>;
}

</script>

<script type="text/babel">
// ─── RECIPES PAGE ────────────────────────────────────────────────────────────
function RecipesPage({recipes,setRecipes,ringredients,setRingredients,ingredients,customers,cbeers}){
  const [showModal,setShowModal] = useState(false);
  const [editId,setEditId]       = useState(null);
  const [viewId,setViewId]       = useState(null);
  const [delId,setDelId]         = useState(null);
  const [ingSearch,setIngSearch] = useState("");

  const emptyForm = ()=>({
    recipe_code:"", customer_id:"", beer_id:"", beer_name:"", brand:"", style:"", abv:"",
    batch_size_litres:1000, misc_pct:5, notes:""
  });
  const [form,setForm]   = useState(emptyForm());
  const [ingLines,setIngLines] = useState([]);

  // Beers filtered by selected customer
  const customerBeers = useMemo(()=>
    form.customer_id ? cbeers.filter(b=>b.customer_id===form.customer_id) : []
  ,[form.customer_id, cbeers]);

  // Auto-fill beer info when beer_id changes
  const handleBeerSelect = (beer_id)=>{
    const b = cbeers.find(x=>x.id===beer_id);
    setForm(f=>({...f, beer_id,
      beer_name: b?.beer_name||"", brand: b?.brand||"",
      style: b?.style||"", abv: b?.abv||"",
    }));
  };

  // Auto-generate recipe code
  const autoCode = useCallback((custId, beerName)=>{
    const c = customers.find(x=>x.id===custId);
    const cPart = (c?.name||"RCP").replace(/\s+/g,"").toUpperCase().slice(0,4);
    const bPart = (beerName||"BEER").replace(/\s+/g,"").toUpperCase().slice(0,5);
    const seq   = String(recipes.filter(r=>r.customer_id===custId).length+1).padStart(3,"0");
    return `${cPart}-${bPart}-${seq}`;
  },[customers,recipes]);

  const openAdd = ()=>{
    setForm(emptyForm()); setIngLines([]); setEditId(null); setShowModal(true);
  };
  const openEdit = (r)=>{
    const b = cbeers.find(x=>x.beer_name===r.beer_name && x.customer_id===r.customer_id);
    setForm({recipe_code:r.recipe_code||"",customer_id:r.customer_id||"",
      beer_id:b?.id||"", beer_name:r.beer_name||"", brand:r.brand||"",
      style:r.style||"", abv:r.abv||"",
      batch_size_litres:r.batch_size_litres||1000, misc_pct:r.misc_pct||5, notes:r.notes||""});
    setIngLines(ringredients.filter(ri=>ri.recipe_id===r.id).map(ri=>({...ri})));
    setEditId(r.id); setShowModal(true);
  };

  // When customer+beer set and no code yet, auto-generate
  useEffect(()=>{
    if(!editId && form.customer_id && form.beer_name && !form.recipe_code){
      setForm(f=>({...f, recipe_code: autoCode(f.customer_id, f.beer_name)}));
    }
  },[form.customer_id, form.beer_name]);

  // Ingredient search suggest
  const ingSuggest = useMemo(()=>{
    if(!ingSearch) return [];
    const q = ingSearch.toLowerCase();
    return ingredients.filter(i=>(i.name||"").toLowerCase().includes(q)).slice(0,8);
  },[ingredients, ingSearch]);

  const addIngLine = (ing)=>{
    if(ingLines.some(l=>l.ingredient_name===ing.name)) return;
    setIngLines(p=>[...p,{
      id:uid(), ingredient_name:ing.name,
      purchase_size:ing.purchase_size, purchase_unit:ing.purchase_unit,
      cost_per_unit:ing.cost_per_unit,
      yield_pct:100, use_qty:ing.use_qty, use_unit:ing.use_unit,
      line_cost:0
    }]);
    setIngSearch("");
  };

  const updateLine = (idx,field,val)=>{
    setIngLines(p=>p.map((l,i)=>{
      if(i!==idx) return l;
      const upd = {...l,[field]:val};
      const actualCost = (parseFloat(upd.cost_per_unit)||0) / ((parseFloat(upd.yield_pct)||100)/100);
      upd.line_cost = (parseFloat(upd.use_qty)||0) * actualCost;
      return upd;
    }));
  };

  const rmCost   = useMemo(()=>ingLines.reduce((s,l)=>{
    const ac = (parseFloat(l.cost_per_unit)||0)/((parseFloat(l.yield_pct)||100)/100);
    return s+(parseFloat(l.use_qty)||0)*ac;
  },0),[ingLines]);
  const miscCost = rmCost*(parseFloat(form.misc_pct)||0)/100;
  const totalCost= rmCost+miscCost;

  const handleSave=(e)=>{
    e.preventDefault();
    const rid = editId||uid();
    const perL = form.batch_size_litres>0 ? totalCost/(+form.batch_size_litres) : 0;
    const saveForm = {...form, per_litre:perL};
    if(editId){
      setRecipes(p=>p.map(r=>r.id===editId?{...r,...saveForm,total_cost:totalCost}:r));
      setRingredients(p=>[...p.filter(ri=>ri.recipe_id!==editId),...ingLines.map(l=>({...l,recipe_id:editId}))]);
    } else {
      setRecipes(p=>[...p,{id:rid,...saveForm,total_cost:totalCost}]);
      setRingredients(p=>[...p,...ingLines.map(l=>({...l,id:uid(),recipe_id:rid}))]);
    }
    setShowModal(false);
  };

  const handleDelete=()=>{
    setRecipes(p=>p.filter(r=>r.id!==delId));
    setRingredients(p=>p.filter(ri=>ri.recipe_id!==delId));
    if(viewId===delId) setViewId(null);
    setDelId(null);
  };

  const getCustomerName=(id)=>customers.find(c=>c.id===id)?.name||"—";

  // ── DETAIL VIEW ────────────────────────────────────────────────────────────
  const viewedRecipe = recipes.find(r=>r.id===viewId);
  const viewedLines  = ringredients.filter(ri=>ri.recipe_id===viewId);

  if(viewId && viewedRecipe){
    const rm2 = viewedLines.reduce((s,l)=>{
      const ac=(parseFloat(l.cost_per_unit)||0)/((parseFloat(l.yield_pct)||100)/100);
      return s+(parseFloat(l.use_qty)||0)*ac;
    },0);
    const misc2  = rm2*(+viewedRecipe.misc_pct||0)/100;
    const total2 = rm2+misc2;
    const perL2  = viewedRecipe.batch_size_litres>0 ? total2/(+viewedRecipe.batch_size_litres) : 0;
    const custName = getCustomerName(viewedRecipe.customer_id);

    return <div className="space-y-5">
      {/* Toolbar */}
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setViewId(null)} className="btn-ghost" style={{fontSize:13}}>← Back</button>
        <div style={{flex:1}}/>
        <button onClick={()=>openEdit(viewedRecipe)} className="btn-ghost" style={{fontSize:13}}>✏️ Edit</button>
        <button onClick={()=>setDelId(viewId)} style={{padding:"9px 14px",borderRadius:12,border:"1.5px solid #fca5a5",background:"#fff",color:"#ef4444",fontSize:13,fontWeight:600,cursor:"pointer"}}>🗑 Delete</button>
      </div>

      {/* Excel-style header card */}
      <div className="card" style={{overflow:"hidden"}}>
        {/* Title banner */}
        <div style={{background:"#1e4d6b",color:"#fff",padding:"10px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:16,fontWeight:700,letterSpacing:".04em"}}>UPB Beer Recipe</span>
          <span style={{fontSize:12,opacity:.7,fontFamily:"monospace"}}>{viewedRecipe.recipe_code}</span>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:0}}>
          {/* Left: header fields */}
          <div style={{padding:"16px 20px",borderRight:"1px solid #f3f4f6"}}>
            {[["Brand", viewedRecipe.brand||custName],["Beer Name",viewedRecipe.beer_name],
              ["Style",viewedRecipe.style||"—"],["Batch Volume",`${viewedRecipe.batch_size_litres} L`]
            ].map(([k,v])=><div key={k} style={{display:"flex",gap:12,padding:"4px 0",borderBottom:"1px solid #f9fafb"}}>
              <span style={{width:110,fontSize:13,fontWeight:600,color:"#374151",flexShrink:0}}>{k}</span>
              <span style={{fontSize:13,color:"#111827"}}>{v}</span>
            </div>)}
          </div>
          {/* Right: cost summary */}
          <div style={{padding:"16px 24px",background:"#fafafa",minWidth:220}}>
            <div style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Cost Summary</div>
            {[
              ["Ingredients",fmtThb(rm2),"#0d9488"],
              [`Misc (${viewedRecipe.misc_pct}%)`,fmtThb(misc2),"#d97706"],
              ["Per Litre",fmtThb(perL2),"#6366f1"],
              ["Total Cost",fmtThb(total2),"#e76f51"],
            ].map(([k,v,clr])=><div key={k} style={{display:"flex",justifyContent:"space-between",gap:16,padding:"5px 0",borderBottom:"1px solid #f3f4f6"}}>
              <span style={{fontSize:13,color:"#6b7280"}}>{k}</span>
              <span style={{fontSize:14,fontWeight:700,color:clr}}>{v}</span>
            </div>)}
          </div>
        </div>
      </div>

      {/* Ingredient table */}
      <div className="card table-scroll">
        <table style={{width:"100%",fontSize:13,borderCollapse:"collapse"}}>
          <thead>
            <tr style={{background:"#1e4d6b",color:"#fff"}}>
              <th style={{padding:"10px 12px",textAlign:"left",fontWeight:600,width:32}}>No.</th>
              <th style={{padding:"10px 12px",textAlign:"left",fontWeight:600}}>วัตถุดิบ</th>
              <th style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>ปริมาณซื้อ</th>
              <th style={{padding:"10px 12px",textAlign:"left",fontWeight:600}}>หน่วยซื้อ</th>
              <th style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>ต้นทุน/หน่วย (฿)</th>
              <th style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>Yield (%)</th>
              <th style={{padding:"10px 12px",textAlign:"right",fontWeight:600}}>ต้นทุนจริง</th>
              <th style={{padding:"10px 10px",textAlign:"right",fontWeight:600,background:"#2a9d8f"}}>ปริมาณใช้</th>
              <th style={{padding:"10px 8px",textAlign:"left",fontWeight:600,background:"#2a9d8f"}}>หน่วยใช้</th>
              <th style={{padding:"10px 12px",textAlign:"right",fontWeight:600,background:"#2a9d8f"}}>ต้นทุน (฿)</th>
            </tr>
          </thead>
          <tbody>
            {viewedLines.map((l,idx)=>{
              const ac = (parseFloat(l.cost_per_unit)||0)/((parseFloat(l.yield_pct)||100)/100);
              const lc = (parseFloat(l.use_qty)||0)*ac;
              const isEven = idx%2===0;
              return <tr key={l.id} style={{background:isEven?"#fff":"#f8fafc"}}>
                <td style={{padding:"8px 12px",color:"#9ca3af",textAlign:"center"}}>{idx+1}</td>
                <td style={{padding:"8px 12px",fontWeight:600,color:"#111827"}}>{l.ingredient_name}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:"#374151"}}>{(+l.purchase_size||0).toLocaleString()}</td>
                <td style={{padding:"8px 12px",color:"#6b7280"}}>{l.purchase_unit||"—"}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:"#374151"}}>{(+l.cost_per_unit||0).toFixed(4)}</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:"#374151"}}>{l.yield_pct||100}%</td>
                <td style={{padding:"8px 12px",textAlign:"right",color:"#374151"}}>{ac.toFixed(4)}</td>
                <td style={{padding:"8px 10px",textAlign:"right",fontWeight:600,color:"#1e4d6b",background:isEven?"#f0fdfa":"#e6faf7"}}>{(+l.use_qty||0).toLocaleString()}</td>
                <td style={{padding:"8px 8px",color:"#6b7280",background:isEven?"#f0fdfa":"#e6faf7"}}>{l.use_unit}</td>
                <td style={{padding:"8px 12px",textAlign:"right",fontWeight:700,color:"#0d9488",background:isEven?"#f0fdfa":"#e6faf7"}}>{lc.toFixed(2)}</td>
              </tr>;
            })}
            {/* Totals */}
            <tr style={{background:"#f1f5f9",borderTop:"2px solid #e2e8f0"}}>
              <td colSpan={7} style={{padding:"10px 12px",textAlign:"right",fontWeight:600,color:"#374151",fontSize:13}}>RM + MG Total</td>
              <td colSpan={2} style={{background:"#e6faf7"}}/>
              <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"#0d9488",fontSize:14,background:"#e6faf7"}}>฿{rm2.toFixed(2)}</td>
            </tr>
            <tr style={{background:"#fffbeb"}}>
              <td colSpan={7} style={{padding:"8px 12px",textAlign:"right",fontWeight:600,color:"#92400e",fontSize:13}}>{`Misc (${viewedRecipe.misc_pct}%)`}</td>
              <td colSpan={2}/>
              <td style={{padding:"8px 12px",textAlign:"right",fontWeight:700,color:"#d97706"}}>฿{misc2.toFixed(2)}</td>
            </tr>
            <tr style={{background:"#1e4d6b"}}>
              <td colSpan={7} style={{padding:"10px 12px",textAlign:"right",fontWeight:700,color:"#fff",fontSize:13}}>TOTAL COST</td>
              <td colSpan={2} style={{background:"#2a9d8f"}}/>
              <td style={{padding:"10px 12px",textAlign:"right",fontWeight:800,color:"#e9c46a",fontSize:15,background:"#2a9d8f"}}>฿{total2.toFixed(2)}</td>
            </tr>
          </tbody>
        </table>
      </div>
      {viewedRecipe.notes&&<div className="card p-5"><p style={{fontSize:13,color:"#4b5563",whiteSpace:"pre-wrap"}}>{viewedRecipe.notes}</p></div>}
      <ConfirmModal open={!!delId} danger title="Delete Recipe" message="Delete this recipe and all ingredients?" onConfirm={handleDelete} onCancel={()=>setDelId(null)}/>
    </div>;
  }

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  return <div className="space-y-5">
    <SectionHeader title="Recipes" action={<button onClick={openAdd} className="btn-primary">+ New Recipe</button>}/>
    {recipes.length===0
      ? <div className="card p-10 text-center" style={{color:"#9ca3af"}}>No recipes yet. Click + New Recipe to get started.</div>
      : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:16}}>
          {recipes.map(r=>{
            const lines=ringredients.filter(ri=>ri.recipe_id===r.id);
            return <div key={r.id} className="card" style={{cursor:"pointer",transition:"box-shadow .15s"}}
              onClick={()=>setViewId(r.id)}
              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 16px rgba(0,0,0,.1)"}
              onMouseLeave={e=>e.currentTarget.style.boxShadow=""}>
              <div style={{background:"#1e4d6b",borderRadius:"16px 16px 0 0",padding:"10px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:"monospace",fontSize:12,color:"#7dd3fc",fontWeight:700}}>{r.recipe_code||"NO CODE"}</span>
                <div style={{display:"flex",gap:4}} onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>openEdit(r)} style={{background:"none",border:"none",cursor:"pointer",color:"#94a3b8",fontSize:14,padding:"2px 5px"}}>✏️</button>
                  <button onClick={()=>setDelId(r.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#f87171",fontSize:14,padding:"2px 5px"}}>🗑</button>
                </div>
              </div>
              <div style={{padding:"14px 16px"}}>
                <p style={{fontWeight:700,fontSize:15,color:"#111827",margin:"0 0 2px"}}>{r.beer_name||"Unnamed"}</p>
                <p style={{fontSize:12,color:"#9ca3af",margin:"0 0 10px"}}>{r.brand||getCustomerName(r.customer_id)} · {r.batch_size_litres}L</p>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12}}>
                  <span style={{color:"#9ca3af"}}>{lines.length} ingredients</span>
                  <span style={{fontWeight:700,color:"#0d9488"}}>{fmtThb(+r.total_cost||0)}</span>
                </div>
              </div>
            </div>;
          })}
        </div>
    }

    {/* Add/Edit Modal */}
    <Modal open={showModal} onClose={()=>setShowModal(false)} title={editId?"Edit Recipe":"New Recipe"} wide>
      <form onSubmit={handleSave} className="space-y-4">
        {/* Row 1: customer + code */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          <div>
            <label className="form-label">Customer</label>
            <select className="input-cls" value={form.customer_id}
              onChange={e=>setForm(f=>({...f,customer_id:e.target.value,beer_id:"",beer_name:"",brand:"",recipe_code:""}))}>
              <option value="">— Select customer —</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label className="form-label">Recipe Code <span style={{fontWeight:400,color:"#2dd4bf"}}>(auto)</span></label>
            <input className="input-cls" style={{fontFamily:"monospace"}} value={form.recipe_code}
              onChange={e=>setForm(f=>({...f,recipe_code:e.target.value}))}
              placeholder={form.customer_id&&form.beer_name ? autoCode(form.customer_id,form.beer_name) : "Select customer & beer first"}/>
          </div>
        </div>

        {/* Row 2: beer from list + batch + misc */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 120px 100px",gap:14}}>
          <div>
            <label className="form-label">Beer Name *</label>
            {customerBeers.length>0
              ? <select required className="input-cls" value={form.beer_id}
                  onChange={e=>handleBeerSelect(e.target.value)}>
                  <option value="">— Select beer —</option>
                  {customerBeers.map(b=><option key={b.id} value={b.id}>{b.brand ? `${b.brand} – ` : ""}{b.beer_name}</option>)}
                </select>
              : <input required className="input-cls" placeholder={form.customer_id?"No beers for this customer — add in Customers first":"Select a customer first"}
                  value={form.beer_name} onChange={e=>setForm(f=>({...f,beer_name:e.target.value}))}
                  style={{color: form.customer_id&&!form.beer_name?"#9ca3af":"#111827"}}/>
            }
          </div>
          <div>
            <label className="form-label">Batch (L)</label>
            <input type="number" className="input-cls" value={form.batch_size_litres}
              onChange={e=>setForm(f=>({...f,batch_size_litres:e.target.value}))}/>
          </div>
          <div>
            <label className="form-label">Misc %</label>
            <input type="number" step="0.1" className="input-cls" value={form.misc_pct}
              onChange={e=>setForm(f=>({...f,misc_pct:e.target.value}))}/>
          </div>
        </div>

        {/* Ingredient builder */}
        <div style={{borderTop:"1px solid #f3f4f6",paddingTop:14}}>
          <label className="form-label" style={{marginBottom:8}}>Ingredients</label>
          {/* Search */}
          <div style={{position:"relative",marginBottom:10}}>
            <input className="input-cls" placeholder="🔍 Search & add ingredient…"
              value={ingSearch} onChange={e=>setIngSearch(e.target.value)}/>
            {ingSuggest.length>0&&<div style={{position:"absolute",zIndex:20,width:"100%",marginTop:4,
              background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:12,boxShadow:"0 8px 24px rgba(0,0,0,.1)",maxHeight:220,overflowY:"auto"}}>
              {ingSuggest.map(i=><button type="button" key={i.id} onClick={()=>addIngLine(i)}
                style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  width:"100%",textAlign:"left",padding:"10px 14px",fontSize:13,background:"none",
                  border:"none",borderBottom:"1px solid #f9fafb",cursor:"pointer",color:"#111827"}}>
                <span>{i.name} <span style={{color:"#9ca3af",fontSize:11}}>({i.category})</span></span>
                <span style={{color:"#0d9488",fontWeight:600,fontSize:12}}>฿{i.cost_per_unit}/unit</span>
              </button>)}
            </div>}
          </div>

          {/* Table */}
          {ingLines.length>0&&<div style={{border:"1.5px solid #e5e7eb",borderRadius:12,overflow:"hidden"}}>
            <table style={{width:"100%",fontSize:12,borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#1e4d6b",color:"#fff"}}>
                  <th style={{padding:"8px 10px",textAlign:"left",fontWeight:600}}>Ingredient</th>
                  <th style={{padding:"8px 8px",textAlign:"right",fontWeight:600,width:80}}>Use Qty</th>
                  <th style={{padding:"8px 6px",textAlign:"left",fontWeight:600,width:50}}>Unit</th>
                  <th style={{padding:"8px 8px",textAlign:"right",fontWeight:600,width:70}}>Yield %</th>
                  <th style={{padding:"8px 8px",textAlign:"right",fontWeight:600,width:90}}>Line Cost</th>
                  <th style={{padding:"8px 6px",width:28}}/>
                </tr>
              </thead>
              <tbody>
                {ingLines.map((l,i)=>{
                  const ac=(parseFloat(l.cost_per_unit)||0)/((parseFloat(l.yield_pct)||100)/100);
                  const lc=(parseFloat(l.use_qty)||0)*ac;
                  return <tr key={l.id||i} style={{background:i%2?"#f8fafc":"#fff",borderTop:"1px solid #f3f4f6"}}>
                    <td style={{padding:"6px 10px",fontWeight:600,color:"#111827"}}>{l.ingredient_name}</td>
                    <td style={{padding:"6px 8px"}}>
                      <input type="number" step="0.001" value={l.use_qty}
                        onChange={e=>updateLine(i,"use_qty",e.target.value)}
                        style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:6,padding:"3px 6px",fontSize:12,textAlign:"right"}}/>
                    </td>
                    <td style={{padding:"6px 6px",color:"#6b7280"}}>{l.use_unit}</td>
                    <td style={{padding:"6px 8px"}}>
                      <input type="number" step="1" min="1" max="100" value={l.yield_pct}
                        onChange={e=>updateLine(i,"yield_pct",e.target.value)}
                        style={{width:"100%",border:"1px solid #e5e7eb",borderRadius:6,padding:"3px 6px",fontSize:12,textAlign:"right"}}/>
                    </td>
                    <td style={{padding:"6px 8px",textAlign:"right",fontWeight:700,color:"#0d9488"}}>฿{lc.toFixed(2)}</td>
                    <td style={{padding:"6px 6px",textAlign:"center"}}>
                      <button type="button" onClick={()=>setIngLines(p=>p.filter((_,j)=>j!==i))}
                        style={{background:"none",border:"none",cursor:"pointer",color:"#f87171",fontSize:14,fontWeight:700}}>×</button>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          </div>}

          {/* Cost footer */}
          <div style={{display:"flex",gap:20,marginTop:10,fontSize:13,flexWrap:"wrap"}}>
            <span>RM+MG: <strong style={{color:"#0d9488"}}>฿{rmCost.toFixed(2)}</strong></span>
            <span>{`Misc (${form.misc_pct}%)`}: <strong style={{color:"#d97706"}}>฿{miscCost.toFixed(2)}</strong></span>
            <span>Per Litre: <strong style={{color:"#6366f1"}}>฿{form.batch_size_litres>0?(totalCost/+form.batch_size_litres).toFixed(2):"—"}</strong></span>
            <span style={{fontWeight:800,color:"#111827"}}>Total: ฿{totalCost.toFixed(2)}</span>
          </div>
        </div>

        <div><label className="form-label">Notes</label>
          <textarea className="input-cls" rows={2} value={form.notes}
            onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>

        <div style={{display:"flex",gap:10,justifyContent:"flex-end",paddingTop:8}}>
          <button type="button" onClick={()=>setShowModal(false)} className="btn-ghost">Cancel</button>
          <button type="submit" className="btn-primary">Save Recipe</button>
        </div>
      </form>
    </Modal>
    <ConfirmModal open={!!delId} danger title="Delete Recipe" message="Delete this recipe and all ingredients?" onConfirm={handleDelete} onCancel={()=>setDelId(null)}/>
  </div>;
}


// ─── ORDERS PAGE ─────────────────────────────────────────────────────────────
function OrdersPage({orders,setOrders,customers,cbeers,recipes,setPage}){
  const [showModal,setShowModal]     = useState(false);
  const [editId,setEditId]           = useState(null);
  const [statusFilter,setStatusFilter]=useState("All");
  const [search,setSearch]           = useState("");
  const [viewId,setViewId]           = useState(null);
  const [delId,setDelId]             = useState(null);

  const emptyForm = ()=>({
    order_no:"", customer_id:"", customer_name:"", beer_name:"", style:"", abv:"",
    volume_litres:"", status:"Initiated",
    quotation_no:"", order_price:"", round_no:"", batch_no:"",
    deposit_date:"", deposit_amount:"", balance_date:"", balance_amount:"",
    final_date:"", final_amount:"", brewing_date:"", deliver_date:"",
    recipe_id:"", notes:""
  });
  const [form,setForm] = useState(emptyForm());

  const openAdd = ()=>{ setForm(emptyForm()); setEditId(null); setShowModal(true); };
  const openEdit=(o)=>{
    setForm({order_no:o.order_no||"",customer_id:o.customer_id||"",customer_name:o.customer_name||"",
      beer_name:o.beer_name||"",style:o.style||"",abv:o.abv||"",volume_litres:o.volume_litres||"",
      status:o.status||"Initiated",
      quotation_no:o.quotation_no||"",order_price:o.order_price||"",round_no:o.round_no||"",batch_no:o.batch_no||"",
      deposit_date:o.deposit_date||"",deposit_amount:o.deposit_amount||"",
      balance_date:o.balance_date||"",balance_amount:o.balance_amount||"",
      final_date:o.final_date||"",final_amount:o.final_amount||"",
      brewing_date:o.brewing_date||"",deliver_date:o.deliver_date||"",
      recipe_id:o.recipe_id||"",notes:o.notes||""});
    setEditId(o.id); setShowModal(true);
  };

  const handleSave=(e)=>{
    e.preventDefault();
    const cust = customers.find(c=>c.id===form.customer_id);
    const data = {...form, customer_name:cust?.name||form.customer_name};
    if(editId){
      setOrders(p=>p.map(o=>o.id===editId?{...o,...data}:o));
    } else {
      const nextNo = "ORD-"+(String(orders.length+1).padStart(4,"0"));
      setOrders(p=>[...p,{id:uid(),order_no:form.order_no||nextNo,...data}]);
    }
    setShowModal(false);
  };

  const advanceStatus=(order)=>{
    const next = NEXT_STATUS[order.status];
    if(!next) return;
    setOrders(p=>p.map(o=>o.id===order.id?{...o,status:next}:o));
  };
  const rejectOrder=(order)=>{
    setOrders(p=>p.map(o=>o.id===order.id?{...o,status:"Rejected"}:o));
  };

  const filtered = useMemo(()=> orders.filter(o=>{
    const stOk = statusFilter==="All"||o.status===statusFilter;
    const srOk = !search||(o.customer_name||"").toLowerCase().includes(search.toLowerCase())||(o.beer_name||"").toLowerCase().includes(search.toLowerCase())||(o.order_no||"").toLowerCase().includes(search.toLowerCase());
    return stOk&&srOk;
  }),[orders,statusFilter,search]);

  const viewedOrder = orders.find(o=>o.id===viewId);
  const getRecipeCost=(rid)=>{ const r=recipes.find(x=>x.id===rid); return r?+r.total_cost||0:0; };

  if(viewId && viewedOrder){
    const o=viewedOrder;
    const rcost = getRecipeCost(o.recipe_id);
    const dep   = +o.deposit_amount||0;
    const bal   = +o.balance_amount||0;
    const fin   = +o.final_amount||0;
    const paid  = dep+bal+fin;
    const steps = CONTRACT_STATUSES.filter(s=>s!=="Rejected");
    const curIdx= steps.indexOf(o.status);
    return <div className="space-y-6">
      <div className="flex items-center gap-3">
        <button onClick={()=>setViewId(null)} className="btn-ghost text-sm">← Back</button>
        <div>
          <h2 className="text-2xl font-bold text-gray-900">Order #{o.order_no}</h2>
          <p className="text-sm text-gray-400">{o.customer_name} · {o.beer_name}</p>
        </div>
        <div className="ml-auto flex gap-2">
          <button onClick={()=>openEdit(o)} className="btn-ghost text-sm">✏️ Edit</button>
          {NEXT_STATUS[o.status]&&<button onClick={()=>advanceStatus(o)} className="btn-primary text-sm">
            Advance → {NEXT_STATUS[o.status]}
          </button>}
          {!["Rejected","Delivered"].includes(o.status)&&
            <button onClick={()=>rejectOrder(o)} className="px-3 py-2 text-sm text-red-500 hover:bg-red-50 rounded-xl border border-red-200">Reject</button>}
        </div>
      </div>

      {/* Status progress bar */}
      <div className="card p-5">
        <div className="flex items-center gap-1 flex-wrap">
          {steps.map((s,i)=>{
            const done = i<curIdx; const cur = i===curIdx;
            return <React.Fragment key={s}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:60}}>
                <div style={{width:24,height:24,borderRadius:9999,
                  background:done?"#0d9488":cur?"#1e4d6b":"#e5e7eb",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  color:"#fff",fontSize:11,fontWeight:700}}>
                  {done?"✓":i+1}
                </div>
                <span style={{fontSize:9,marginTop:3,color:cur?"#1e4d6b":done?"#0d9488":"#9ca3af",
                  fontWeight:cur?700:400,textAlign:"center",maxWidth:64}}>{s}</span>
              </div>
              {i<steps.length-1&&<div style={{flex:1,height:2,background:done?"#0d9488":"#e5e7eb",minWidth:8}}/>}
            </React.Fragment>;
          })}
        </div>
      </div>

      <div className="grid grid-cols-2 gap-5">
        <div className="card p-5">
          <h3 className="font-semibold text-gray-800 mb-3">Order Info</h3>
          <div className="grid grid-cols-2 gap-y-3 gap-x-4">
          {[["Customer",o.customer_name],["Beer",o.beer_name],["Style",o.style||"—"],["ABV",o.abv?o.abv+"%":"—"],["Volume",o.volume_litres?o.volume_litres+"L":"—"],["Quotation No.",o.quotation_no||"—"],["Order Price",o.order_price?fmtThb(o.order_price):"—"],["Round No.",o.round_no||"—"],["Batch No.",o.batch_no||"—"],["Brew Date",o.brewing_date||"—"],["Deliver Date",o.deliver_date||"—"],["Recipe Cost",rcost?fmtThb(rcost):"—"]].map(([k,v])=>
            <div key={k}><p className="text-xs text-gray-400">{k}</p><p className="text-sm font-medium text-gray-800">{v}</p></div>
          )}
          </div>
        </div>
        <div className="card p-5">
          <h3 className="font-semibold text-gray-800 mb-3">Payment Milestones</h3>
          <div className="space-y-3">
            {[
              {label:"Deposit (10k + 30% RM+MG)",date:o.deposit_date,amount:dep},
              {label:"Balance (70% RM+MG)",date:o.balance_date,amount:bal},
              {label:"Final (Tax + Storage)",date:o.final_date,amount:fin},
            ].map(pm=><div key={pm.label} className={`flex items-center justify-between p-3 rounded-xl ${pm.amount?"bg-green-50 border border-green-100":"bg-gray-50"}`}>
              <div>
                <p className="text-xs font-medium text-gray-700">{pm.label}</p>
                <p className="text-xs text-gray-400">{pm.date||"Not set"}</p>
              </div>
              <span className={`text-sm font-bold ${pm.amount?"text-green-600":"text-gray-300"}`}>{pm.amount?fmtThb(pm.amount):"—"}</span>
            </div>)}
            <div className="flex justify-between pt-2 border-t border-gray-100">
              <span className="text-sm font-semibold text-gray-700">Total Paid</span>
              <span className="text-sm font-bold text-teal-700">{fmtThb(paid)}</span>
            </div>
          </div>
        </div>
      </div>
      {o.notes&&<div className="card p-5"><h3 className="font-semibold text-gray-800 mb-2">Notes</h3><p className="text-sm text-gray-600 whitespace-pre-wrap">{o.notes}</p></div>}
      {/* Modal rendered here so edit button works in detail view */}
      <Modal open={showModal} onClose={()=>setShowModal(false)} title={editId?"Edit Order":"New Order"} wide>
        <form onSubmit={handleSave} className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <div><label className="form-label">Order #</label><input className="input-cls font-mono" placeholder="auto" value={form.order_no} onChange={e=>setForm(f=>({...f,order_no:e.target.value}))}/></div>
            <div><label className="form-label">Status</label>
              <select className="input-cls" value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
                {CONTRACT_STATUSES.map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <div><label className="form-label">Customer</label>
              <select className="input-cls" value={form.customer_id} onChange={e=>setForm(f=>({...f,customer_id:e.target.value}))}>
                <option value="">— Select —</option>
                {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div>
              <label className="form-label">Beer Name *</label>
              {form.customer_id && cbeers && cbeers.filter(b=>b.customer_id===form.customer_id).length>0
                ? <select required className="input-cls" value={form.beer_name}
                    onChange={e=>{ const b=cbeers.find(x=>x.customer_id===form.customer_id&&x.beer_name===e.target.value); setForm(f=>({...f,beer_name:e.target.value,style:b?.style||f.style,abv:b?.abv||f.abv})); }}>
                    <option value="">— Select beer —</option>
                    {cbeers.filter(b=>b.customer_id===form.customer_id).map(b=><option key={b.id} value={b.beer_name}>{b.brand?b.brand+" – ":""}{b.beer_name}</option>)}
                  </select>
                : <input required className="input-cls" placeholder="Enter beer name" value={form.beer_name} onChange={e=>setForm(f=>({...f,beer_name:e.target.value}))}/>
              }
            </div>
            <div><label className="form-label">Style</label><input className="input-cls" value={form.style} onChange={e=>setForm(f=>({...f,style:e.target.value}))}/></div>
            <div><label className="form-label">ABV %</label><input type="number" step="0.1" className="input-cls" value={form.abv} onChange={e=>setForm(f=>({...f,abv:e.target.value}))}/></div>
            <div><label className="form-label">Volume (L)</label><input type="number" className="input-cls" value={form.volume_litres} onChange={e=>setForm(f=>({...f,volume_litres:e.target.value}))}/></div>
            <div><label className="form-label">Recipe</label>
              <select className="input-cls" value={form.recipe_id} onChange={e=>setForm(f=>({...f,recipe_id:e.target.value}))}>
                <option value="">— None —</option>
                {recipes.map(r=><option key={r.id} value={r.id}>{r.recipe_code} {r.beer_name}</option>)}
              </select>
            </div>
          </div>
          <div style={{background:"#f8fafc",borderRadius:12,padding:"14px 16px",border:"1px solid #e5e7eb"}}>
            <p style={{fontSize:11,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Quotation &amp; Batch Info</p>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="form-label">Quotation No.</label><input className="input-cls" placeholder="e.g. QT-2025-001" value={form.quotation_no} onChange={e=>setForm(f=>({...f,quotation_no:e.target.value}))}/></div>
              <div><label className="form-label">Order Price / Quotation (฿)</label><input type="number" step="0.01" className="input-cls" value={form.order_price} onChange={e=>setForm(f=>({...f,order_price:e.target.value}))}/></div>
              <div><label className="form-label">Round No.</label><input type="number" min="1" className="input-cls" value={form.round_no} onChange={e=>setForm(f=>({...f,round_no:e.target.value}))}/></div>
              <div><label className="form-label">Batch No. <span style={{fontSize:11,color:"#9ca3af",fontWeight:400}}>(optional)</span></label><input type="number" min="1" className="input-cls" value={form.batch_no} onChange={e=>setForm(f=>({...f,batch_no:e.target.value}))}/></div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <div><label className="form-label">Deposit Date</label><input type="date" className="input-cls" value={form.deposit_date} onChange={e=>setForm(f=>({...f,deposit_date:e.target.value}))}/></div>
            <div><label className="form-label">Deposit Amount</label><input type="number" className="input-cls" value={form.deposit_amount} onChange={e=>setForm(f=>({...f,deposit_amount:e.target.value}))}/></div>
            <div/>
            <div><label className="form-label">Balance Date</label><input type="date" className="input-cls" value={form.balance_date} onChange={e=>setForm(f=>({...f,balance_date:e.target.value}))}/></div>
            <div><label className="form-label">Balance Amount</label><input type="number" className="input-cls" value={form.balance_amount} onChange={e=>setForm(f=>({...f,balance_amount:e.target.value}))}/></div>
            <div/>
            <div><label className="form-label">Final Date</label><input type="date" className="input-cls" value={form.final_date} onChange={e=>setForm(f=>({...f,final_date:e.target.value}))}/></div>
            <div><label className="form-label">Final Amount</label><input type="number" className="input-cls" value={form.final_amount} onChange={e=>setForm(f=>({...f,final_amount:e.target.value}))}/></div>
            <div/>
            <div><label className="form-label">Brew Date</label><input type="date" className="input-cls" value={form.brewing_date} onChange={e=>setForm(f=>({...f,brewing_date:e.target.value}))}/></div>
            <div><label className="form-label">Deliver Date</label><input type="date" className="input-cls" value={form.deliver_date} onChange={e=>setForm(f=>({...f,deliver_date:e.target.value}))}/></div>
          </div>
          <div><label className="form-label">Notes</label><textarea className="input-cls" rows={2} value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))}/></div>
          <div className="flex gap-3 justify-end pt-2">
            <button type="button" onClick={()=>setShowModal(false)} className="btn-ghost">Cancel</button>
            <button type="submit" className="btn-primary">Save Order</button>
          </div>
        </form>
      </Modal>
      <ConfirmModal open={!!delId} danger title="Delete Order" message="Delete this order permanently?" onConfirm={()=>{ setOrders(p=>p.filter(o=>o.id!==delId)); setDelId(null); }} onCancel={()=>setDelId(null)}/>
    </div>;
  }

  return <div className="space-y-5">
    <SectionHeader title="Orders" action={<button onClick={openAdd} className="btn-primary">+ New Order</button>}/>

    <div className="flex flex-wrap gap-3">
      <input className="input-cls flex-1 min-w-40 max-w-64" placeholder="Search order, customer, beer…" value={search} onChange={e=>setSearch(e.target.value)}/>
      <select className="input-cls w-auto" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
        <option value="All">All Statuses</option>
        {CONTRACT_STATUSES.map(s=><option key={s}>{s}</option>)}
      </select>
    </div>

    {filtered.length===0
      ? <div className="card p-10 text-center text-gray-400">No orders match.</div>
      : <div className="card table-scroll">
          <table className="w-full text-sm">
            <thead className="bg-gray-50 border-b border-gray-100">
              <tr className="text-left text-xs text-gray-400 uppercase tracking-wide">
                <th className="px-4 py-3 font-medium">Order #</th>
                <th className="px-4 py-3 font-medium">Customer</th>
                <th className="px-4 py-3 font-medium">Beer</th>
                <th className="px-4 py-3 font-medium">Vol.</th>
                <th className="px-4 py-3 font-medium">Status</th>
                <th className="px-4 py-3 font-medium">Brew Date</th>
                <th className="px-4 py-3 font-medium"/>
              </tr>
            </thead>
            <tbody>
              {filtered.map(o=><tr key={o.id} className="border-b border-gray-50 hover:bg-gray-50 cursor-pointer" onClick={()=>setViewId(o.id)}>
                <td className="px-4 py-3 font-mono text-xs text-gray-500">#{o.order_no||"—"}</td>
                <td className="px-4 py-3 font-medium text-gray-800">{o.customer_name||"—"}</td>
                <td className="px-4 py-3 text-gray-700">{o.beer_name}</td>
                <td className="px-4 py-3 text-gray-500">{o.volume_litres?o.volume_litres+"L":"—"}</td>
                <td className="px-4 py-3"><StatusBadge status={o.status}/></td>
                <td className="px-4 py-3 text-gray-500">{o.brewing_date||"—"}</td>
                <td className="px-4 py-3 text-right" onClick={e=>e.stopPropagation()}>
                  <button onClick={()=>openEdit(o)} className="text-xs text-indigo-500 hover:text-indigo-700 mr-2">Edit</button>
                  <button onClick={()=>setDelId(o.id)} className="text-xs text-red-400 hover:text-red-600">Del</button>
                </td>
              </tr>)}
            </tbody>
          </table>
        </div>
    }

    {/* Add/Edit Order Modal */}
    <Modal open={showModal} onClose={()=>setShowModal(false)} title={editId?"Edit Order":"New Order"} wide>
      <form onSubmit={handleSave} className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <div><label className="form-label">Order #</label><input className="input-cls font-mono" placeholder="auto" value={form.order_no} onChange={e=>setForm(f=>({...f,order_no:e.target.value}))}/></div>
          <div><label className="form-label">Status</label>
            <select className="input-cls" value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))}>
              {CONTRACT_STATUSES.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div><label className="form-label">Customer</label>
            <select className="input-cls" value={form.customer_id} onChange={e=>setForm(f=>({...f,customer_id:e.target.value}))}>
              <option value="">— Select —</option>
              {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label className="form-label">Beer Name *</label>
            {form.customer_id && cbeers && cbeers.filter(b=>b.customer_id===form.customer_id).length>0
              ? <select required className="input-cls" value={form.beer_name}
                  onChange={e=>{ const b=cbeers.find(x=>x.customer_id===form.customer_id&&x.beer_name===e.target.value); setForm(f=>({...f,beer_name:e.target.value,style:b?.style||f.style,abv:b?.abv||f.abv})); }}>
                  <option value="">— Select beer —</option>
                  {cbeers.filter(b=>b.customer_id===form.customer_id).map(b=><option key={b.id} value={b.beer_name}>{b.brand?b.brand+" – ":""}{b.beer_name}</option>)}
                </select>
              : <input required className="input-cls" placeholder="Enter beer name" value={form.beer_name} onChange={e=>setForm(f=>({...f,beer_name:e.target.value}))}/>
            }
          </div>
          <div><label className="form-label">Style</label><input className="input-cls" value={form.style} onChange={e=>setForm(f=>({...f,style:e.target.value}))}/></div>
          <div><label className="form-label">ABV %</label><input type="number" step="0.1" className="input-cls" value={form.abv} onChange={e=>setForm(f=>({...f,abv:e.target.value}))}/></div>

          <div><label className="form-label">Recipe</label>
            <select className="input-cls" value={form.recipe_id} onChange={e=>setForm(f=>({...f,recipe_id:e.target.value}))}>

              {recipes.map(r=><option key={r.id} value={r.id}>{r.recipe_code} {r.beer_name}</option>)}
            </select>
