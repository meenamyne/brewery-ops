      const KNOWN = [
        { key: "app_title",                label: "App Title",                hint: "Header label" },
        { key: "operating_hours_weekday",  label: "Weekday Hours (Bar)",      hint: "e.g. 16:00-00:00" },
        { key: "operating_hours_weekend",  label: "Weekend Hours (Bar)",      hint: "e.g. 14:00-00:00" },
        { key: "brewery_hours",            label: "Brewery Hours",            hint: "Mon-Fri schedule" },
        { key: "ot_rate_hour",             label: "OT Rate (THB/hour)",       hint: "Hourly OT rate" },
        { key: "ot_rate_brewery_weekend",  label: "Brewery Weekend OT",       hint: "Saturday optional rate" },
        { key: "monthly_off_days",         label: "Monthly Off Days",         hint: "e.g. 6 (4+2 weekly)" },
      ];

      function saveSetting(key, value) {
        const exists = settings.find(s => s.key === key);
        if (exists) {
          setSettings(settings.map(s => s.key === key ? { key, value } : s));
        } else {
          setSettings([...settings, { key, value }]);
        }
      }
      function getValue(k) { return settings.find(s => s.key === k)?.value || ""; }

      return (
        <div className="p-6 overflow-y-auto h-full">
          <PageHeader title="Settings" subtitle="App configuration and reference data" />

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden mb-4">
            <div className="px-5 py-3 border-b border-gray-100">
              <p className="text-sm font-semibold text-gray-700">Operating Settings</p>
            </div>
            <div className="divide-y divide-gray-50">
              {KNOWN.map(s => (
                <div key={s.key} className="px-5 py-3 flex items-center justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-medium text-gray-700">{s.label}</p>
                    <p className="text-xs text-gray-400">{s.hint}</p>
                  </div>
                  <input value={getValue(s.key)} onChange={e => saveSetting(s.key, e.target.value)}
                    className="w-72 border border-gray-200 rounded-xl px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-400" />
                </div>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden mb-4">
            <div className="px-5 py-3 border-b border-gray-100">
              <p className="text-sm font-semibold text-gray-700">Leave Types</p>
              <p className="text-xs text-gray-400">Reference list — used in the Leave page dropdown</p>
            </div>
            <table className="w-full text-sm">
              <thead><tr className="border-b border-gray-100 bg-gray-50/60">
                {["Code","English","Thai","Paid"].map(h=>(
                  <th key={h} className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                ))}
              </tr></thead>
              <tbody>
                {leaveTypes.map(t => (
                  <tr key={t.code} className="border-b border-gray-50">
                    <td className="px-4 py-2.5 text-xs font-mono text-gray-500">{t.code}</td>
                    <td className="px-4 py-2.5 text-gray-700">{t.name_en}</td>
                    <td className="px-4 py-2.5 text-gray-600">{t.name_th}</td>
                    <td className="px-4 py-2.5">{t.paid === "Yes" || t.paid === "yes" ? <span className="text-emerald-500">✓</span> : <span className="text-gray-300">—</span>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            <p className="text-xs text-gray-400 px-5 py-3 border-t border-gray-100">Edit leave types directly in the Google Sheet → <code className="bg-gray-50 px-1 rounded">LeaveTypes</code> tab.</p>
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 p-5">
            <p className="text-sm font-semibold text-gray-700 mb-2">Sheet ID</p>
            <p className="text-xs text-gray-500 font-mono break-all">{SHEET_ID}</p>
            <a href={`https://docs.google.com/spreadsheets/d/${SHEET_ID}`} target="_blank" rel="noopener"
              className="text-xs text-teal-600 hover:text-teal-700 mt-2 inline-block">Open in Google Sheets ↗</a>
          </div>
        </div>
      );
    }

    // ─── APP ─────────────────────────────────────────────────────────────────
    function App() {
      const [authState,   setAuthState]   = useState("idle"); // idle | signing-in | ready | error
      const [user,        setUser]        = useState(null);
      const [page,        setPage]        = useState("dashboard");
      const [authError,   setAuthError]   = useState("");
      const [savingState, setSavingState] = useState("");

      // Data
      const [employees,    setEmployees]    = useState(OFFLINE_MODE ? SAMPLE_EMPLOYEES : []);
      const [positions,    setPositions]    = useState(OFFLINE_MODE ? SAMPLE_POSITIONS : []);
      const [jds,          setJds]          = useState(OFFLINE_MODE ? SAMPLE_JDS : []);
      const [leaveTypes,   setLeaveTypes]   = useState(LEAVE_TYPES); // also seeded
      const [leaveRecords, setLeaveRecords] = useState(OFFLINE_MODE ? SAMPLE_LEAVE_RECORDS : []);
      const [leaveQuota,   setLeaveQuota]   = useState(OFFLINE_MODE ? SAMPLE_LEAVE_QUOTA : []);
      const [calendar,     setCalendar]     = useState(OFFLINE_MODE ? SAMPLE_CALENDAR : []);
      const [compensation, setCompensation] = useState(OFFLINE_MODE ? SAMPLE_COMPENSATION : []);
      const [settings,     setSettings]     = useState(OFFLINE_MODE ? SAMPLE_SETTINGS : []);
      const [departments,  setDepartments]  = useState(DEPARTMENTS.flatMap(d => BRANCHES.map(b => ({ id: `${d.id}_${b.id}`, label: d.label, branch: b.id, note: "" }))));
      const [sheetsReady,  setSheetsReady]  = useState(OFFLINE_MODE);

      // Auto-save
      useSave("Employees",        employees,    sheetsReady);
      useSave("Positions",        positions,    sheetsReady);
      useSave("JobDescriptions",  jds,          sheetsReady);
      useSave("LeaveTypes",       leaveTypes,   sheetsReady);
      useSave("LeaveRecords",     leaveRecords, sheetsReady);
      useSave("LeaveQuota",       leaveQuota,   sheetsReady);
      useSave("BusinessCalendar", calendar,     sheetsReady);
      useSave("Compensation",     compensation, sheetsReady);
      useSave("Settings",         settings,     sheetsReady);
      useSave("Departments",      departments,  sheetsReady);

      // ── Auth ──────────────────────────────────────────────────────────────
      function handleTokenCallback(resp) {
        if (resp.error) {
          setAuthError(resp.error_description || resp.error || "Sign-in failed");
          setAuthState("error");
          return;
        }
        _gTok = resp.access_token;
        fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
          headers: { Authorization: `Bearer ${_gTok}` }
        })
          .then(r => r.json())
          .then(info => {
            const u = { name: info.name, email: info.email, picture: info.picture };
            setUser(u);
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(u)); } catch {}
            setSavingState("Loading data…");
            return ensureSheetsExist();
          })
          .then(() => sheetsLoadAll())
          .then(data => {
            // Seed each tab — only overwrite local state if sheet has rows already
            if (data.Employees?.length)        setEmployees(data.Employees);
            if (data.Positions?.length)        setPositions(data.Positions);        else if (!OFFLINE_MODE) setPositions(SAMPLE_POSITIONS);
            if (data.JobDescriptions?.length)  setJds(data.JobDescriptions);
            if (data.LeaveTypes?.length)       setLeaveTypes(data.LeaveTypes);      else if (!OFFLINE_MODE) setLeaveTypes(LEAVE_TYPES);
            if (data.LeaveRecords?.length)     setLeaveRecords(data.LeaveRecords);
            if (data.LeaveQuota?.length)       setLeaveQuota(data.LeaveQuota);
            if (data.BusinessCalendar?.length) setCalendar(data.BusinessCalendar);
            if (data.Compensation?.length)     setCompensation(data.Compensation);  else if (!OFFLINE_MODE) setCompensation(SAMPLE_COMPENSATION);
            if (data.Settings?.length)         setSettings(data.Settings);          else if (!OFFLINE_MODE) setSettings(SAMPLE_SETTINGS);
            if (data.Departments?.length)      setDepartments(data.Departments);
            setSheetsReady(true);
            setSavingState("");
            setAuthState("ready");
          })
          .catch(err => {
            console.error(err);
            setAuthError(String(err.message || err));
            setAuthState("error");
            setSavingState("");
          });
      }

      function signIn() {
        setAuthState("signing-in");
        setAuthError("");
        google.accounts.oauth2.initTokenClient({
          client_id: GOOGLE_CLIENT_ID,
          scope: "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile",
          callback: handleTokenCallback,
        }).requestAccessToken();
      }

      function signOut() {
        try { localStorage.removeItem(STORAGE_KEY); } catch {}
        try { google.accounts.oauth2.revoke(_gTok, () => {}); } catch {}
        _gTok = null;
        setUser(null); setAuthState("idle"); setSheetsReady(false);
        setEmployees([]); setLeaveRecords([]); setLeaveQuota([]); setCalendar([]); setJds([]); setPositions([]); setCompensation([]); setSettings([]);
      }

      // Silent re-auth on load
      useEffect(() => {
        if (OFFLINE_MODE) return;
        const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; } })();
        if (!saved?.email) return;
        setUser(saved);
        setAuthState("signing-in");
        const tryInit = () => {
          if (!window.google?.accounts?.oauth2) { setTimeout(tryInit, 200); return; }
          google.accounts.oauth2.initTokenClient({
            client_id: GOOGLE_CLIENT_ID,
            scope: "https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile",
            prompt: "",
            login_hint: saved.email,
            callback: handleTokenCallback,
          }).requestAccessToken();
        };
        tryInit();
      }, []);

      // ── Login screen ──────────────────────────────────────────────────────
      if (!OFFLINE_MODE && authState !== "ready") {
        return (
          <div className="min-h-screen bg-gradient-to-br from-teal-50 via-white to-emerald-50 flex items-center justify-center p-4">
            <div className="bg-white rounded-3xl shadow-2xl p-10 max-w-sm w-full text-center space-y-6">
              <div className="w-16 h-16 rounded-2xl bg-teal-500 flex items-center justify-center mx-auto shadow-lg shadow-teal-200">
                <svg className="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <div>
                <h1 className="text-2xl font-bold text-gray-800">UPB HR</h1>
                <p className="text-sm text-gray-400 mt-1">Human Resources · United Peoples Brewery</p>
              </div>
              {authState === "signing-in" ? (
                <div className="flex flex-col items-center justify-center gap-2 text-gray-400">
                  <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                  </svg>
                  <span className="text-sm">Signing in…</span>
                  {savingState && <p className="text-xs">{savingState}</p>}
                </div>
              ) : authState === "error" ? (
                <div className="space-y-3">
                  <p className="text-sm text-red-500">Sign in failed.</p>
                  {authError && <p className="text-xs text-gray-400 break-all">{authError}</p>}
                  <button onClick={signIn} className="w-full py-3 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-medium text-sm transition-colors">Try Again</button>
                </div>
              ) : (
                <button onClick={signIn} className="w-full py-3 bg-teal-500 hover:bg-teal-600 text-white rounded-xl font-medium text-sm transition-colors flex items-center justify-center gap-2.5">
                  <svg className="w-5 h-5" viewBox="0 0 24 24">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="white"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="white"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="white"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="white"/>
                  </svg>
                  Sign in with Google
                </button>
              )}
              <p className="text-xs text-gray-400">Admin access only — your Google account must be on the OAuth tester list.</p>
            </div>
          </div>
        );
      }

      // ── Main app ──────────────────────────────────────────────────────────
      const sharedProps = { user };
      return (
        <div className="flex h-screen bg-gray-50 overflow-hidden">
          <Sidebar page={page} setPage={setPage} user={user} onSignOut={signOut} savingState={OFFLINE_MODE ? "Demo mode — data is not saved." : savingState} />
          <main className="flex-1 overflow-hidden relative">
            {page === "dashboard"    && <DashboardPage employees={employees} leaveRecords={leaveRecords} calendar={calendar} positions={positions} />}
            {page === "employees"    && <EmployeesPage employees={employees} setEmployees={setEmployees} positions={positions} {...sharedProps} />}
            {page === "leave"        && <LeavePage employees={employees} leaveRecords={leaveRecords} setLeaveRecords={setLeaveRecords} leaveQuota={leaveQuota} setLeaveQuota={setLeaveQuota} {...sharedProps} />}
            {page === "compensation" && <CompensationPage compensation={compensation} setCompensation={setCompensation} settings={settings} {...sharedProps} />}
            {page === "jd"           && <JDPage positions={positions} setPositions={setPositions} jds={jds} setJds={setJds} {...sharedProps} />}
            {page === "calendar"     && <CalendarPage calendar={calendar} setCalendar={setCalendar} {...sharedProps} />}
            {page === "settings"     && <SettingsPage settings={settings} setSettings={setSettings} leaveTypes={leaveTypes} />}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
