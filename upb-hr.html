    // ─── GOOGLE SHEETS API ────────────────────────────────────────────────────
    let _gTok = null;

    async function gFetch(method, path, body) {
      const base = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;
      const res = await fetch(base + path, {
        method,
        headers: { Authorization: `Bearer ${_gTok}`, "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(`${method} ${path} → ${res.status}: ${await res.text()}`);
      return res.json();
    }

    // Load every tab in one batch request, return { [tabName]: rowObjects[] }
    async function sheetsLoadAll() {
      const names = Object.keys(SHEET_COLS);
      const qp = names.map(n => `ranges=${encodeURIComponent(n + "!A1:Z")}`).join("&");
      const { valueRanges } = await gFetch("GET", `/values:batchGet?${qp}`);
      const out = {};
      valueRanges.forEach((vr, i) => {
        const name = names[i], cols = SHEET_COLS[name];
        const [, ...rows] = vr.values || [[]];
        out[name] = rows
          .map(r => { const o = {}; cols.forEach((c, ci) => { o[c] = r[ci] ?? ""; }); return o; })
          .filter(o => Object.values(o).some(v => v !== "" && v != null));
      });
      return out;
    }

    // Overwrite a full sheet tab — simpler than partial range updates
    async function sheetsSave(name, items) {
      const cols = SHEET_COLS[name];
      const values = [
        cols,
        ...items.map(item => cols.map(c => (item[c] == null ? "" : String(item[c])))),
      ];
      // Clear first to drop trailing rows that may exist after a delete
      await gFetch("POST", `/values/${encodeURIComponent(name + "!A1:Z")}:clear`, {});
      await gFetch("PUT",
        `/values/${encodeURIComponent(name + "!A1")}?valueInputOption=RAW`,
        { range: name + "!A1", majorDimension: "ROWS", values }
      );
    }

    // Create any missing tabs and write header rows
    async function ensureSheetsExist() {
      const meta = await gFetch("GET", "?fields=sheets.properties.title");
      const existing = new Set((meta.sheets || []).map(s => s.properties.title));
      const missing = Object.keys(SHEET_COLS).filter(n => !existing.has(n));
      if (missing.length) {
        await gFetch("POST", ":batchUpdate", {
          requests: missing.map(title => ({ addSheet: { properties: { title } } }))
        });
        for (const name of missing) {
          await sheetsSave(name, []);
        }
      }
      // Always make sure header rows exist (even on existing tabs that may be blank)
      const namesNeedingHeader = [];
      for (const name of Object.keys(SHEET_COLS)) {
        try {
          const r = await gFetch("GET", `/values/${encodeURIComponent(name + "!A1:Z1")}`);
          const firstRow = (r.values && r.values[0]) || [];
          if (firstRow.length < SHEET_COLS[name].length) namesNeedingHeader.push(name);
        } catch { namesNeedingHeader.push(name); }
      }
      for (const name of namesNeedingHeader) {
        await gFetch("PUT",
          `/values/${encodeURIComponent(name + "!A1")}?valueInputOption=RAW`,
          { range: name + "!A1", majorDimension: "ROWS", values: [SHEET_COLS[name]] }
        );
      }
    }

    // ─── HELPERS ─────────────────────────────────────────────────────────────
    function toLocalDateStr(d) {
      if (!d) return "";
      if (typeof d === "string") return d.length >= 10 ? d.slice(0, 10) : d;
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }
    const TODAY      = toLocalDateStr(new Date());
    const THIS_YEAR  = new Date().getFullYear();
    const THIS_MONTH = new Date().getMonth() + 1;

    function fmtDate(d) {
      if (!d) return "—";
      try {
        return new Date(d + "T00:00:00").toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });
      } catch { return d; }
    }
    function fmtMoney(n) {
      const v = parseFloat(n);
      if (isNaN(v) || v === 0) return "—";
      return v.toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }
    function tenureFromStart(startDate, endDate) {
      if (!startDate) return "";
      try {
        const s = new Date(startDate + "T00:00:00");
        const e = endDate ? new Date(endDate + "T00:00:00") : new Date();
        if (isNaN(s.getTime())) return "";
        let years = e.getFullYear() - s.getFullYear();
        let months = e.getMonth() - s.getMonth();
        let days = e.getDate() - s.getDate();
        if (days < 0) { months -= 1; days += new Date(e.getFullYear(), e.getMonth(), 0).getDate(); }
        if (months < 0) { years -= 1; months += 12; }
        if (years < 0) return "";
        return `${years}y ${months}m ${days}d`;
      } catch { return ""; }
    }
    function genId(prefix, list, idKey = "id") {
      const nums = list.map(x => parseInt(String(x[idKey] || "").replace(/\D/g, "")) || 0);
      return `${prefix}${String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3, "0")}`;
    }
    function diffDaysInclusive(a, b) {
      if (!a || !b) return 0;
      try {
        const d1 = new Date(a + "T00:00:00"), d2 = new Date(b + "T00:00:00");
        return Math.max(1, Math.round((d2 - d1) / 86400000) + 1);
      } catch { return 0; }
    }
    function fullName(emp) {
      if (!emp) return "—";

    }

      const timer = useRef(null);
      const prev  = useRef(null);
      useEffect(() => {
        if (!ready || OFFLINE_MODE) return;
        const json = JSON.stringify(data);
        if (json === prev.current) return;
        prev.current = json;
        clearTimeout(timer.current);
        timer.current = setTimeout(() => sheetsSave(name, data).catch(console.error), 1800);
      }, [data, ready]);
    }

      const t = LEAVE_TYPES.find(x => x.code === code);
      const map = { sick:"bg-red-50 text-red-600", annual:"bg-emerald-50 text-emerald-600", personal:"bg-amber-50 text-amber-600", special:"bg-blue-50 text-blue-600", unpaid:"bg-gray-100 text-gray-500" };

    function Pagination({ page, total, perPage, onPage }) {
      const totalPages = Math.max(1, Math.ceil(total / perPage));
      if (totalPages <= 1) return <div className="flex items-center justify-end px-4 py-3 text-xs text-gray-400">{total} item{total === 1 ? "" : "s"}</div>;
      const start = (page - 1) * perPage + 1;
      const end   = Math.min(page * perPage, total);
      const pages = [];
      const add = (n) => pages.push(n);
      const ell = "…";
      if (totalPages <= 7) {
        for (let i = 1; i <= totalPages; i++) add(i);
      } else {
        add(1);
        if (page > 4) add(ell);
        for (let i = Math.max(2, page - 1); i <= Math.min(totalPages - 1, page + 1); i++) add(i);
        if (page < totalPages - 3) add(ell);
        add(totalPages);
      }
      return (
        <div className="flex items-center justify-between px-4 py-3 border-t border-gray-100">
          <p className="text-xs text-gray-400">Showing {start}–{end} of {total}</p>
          <div className="flex items-center gap-1">
            <button onClick={() => onPage(Math.max(1, page - 1))} disabled={page === 1}
              className="px-2.5 py-1 text-xs rounded-lg text-gray-500 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">Prev</button>
            {pages.map((p, i) => p === ell
              ? <span key={i} className="px-1 text-xs text-gray-300">…</span>
              : <button key={i} onClick={() => onPage(p)}
                  className={`px-2.5 py-1 text-xs rounded-lg ${p === page ? "bg-teal-500 text-white" : "text-gray-600 hover:bg-gray-100"}`}>{p}</button>
            )}
            <button onClick={() => onPage(Math.min(totalPages, page + 1))} disabled={page === totalPages}
              className="px-2.5 py-1 text-xs rounded-lg text-gray-500 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
          </div>
        </div>
      );
    }

      { id:"calendar",     label:"Business Calendar",    icon:I.calendar, dividerAfter:true },
      { id:"settings",     label:"Settings",             icon:I.settings },

    // ─── DASHBOARD PAGE ──────────────────────────────────────────────────────
    function DashboardPage({ employees, leaveRecords, calendar, positions }) {
      const activeEmps = employees.filter(e => !["Resigned","Terminated"].includes(e.hiring_status));
      const byBranch = useMemo(() => {
        const m = { HQ: 0, LC: 0 };
        activeEmps.forEach(e => { m[e.branch] = (m[e.branch] || 0) + 1; });
        return m;
      }, [employees]);
      const byDept = useMemo(() => {
        const m = {}; DEPARTMENTS.forEach(d => m[d.id] = 0);
        activeEmps.forEach(e => { m[e.department] = (m[e.department] || 0) + 1; });
        return m;
      }, [employees]);
      const onLeaveToday = leaveRecords.filter(l =>
        l.status === "Approved" && (l.start_date || "") <= TODAY && (l.end_date || "") >= TODAY
      );
      const upcomingHolidays = calendar
        .filter(h => (h.date_start || "") >= TODAY)
        .sort((a, b) => (a.date_start || "").localeCompare(b.date_start || ""))
        .slice(0, 5);
      const recentLeave = [...leaveRecords]
        .sort((a, b) => (b.start_date || "").localeCompare(a.start_date || ""))
        .slice(0, 6);
      const empMap = useMemo(() => Object.fromEntries(employees.map(e => [e.employee_id, e])), [employees]);

      return (
        <div className="p-6 overflow-y-auto h-full">
          <PageHeader title="Dashboard" subtitle={`United Peoples Brewery · ${new Date().toLocaleDateString("en-GB", { weekday:"long", day:"numeric", month:"long", year:"numeric" })}`} />

          {/* KPIs */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <KpiCard label="Active Employees" value={activeEmps.length} hint={`Total ${employees.length} on file`} color="teal" />
            <KpiCard label="UPB HQ" value={byBranch.HQ || 0} hint="Active employees" color="emerald" />
            <KpiCard label="UPB Lake Club" value={byBranch.LC || 0} hint="Active employees" color="sky" />
            <KpiCard label="On Leave Today" value={onLeaveToday.length} hint={onLeaveToday.length ? "Approved leave" : "No one on leave"} color={onLeaveToday.length ? "amber" : "gray"} />
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* Department breakdown */}
            <div className="bg-white rounded-2xl border border-gray-100 p-5 lg:col-span-1">
              <p className="text-sm font-semibold text-gray-700 mb-3">By Department</p>
              <div className="space-y-2">
                {DEPARTMENTS.map(d => {
                  const c = byDept[d.id] || 0;
                  const pct = activeEmps.length ? Math.round((c / activeEmps.length) * 100) : 0;
                  return (
                    <div key={d.id}>
                      <div className="flex items-center justify-between text-xs mb-1">
                        <DeptBadge dept={d.id} />
                        <span className="text-gray-500 font-medium">{c} <span className="text-gray-400">({pct}%)</span></span>
                      </div>
                      <div className="h-1.5 bg-gray-100 rounded-full overflow-hidden">
                        <div className={`h-full rounded-full bg-${d.color}-400`} style={{ width: `${pct}%`, background: ({amber:"#fbbf24", teal:"#2dd4bf", rose:"#fb7185", indigo:"#818cf8"})[d.color] }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* On leave today */}
            <div className="bg-white rounded-2xl border border-gray-100 p-5 lg:col-span-1">
              <p className="text-sm font-semibold text-gray-700 mb-3">On Leave Today</p>
              {onLeaveToday.length === 0
                ? <p className="text-xs text-gray-400 py-6 text-center">No one is on leave today.</p>
                : <div className="space-y-2">
                    {onLeaveToday.map(l => {
                      const emp = empMap[l.employee_id];
                      return (
                        <div key={l.id} className="flex items-center gap-3 px-3 py-2 rounded-xl bg-gray-50">
                          <div className="w-7 h-7 rounded-full bg-teal-100 flex items-center justify-center text-xs font-bold text-teal-700 shrink-0">{(emp?.first_name || emp?.nickname || "?")[0]}</div>
                          <div className="flex-1 min-w-0">
                            <p className="text-xs font-medium text-gray-700 truncate">{fullName(emp)}</p>
                            <p className="text-xs text-gray-400">{fmtDate(l.start_date)} → {fmtDate(l.end_date)}</p>
                          </div>
                          <LeaveBadge code={l.leave_type} />
                        </div>
                      );
                    })}
                  </div>
              }
            </div>

            {/* Upcoming holidays */}
            <div className="bg-white rounded-2xl border border-gray-100 p-5 lg:col-span-1">
              <p className="text-sm font-semibold text-gray-700 mb-3">Upcoming Holidays</p>
              {upcomingHolidays.length === 0
                ? <p className="text-xs text-gray-400 py-6 text-center">No upcoming holidays.</p>
                : <div className="space-y-2">
                    {upcomingHolidays.map(h => (
                      <div key={h.id} className="px-3 py-2 rounded-xl bg-gray-50">
                        <div className="flex items-center justify-between">
                          <p className="text-xs font-medium text-gray-700">{h.name_en || h.name_th}</p>
                          <p className="text-xs text-gray-400">{fmtDate(h.date_start)}</p>
                        </div>
                        <div className="flex flex-wrap gap-1 mt-1">
                          {DEPARTMENTS.map(d => h["applies_" + d.id] === "yes" && <DeptBadge key={d.id} dept={d.id} />)}
                        </div>
                      </div>
                    ))}
                  </div>
              }
            </div>
          </div>

          {/* Recent leave */}
          <div className="bg-white rounded-2xl border border-gray-100 mt-4 overflow-hidden">
            <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between">
              <p className="text-sm font-semibold text-gray-700">Recent Leave</p>
              <span className="text-xs text-gray-400">Latest 6 records</span>
            </div>
            {recentLeave.length === 0
              ? <p className="text-xs text-gray-400 py-8 text-center">No leave records yet.</p>
              : <table className="w-full text-sm">
                  <thead><tr className="border-b border-gray-100 bg-gray-50/60">
                    {["Employee","Type","From","To","Days","Status"].map(h=>(
                      <th key={h} className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {recentLeave.map(l => {
                      const emp = empMap[l.employee_id];
                      return (
                        <tr key={l.id} className="border-b border-gray-50">
                          <td className="px-4 py-2.5 text-gray-700">{fullName(emp)} <span className="text-gray-400 ml-1">({emp?.nickname})</span></td>
                          <td className="px-4 py-2.5"><LeaveBadge code={l.leave_type} /></td>
                          <td className="px-4 py-2.5 text-gray-600">{fmtDate(l.start_date)}</td>
                          <td className="px-4 py-2.5 text-gray-600">{fmtDate(l.end_date)}</td>
                          <td className="px-4 py-2.5 text-gray-600">{l.days}</td>
                          <td className="px-4 py-2.5"><span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${l.status === "Approved" ? "bg-emerald-50 text-emerald-600" : l.status === "Pending" ? "bg-amber-50 text-amber-600" : "bg-red-50 text-red-500"}`}>{l.status}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
            }
          </div>
        </div>
      );
    }

    function KpiCard({ label, value, hint, color }) {
      const colorMap = {
        teal:    "from-teal-50 to-white",
        emerald: "from-emerald-50 to-white",
        sky:     "from-sky-50 to-white",
        amber:   "from-amber-50 to-white",
        gray:    "from-gray-50 to-white",
      };
      return (
        <div className={`bg-gradient-to-br ${colorMap[color] || colorMap.teal} rounded-2xl border border-gray-100 p-4`}>
          <p className="text-xs font-medium text-gray-400 uppercase tracking-wide">{label}</p>
          <p className="text-2xl font-bold text-gray-800 mt-1">{value}</p>
          {hint && <p className="text-xs text-gray-400 mt-0.5">{hint}</p>}
        </div>
      );
    }

    // ─── EMPLOYEES PAGE ──────────────────────────────────────────────────────
    function EmployeesPage({ employees, setEmployees, positions, user }) {
      const [search,    setSearch]    = useState("");
      const [filterBr,  setFilterBr]  = useState("All");
      const [filterDp,  setFilterDp]  = useState("All");
      const [filterSt,  setFilterSt]  = useState("All");
      const [page,      setPage]      = useState(1);
      const [editing,   setEditing]   = useState(null); // null | "new" | employee object

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        return employees.filter(e => {
          if (filterBr !== "All" && e.branch !== filterBr) return false;
          if (filterDp !== "All" && e.department !== filterDp) return false;
          if (filterSt !== "All" && e.hiring_status !== filterSt) return false;
          if (!q) return true;
          return [e.first_name, e.last_name, e.nickname, e.position, e.employee_id].join(" ").toLowerCase().includes(q);
        });
      }, [employees, search, filterBr, filterDp, filterSt]);

      const pageRows = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
      useEffect(() => { setPage(1); }, [search, filterBr, filterDp, filterSt]);

      function saveEmp(emp) {
        if (!emp.first_name && !emp.last_name && !emp.nickname) {
          alert("Please enter at least a first name, last name, or nickname.");
          return;
        }
        if (editing === "new") {
          const e = { ...emp, employee_id: emp.employee_id || genId("EMP", employees, "employee_id") };
          setEmployees([...employees, e]);
        } else {
          setEmployees(employees.map(x => x.employee_id === emp.employee_id ? emp : x));
        }
        setEditing(null);
      }
      function deleteEmp(emp) {
        if (!confirm(`Delete ${fullName(emp)}? This cannot be undone.`)) return;
        setEmployees(employees.filter(x => x.employee_id !== emp.employee_id));
        setEditing(null);
      }

      return (
        <div className="p-6 overflow-y-auto h-full">
          <PageHeader
            title="Employees"
            subtitle={`${filtered.length} of ${employees.length} employees`}
            action={
              <button onClick={() => setEditing("new")}
                className="flex items-center gap-2 px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium transition-colors">
                {I.add} Add Employee
              </button>
            }
          />

          {/* Filter bar */}
          <div className="bg-white rounded-2xl border border-gray-100 p-3 mb-4 flex flex-wrap items-center gap-2">
            <div className="relative flex-1 min-w-[200px]">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{I.search}</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search name, nickname, position, ID…"
                className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white" />
            </div>
            <select value={filterBr} onChange={e => setFilterBr(e.target.value)}
              className="text-sm border border-gray-200 rounded-xl px-3 py-2 bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-400">
              <option value="All">All Branches</option>
              {BRANCHES.map(b => <option key={b.id} value={b.id}>{b.label}</option>)}
            </select>
            <select value={filterDp} onChange={e => setFilterDp(e.target.value)}
              className="text-sm border border-gray-200 rounded-xl px-3 py-2 bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-400">
              <option value="All">All Departments</option>
              {DEPARTMENTS.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
            </select>
            <select value={filterSt} onChange={e => setFilterSt(e.target.value)}
              className="text-sm border border-gray-200 rounded-xl px-3 py-2 bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-400">
              <option value="All">All Statuses</option>
              {HIRING_STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>

          {/* Table */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="border-b border-gray-100 bg-gray-50/60">
                  {["ID","Name","Nickname","Position","Department","Branch","Status","Start","Tenure",""].map(h => (
                    <th key={h} className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {pageRows.length === 0 ? (
                    <tr><td colSpan={10} className="text-center py-12 text-gray-400 text-sm">No employees match these filters.</td></tr>
                  ) : pageRows.map(e => (
                    <tr key={e.employee_id} className="border-b border-gray-50 hover:bg-gray-50/50 cursor-pointer" onClick={() => setEditing(e)}>
                      <td className="px-4 py-2.5 text-xs text-gray-400 font-mono">{e.employee_id}</td>
                      <td className="px-4 py-2.5 text-gray-700 font-medium">{[e.prefix, e.first_name, e.last_name].filter(Boolean).join(" ")}</td>
                      <td className="px-4 py-2.5 text-gray-500">{e.nickname || "—"}</td>
                      <td className="px-4 py-2.5 text-gray-600">{e.position || "—"}</td>
                      <td className="px-4 py-2.5"><DeptBadge dept={e.department} /></td>
                      <td className="px-4 py-2.5"><BranchBadge branch={e.branch} /></td>
                      <td className="px-4 py-2.5"><StatusBadge status={e.hiring_status} /></td>
                      <td className="px-4 py-2.5 text-gray-500 text-xs">{fmtDate(e.start_date)}</td>
                      <td className="px-4 py-2.5 text-gray-500 text-xs whitespace-nowrap">{tenureFromStart(e.start_date, e.end_date)}</td>
                      <td className="px-4 py-2.5 text-right">
                        <button onClick={(ev) => { ev.stopPropagation(); setEditing(e); }} className="text-gray-400 hover:text-teal-500 transition-colors p-1">{I.edit}</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <Pagination page={page} total={filtered.length} perPage={PAGE_SIZE} onPage={setPage} />
          </div>

          {editing && (
            <EmployeeFormModal
              employee={editing === "new" ? blankEmployee(employees) : editing}
              isNew={editing === "new"}
              positions={positions}
              onSave={saveEmp}
              onDelete={deleteEmp}
              onClose={() => setEditing(null)}
            />
          )}
        </div>
      );
    }

    function blankEmployee(employees) {
      return {
        employee_id: genId("EMP", employees, "employee_id"),
        prefix: "", first_name: "", last_name: "", nickname: "", id_card: "", birth_date: "",
        position: "", department: "restaurant", branch: "HQ",
        hiring_status: "Full Time", start_date: TODAY, end_date: "",
        salary_monthly: "", salary_daily: "", note: "",
      };
    }

    function EmployeeFormModal({ employee, isNew, positions, onSave, onDelete, onClose }) {
      const [form, setForm] = useState({ ...employee });
      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

      // When position changes, infer department from positions list
      function pickPosition(name) {
        update("position", name);
        const p = positions.find(x => x.name_th === name || x.name_en === name);
        if (p) update("department", p.department);
      }

      return (
        <Modal title={isNew ? "Add Employee" : `Edit · ${fullName(employee)}`} onClose={onClose} wide>
          <div className="grid grid-cols-2 gap-4">
            <Field label="Employee ID"><input value={form.employee_id} disabled className={inputCls + " bg-gray-50 text-gray-500"} /></Field>
            <Field label="Prefix">
              <select value={form.prefix} onChange={e => update("prefix", e.target.value)} className={inputCls}>
                <option value="">—</option>
                {["นาย","นางสาว","นาง","Mr","Ms","Mrs"].map(p => <option key={p}>{p}</option>)}
              </select>
            </Field>
            <Field label="First Name" required><input value={form.first_name} onChange={e => update("first_name", e.target.value)} className={inputCls} /></Field>
            <Field label="Last Name"><input value={form.last_name} onChange={e => update("last_name", e.target.value)} className={inputCls} /></Field>
            <Field label="Nickname"><input value={form.nickname} onChange={e => update("nickname", e.target.value)} className={inputCls} /></Field>
            <Field label="ID Card / Passport"><input value={form.id_card} onChange={e => update("id_card", e.target.value)} className={inputCls} /></Field>
            <Field label="Birth Date"><input type="date" value={form.birth_date} onChange={e => update("birth_date", e.target.value)} className={inputCls} /></Field>
            <Field label="Position">
              <input list="position-list" value={form.position} onChange={e => pickPosition(e.target.value)} className={inputCls} placeholder="Type or pick…" />
              <datalist id="position-list">
                {positions.map(p => <option key={p.id} value={p.name_th}>{p.name_en} · {p.department}</option>)}
                {positions.map(p => <option key={p.id + "_en"} value={p.name_en}>{p.name_th} · {p.department}</option>)}
              </datalist>
            </Field>
            <Field label="Department" required>
              <select value={form.department} onChange={e => update("department", e.target.value)} className={inputCls}>
                {DEPARTMENTS.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
              </select>
            </Field>
            <Field label="Branch" required>
              <select value={form.branch} onChange={e => update("branch", e.target.value)} className={inputCls}>
                {BRANCHES.map(b => <option key={b.id} value={b.id}>{b.label}</option>)}
              </select>
            </Field>
            <Field label="Hiring Status" required>
              <select value={form.hiring_status} onChange={e => update("hiring_status", e.target.value)} className={inputCls}>
                {HIRING_STATUSES.map(s => <option key={s}>{s}</option>)}
              </select>
            </Field>
            <Field label="Start Date"><input type="date" value={form.start_date} onChange={e => update("start_date", e.target.value)} className={inputCls} /></Field>
            <Field label="End Date" hint="Set when an employee resigns or is terminated">
              <input type="date" value={form.end_date} onChange={e => update("end_date", e.target.value)} className={inputCls} />
            </Field>
            <Field label="Monthly Salary (THB)"><input type="number" value={form.salary_monthly} onChange={e => update("salary_monthly", e.target.value)} className={inputCls} placeholder="e.g. 15000" /></Field>
            <Field label="Daily Wage (THB)"><input type="number" value={form.salary_daily} onChange={e => update("salary_daily", e.target.value)} className={inputCls} placeholder="e.g. 500" /></Field>
            <div className="col-span-2">
              <Field label="Note"><textarea value={form.note} onChange={e => update("note", e.target.value)} rows={2} className={inputCls} placeholder="Optional remarks…" /></Field>
            </div>
          </div>
          <div className="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
            {!isNew
              ? <button onClick={() => onDelete(form)} className="text-xs text-red-400 hover:text-red-600 flex items-center gap-1">{I.trash} Delete</button>
              : <span />
            }
            <div className="flex items-center gap-2">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
              <button onClick={() => onSave(form)} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium">Save</button>
            </div>
          </div>
        </Modal>
      );
    }

    // ─── LEAVE PAGE ──────────────────────────────────────────────────────────
    function LeavePage({ employees, leaveRecords, setLeaveRecords, leaveQuota, setLeaveQuota, user }) {
      const [tab,        setTab]        = useState("records"); // records | quota
      const [search,     setSearch]     = useState("");
      const [typeFilter, setTypeFilter] = useState("All");
      const [year,       setYear]       = useState(THIS_YEAR);
      const [page,       setPage]       = useState(1);
      const [editing,    setEditing]    = useState(null);
      const [editingQ,   setEditingQ]   = useState(null);

      const empMap = useMemo(() => Object.fromEntries(employees.map(e => [e.employee_id, e])), [employees]);
      const activeEmps = employees.filter(e => !["Resigned","Terminated"].includes(e.hiring_status));

      const filteredRecords = useMemo(() => {
        const q = search.trim().toLowerCase();
        return leaveRecords.filter(l => {
          if (typeFilter !== "All" && l.leave_type !== typeFilter) return false;
          if ((l.start_date || "").slice(0, 4) !== String(year)) return false;
          if (!q) return true;
          const emp = empMap[l.employee_id];
          return [fullName(emp), emp?.nickname, l.note].join(" ").toLowerCase().includes(q);
        }).sort((a, b) => (b.start_date || "").localeCompare(a.start_date || ""));
      }, [leaveRecords, search, typeFilter, year, empMap]);

      const pageRows = filteredRecords.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
      useEffect(() => { setPage(1); }, [search, typeFilter, year, tab]);

      // Compute usage per employee per year
      const usage = useMemo(() => {
        const m = {};
        leaveRecords.forEach(l => {
          if ((l.start_date || "").slice(0, 4) !== String(year)) return;
          const eid = l.employee_id;
          if (!m[eid]) m[eid] = { sick: 0, annual: 0, personal: 0, special: 0, unpaid: 0 };
          if (m[eid][l.leave_type] != null) m[eid][l.leave_type] += parseFloat(l.days) || 0;
        });
        return m;
      }, [leaveRecords, year]);

      function saveRec(rec) {
        if (!rec.employee_id) { alert("Please select an employee."); return; }
        if (!rec.start_date)  { alert("Please enter a start date."); return; }
        if (!rec.end_date)    rec.end_date = rec.start_date;
        if (!rec.days)        rec.days = String(diffDaysInclusive(rec.start_date, rec.end_date));
        const out = {
          ...rec,
          recorded_by: rec.recorded_by || (user?.name || "Admin"),
          recorded_at: rec.recorded_at || TODAY,
        };
        if (editing === "new") {
          out.id = out.id || genId("L", leaveRecords, "id");
          setLeaveRecords([...leaveRecords, out]);
        } else {
          setLeaveRecords(leaveRecords.map(x => x.id === out.id ? out : x));
        }
        setEditing(null);
      }
      function deleteRec(rec) {
        if (!confirm("Delete this leave record?")) return;
        setLeaveRecords(leaveRecords.filter(x => x.id !== rec.id));
        setEditing(null);
      }
      function saveQuota(q) {
        const exists = leaveQuota.find(x => x.employee_id === q.employee_id && x.year === q.year);
        if (exists) {
          setLeaveQuota(leaveQuota.map(x => (x.employee_id === q.employee_id && x.year === q.year) ? q : x));
        } else {
          setLeaveQuota([...leaveQuota, q]);
        }
        setEditingQ(null);
      }

      return (
        <div className="p-6 overflow-y-auto h-full">
          <PageHeader
            title="Leave"
            subtitle={tab === "records" ? "Leave records (admin entry from paper forms)" : "Annual leave quota per employee"}
            action={
              <div className="flex items-center gap-2">
                <select value={year} onChange={e => setYear(parseInt(e.target.value))}
                  className="text-sm border border-gray-200 rounded-xl px-3 py-2 bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-400">
                  {[THIS_YEAR - 1, THIS_YEAR, THIS_YEAR + 1].map(y => <option key={y} value={y}>{y}</option>)}
                </select>
                {tab === "records" && (
                  <button onClick={() => setEditing("new")}
                    className="flex items-center gap-2 px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium transition-colors">
                    {I.add} New Leave
                  </button>
                )}
              </div>
            }
          />

          {/* Tabs */}
          <div className="flex items-center gap-1 mb-4">
            {[
              { id: "records", label: "Records" },
              { id: "quota",   label: "Quota & Usage" },
            ].map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`px-4 py-1.5 rounded-xl text-sm font-medium transition-colors ${tab === t.id ? "bg-teal-50 text-teal-700" : "text-gray-500 hover:bg-gray-50"}`}>
                {t.label}
              </button>
            ))}
          </div>

          {tab === "records" ? (
            <>
              <div className="bg-white rounded-2xl border border-gray-100 p-3 mb-4 flex flex-wrap items-center gap-2">
                <div className="relative flex-1 min-w-[200px]">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{I.search}</span>
                  <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search employee or note…"
                    className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white" />
                </div>
                <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)}
                  className="text-sm border border-gray-200 rounded-xl px-3 py-2 bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-400">
                  <option value="All">All Types</option>
                  {LEAVE_TYPES.map(t => <option key={t.code} value={t.code}>{t.name_en}</option>)}
                </select>
              </div>

              <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead><tr className="border-b border-gray-100 bg-gray-50/60">
                      {["Employee","Type","From","To","Days","Status","Note",""].map(h=>(
                        <th key={h} className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                      ))}
                    </tr></thead>
                    <tbody>
                      {pageRows.length === 0 ? (
                        <tr><td colSpan={8} className="text-center py-12 text-gray-400 text-sm">No leave records for this filter.</td></tr>
                      ) : pageRows.map(l => {
                        const emp = empMap[l.employee_id];
                        return (
                          <tr key={l.id} className="border-b border-gray-50 hover:bg-gray-50/50 cursor-pointer" onClick={() => setEditing(l)}>
                            <td className="px-4 py-2.5 text-gray-700">{fullName(emp)} <span className="text-gray-400 ml-1 text-xs">({emp?.nickname})</span></td>
                            <td className="px-4 py-2.5"><LeaveBadge code={l.leave_type} /></td>
                            <td className="px-4 py-2.5 text-gray-600">{fmtDate(l.start_date)}</td>
                            <td className="px-4 py-2.5 text-gray-600">{fmtDate(l.end_date)}</td>
                            <td className="px-4 py-2.5 text-gray-700 font-medium">{l.days}</td>
                            <td className="px-4 py-2.5"><span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${l.status === "Approved" ? "bg-emerald-50 text-emerald-600" : l.status === "Pending" ? "bg-amber-50 text-amber-600" : "bg-red-50 text-red-500"}`}>{l.status || "Pending"}</span></td>
                            <td className="px-4 py-2.5 text-gray-500 text-xs max-w-xs truncate" title={l.note}>{l.note || "—"}</td>
                            <td className="px-4 py-2.5 text-right">
                              <button onClick={(ev) => { ev.stopPropagation(); setEditing(l); }} className="text-gray-400 hover:text-teal-500 p-1">{I.edit}</button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <Pagination page={page} total={filteredRecords.length} perPage={PAGE_SIZE} onPage={setPage} />
              </div>
            </>
          ) : (
            <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="border-b border-gray-100 bg-gray-50/60">
                      <th className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">Employee</th>
                      <th className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">Dept</th>
                      {LEAVE_TYPES.map(t => (
                        <th key={t.code} className="text-center px-3 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{t.name_en}<br/><span className="text-[10px] normal-case text-gray-400 font-normal">used / quota</span></th>
                      ))}
                      <th className="px-4 py-2.5"></th>
                    </tr>
                  </thead>
                  <tbody>
                    {activeEmps.length === 0 ? (
                      <tr><td colSpan={8} className="text-center py-12 text-gray-400 text-sm">No active employees.</td></tr>
                    ) : activeEmps.map(e => {
                      const q = leaveQuota.find(x => x.employee_id === e.employee_id && String(x.year) === String(year)) || { year: String(year), employee_id: e.employee_id, sick: "0", annual: "0", personal: "0", special: "0", unpaid: "0" };
                      const u = usage[e.employee_id] || {};
                      return (
                        <tr key={e.employee_id} className="border-b border-gray-50 hover:bg-gray-50/50 cursor-pointer" onClick={() => setEditingQ(q)}>
                          <td className="px-4 py-2.5 text-gray-700">{fullName(e)} <span className="text-gray-400 text-xs ml-1">({e.nickname})</span></td>
                          <td className="px-4 py-2.5"><DeptBadge dept={e.department} /></td>
                          {LEAVE_TYPES.map(t => {
                            const used  = (u[t.code] || 0);
                            const quota = parseFloat(q[t.code]) || 0;
                            const over  = quota > 0 && used > quota;
                            return (
                              <td key={t.code} className="px-3 py-2.5 text-center">
                                <span className={`text-xs font-medium ${over ? "text-red-500" : used > 0 ? "text-gray-700" : "text-gray-400"}`}>{used} / {quota || "—"}</span>
                              </td>
                            );
                          })}
                          <td className="px-4 py-2.5 text-right">
                            <button onClick={(ev) => { ev.stopPropagation(); setEditingQ(q); }} className="text-gray-400 hover:text-teal-500 p-1">{I.edit}</button>
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {editing && (
            <LeaveFormModal
              record={editing === "new" ? blankLeave(leaveRecords, user) : editing}
              isNew={editing === "new"}
              employees={employees}
              onSave={saveRec}
              onDelete={deleteRec}
              onClose={() => setEditing(null)}
            />
          )}

          {editingQ && (
            <QuotaFormModal
              quota={editingQ}
              employee={empMap[editingQ.employee_id]}
              onSave={saveQuota}
              onClose={() => setEditingQ(null)}
            />
          )}
        </div>
      );
    }

    function blankLeave(records, user) {
      return {
        id: genId("L", records, "id"),
        employee_id: "",
        leave_type: "sick",
        start_date: TODAY, end_date: TODAY,
        days: "1", status: "Approved", note: "",
        recorded_by: user?.name || "Admin",
        recorded_at: TODAY,
      };
    }

    function LeaveFormModal({ record, isNew, employees, onSave, onDelete, onClose }) {
      const [form, setForm] = useState({ ...record });
      const update = (k, v) => setForm(f => {
        const next = { ...f, [k]: v };
        if (k === "start_date" || k === "end_date") {
          const s = k === "start_date" ? v : f.start_date;
          let e = k === "end_date" ? v : f.end_date;
          if (k === "start_date" && (!f.end_date || f.end_date < s)) { e = s; next.end_date = s; }
          next.days = String(diffDaysInclusive(s, e));
        }
        return next;
      });

      return (
        <Modal title={isNew ? "New Leave Record" : "Edit Leave Record"} onClose={onClose} wide>
          <div className="grid grid-cols-2 gap-4">
            <div className="col-span-2">
              <Field label="Employee" required>
                <select value={form.employee_id} onChange={e => update("employee_id", e.target.value)} className={inputCls}>
                  <option value="">— Select —</option>
                  {employees.filter(e => !["Resigned","Terminated"].includes(e.hiring_status)).map(e => (
                    <option key={e.employee_id} value={e.employee_id}>{fullName(e)} ({e.nickname || e.employee_id}) · {e.position}</option>
                  ))}
                </select>
              </Field>
            </div>
            <Field label="Leave Type" required>
              <select value={form.leave_type} onChange={e => update("leave_type", e.target.value)} className={inputCls}>
                {LEAVE_TYPES.map(t => <option key={t.code} value={t.code}>{t.name_en} ({t.name_th})</option>)}
              </select>
            </Field>
            <Field label="Status">
              <select value={form.status} onChange={e => update("status", e.target.value)} className={inputCls}>
                {["Approved","Pending","Rejected"].map(s => <option key={s}>{s}</option>)}
              </select>
            </Field>
            <Field label="Start Date" required><input type="date" value={form.start_date} onChange={e => update("start_date", e.target.value)} className={inputCls} /></Field>
            <Field label="End Date" required><input type="date" value={form.end_date} onChange={e => update("end_date", e.target.value)} className={inputCls} /></Field>
            <Field label="Days"><input type="number" value={form.days} onChange={e => update("days", e.target.value)} step="0.5" className={inputCls} /></Field>
            <Field label="Recorded By"><input value={form.recorded_by} onChange={e => update("recorded_by", e.target.value)} className={inputCls} /></Field>
            <div className="col-span-2">
              <Field label="Note / Reason"><textarea value={form.note} onChange={e => update("note", e.target.value)} rows={3} className={inputCls} placeholder="From the paper leave form…" /></Field>
            </div>
          </div>
          <div className="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
            {!isNew
              ? <button onClick={() => onDelete(form)} className="text-xs text-red-400 hover:text-red-600 flex items-center gap-1">{I.trash} Delete</button>
              : <span />}
            <div className="flex items-center gap-2">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
              <button onClick={() => onSave(form)} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium">Save</button>
            </div>
          </div>
        </Modal>
      );
    }

    function QuotaFormModal({ quota, employee, onSave, onClose }) {
      const [form, setForm] = useState({ ...quota });
      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

      return (
        <Modal title={`Quota · ${fullName(employee)} · ${quota.year}`} onClose={onClose}>
          <div className="grid grid-cols-2 gap-4">
            {LEAVE_TYPES.map(t => (
              <Field key={t.code} label={`${t.name_en} (days)`}>
                <input type="number" value={form[t.code] || ""} onChange={e => update(t.code, e.target.value)} className={inputCls} />
              </Field>
            ))}
            <div className="col-span-2">
              <Field label="Pro-rate Eligible Date" hint="Date when employee becomes eligible for full annual leave (typically 1 year after start date).">
                <input type="date" value={form.prorate_eligible_date || ""} onChange={e => update("prorate_eligible_date", e.target.value)} className={inputCls} />
              </Field>
            </div>
          </div>
          <div className="flex items-center justify-end gap-2 mt-6 pt-4 border-t border-gray-100">
            <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
            <button onClick={() => onSave(form)} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium">Save</button>
          </div>
        </Modal>
      );
    }

    // ─── COMPENSATION & BENEFITS PAGE ────────────────────────────────────────
    function CompensationPage({ compensation, setCompensation, settings, user }) {
      const [editing, setEditing] = useState(null);
      const [search,  setSearch]  = useState("");
      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        if (!q) return compensation;
        return compensation.filter(c => [c.item_th, c.item_en, c.category, c.remark].join(" ").toLowerCase().includes(q));
      }, [compensation, search]);

      const grouped = useMemo(() => {
        const groups = {};
        filtered.forEach(c => {
          const cat = c.category || "Other";
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(c);
        });
        return groups;
      }, [filtered]);

      function saveItem(item) {
        if (!item.item_th && !item.item_en) { alert("Please enter the benefit name."); return; }
        if (editing === "new") {
          const i = { ...item, id: item.id || genId("C", compensation, "id") };
          setCompensation([...compensation, i]);
        } else {
          setCompensation(compensation.map(x => x.id === item.id ? item : x));
        }
        setEditing(null);
      }
      function deleteItem(item) {
        if (!confirm("Delete this benefit row?")) return;
        setCompensation(compensation.filter(x => x.id !== item.id));
        setEditing(null);
      }

      const opHrs = (k) => settings.find(s => s.key === k)?.value;

      return (
        <div className="p-6 overflow-y-auto h-full">
          <PageHeader
            title="Compensation & Benefits"
            subtitle="Benefits matrix by department · click any row to edit"
            action={
              <button onClick={() => setEditing("new")}
                className="flex items-center gap-2 px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium transition-colors">
                {I.add} Add Benefit
              </button>
            }
          />

          {/* Operating hours quick reference */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-5">
            <InfoBlock title="Restaurant Hours" lines={[opHrs("operating_hours_weekday") || "—", opHrs("operating_hours_weekend") || "—"]} color="teal" />
            <InfoBlock title="Brewery Hours" lines={[opHrs("brewery_hours") || "—", `Off days: ${opHrs("monthly_off_days") || "—"}/month`]} color="amber" />
            <InfoBlock title="OT Rates" lines={[`${opHrs("ot_rate_hour") || "—"} THB/hr`, `Brewery weekend: ${opHrs("ot_rate_brewery_weekend") || "—"}`]} color="rose" />
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 p-3 mb-4">
            <div className="relative">
              <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{I.search}</span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search benefit, category, remark…"
                className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white" />
            </div>
          </div>

          {Object.keys(grouped).length === 0 ? (
            <EmptyState icon="💰" title="No benefits yet" hint="Click 'Add Benefit' to start." />
          ) : Object.entries(grouped).map(([cat, items]) => (
            <div key={cat} className="bg-white rounded-2xl border border-gray-100 mb-4 overflow-hidden">
              <div className="px-5 py-3 border-b border-gray-100 bg-gray-50/40">
                <p className="text-sm font-semibold text-gray-700">{cat === "Basic" ? "Basic Compensation" : cat === "Welfare" ? "Welfare Benefits" : cat === "Zone" ? "Zone-specific Compensation" : cat === "Extra" ? "Additional Benefits" : cat}</p>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-sm">
                  <thead><tr className="border-b border-gray-100 bg-white">
                    {["Benefit","Brewery","Bar / Restaurant","Kitchen","Office","Remark",""].map(h=>(
                      <th key={h} className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>
                    {items.map(c => (
                      <tr key={c.id} className="border-b border-gray-50 hover:bg-gray-50/50 cursor-pointer" onClick={() => setEditing(c)}>
                        <td className="px-4 py-3">
                          <p className="text-sm font-medium text-gray-700">{c.item_en || c.item_th}</p>
                          {c.item_th && c.item_en && <p className="text-xs text-gray-400">{c.item_th}</p>}
                        </td>
                        {["brewery","bar_restaurant","kitchen","office"].map(k => (
                          <td key={k} className="px-4 py-3 text-center">
                            {c[k] === "✅" || c[k] === "yes" || c[k] === "Yes"
                              ? <span className="text-emerald-500">✓</span>
                              : c[k] === "—" || !c[k] ? <span className="text-gray-300">—</span>
                              : <span className="text-xs text-gray-600">{c[k]}</span>}
                          </td>
                        ))}
                        <td className="px-4 py-3 text-xs text-gray-500 max-w-md whitespace-pre-line">{c.remark || ""}</td>
                        <td className="px-4 py-3 text-right">
                          <button onClick={(ev) => { ev.stopPropagation(); setEditing(c); }} className="text-gray-400 hover:text-teal-500 p-1">{I.edit}</button>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          ))}

          {editing && (
            <CompensationFormModal
              item={editing === "new" ? { id: genId("C", compensation, "id"), item_th:"", item_en:"", category:"Welfare", brewery:"", bar_restaurant:"", kitchen:"", office:"", remark:"" } : editing}
              isNew={editing === "new"}
              onSave={saveItem}
              onDelete={deleteItem}
              onClose={() => setEditing(null)}
            />
          )}
        </div>
      );
    }

    function InfoBlock({ title, lines, color }) {
      const map = { teal: "bg-teal-50 border-teal-100", amber: "bg-amber-50 border-amber-100", rose: "bg-rose-50 border-rose-100" };
      return (
        <div className={`rounded-2xl border p-4 ${map[color] || "bg-gray-50 border-gray-100"}`}>
          <p className="text-xs font-medium text-gray-500 uppercase tracking-wide">{title}</p>
          {lines.map((l, i) => <p key={i} className="text-sm text-gray-700 mt-1">{l}</p>)}
        </div>
      );
    }

    function CompensationFormModal({ item, isNew, onSave, onDelete, onClose }) {
      const [form, setForm] = useState({ ...item });
      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));

      return (
        <Modal title={isNew ? "Add Benefit" : "Edit Benefit"} onClose={onClose} wide>
          <div className="grid grid-cols-2 gap-4">
            <Field label="English Name"><input value={form.item_en} onChange={e => update("item_en", e.target.value)} className={inputCls} /></Field>
            <Field label="Thai Name"><input value={form.item_th} onChange={e => update("item_th", e.target.value)} className={inputCls} /></Field>
            <Field label="Category">
              <select value={form.category} onChange={e => update("category", e.target.value)} className={inputCls}>
                {["Basic","Zone","Welfare","Extra"].map(c => <option key={c}>{c}</option>)}
              </select>
            </Field>
            <div />
            {[
              ["brewery","Brewery"],
              ["bar_restaurant","Bar / Restaurant"],
              ["kitchen","Kitchen"],
              ["office","Office"],
            ].map(([k, label]) => (
              <Field key={k} label={`${label} value`}>
                <input value={form[k] || ""} onChange={e => update(k, e.target.value)} className={inputCls} placeholder='✅, custom value, or leave blank' />
              </Field>
            ))}
            <div className="col-span-2">
              <Field label="Remark"><textarea value={form.remark} onChange={e => update("remark", e.target.value)} rows={3} className={inputCls} /></Field>
            </div>
          </div>
          <div className="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
            {!isNew
              ? <button onClick={() => onDelete(form)} className="text-xs text-red-400 hover:text-red-600 flex items-center gap-1">{I.trash} Delete</button>
              : <span />}
            <div className="flex items-center gap-2">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
              <button onClick={() => onSave(form)} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium">Save</button>
            </div>
          </div>
        </Modal>
      );
    }

    // ─── JOB DESCRIPTIONS PAGE ───────────────────────────────────────────────
    function JDPage({ positions, setPositions, jds, setJds, user }) {
      const [search, setSearch] = useState("");
      const [selected, setSelected] = useState(null);
      const [editingPos, setEditingPos] = useState(null);
      const [editingJD, setEditingJD] = useState(false);

      const filtered = useMemo(() => {
        const q = search.trim().toLowerCase();
        if (!q) return positions;
        return positions.filter(p => [p.name_th, p.name_en, p.department].join(" ").toLowerCase().includes(q));
      }, [positions, search]);

      const grouped = useMemo(() => {
        const m = {};
        filtered.forEach(p => { (m[p.department] = m[p.department] || []).push(p); });
        return m;
      }, [filtered]);

      const currentJD = selected ? (jds.find(j => j.position_id === selected.id) || { position_id: selected.id, qualifications:"", responsibilities:"", benefits_summary:"", updated_by:"", updated_at:"" }) : null;

      function savePosition(p) {
        if (!p.name_en && !p.name_th) { alert("Please enter at least one name."); return; }
        if (editingPos === "new") {
          const np = { ...p, id: p.id || genId("P", positions, "id") };
          setPositions([...positions, np]);
          setSelected(np);
        } else {
          setPositions(positions.map(x => x.id === p.id ? p : x));
          if (selected?.id === p.id) setSelected(p);
        }
        setEditingPos(null);
      }
      function deletePosition(p) {
        if (!confirm(`Delete position ${p.name_en || p.name_th}? This will also remove its job description.`)) return;
        setPositions(positions.filter(x => x.id !== p.id));
        setJds(jds.filter(j => j.position_id !== p.id));
        if (selected?.id === p.id) setSelected(null);
        setEditingPos(null);
      }
      function saveJD(jd) {
        const out = { ...jd, updated_by: user?.name || "Admin", updated_at: TODAY };
        const exists = jds.find(j => j.position_id === out.position_id);
        if (exists) {
          setJds(jds.map(j => j.position_id === out.position_id ? out : j));
        } else {
          setJds([...jds, out]);
        }
        setEditingJD(false);
      }

      return (
        <div className="p-6 overflow-y-auto h-full">
          <PageHeader
            title="Job Descriptions"
            subtitle={`${positions.length} positions across ${DEPARTMENTS.length} departments`}
            action={
              <button onClick={() => setEditingPos("new")}
                className="flex items-center gap-2 px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium transition-colors">
                {I.add} Add Position
              </button>
            }
          />

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            {/* Left: position list */}
            <div className="lg:col-span-1 space-y-3">
              <div className="bg-white rounded-2xl border border-gray-100 p-3">
                <div className="relative">
                  <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">{I.search}</span>
                  <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search positions…"
                    className="w-full pl-9 pr-3 py-2 text-sm border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 bg-white" />
                </div>
              </div>

              {DEPARTMENTS.map(d => {
                const list = grouped[d.id] || [];
                if (!list.length) return null;
                return (
                  <div key={d.id} className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                    <div className="px-4 py-2.5 border-b border-gray-100 bg-gray-50/40 flex items-center justify-between">
                      <DeptBadge dept={d.id} />
                      <span className="text-xs text-gray-400">{list.length}</span>
                    </div>
                    <div className="divide-y divide-gray-50">
                      {list.map(p => (
                        <button key={p.id} onClick={() => setSelected(p)}
                          className={`w-full px-4 py-2.5 text-left flex items-center justify-between hover:bg-gray-50 transition-colors ${selected?.id === p.id ? "bg-teal-50/50" : ""}`}>
                          <div className="min-w-0">
                            <p className="text-sm font-medium text-gray-700 truncate">{p.name_en}</p>
                            <p className="text-xs text-gray-400 truncate">{p.name_th}</p>
                          </div>
                          {jds.find(j => j.position_id === p.id)
                            ? <span className="text-xs text-emerald-500 shrink-0 ml-2">●</span>
                            : <span className="text-xs text-gray-300 shrink-0 ml-2">○</span>}
                        </button>
                      ))}
                    </div>
                  </div>
                );
              })}

              {Object.keys(grouped).length === 0 && (
                <EmptyState icon="💼" title="No positions" hint="Click 'Add Position' to start." />
              )}
            </div>

            {/* Right: JD detail */}
            <div className="lg:col-span-2">
              {!selected ? (
                <EmptyState icon="📋" title="Select a position" hint="Pick a position on the left to view or edit its job description." />
              ) : (
                <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
                  <div className="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                    <div>
                      <p className="text-xs text-gray-400 uppercase tracking-wide font-medium">Job Description</p>
                      <h2 className="text-lg font-bold text-gray-800 mt-0.5">{selected.name_en}</h2>
                      <p className="text-sm text-gray-400">{selected.name_th}</p>
                      <div className="flex items-center gap-2 mt-2">
                        <DeptBadge dept={selected.department} />
                        <span className="text-xs text-gray-400">{selected.default_employment_type}</span>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <button onClick={() => setEditingPos(selected)}
                        className="px-3 py-1.5 text-xs text-gray-500 hover:bg-gray-50 rounded-lg flex items-center gap-1">{I.edit} Position</button>
                      <button onClick={() => setEditingJD(true)}
                        className="px-3 py-1.5 text-xs bg-teal-50 text-teal-600 hover:bg-teal-100 rounded-lg flex items-center gap-1">{I.edit} JD</button>
                    </div>
                  </div>
                  <div className="p-6 space-y-6">
                    <JDSection title="Qualifications" content={currentJD.qualifications} />
                    <JDSection title="Responsibilities" content={currentJD.responsibilities} />
                    <JDSection title="Benefits Summary" content={currentJD.benefits_summary} />
                    {currentJD.updated_at && (
                      <p className="text-xs text-gray-400 pt-3 border-t border-gray-100">Last updated {fmtDate(currentJD.updated_at)} by {currentJD.updated_by || "—"}</p>
                    )}
                  </div>
                </div>
              )}
            </div>
          </div>

          {editingPos && (
            <PositionFormModal
              position={editingPos === "new" ? { id: genId("P", positions, "id"), name_th:"", name_en:"", department:"restaurant", default_employment_type:"Full Time" } : editingPos}
              isNew={editingPos === "new"}
              onSave={savePosition}
              onDelete={deletePosition}
              onClose={() => setEditingPos(null)}
            />
          )}

          {editingJD && selected && (
            <JDFormModal
              jd={currentJD}
              position={selected}
              onSave={saveJD}
              onClose={() => setEditingJD(false)}
            />
          )}
        </div>
      );
    }

    function JDSection({ title, content }) {
      return (
        <div>
          <p className="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">{title}</p>
          {content
            ? <p className="text-sm text-gray-700 whitespace-pre-line leading-relaxed">{content}</p>
            : <p className="text-sm text-gray-300 italic">Not specified</p>}
        </div>
      );
    }

    function PositionFormModal({ position, isNew, onSave, onDelete, onClose }) {
      const [form, setForm] = useState({ ...position });
      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));
      return (
        <Modal title={isNew ? "Add Position" : "Edit Position"} onClose={onClose}>
          <div className="grid grid-cols-2 gap-4">
            <Field label="English Name" required><input value={form.name_en} onChange={e => update("name_en", e.target.value)} className={inputCls} /></Field>
            <Field label="Thai Name"><input value={form.name_th} onChange={e => update("name_th", e.target.value)} className={inputCls} /></Field>
            <Field label="Department" required>
              <select value={form.department} onChange={e => update("department", e.target.value)} className={inputCls}>
                {DEPARTMENTS.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
              </select>
            </Field>
            <Field label="Default Employment Type">
              <select value={form.default_employment_type} onChange={e => update("default_employment_type", e.target.value)} className={inputCls}>
                {["Full Time","Part Time","Contract"].map(s => <option key={s}>{s}</option>)}
              </select>
            </Field>
          </div>
          <div className="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
            {!isNew
              ? <button onClick={() => onDelete(form)} className="text-xs text-red-400 hover:text-red-600 flex items-center gap-1">{I.trash} Delete</button>
              : <span />}
            <div className="flex items-center gap-2">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
              <button onClick={() => onSave(form)} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium">Save</button>
            </div>
          </div>
        </Modal>
      );
    }

    function JDFormModal({ jd, position, onSave, onClose }) {
      const [form, setForm] = useState({ ...jd });
      const update = (k, v) => setForm(f => ({ ...f, [k]: v }));
      return (
        <Modal title={`Edit JD · ${position.name_en}`} onClose={onClose} xwide>
          <div className="space-y-4">
            <Field label="Qualifications" hint="One per line — e.g. age, education, experience"><textarea value={form.qualifications} onChange={e => update("qualifications", e.target.value)} rows={6} className={inputCls + " font-mono text-xs leading-relaxed"} /></Field>
            <Field label="Responsibilities" hint="Numbered or bulleted list of duties"><textarea value={form.responsibilities} onChange={e => update("responsibilities", e.target.value)} rows={8} className={inputCls + " font-mono text-xs leading-relaxed"} /></Field>
            <Field label="Benefits Summary" hint="Quick summary of benefits for this position"><textarea value={form.benefits_summary} onChange={e => update("benefits_summary", e.target.value)} rows={4} className={inputCls + " font-mono text-xs leading-relaxed"} /></Field>
          </div>
          <div className="flex items-center justify-end gap-2 mt-6 pt-4 border-t border-gray-100">
            <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
            <button onClick={() => onSave(form)} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium">Save</button>
          </div>
        </Modal>
      );
    }

    // ─── BUSINESS CALENDAR PAGE ──────────────────────────────────────────────
    function CalendarPage({ calendar, setCalendar, user }) {
      const [year,    setYear]    = useState(THIS_YEAR);
      const [editing, setEditing] = useState(null);
      const [deptFilter, setDeptFilter] = useState("All");

      const filtered = useMemo(() => {
        return calendar
          .filter(h => String(h.year) === String(year))
          .filter(h => deptFilter === "All" ? true : h["applies_" + deptFilter] === "yes")
          .sort((a, b) => (a.date_start || "").localeCompare(b.date_start || ""));
      }, [calendar, year, deptFilter]);

      function saveItem(item) {
        if (!item.date_start) { alert("Please enter a start date."); return; }
        if (!item.name_th && !item.name_en) { alert("Please enter the holiday name."); return; }
        if (!item.date_end) item.date_end = item.date_start;
        if (!item.year) item.year = String(item.date_start.slice(0, 4));
        if (!item.days_off) item.days_off = String(diffDaysInclusive(item.date_start, item.date_end));
        if (editing === "new") {
          const i = { ...item, id: item.id || genId("H", calendar, "id") };
          setCalendar([...calendar, i]);
        } else {
          setCalendar(calendar.map(x => x.id === item.id ? item : x));
        }
        setEditing(null);
      }
      function deleteItem(item) {
        if (!confirm("Delete this calendar entry?")) return;
        setCalendar(calendar.filter(x => x.id !== item.id));
        setEditing(null);
      }

      const totalDaysByDept = useMemo(() => {
        const m = { brewery: 0, restaurant: 0, kitchen: 0, office: 0 };
        filtered.forEach(h => {
          const d = parseFloat(h.days_off) || 0;
          DEPARTMENTS.forEach(dep => { if (h["applies_" + dep.id] === "yes") m[dep.id] += d; });
        });
        return m;
      }, [filtered]);

      return (
        <div className="p-6 overflow-y-auto h-full">
          <PageHeader
            title="Business Calendar"
            subtitle="Public holidays and special days per department"
            action={
              <div className="flex items-center gap-2">
                <select value={year} onChange={e => setYear(parseInt(e.target.value))}
                  className="text-sm border border-gray-200 rounded-xl px-3 py-2 bg-white text-gray-600 focus:outline-none focus:ring-2 focus:ring-teal-400">
                  {[THIS_YEAR - 1, THIS_YEAR, THIS_YEAR + 1, THIS_YEAR + 2].map(y => <option key={y} value={y}>{y}</option>)}
                </select>
                <button onClick={() => setEditing("new")}
                  className="flex items-center gap-2 px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium transition-colors">
                  {I.add} Add Holiday
                </button>
              </div>
            }
          />

          {/* Dept totals */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
            {DEPARTMENTS.map(d => (
              <div key={d.id} className="bg-white rounded-2xl border border-gray-100 p-4">
                <DeptBadge dept={d.id} />
                <p className="text-2xl font-bold text-gray-800 mt-2">{totalDaysByDept[d.id]}</p>
                <p className="text-xs text-gray-400">days off in {year}</p>
              </div>
            ))}
          </div>

          {/* Filter */}
          <div className="flex items-center gap-1 mb-4">
            <button onClick={() => setDeptFilter("All")}
              className={`px-3 py-1.5 rounded-xl text-xs font-medium ${deptFilter === "All" ? "bg-teal-50 text-teal-700" : "text-gray-500 hover:bg-gray-50"}`}>All</button>
            {DEPARTMENTS.map(d => (
              <button key={d.id} onClick={() => setDeptFilter(d.id)}
                className={`px-3 py-1.5 rounded-xl text-xs font-medium ${deptFilter === d.id ? "bg-teal-50 text-teal-700" : "text-gray-500 hover:bg-gray-50"}`}>{d.label}</button>
            ))}
          </div>

          {/* Table */}
          <div className="bg-white rounded-2xl border border-gray-100 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead><tr className="border-b border-gray-100 bg-gray-50/60">
                  {["Date","Name","Days","Brewery","Restaurant","Kitchen","Office","Note",""].map(h=>(
                    <th key={h} className="text-left px-4 py-2.5 text-xs font-medium text-gray-400 uppercase tracking-wide">{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {filtered.length === 0 ? (
                    <tr><td colSpan={9} className="text-center py-12 text-gray-400 text-sm">No holidays in {year}.</td></tr>
                  ) : filtered.map(h => (
                    <tr key={h.id} className="border-b border-gray-50 hover:bg-gray-50/50 cursor-pointer" onClick={() => setEditing(h)}>
                      <td className="px-4 py-2.5 text-gray-600 text-xs whitespace-nowrap">
                        {fmtDate(h.date_start)}{h.date_end !== h.date_start && <> → {fmtDate(h.date_end)}</>}
                      </td>
                      <td className="px-4 py-2.5">
                        <p className="text-sm font-medium text-gray-700">{h.name_en || h.name_th}</p>
                        {h.name_th && h.name_en && <p className="text-xs text-gray-400">{h.name_th}</p>}
                      </td>
                      <td className="px-4 py-2.5 text-gray-700 font-medium">{h.days_off}</td>
                      {DEPARTMENTS.map(d => (
                        <td key={d.id} className="px-4 py-2.5 text-center">
                          {h["applies_" + d.id] === "yes" ? <span className="text-emerald-500">✓</span> : <span className="text-gray-300">—</span>}
                        </td>
                      ))}
                      <td className="px-4 py-2.5 text-xs text-gray-500">{h.note || ""}</td>
                      <td className="px-4 py-2.5 text-right">
                        <button onClick={(ev) => { ev.stopPropagation(); setEditing(h); }} className="text-gray-400 hover:text-teal-500 p-1">{I.edit}</button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>

          {editing && (
            <CalendarFormModal
              item={editing === "new" ? { id: genId("H", calendar, "id"), year: String(year), date_start: TODAY, date_end: TODAY, name_th:"", name_en:"", note:"", days_off:"1", applies_brewery:"yes", applies_restaurant:"yes", applies_kitchen:"yes", applies_office:"yes" } : editing}
              isNew={editing === "new"}
              onSave={saveItem}
              onDelete={deleteItem}
              onClose={() => setEditing(null)}
            />
          )}
        </div>
      );
    }

    function CalendarFormModal({ item, isNew, onSave, onDelete, onClose }) {
      const [form, setForm] = useState({ ...item });
      const update = (k, v) => setForm(f => {
        const next = { ...f, [k]: v };
        if (k === "date_start" || k === "date_end") {
          const s = k === "date_start" ? v : f.date_start;
          let e = k === "date_end" ? v : f.date_end;
          if (k === "date_start" && (!f.date_end || f.date_end < s)) { e = s; next.date_end = s; }
          next.days_off = String(diffDaysInclusive(s, e));
          next.year = (s || "").slice(0, 4);
        }
        return next;
      });
      const toggleDept = (id) => update("applies_" + id, form["applies_" + id] === "yes" ? "" : "yes");

      return (
        <Modal title={isNew ? "Add Holiday" : "Edit Holiday"} onClose={onClose} wide>
          <div className="grid grid-cols-2 gap-4">
            <Field label="Start Date" required><input type="date" value={form.date_start} onChange={e => update("date_start", e.target.value)} className={inputCls} /></Field>
            <Field label="End Date"><input type="date" value={form.date_end} onChange={e => update("date_end", e.target.value)} className={inputCls} /></Field>
            <Field label="English Name"><input value={form.name_en} onChange={e => update("name_en", e.target.value)} className={inputCls} /></Field>
            <Field label="Thai Name"><input value={form.name_th} onChange={e => update("name_th", e.target.value)} className={inputCls} /></Field>
            <Field label="Days Off"><input type="number" value={form.days_off} onChange={e => update("days_off", e.target.value)} className={inputCls} /></Field>
            <Field label="Year"><input value={form.year} onChange={e => update("year", e.target.value)} className={inputCls} /></Field>
            <div className="col-span-2">
              <label className={labelCls}>Applies to Departments</label>
              <div className="flex flex-wrap gap-2">
                {DEPARTMENTS.map(d => (
                  <button key={d.id} type="button" onClick={() => toggleDept(d.id)}
                    className={`px-3 py-1.5 rounded-xl text-xs font-medium transition-colors border ${form["applies_" + d.id] === "yes" ? "bg-teal-50 text-teal-700 border-teal-200" : "bg-white text-gray-500 border-gray-200 hover:bg-gray-50"}`}>
                    {form["applies_" + d.id] === "yes" ? "✓ " : ""}{d.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="col-span-2">
              <Field label="Note"><textarea value={form.note} onChange={e => update("note", e.target.value)} rows={2} className={inputCls} placeholder="e.g. Outing, ชดเชย, tentative…" /></Field>
            </div>
          </div>
          <div className="flex items-center justify-between mt-6 pt-4 border-t border-gray-100">
            {!isNew
              ? <button onClick={() => onDelete(form)} className="text-xs text-red-400 hover:text-red-600 flex items-center gap-1">{I.trash} Delete</button>
              : <span />}
            <div className="flex items-center gap-2">
              <button onClick={onClose} className="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">Cancel</button>
              <button onClick={() => onSave(form)} className="px-4 py-2 bg-teal-500 hover:bg-teal-600 text-white rounded-xl text-sm font-medium">Save</button>
            </div>
          </div>
        </Modal>
      );
    }

    // ─── SETTINGS PAGE ───────────────────────────────────────────────────────
    function SettingsPage({ settings, setSettings, leaveTypes }) {
